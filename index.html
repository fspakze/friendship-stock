<!-- html5-qrcode with multi-CDN fallback -->
<script>
(function loadHtml5Qrcode() {
  // аёҘаёіаё”аёұаёҡ CDN: jsdelivr вҶ’ cdnjs вҶ’ unpkg
  const cdns = [
    'https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js',
    'https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js',
    'https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js'
  ];
  let idx = 0;
  function tryLoad() {
    if (idx >= cdns.length) {
      console.error('[FS] All html5-qrcode CDNs failed!');
      window._html5QrcodeLoadFailed = true;
      return;
    }
    const script = document.createElement('script');
    script.src = cdns[idx];
    script.async = false;
    script.onload = () => {
      console.log('[FS] html5-qrcode loaded from:', cdns[idx]);
      window._html5QrcodeLoadedFrom = cdns[idx];
    };
    script.onerror = () => {
      console.warn('[FS] CDN failed:', cdns[idx]);
      idx++;
      tryLoad();
    };
    document.head.appendChild(script);
  }
  tryLoad();
})();
</script>

<style>

  /* APP */
  .app { min-height: 100vh; display: none; }

  .topbar { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--slate-200); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }

  #reader video, #locReader video { 
    width: 100% !important; 
    height: 100% !important; 
    object-fit: cover !important;
    /* iOS Safari fixes */
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    background: #000;

  /* hide html5-qrcode default UI clutter on small screens */

  #reader__scan_region, #locReader__scan_region { background: transparent !important; min-height: 0 !important; }

  .meta-label { font-size: 10px; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
  .meta-value { font-size: 13px; font-weight: 700; color: var(--slate-900); margin-top: 2px; font-family: 'Space Grotesk', sans-serif; }
  
  .count-section { background: linear-gradient(135deg, var(--teal-50), white); border-radius: 11px; padding: 11px; border: 2px solid var(--teal-100); margin-bottom: 10px; }
  .count-section.audit-mode { background: linear-gradient(135deg, var(--amber-100), white); border-color: var(--amber-400); }
  .count-section.tiebreaker-mode { background: linear-gradient(135deg, var(--violet-100), white); border-color: var(--violet-500); }
  .count-label { font-size: 11px; font-weight: 700; color: var(--teal-700); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-align: center; }
  .count-section.audit-mode .count-label { color: #92400e; }
  .count-section.tiebreaker-mode .count-label { color: var(--violet-600); }
  .count-controls { display: flex; align-items: center; gap: 7px; }

  .count-section.tiebreaker-mode .count-btn { color: var(--violet-600); }
  .count-btn:active { transform: scale(0.92); }
  .count-input { flex: 1; height: 44px; border: 2px solid var(--teal-200); border-radius: 11px; text-align: center; font-size: 22px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; background: white; }
  .count-section.audit-mode .count-input { border-color: var(--amber-400); }
  .count-section.tiebreaker-mode .count-input { border-color: var(--violet-500); }
  
  .note-input { width: 100%; padding: 9px 11px; border: 2px solid var(--slate-200); border-radius: 9px; font-size: 13px; font-family: inherit; margin-bottom: 9px; resize: none; }
  .action-row { display: flex; gap: 7px; }
  .action-row .btn { flex: 1; }
  
  /* Quick actions */
  .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .quick-btn { padding: 8px; border: 1px dashed var(--slate-300); background: var(--slate-50); border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--slate-600); display: flex; align-items: center; justify-content: center; gap: 4px; font-family: inherit; }
  .quick-btn:hover { background: var(--slate-100); }
  .quick-btn svg { width: 13px; height: 13px; }
  
  /* History/list cards */
  .history-card { background: white; border-radius: 16px; padding: 12px; box-shadow: var(--sh-md); border: 1px solid var(--slate-200); margin-bottom: 12px; }
  .section-title { font-size: 11px; font-weight: 700; color: var(--slate-500); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px; display: flex; align-items: center; justify-content: space-between; }
  .badge { background: var(--teal-100); color: var(--teal-700); padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
  .badge.danger { background: var(--rose-100); color: var(--rose-500); }
  .badge.warn { background: var(--amber-100); color: #92400e; }
  
  .history-list { display: flex; flex-direction: column; gap: 5px; padding-bottom: 80px; }
  .history-list-scroll-end { text-align: center; padding: 12px; color: var(--slate-400); font-size: 10px; font-style: italic; }
  .history-item { background: var(--slate-50); border-radius: 9px; padding: 9px; display: flex; align-items: center; gap: 9px; border-left: 3px solid var(--slate-300); }

  .history-content { flex: 1; min-width: 0; }

  /* ===== Location Detail Modal ===== */
  .loc-detail-sort {

    align-items: center;
    gap: 6px;
  }
  
  /* View toggle: Pivot vs Rows */
  .loc-view-toggle {

    padding: 3px;
    margin-bottom: 8px;

  .loc-view-btn.active {
    background: white;
    color: var(--teal-700);
    box-shadow: 0 1px 4px rgba(15,23,42,0.08);
  }
  
  /* ===== Pivot view item (1 product / 1 row) ===== */
  .loc-piv-item {
    background: white;
    border: 1px solid var(--slate-200);

    padding: 10px;

  }
  .loc-piv-item:hover {
    border-color: var(--teal-300);

  }
  .loc-piv-head {
    display: flex;

    align-items: flex-start;
    gap: 8px;
    margin-bottom: 8px;
  }
  .loc-piv-name {

    line-height: 1.3;
  }
  .loc-piv-status {

    padding: 3px 8px;
    border-radius: 5px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    white-space: nowrap;
  }
  
  /* Roles grid: Counter / Verifier / TB / Manager */
  .loc-piv-roles {
    display: grid;

    margin-bottom: 8px;

  }

  .loc-piv-role-qty {

  .loc-piv-role-user {

  /* Summary: POS | Final | Diff */
  .loc-piv-summary {

  }
  .loc-piv-sum-item {

  }
  .loc-piv-sum-lbl {
    font-size: 9px;
    color: var(--slate-500);
    font-weight: 700;
    text-transform: uppercase;
  }
  .loc-piv-sum-val {
    font-size: 15px;
    font-weight: 800;
    font-family: 'Space Grotesk', monospace;
    color: var(--slate-900);
    line-height: 1.1;
    margin-top: 1px;
  }
  .loc-piv-note {
    margin-top: 6px;
    font-size: 10px;
    color: var(--slate-600);
    background: var(--amber-100);
    padding: 5px 8px;
    border-radius: 6px;
    font-style: italic;
  }
  
  .loc-detail-item {
    background: white;
    border: 1px solid var(--slate-200);
    border-radius: 9px;
    padding: 9px 11px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .loc-detail-item:hover {

  }
  .loc-detail-name {
    font-size: 12px;
    color: var(--slate-900);
    line-height: 1.3;
    margin-bottom: 2px;
  }
  .loc-detail-meta {
    margin-bottom: 5px;
  }
  .loc-detail-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }
  .loc-detail-role {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 5px;
    font-size: 9px;
    font-weight: 700;
    font-family: 'Space Grotesk', monospace;
    text-transform: uppercase;
  }
  .loc-detail-numbers {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    margin-top: 6px;
  }
  .loc-detail-num-item {
    background: var(--slate-50);
    border-radius: 6px;
    padding: 5px 4px;
    text-align: center;
  }
  .loc-detail-num-lbl {
    font-size: 9px;
    color: var(--slate-500);
    font-weight: 700;
    text-transform: uppercase;
  }
  .loc-detail-num-val {
    font-size: 15px;
    font-weight: 800;
    font-family: 'Space Grotesk', monospace;
    color: var(--slate-900);
    line-height: 1.1;
    margin-top: 1px;
  }
  
  /* ===== History Search Bar ===== */
  .hist-search-row {
    display: flex;
    gap: 6px;
    margin-bottom: 9px;
  }
  .hist-search-input {
    flex: 1;
    padding: 8px 11px 8px 30px;
    border: 1.5px solid var(--slate-200);
    border-radius: 9px;
    font-size: 13px;
    font-family: inherit;
    background: white url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' fill='none' stroke='%2364748b' stroke-width='2.5' viewBox='0 0 24 24'><path stroke-linecap='round' stroke-linejoin='round' d='M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z'/></svg>") 9px center no-repeat;
    transition: border-color 0.15s;
  }
  .hist-search-input:focus {

  }

    color: var(--slate-600);
    font-weight: 700;
  }
  .hist-search-clear:hover { background: var(--slate-200); }
  
  /* ===== Context Chip as Button (Quick Zone Jump) ===== */
  .ctx-chip-btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .ctx-chip-btn:hover {
    background: var(--teal-100);
    transform: translateY(-1px);
  }
  .ctx-chip-btn:active { transform: translateY(0); }
  
  /* ===== Quick Zone Jump Modal Grid ===== */
  .qzone-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    max-height: 380px;
    overflow-y: auto;
    padding: 4px;
  }
  .qzone-card {
    position: relative;
    background: white;
    border: 2px solid var(--slate-200);

    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .qzone-card:hover {
    border-color: var(--teal-500);

    box-shadow: 0 4px 12px rgba(20,184,166,0.18);
  }
  .qzone-card.is-current {
    border-color: var(--teal-500);

  .qzone-code {

  }

  .qzone-name {
    font-size: 11px;

    font-weight: 600;
    line-height: 1.2;
    min-height: 26px;
  }
  .qzone-count {
    margin-top: 6px;
    font-size: 10px;
    color: var(--violet-600);
    font-family: 'Space Grotesk', monospace;

    padding: 2px 7px;
    border-radius: 8px;
    display: inline-block;
  }
  .qzone-current-badge {
    position: absolute;
    top: -6px;
    right: -4px;
    background: var(--teal-500);
    color: white;
    font-size: 8px;
    font-weight: 800;
    padding: 2px 6px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 6px rgba(20,184,166,0.4);
  }
  .hist-filter-bar {
    display: flex;
    flex-wrap: nowrap;
    gap: 6px;
    margin-bottom: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
    -webkit-overflow-scrolling: touch;
  }
  .hist-filter-bar::-webkit-scrollbar { height: 4px; }
  .hist-filter-bar::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 2px; }
  
  .hist-chip {
    flex: 0 0 auto;
    padding: 6px 11px;
    background: var(--slate-100);
    border: 1.5px solid var(--slate-200);
    border-radius: 18px;
    font-size: 11px;
    font-weight: 700;
    color: var(--slate-600);
    cursor: pointer;
    font-family: 'Space Grotesk', monospace;

  .hist-chip:hover { background: var(--slate-50); border-color: var(--teal-300); }
  .hist-chip.active {

    border-color: var(--teal-500);
    color: white;
    box-shadow: 0 2px 8px rgba(20,184,166,0.3);
  }
  .hist-chip-count {
    background: rgba(255,255,255,0.25);

    border-radius: 10px;
    font-size: 10px;
    color: inherit;
  }
  .hist-chip:not(.active) .hist-chip-count {

    color: var(--slate-500);
  }
  
  /* ===== History Group (Zone вҶ’ Loc) ===== */
  .hist-group {
    margin-bottom: 12px;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--slate-200);
  }
  .hist-group-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 11px;
    background: linear-gradient(90deg, var(--teal-100), white);

    font-size: 11px;
  }
  .hist-group-zone { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .hist-group-zone-code {
    background: var(--teal-500);
    color: white;
    padding: 2px 8px;
    border-radius: 5px;

    font-family: 'Space Grotesk', monospace;
    font-size: 11px;
  }
  .hist-group-zone-name {
    font-weight: 700;
    color: var(--slate-700);
    font-size: 11px;
  }
  .hist-group-loc {

    font-family: 'Space Grotesk', monospace;
    font-weight: 700;
    color: var(--violet-600);
    font-size: 11px;
  }
  .hist-group-count {
    color: var(--slate-500);

    font-family: 'Space Grotesk', monospace;
    font-weight: 600;
  }

    border-bottom: 1px solid var(--slate-100);
  }

  /* ===== Product Locations (Tiebreaker detail) ===== */
  .prod-locs-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 8px;
    font-size: 11px;
  }
  .prod-locs-table th {

    color: var(--slate-600);

    text-align: left;
    font-weight: 700;

    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid var(--slate-200);
  }

    padding: 7px 8px;
    border-bottom: 1px solid var(--slate-100);
  }

  .prod-locs-role-badge {

  }

  .prod-locs-role-badge.verifier { background: var(--amber-100); color: #92400e; }
  .prod-locs-role-badge.tiebreaker { background: var(--violet-100); color: var(--violet-600); }
  .prod-locs-loc {
    font-family: 'Space Grotesk', monospace;
    font-weight: 700;
    color: var(--slate-900);
  }
  .prod-locs-zone {
    display: inline-block;

    color: var(--slate-600);

  .empty-state { text-align: center; padding: 24px 14px; color: var(--slate-400); }

  /* Variance Badges */

  /* Banners */
  .banner { border-radius: 13px; padding: 11px 13px; display: flex; gap: 10px; margin-bottom: 12px; }

  .banner.sky .banner-text h4 { color: var(--sky-600); }
  
  /* Floor Map */
  .fm-section { background: white; border-radius: 13px; padding: 11px; margin-bottom: 11px; box-shadow: var(--sh-sm); }
  .fm-title { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 700; color: var(--slate-900); margin-bottom: 9px; padding-bottom: 7px; border-bottom: 1px solid var(--slate-200); }
  .fm-title-emoji { font-size: 16px; }
  .fm-title-count { margin-left: auto; font-size: 11px; color: var(--slate-500); font-family: 'Space Grotesk', monospace; font-weight: 600; }
  
  .fm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(58px, 1fr)); gap: 4px; }
  .fm-grid-wh { grid-template-columns: repeat(auto-fill, minmax(54px, 1fr)); }
  .fm-cell { aspect-ratio: 1; border-radius: 7px; padding: 4px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; border: 1px solid transparent; }

  /* Gondola Group styles */
  .fm-group { margin-bottom: 11px; padding: 8px; background: linear-gradient(135deg, var(--slate-50), white); border: 1px solid var(--slate-200); border-radius: 9px; }

  .fm-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; padding: 4px 5px; }

  .fm-group-label { font-size: 12px; font-weight: 800; color: var(--violet-600); font-family: 'Space Grotesk', monospace; letter-spacing: 0.3px; }
  .fm-group-count { background: var(--violet-100); color: var(--violet-600); padding: 1px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; font-family: 'Space Grotesk', monospace; }
  .fm-group-progress-bar { flex: 1; height: 5px; background: var(--slate-200); border-radius: 3px; overflow: hidden; min-width: 40px; }

  .fm-group-stat-am { background: var(--amber-100); color: #92400e; }
  .fm-group-stat-rs { background: var(--rose-100); color: var(--rose-500); }
  .fm-group-stat-vt { background: var(--violet-100); color: var(--violet-600); }
  
  .fm-code { font-family: 'Space Grotesk', monospace; font-size: 9px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
  .fm-progress { font-size: 8px; opacity: 0.85; font-weight: 600; line-height: 1; }
  
  /* Color states */
  .fm-cell.s-closed { background: var(--slate-100); border-color: var(--slate-200); color: var(--slate-500); }
  .fm-cell.s-open_for_counting { background: var(--teal-100); border-color: var(--teal-500); color: var(--teal-700); }

  .fm-cell.s-counted { background: var(--amber-100); border-color: var(--amber-500); color: #92400e; }
  .fm-cell.s-open_for_verify { background: var(--amber-100); border-color: var(--amber-500); color: #92400e; }
  .fm-cell.s-verifying { background: var(--amber-500); color: white; animation: pulse-amber 2s infinite; }
  .fm-cell.s-verified { background: var(--violet-100); border-color: var(--violet-500); color: var(--violet-600); }
  .fm-cell.s-tiebreaker_needed { background: var(--rose-100); border: 2px solid var(--rose-500); color: var(--rose-500); }
  .fm-cell.s-tiebreaker { background: var(--violet-500); color: white; animation: pulse-violet 2s infinite; }
  .fm-cell.s-completed { background: var(--emerald-500); color: white; }
  
  @keyframes pulse-teal { 0%,100%{box-shadow: 0 0 0 0 rgba(20,184,166,0.6);} 50%{box-shadow: 0 0 0 6px rgba(20,184,166,0);} }
  @keyframes pulse-amber { 0%,100%{box-shadow: 0 0 0 0 rgba(245,158,11,0.6);} 50%{box-shadow: 0 0 0 6px rgba(245,158,11,0);} }
  @keyframes pulse-violet { 0%,100%{box-shadow: 0 0 0 0 rgba(124,58,237,0.6);} 50%{box-shadow: 0 0 0 6px rgba(124,58,237,0);} }
  @keyframes pulse-badge { 0%,100%{transform: translateX(18px) scale(1); box-shadow: 0 2px 6px rgba(244,63,94,0.3);} 50%{transform: translateX(18px) scale(1.15); box-shadow: 0 2px 10px rgba(244,63,94,0.6);} }
  @keyframes shimmer { 0%{background-position:-200px 0;} 100%{background-position:calc(200px + 100%) 0;} }
  .skeleton { background: linear-gradient(90deg, var(--slate-100) 0%, var(--slate-200) 50%, var(--slate-100) 100%); background-size: 200px 100%; animation: shimmer 1.5s infinite; border-radius: 6px; display: inline-block; }
  .skeleton-line { height: 10px; margin: 4px 0; border-radius: 4px; }
  .skeleton-block { height: 60px; border-radius: 9px; margin: 6px 0; }
  
  /* Legend */

  .fm-legend-item { display: flex; align-items: center; gap: 4px; }
  .fm-legend-box { width: 12px; height: 12px; border-radius: 3px; }
  
  /* ===== Add Gondola Button (BIG) ===== */
  .btn-add-gondola-big {

    padding: 14px 18px !important;

  }

    transform: translateY(-2px);

  }

  .btn-add-gondola-big .plus-icon {
    width: 22px; height: 22px; border-radius: 50%;

  }
  .btn-refresh-map-big {

  }
  .btn-refresh-map-big:hover {

  }
  
  /* ===== Quick Nav FAB (Floating Action Button) ===== */
  .qnav-wrap {
    position: fixed;
    bottom: 20px;
    right: 16px;
    z-index: 9000;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    pointer-events: none;
  }
  .qnav-wrap > * { pointer-events: auto; }
  
  .qnav-fab {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--violet-600), var(--violet-500));
    color: white;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(124,58,237,0.45), 0 3px 8px rgba(124,58,237,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
  }
  .qnav-fab:hover { transform: scale(1.08); box-shadow: 0 12px 32px rgba(124,58,237,0.55); }
  .qnav-fab:active { transform: scale(0.95); }
  .qnav-fab.is-open { transform: rotate(135deg); background: linear-gradient(135deg, var(--rose-500), #e11d48); }
  
  .qnav-menu {
    display: flex;
    flex-direction: column;
    gap: 8px;
    opacity: 0;
    transform: translateY(10px) scale(0.92);
    transform-origin: bottom right;
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .qnav-menu.is-open {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .qnav-item {
    display: flex;
    align-items: center;
    gap: 9px;
    background: white;
    border: none;
    padding: 9px 13px 9px 10px;
    border-radius: 26px;
    box-shadow: 0 4px 14px rgba(15,23,42,0.12), 0 1px 3px rgba(15,23,42,0.08);
    cursor: pointer;
    font-size: 12px;
    font-weight: 700;
    color: var(--slate-700);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s;
    white-space: nowrap;
  }
  .qnav-item:hover {
    transform: translateX(-3px);
    background: var(--violet-100);
    color: var(--violet-600);
    box-shadow: 0 6px 18px rgba(124,58,237,0.25);
  }
  .qnav-item-icon {
    width: 32px; height: 32px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .qnav-item-icon.sale { background: linear-gradient(135deg, #fef3c7, #fde68a); }
  .qnav-item-icon.top { background: linear-gradient(135deg, #ddd6fe, #c4b5fd); }
  .qnav-item-icon.display { background: linear-gradient(135deg, #fce7f3, #fbcfe8); }
  .qnav-item-icon.wh1 { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
  .qnav-item-icon.wh2 { background: linear-gradient(135deg, #cffafe, #a5f3fc); }
  .qnav-item-count {
    margin-left: auto;
    background: var(--slate-100);
    color: var(--slate-600);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-family: 'Space Grotesk', monospace;
    font-weight: 700;
  }
  .qnav-item:hover .qnav-item-count {
    background: var(--violet-500);
    color: white;
  }
  .qnav-item-active {
    background: linear-gradient(135deg, var(--violet-100), var(--sky-100)) !important;
    color: var(--violet-600) !important;
    border: 2px solid var(--violet-500) !important;
    padding: 7px 11px 7px 8px;
  }
  .qnav-item-active .qnav-item-count {
    background: var(--violet-500);
    color: white;
  }
  .qnav-section-label {
    font-size: 9px; font-weight: 700; color: var(--slate-500); 
    text-transform: uppercase; padding: 7px 10px 3px; letter-spacing: 0.5px;
    border-top: 1px solid var(--slate-100); margin-top: 3px;
  }
  .qnav-section-label:first-child { border-top: none; margin-top: 0; }
  .qnav-item-status { padding-left: 6px !important; }
  
  /* Section flash highlight when jumped to */
  .fm-section.is-flashed {
    animation: fmFlash 1.2s ease;
  }
  @keyframes fmFlash {
    0% { box-shadow: 0 0 0 0 rgba(124,58,237,0.4), var(--sh-sm); }
    40% { box-shadow: 0 0 0 6px rgba(124,58,237,0.15), 0 8px 20px rgba(124,58,237,0.2); }
    100% { box-shadow: var(--sh-sm); }
  }
  
  /* Backdrop when menu open (mobile-friendly) */
  .qnav-backdrop {
    position: fixed; inset: 0;
    background: rgba(15,23,42,0.04);
    z-index: 8999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .qnav-backdrop.is-open { opacity: 1; pointer-events: auto; }
  
  @media (max-width: 480px) {
    .qnav-wrap { bottom: 16px; right: 12px; }
    .qnav-fab { width: 52px; height: 52px; font-size: 22px; }
    .qnav-item { font-size: 11px; padding: 8px 11px 8px 8px; }
    .qnav-item-icon { width: 28px; height: 28px; font-size: 14px; }
    
    /* fm-group mobile: stack header items */
    .fm-group { padding: 6px; }
    .fm-group-header { flex-wrap: wrap; gap: 6px; }
    .fm-group-title { width: 100%; justify-content: space-between; }
    .fm-group-progress-bar { width: 100%; flex: 1; }
    .fm-group-stats { flex-wrap: wrap; }
  }
  
  /* Workflow Control */
  .wf-card { background: white; border-radius: 12px; padding: 11px; box-shadow: var(--sh-sm); border-left: 4px solid var(--slate-300); margin-bottom: 8px; }
  .wf-card.s-open_for_counting { border-left-color: var(--teal-500); background: var(--teal-50); }
  .wf-card.s-counting { border-left-color: var(--teal-500); background: linear-gradient(135deg, var(--teal-50), white); }
  .wf-card.s-counted { border-left-color: var(--amber-500); background: var(--amber-100); }
  .wf-card.s-open_for_verify { border-left-color: var(--amber-500); background: var(--amber-100); }
  .wf-card.s-verifying { border-left-color: var(--amber-500); background: linear-gradient(135deg, var(--amber-100), white); }
  .wf-card.s-verified { border-left-color: var(--violet-500); background: var(--violet-100); }
  .wf-card.s-tiebreaker_needed { border-left-color: var(--rose-500); background: var(--rose-100); }
  .wf-card.s-tiebreaker { border-left-color: var(--violet-600); background: var(--violet-100); }
  .wf-card.s-completed { border-left-color: var(--emerald-500); background: var(--emerald-100); opacity: 0.85; }
  .wf-card.s-closed { border-left-color: var(--slate-300); }
  
  .wf-row { display: flex; align-items: center; gap: 10px; }
  .wf-loc { font-size: 16px; font-weight: 700; color: var(--slate-900); font-family: 'Space Grotesk', monospace; min-width: 70px; }
  .wf-info { flex: 1; min-width: 0; }
  .wf-status-text { font-size: 11px; font-weight: 600; }
  .wf-meta { font-size: 10px; color: var(--slate-500); margin-top: 2px; }
  .wf-stats { display: flex; gap: 5px; font-size: 10px; margin-top: 3px; }
  .wf-stat-chip { background: rgba(255,255,255,0.7); padding: 1px 6px; border-radius: 4px; font-weight: 600; color: var(--slate-700); }
  .wf-actions { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
  .wf-btn { padding: 6px 11px; border: none; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; font-family: inherit; flex: 1; min-width: 90px; }
  .wf-btn-open { background: var(--teal-500); color: white; }
  .wf-btn-close { background: var(--amber-500); color: white; }
  .wf-btn-verify { background: var(--amber-600); color: white; }
  .wf-btn-complete { background: var(--emerald-500); color: white; }
  .wf-btn-reopen { background: var(--slate-200); color: var(--slate-700); }
  
  .wf-filter { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 8px; -webkit-overflow-scrolling: touch; }
  .wf-filter-tab { padding: 6px 11px; background: white; border: 1px solid var(--slate-200); border-radius: 7px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--slate-600); white-space: nowrap; font-family: inherit; flex-shrink: 0; }
  .wf-filter-tab.active { background: var(--slate-900); color: white; border-color: var(--slate-900); }
  
  /* Progress Donut for Dashboard */
  .progress-donut-card { background: white; border-radius: 14px; padding: 14px; box-shadow: var(--sh-md); margin-bottom: 12px; text-align: center; }
  .progress-donut { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 10px 0; }
  .donut-svg { width: 110px; height: 110px; }
  .donut-bg { fill: none; stroke: var(--slate-100); stroke-width: 12; }
  .donut-fg { fill: none; stroke: var(--emerald-500); stroke-width: 12; stroke-linecap: round; transition: stroke-dashoffset 0.5s; transform: rotate(-90deg); transform-origin: center; }
  .donut-text { font-size: 24px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; fill: var(--slate-900); }
  .donut-label { font-size: 9px; fill: var(--slate-500); text-transform: uppercase; }
  
  .wf-summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; }
  .wf-sum-card { padding: 9px; border-radius: 9px; }
  .wf-sum-card.completed { background: var(--emerald-100); }
  .wf-sum-card.progress { background: var(--teal-100); }
  .wf-sum-card.waiting { background: var(--amber-100); }
  .wf-sum-card.not_started { background: var(--slate-100); }
  .wf-sum-num { font-size: 20px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .wf-sum-lbl { font-size: 9px; text-transform: uppercase; font-weight: 600; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 12px; }
  .stat-card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 1px 3px rgba(15,23,42,0.04), 0 1px 2px rgba(15,23,42,0.06); border: 1px solid rgba(226,232,240,0.6); transition: all 0.2s; }
  .stat-card .num { font-size: 24px; font-weight: 700; color: var(--slate-900); font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
  .stat-card .lbl { font-size: 10px; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; font-weight: 500; }
  
  /* KPI */
  .kpi-card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 1px 3px rgba(15,23,42,0.04), 0 1px 2px rgba(15,23,42,0.06); border: 1px solid rgba(226,232,240,0.6); margin-bottom: 9px; transition: all 0.2s; }
  .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .kpi-title { font-size: 11px; font-weight: 700; color: var(--slate-700); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 26px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .kpi-target { font-size: 10px; color: var(--slate-500); }
  .kpi-bar { height: 5px; background: var(--slate-100); border-radius: 3px; overflow: hidden; margin-top: 5px; }
  .kpi-bar-fill { height: 100%; transition: width 0.3s; border-radius: 3px; }
  .kpi-good .kpi-bar-fill { background: var(--emerald-500); }
  .kpi-warn .kpi-bar-fill { background: var(--amber-500); }
  .kpi-bad .kpi-bar-fill { background: var(--rose-500); }
  
  /* Zone selection */
  .zone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; max-height: 280px; overflow-y: auto; }
  .zone-card { background: white; border: 2px solid var(--slate-200); border-radius: 11px; padding: 9px; cursor: pointer; text-align: center; transition: all 0.15s; }
  .zone-card:hover { border-color: var(--teal-500); }
  .zone-card.selected { border-color: var(--teal-500); background: var(--teal-50); }
  .zone-code { font-size: 17px; font-weight: 700; color: var(--teal-700); font-family: 'Space Grotesk', sans-serif; }
  .zone-name { font-size: 10px; color: var(--slate-600); margin-top: 2px; line-height: 1.3; }
  
  .loc-type-tabs { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 8px; -webkit-overflow-scrolling: touch; }
  .loc-type-tabs::-webkit-scrollbar { height: 4px; }
  .loc-type-tabs::-webkit-scrollbar-thumb { background: var(--slate-300); border-radius: 2px; }
  .loc-type-tab { padding: 7px 11px; background: white; border: 2px solid var(--slate-200); border-radius: 9px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--slate-600); white-space: nowrap; font-family: inherit; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .loc-type-tab.active { background: var(--teal-500); color: white; border-color: var(--teal-500); }
  .loc-type-count { background: rgba(0,0,0,0.1); padding: 1px 6px; border-radius: 8px; font-size: 10px; font-weight: 700; }
  .loc-type-tab.active .loc-type-count { background: rgba(255,255,255,0.3); color: white; }
  
  /* New: Location input system */
  .loc-input-row { display: flex; gap: 6px; margin-bottom: 10px; }
  .loc-input { flex: 1; padding: 12px 14px; border: 2px solid var(--slate-200); border-radius: 10px; font-size: 16px; font-weight: 700; font-family: 'Space Grotesk', monospace; text-transform: uppercase; letter-spacing: 1px; text-align: center; background: var(--slate-50); }
  .loc-input:focus { outline: none; border-color: var(--teal-500); background: white; box-shadow: 0 0 0 4px rgba(20,184,166,0.1); }
  .loc-scan-btn { padding: 0 14px; background: linear-gradient(135deg, var(--teal-700), var(--teal-500)); color: white; border: none; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-family: inherit; }
  .loc-scan-btn svg { width: 22px; height: 22px; }
  .loc-scan-btn:active { transform: scale(0.95); }
  
  /* Recent locations chips */
  .loc-recent-row { margin-bottom: 10px; }
  .loc-recent-label { font-size: 10px; color: var(--slate-500); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .loc-recent { display: flex; flex-wrap: wrap; gap: 4px; }
  .loc-recent-chip { padding: 5px 10px; background: var(--slate-100); border: 1px solid var(--slate-200); border-radius: 7px; cursor: pointer; font-size: 12px; font-weight: 700; color: var(--slate-700); font-family: 'Space Grotesk', monospace; }
  .loc-recent-chip:hover { background: var(--teal-50); border-color: var(--teal-500); color: var(--teal-700); }
  
  /* Selected location display */
  .loc-selected { background: linear-gradient(135deg, var(--teal-50), var(--teal-100)); border: 2px solid var(--teal-500); border-radius: 11px; padding: 11px 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 11px; }
  .loc-selected-icon { width: 38px; height: 38px; background: var(--teal-500); border-radius: 9px; display: flex; align-items: center; justify-content: center; color: white; font-size: 18px; flex-shrink: 0; }
  .loc-selected-info { flex: 1; min-width: 0; }
  .loc-selected-code { font-size: 18px; font-weight: 700; color: var(--teal-700); font-family: 'Space Grotesk', monospace; }
  .loc-selected-desc { font-size: 11px; color: var(--slate-600); margin-top: 1px; }
  .loc-selected-clear { width: 28px; height: 28px; background: white; border: 1px solid var(--slate-200); border-radius: 7px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--slate-500); }
  .loc-selected-clear:hover { background: var(--rose-100); color: var(--rose-500); border-color: var(--rose-500); }
  
  /* Error state */
  .loc-not-found { background: var(--rose-100); color: var(--rose-500); padding: 9px 11px; border-radius: 9px; font-size: 12px; margin-bottom: 10px; border-left: 3px solid var(--rose-500); }
  
  /* Browse all (collapsible) */
  .loc-browse-toggle { background: none; border: 1px dashed var(--slate-300); padding: 8px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--slate-600); font-family: inherit; margin-bottom: 8px; }
  .loc-browse-toggle:hover { background: var(--slate-50); border-color: var(--slate-400); }
  
  .loc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-bottom: 10px; max-height: 220px; overflow-y: auto; padding: 2px; }
  .loc-grid.hidden { display: none; }
  .loc-chip { padding: 9px 4px; background: white; border: 2px solid var(--slate-200); border-radius: 9px; cursor: pointer; text-align: center; font-size: 11px; font-weight: 700; color: var(--slate-700); transition: all 0.15s; font-family: 'Space Grotesk', sans-serif; }
  .loc-chip.selected { background: var(--teal-500); color: white; border-color: var(--teal-500); transform: scale(1.05); }
  .loc-chip:hover:not(.selected) { border-color: var(--teal-500); background: var(--teal-50); }
  
  /* User card */
  .user-card { background: white; border-radius: 11px; padding: 10px; border: 1px solid var(--slate-200); margin-bottom: 5px; display: flex; align-items: center; gap: 9px; cursor: pointer; }
  .user-card:hover { border-color: var(--indigo-500); box-shadow: var(--sh-md); }
  .user-card.inactive { opacity: 0.5; }
  .user-avatar { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .user-avatar.r-counter, .user-avatar.r-staff { background: linear-gradient(135deg, var(--teal-700), var(--teal-500)); }
  .user-avatar.r-verifier, .user-avatar.r-audit { background: linear-gradient(135deg, var(--amber-500), var(--amber-400)); }

function T(key) { return (I18N[lang] && I18N[lang][key]) || key; }

function applyI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = T(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = T(el.dataset.i18nPlaceholder);
  });
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  applyI18n();
  if (user) renderApp();
}

function toggleLang() { setLang(lang === 'lo' ? 'th' : 'lo'); }

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => el.classList.remove('show'), 2800);
}

// Friendly error messages вҖ” translate Supabase errors to readable
function friendlyError(err) {
  const isLao = lang === 'lo';
  const msg = err?.message || String(err) || 'Unknown error';
  
  // Network errors
  if (msg.includes('Failed to fetch') || msg.includes('NetworkError') || msg.includes('network')) {
    return isLao ? 'рҹҢҗ аәҡа»Қа»ҲаәӘаәІаәЎаәІаә”а»ҖаәҠаә·а»ҲаәӯаәЎаә•а»Қа»ҲаәҒаәұаәҡ server вҖ” аәҒаә§аә”аәӘаәӯаәҡ internet' : 'рҹҢҗ а№„аёЎа№ҲаёӘаёІаёЎаёІаёЈаё–а№ҖаёҠаё·а№ҲаёӯаёЎаё•а№Ҳаёӯ server вҖ” аё•аёЈаё§аёҲаёӘаёӯаёҡ internet';
  }
  // Duplicate key
  if (msg.includes('duplicate key') || msg.includes('UNIQUE')) {
    return isLao ? 'вҡ пёҸ аәӮа»Қа»үаәЎаә№аәҷаәҠа»үаәіаәҒаәұаәҷ' : 'вҡ пёҸ аёӮа№үаёӯаёЎаё№аёҘаёӢа№үаёіаёҒаёұаёҷ';
  }
  // Permission / RLS
  if (msg.includes('row-level security') || msg.includes('permission denied')) {
    return isLao ? 'рҹ”’ аәҡа»Қа»ҲаәЎаәөаәӘаәҙаә”аә”аәіа»ҖаәҷаәөаәҷаәҒаәІаәҷаәҷаәөа»ү' : 'рҹ”’ а№„аёЎа№ҲаёЎаёөаёӘаёҙаё—аёҳаёҙа№Ңаё”аёіа№ҖаёҷаёҙаёҷаёҒаёІаёЈаёҷаёөа№ү';
  }
  // Foreign key
  if (msg.includes('foreign key') || msg.includes('violates')) {
    return isLao ? 'рҹ”— аәӮа»Қа»үаәЎаә№аәҷаәҚаәұаәҮаә–аә·аәҒа»ғаәҠа»үаәўаә№а»Ҳ вҖ” аәҡа»Қа»ҲаәӘаәІаәЎаәІаә”аәҘаә»аәҡа»„аә”а»ү' : 'рҹ”— аёӮа№үаёӯаёЎаё№аёҘаёўаёұаёҮаё–аё№аёҒа№ғаёҠа№үаёӯаёўаё№а№Ҳ вҖ” аёҘаёҡа№„аёЎа№Ҳа№„аё”а№ү';
  }
  // Timeout
  if (msg.includes('timeout') || msg.includes('aborted')) {
    return isLao ? 'вҸұпёҸ аәҒаәІаәҷа»Җаә®аәұаә”аә§аәҪаәҒаәҷаәІаәҷа»ҖаәҒаәөаәҷа»„аәӣ вҖ” аәҘаәӯаәҮа»ға»қа»Ҳ' : 'вҸұпёҸ аё—аёіаёҮаёІаёҷаёҷаёІаёҷа№ҖаёҒаёҙаёҷа№„аёӣ вҖ” аёҘаёӯаёҮа№ғаё«аёЎа№Ҳ';
  }
  // Auth
  if (msg.includes('JWT') || msg.includes('Unauthorized') || msg.includes('401')) {
    return isLao ? 'рҹ”җ Session а»қаә»аә”аәӯаәІаәҚаәё вҖ” Login а»ға»қа»Ҳ' : 'рҹ”җ Session аё«аёЎаё”аёӯаёІаёўаёё вҖ” Login а№ғаё«аёЎа№Ҳ';
  }
  // Default вҖ” short version
  if (msg.length > 80) {
    return (isLao ? 'вқҢ аәңаәҙаә”аәһаәІаә”: ' : 'вқҢ аёңаёҙаё”аёһаёҘаёІаё”: ') + msg.substring(0, 80) + '...';
  }
  return (isLao ? 'вқҢ ' : 'вқҢ ') + msg;
}

// Wrapper аёӘаёіаё«аёЈаёұаёҡ toast error аё—аёөа№Ҳа№ғаёҠа№үаёҡа№Ҳаёӯаёў вҖ” show friendly message
function toastError(err) {
  showToast(friendlyError(err), 'error');
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 1200;
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    osc.start(); osc.stop(ctx.currentTime + 0.1);
  } catch(e) {}
}

// а№Ӯаё«аёҘаё” branches list аё•аёӯаёҷаё«аёҷа№үаёІ login
async function loadBranchListForLogin() {
  try {
    const { data, error } = await sb.from('branches')
      .select('id, code, name_th, name_lo, branch_type')
      .eq('is_active', true)
      .order('id');
    
    if (error) {
      log('Load branches error:', error);
      return;
    }
    
    const sel = document.getElementById('loginBranch');
    if (!sel) return;
    
    // Sort by type: hq вҶ’ warehouse вҶ’ minimart/mini/super/mall
    const typeOrder = { 'hq': 1, 'super': 1, 'warehouse': 2, 'minimart': 3, 'mini': 3, 'mall': 3 };
    const sorted = [...(data || [])].sort((a, b) => {
      const oa = typeOrder[a.branch_type] || 9;
      const ob = typeOrder[b.branch_type] || 9;
      if (oa !== ob) return oa - ob;
      return (a.code || '').localeCompare(b.code || '');
    });
    
    const placeholderText = lang === 'lo' ? 'аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒаәӘаәІаәӮаәІ' : 'аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒаёӘаёІаёӮаёІ';
    sel.innerHTML = `<option value="">-- ${placeholderText} --</option>` +
      sorted.map(b => {
        const displayName = lang === 'lo' ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo);
        const typeLabel = (b.branch_type === 'hq' || b.branch_type === 'super') ? ' вӯҗ' : 
                          (b.branch_type === 'warehouse') ? ' рҹ“Ұ' : '';
        return `<option value="${b.id}" data-code="${b.code}">${displayName} (${b.code})${typeLabel}</option>`;
      }).join('');
    
    // Restore last selected branch
    const lastBranch = localStorage.getItem('fs_last_branch_id');
    if (lastBranch) {
      sel.value = lastBranch;
    }
    
    log('Branches loaded for login:', data?.length);
  } catch (e) {
    console.error('[FS] loadBranchListForLogin error:', e);
  }
}

async function hashPassword(pwd) {
  const data = new TextEncoder().encode(pwd + SALT);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function login() {
  const selectedBranchId = document.getElementById('loginBranch').value;
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  
  errEl.classList.remove('show');
  
  // Validate branch selected
  if (!selectedBranchId) {
    errEl.textContent = lang === 'lo' ? 'аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒаәӘаәІаәӮаәІ' : 'аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒаёӘаёІаёӮаёІ';
    errEl.classList.add('show');
    return;
  }
  
  if (!username || !password) {
    errEl.textContent = T('login_failed');
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span> ${T('logging_in')}`;
  
  try {
    const hash = await hashPassword(password);
    log('Login attempt:', username, 'branch:', selectedBranchId);
    
    // Step 1: Find user
    const { data: userData, error: userErr } = await sb
      .from('users')
      .select('*')
      .eq('username', username)
      .eq('password_hash', hash)
      .eq('is_active', true)
      .maybeSingle();
    
    if (userErr) throw userErr;
    if (!userData) {
      errEl.textContent = T('login_failed');
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = `<span>${T('login')}</span>`;
      return;
    }
    
    user = userData;
    log('User found:', user.username, 'role:', user.role, 'user.branch_id:', user.branch_id);
    
    // Step 2: Validate branch access
    const branchIdInt = parseInt(selectedBranchId);
    const isAdminRole = ['admin', 'scc', 'bcs'].includes(user.role);
    
    if (!isAdminRole && user.branch_id && user.branch_id !== branchIdInt) {
      // User а№„аёЎа№Ҳа№ғаёҠа№Ҳ admin + аёһаёўаёІаёўаёІаёЎа№ҖаёӮа№үаёІаёӘаёІаёӮаёІаё—аёөа№Ҳа№„аёЎа№Ҳа№ғаёҠа№ҲаёӮаёӯаёҮаё•аёұаё§а№ҖаёӯаёҮ вҶ’ reject
      const branchName = document.getElementById('loginBranch')
        .options[document.getElementById('loginBranch').selectedIndex].text;
      errEl.textContent = lang === 'lo' 
        ? `аәҡаәұаәҷаәҠаәөаәҷаәөа»үаәҡа»Қа»ҲаәЎаәөаәӘаәҙаә”а»ҖаәӮаә»а»үаәІаәӘаәІаәӮаәІ ${branchName}` 
        : `аёҡаёұаёҚаёҠаёөаёҷаёөа№үа№„аёЎа№ҲаёЎаёөаёӘаёҙаё—аёҳаёҙа№Ңа№ҖаёӮа№үаёІаёӘаёІаёӮаёІ ${branchName}`;
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = `<span>${T('login')}</span>`;
      return;
    }
    
    // Step 3: Load selected branch
    const { data: br } = await sb.from('branches').select('*').eq('id', branchIdInt).maybeSingle();
    if (!br) {
      errEl.textContent = lang === 'lo' ? 'аәҡа»Қа»Ҳаәһаә»аәҡаәӘаәІаәӮаәІ' : 'а№„аёЎа№ҲаёһаёҡаёӘаёІаёӮаёІ';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = `<span>${T('login')}</span>`;
      return;
    }
    branch = br;
    
    // аё–а№үаёІ user а№„аёЎа№ҲаёЎаёө branch_id (аё•аёӯаёҷаёӘаёЎаёұаё„аёЈаё„аёЈаёұа№үаёҮа№ҒаёЈаёҒ) вҶ’ set а№ғаё«а№ү
    if (!user.branch_id && !isAdminRole) {
      await sb.from('users').update({ branch_id: branch.id }).eq('id', user.id);
      user.branch_id = branch.id;
    }
    
    // аёӘаёіаё«аёЈаёұаёҡ admin вҶ’ аёҲаёі "active branch" а№ҒаёўаёҒаёҲаёІаёҒ user.branch_id
    user.active_branch_id = branch.id;
    
    log('Logged in:', user.username, 'вҶ’ branch:', branch.code, isAdminRole ? '(Admin)' : '');
    
    localStorage.setItem('fs_user', JSON.stringify(user));
    localStorage.setItem('fs_branch', JSON.stringify(branch));
    localStorage.setItem('fs_last_branch_id', String(branch.id));
    
    await afterLogin();
    
  } catch (e) {
    console.error('[FS] Login error:', e);
    errEl.textContent = T('login_failed') + ': ' + (e.message || e);
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `<span>${T('login')}</span>`;
  }
}

async function afterLogin() {

  // Counter, Verifier, Staff, Audit аё•а№үаёӯаёҮа№ҖаёҘаё·аёӯаёҒ (аё•а№үаёӯаёҮаёӘа№ҒаёҒаёҷаёҷаёұаёҡ)
  const needsZone = ['counter', 'verifier', 'staff', 'audit'].includes(user.role);
  
  // а№Ӯаё«аёҘаё” zones+locations а№ҖаёӘаёЎаёӯ (а№Җаёһаё·а№Ҳаёӯа№ғаё«а№ү Floor Map + Workflow Control а№ғаёҠа№ү)
  await loadZonesAndLocations();

      showZoneStep();
    } else {
      // а№„аёЎа№ҲаёЎаёө zone вҶ’ аёўаёұаёҮаё•а№үаёӯаёҮа№ҖаёҘаё·аёӯаёҒ Gondola (а№Җаёһаё·а№Ҳаёӯаёңаё№аёҒ scan/Pan-O-Gram аёҒаёұаёҡ location)
      // Set default zone аёӯаёұаё•а№ӮаёҷаёЎаёұаё•аёҙ
      if (allZones && allZones.length > 0) {
        zone = allZones[0];
        log('Branch use_zones=false, default zone:', zone.code);
      }
      // а№ҖаёӮа№үаёІ app а№ҒаёҘа№үаё§а№Җаёӣаёҙаё” Gondola Picker аё—аёұаёҷаё—аёө
      enterApp();
      // аё«аёҘаёұаёҮ render а№ҖаёӘаёЈа№ҮаёҲ вҶ’ а№Җаёӣаёҙаё” picker (аёўаёҒа№Җаё§а№үаёҷаёЎаёө loc аёӯаёўаё№а№Ҳа№ҒаёҘа№үаё§)
      setTimeout(() => {
        if (!loc) {
          openQuickLocPicker(true); // true = force mode (must select)

  }
}

async function loadZonesAndLocations() {
  if (!branch) {
    log('ERROR: No branch loaded');
    return;
  }
  
  log('Loading zones + locations for branch:', branch.id);
  
  const [zonesRes, locsRes] = await Promise.all([
    sb.from('zones').select('*').eq('branch_id', branch.id).eq('is_active', true).order('sort_order'),
    sb.from('location_master').select('*').eq('branch_id', branch.id).eq('is_active', true).order('location_code')
  ]);
  
  allZones = zonesRes.data || [];
  allLocations = locsRes.data || [];
  
  // аёҲаёұаё”аёҒаёҘаёёа№ҲаёЎаё•аёІаёЎ type
  locationsByType = {};
  allLocations.forEach(l => {
    if (!locationsByType[l.location_type]) locationsByType[l.location_type] = [];
    locationsByType[l.location_type].push(l);
  });
  
  log('Zones loaded:', allZones.length);
  log('Locations loaded:', allLocations.length);
  log('Location types:', Object.keys(locationsByType));
  
  const isLao = lang === 'lo';
  const isAdmin = user && ['admin', 'scc', 'bcs'].includes(user.role);
  
  // аё–а№үаёІ branch аёҷаёөа№үаёўаёұаёҮа№„аёЎа№ҲаёЎаёө zones аё«аёЈаё·аёӯ locations
  if (!allZones.length || !allLocations.length) {
    const branchName = branch ? (isLao ? (branch.name_lo || branch.code) : (branch.name_th || branch.code)) : '?';
    
    if (isAdmin) {
      // Admin вҶ’ а№ҒаёӘаё”аёҮ modal аё•аёұа№үаёҮаё„а№ҲаёІа№ҖаёЈаёҙа№ҲаёЎаё•а№үаёҷ
      showBranchSetupModal(branchName, allZones.length, allLocations.length);
    } else {
      // Non-admin вҶ’ а№Ғаё„а№Ҳ toast
      showToast(
        isLao 
          ? `аәӘаәІаәӮаәІ ${branchName} аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәө${!allZones.length ? 'а»ӮаәҠаәҷ' : 'аә•аәіа»Ға»ңа»ҲаәҮ'} вҖ” аәҒаә°аәҘаәёаәҷаәІа»ҒаәҲа»үаәҮ Admin`
          : `аёӘаёІаёӮаёІ ${branchName} аёўаёұаёҮа№„аёЎа№ҲаёЎаёө${!allZones.length ? 'а№ӮаёӢаёҷ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'} вҖ” аёҒаёЈаёёаё“аёІа№ҒаёҲа№үаёҮ Admin`,
        'warning'
      );
    }
  }
}

// State аёӘаёіаё«аёЈаёұаёҡ Selective Copy Modal
let _copyState = {
  zones: [],          // [{...zone, selected: bool, locations: [...]}]
  locsByZone: {},     // zone_id вҶ’ [locations]
  search: ''
};

async function openSelectiveCopyModal() {
  const isLao = lang === 'lo';
  
  // а№Ӯаё«аёҘаё” zones + locations аёӮаёӯаёҮ SUPERMART
  const [zonesRes, locsRes] = await Promise.all([
    sb.from('zones').select('*').eq('branch_id', 1).eq('is_active', true).order('sort_order').order('code'),
    sb.from('location_master').select('*').eq('branch_id', 1).eq('is_active', true).order('location_code')
  ]);
  
  if (zonesRes.error || locsRes.error) {
    showToast('Error: ' + (zonesRes.error?.message || locsRes.error?.message), 'error');
    return;
  }
  
  const allZones = zonesRes.data || [];
  const allLocs = locsRes.data || [];
  
  // а№ҖаёҒа№Үаёҡ zones lookup а№Җаёһаё·а№Ҳаёӯа№ғаёҠа№үаё•аёӯаёҷ copy
  _copyState.zonesByOldId = {};
  allZones.forEach(z => { _copyState.zonesByOldId[z.id] = z; });
  _copyState.allZones = allZones;
  
  // ==================== GROUP BY GONDOLA NUMBER ====================
  // Pattern:
  //   01A01 вҶ’ Gondola "01" (number = 01)
  //   01B03 вҶ’ Gondola "01" 
  //   01E02 вҶ’ Gondola "01"
  //   02A01 вҶ’ Gondola "02"
  //   W028  вҶ’ Wall (group "W")
  //   WT028 вҶ’ Wall Top (group "WT")
  //   WH050 вҶ’ Warehouse (group "WH")
  //   D01, D02 вҶ’ Display (group "D")
  
  function parseLocationCode(code) {
    const upper = (code || '').toUpperCase().trim();
    
    // 01A01, 02B03, 10AT05 вҶ’ number group
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) {
      return {
        groupKey: numMatch[1],        // "01", "02", "10"
        groupLabel: `Gondola ${numMatch[1]}`,
        type: numMatch[2],            // "A", "B", "E", "AT"
        bay: numMatch[3]              // "01", "03"
      };
    }
    
    // W028, WT028, WH050 вҶ’ letter prefix
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      else if (prefix === 'D') label = 'Display';
      else if (prefix === 'C') label = 'Cashier';
      else if (prefix === 'R') label = 'Rack';
      return {
        groupKey: 'z' + prefix,       // 'zW' (prefix z to sort after numbers)
        groupLabel: label,
        type: prefix,
        bay: letterMatch[2]
      };
    }
    
    // Other patterns
    return {
      groupKey: 'zzz_other',
      groupLabel: isLao ? 'аәӯаә·а»Ҳаәҷа»Ҷ' : 'аёӯаё·а№Ҳаёҷа№Ҷ',
      type: '?',
      bay: code
    };
  }
  
  _copyState.groups = {};  // groupKey вҶ’ { label, locations: [] }
  
  allLocs.forEach(l => {
    const parsed = parseLocationCode(l.location_code);
    
    if (!_copyState.groups[parsed.groupKey]) {
      _copyState.groups[parsed.groupKey] = {
        groupKey: parsed.groupKey,
        groupLabel: parsed.groupLabel,
        locations: []
      };
    }
    _copyState.groups[parsed.groupKey].locations.push({
      ...l,
      selected: false,
      _parsed: parsed
    });
  });
  
  // Sort locations within each group: by type (AвҶ’BвҶ’EвҶ’AT...) then by bay
  Object.values(_copyState.groups).forEach(g => {
    g.locations.sort((a, b) => {
      const typeA = a._parsed.type || '';
      const typeB = b._parsed.type || '';
      if (typeA !== typeB) return typeA.localeCompare(typeB);
      // Numeric sort for bay
      const bayA = parseInt(a._parsed.bay) || 0;
      const bayB = parseInt(b._parsed.bay) || 0;
      return bayA - bayB;
    });
  });
  
  _copyState.search = '';
  
  renderSelectiveCopyModal();
}

function renderCopyList(search) {
  const isLao = lang === 'lo';
  let html = '';
  let hasResults = false;
  
  // Sort groups by groupKey (numbers first, then letter-prefixed)
  const sortedGroups = Object.values(_copyState.groups).sort((a, b) => {
    // Numbers (01, 02...) come before letters (zW, zWT...)
    return a.groupKey.localeCompare(b.groupKey, undefined, { numeric: true });
  });
  
  sortedGroups.forEach(group => {
    const allLocsInGroup = group.locations;
    
    // Apply search filter
    let locsInGroup = allLocsInGroup;
    if (search) {
      locsInGroup = allLocsInGroup.filter(l => 
        (l.location_code || '').toLowerCase().includes(search)
      );
    }
    
    if (locsInGroup.length === 0) return;
    hasResults = true;
    
    // Count selected in this group
    const selectedInGroup = locsInGroup.filter(l => l.selected).length;
    const allSelected = locsInGroup.length > 0 && selectedInGroup === locsInGroup.length;
    const someSelected = selectedInGroup > 0 && selectedInGroup < locsInGroup.length;
    
    // Get unique types in this group (e.g., "A, B, E")
    const typesInGroup = [...new Set(locsInGroup.map(l => l._parsed.type))].sort().join(', ');
    
    // Group header
    html += `
      <div style="margin-bottom:9px;">
        <div onclick="toggleZoneSelection('${group.groupKey}')"
             style="background:white;border:2px solid ${allSelected ? 'var(--teal-500)' : someSelected ? 'var(--amber-500)' : 'var(--slate-200)'};border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:all 0.15s;">
          <div style="font-size:18px;flex-shrink:0;">
            ${allSelected ? 'вң…' : someSelected ? 'рҹҹЎ' : 'в¬ң'}
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:800;color:var(--slate-900);font-size:13px;font-family:'Space Grotesk',monospace;">
              ${group.groupLabel}
            </div>
            <div style="font-size:10px;color:var(--slate-500);">
              ${selectedInGroup}/${locsInGroup.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'} вҖў Type: ${typesInGroup}
            </div>
          </div>
        </div>
        
        <!-- Locations in this group -->
        <div style="padding:5px 0 5px 21px;border-left:2px dashed var(--slate-200);margin-left:7px;">
    `;
    
    // Group locations by TYPE within the group (A, B, E, AT...)
    const byType = {};
    locsInGroup.forEach(l => {
      const t = l._parsed.type || '?';
      if (!byType[t]) byType[t] = [];
      byType[t].push(l);
    });
    
    Object.keys(byType).sort().forEach(typeKey => {
      const typeLocs = byType[typeKey];
      const typeSelected = typeLocs.filter(l => l.selected).length;
      
      // Type sub-header (only if multiple types)
      if (Object.keys(byType).length > 1) {
        html += `
          <div style="font-size:10px;color:var(--violet-500);font-weight:700;margin:5px 0 3px;padding-left:3px;">
            в–ё ${typeKey} <span style="color:var(--slate-400);font-weight:500;">(${typeSelected}/${typeLocs.length})</span>
          </div>
        `;
      }
      
      typeLocs.forEach(loc => {
        html += `
          <div onclick="toggleLocationSelection('${group.groupKey}', ${loc.id})"
               style="background:white;border:1px solid ${loc.selected ? 'var(--teal-500)' : 'var(--slate-200)'};border-radius:7px;padding:5px 9px;margin-bottom:3px;display:flex;align-items:center;gap:7px;cursor:pointer;transition:all 0.1s;${loc.selected ? 'background:var(--teal-100);' : ''}">
            <div style="font-size:13px;flex-shrink:0;">
              ${loc.selected ? 'вҳ‘пёҸ' : 'в¬ң'}
            </div>
            <div style="flex:1;min-width:0;display:flex;align-items:center;gap:7px;">
              <span style="font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;color:var(--slate-900);">
                ${loc.location_code}
              </span>
              <span style="font-size:9px;color:var(--slate-500);background:var(--slate-100);padding:1px 5px;border-radius:4px;">
                ${loc.location_type}
              </span>
            </div>
          </div>
        `;
      });
    });
    
    html += '</div></div>';
  });
  
  if (!hasResults) {
    html = `<div style="text-align:center;padding:30px;color:var(--slate-400);font-size:11px;">
      ${isLao ? 'аәҡа»Қа»Ҳаәһаә»аәҡ' : 'а№„аёЎа№Ҳаёһаёҡ'}
    </div>`;
  }
  
  return html;
}

function toggleZoneSelection(groupKey) {
  const group = _copyState.groups[groupKey];
  if (!group) return;
  
  const search = (_copyState.search || '').toLowerCase().trim();
  
  // Find visible locations (consider search filter)
  let visibleLocs = group.locations;
  if (search) {
    visibleLocs = group.locations.filter(l => (l.location_code || '').toLowerCase().includes(search));
  }
  
  if (visibleLocs.length === 0) return;
  
  const allSelected = visibleLocs.every(l => l.selected);
  const newState = !allSelected;
  
  visibleLocs.forEach(l => {
    l.selected = newState;
  });
  
  renderSelectiveCopyModal();
}

function toggleLocationSelection(groupKey, locId) {
  const group = _copyState.groups[groupKey];
  if (!group) return;
  
  const loc = group.locations.find(l => l.id === locId);
  if (loc) {
    loc.selected = !loc.selected;
    renderSelectiveCopyModal();
  }
}

function selectAllInCopy(state) {
  const search = (_copyState.search || '').toLowerCase().trim();
  
  Object.values(_copyState.groups).forEach(g => {
    g.locations.forEach(l => {
      if (search) {
        if ((l.location_code || '').toLowerCase().includes(search)) {
          l.selected = state;
        }
      } else {
        l.selected = state;
      }
    });
  });
  
  renderSelectiveCopyModal();
}

function onCopySearchChange(value) {
  _copyState.search = (value || '').trim();
  clearTimeout(window._copySearchTimer);
  window._copySearchTimer = setTimeout(() => {
    const listEl = document.getElementById('copyList');
    if (listEl) listEl.innerHTML = renderCopyList(_copyState.search.toLowerCase());
  }, 150);
}

async function executeCopyFromSupermart() {
  const isLao = lang === 'lo';
  if (!branch || branch.id === 1) {
    showToast(isLao ? 'аәҡа»Қа»ҲаәӘаәІаәЎаәІаә”аәҒа»Ҡаәӯаәҡаәӣаәөа»үа»ғаәӘа»Ҳ SUPERMART' : 'а№„аёЎа№ҲаёӘаёІаёЎаёІаёЈаё–аё„аёұаё”аёҘаёӯаёҒа№ғаёӘа№Ҳ SUPERMART', 'error');
    return;
  }
  
  // аёЈаё§аёҡаёЈаё§аёЎ selected locations
  const selectedLocs = [];
  const requiredOldZoneIds = new Set();
  
  Object.values(_copyState.groups).forEach(g => {
    g.locations.forEach(l => {
      if (l.selected) {
        selectedLocs.push(l);
        if (l.zone_id) requiredOldZoneIds.add(l.zone_id);
      }
    });
  });
  
  if (selectedLocs.length === 0) {
    showToast(isLao ? 'аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒаәўа»ҲаәІаәҮа»ңа»үаәӯаәҚ 1 аә•аәіа»Ға»ңа»ҲаәҮ' : 'аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒаёӯаёўа№ҲаёІаёҮаёҷа№үаёӯаёў 1 аё•аёіа№Ғаё«аёҷа№ҲаёҮ', 'warning');
    return;
  }
  
  if (!confirm(isLao 
    ? `аәҒа»Ҡаәӯаәҡаәӣаәөа»ү ${selectedLocs.length} аә•аәіа»Ға»ңа»ҲаәҮ аәЎаәІ ${branch.code}?`
    : `аё„аёұаё”аёҘаёӯаёҒ ${selectedLocs.length} аё•аёіа№Ғаё«аёҷа№ҲаёҮ аёЎаёІ ${branch.code}?`)) return;
  
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәҒа»Ҡаәӯаәҡаәӣаәөа»ү...' : 'вҸі аёҒаёіаёҘаёұаёҮаё„аёұаё”аёҘаёӯаёҒ...', 'success');
  
  try {
    // 1. Copy required zones first (zones аё—аёөа№Ҳ locations аё—аёөа№Ҳа№ҖаёҘаё·аёӯаёҒа№ғаёҠа№ү)
    let zonesCopied = 0;
    const zoneIdMap = {}; // old_zone_id вҶ’ new_zone_id
    
    for (const oldZoneId of requiredOldZoneIds) {
      const zone = _copyState.zonesByOldId[oldZoneId];
      if (!zone) continue;
      
      // а№ҖаёҠа№Үаё„аё§а№ҲаёІаёЎаёөаёӯаёўаё№а№Ҳа№ҒаёҘа№үаё§а№ғаёҷ branch аёҷаёөа№үа№„аё«аёЎ
      const { data: existing } = await sb
        .from('zones').select('id')
        .eq('branch_id', branch.id).eq('code', zone.code).maybeSingle();
      
      if (existing) {
        zoneIdMap[oldZoneId] = existing.id;
        continue;
      }
      
      const newZone = {
        branch_id: branch.id,
        code: zone.code,
        name_th: zone.name_th,
        name_lo: zone.name_lo,
        sort_order: zone.sort_order,
        is_active: true
      };
      if (zone.color !== undefined) newZone.color = zone.color;
      if (zone.description !== undefined) newZone.description = zone.description;
      
      const { data: inserted, error: ie } = await sb
        .from('zones').insert(newZone).select('id').single();
      
      if (ie) {
        console.warn('[FS] Zone copy err:', ie.message);
        continue;
      }
      zoneIdMap[oldZoneId] = inserted.id;
      zonesCopied++;
    }
    
    // 2. Copy locations (batch insert)
    let locsCopied = 0;
    let locsFailed = 0;
    const BATCH = 100;
    
    for (let i = 0; i < selectedLocs.length; i += BATCH) {
      const chunk = selectedLocs.slice(i, i + BATCH).map(l => {
        const newLoc = {
          branch_id: branch.id,
          location_code: l.location_code,
          location_type: l.location_type,
          zone_id: zoneIdMap[l.zone_id] || null,
          is_active: true
        };
        if (l.description !== undefined) newLoc.description = l.description;
        if (l.sort_order !== undefined) newLoc.sort_order = l.sort_order;
        return newLoc;
      });
      
      const { error: lie } = await sb.from('location_master').insert(chunk);
      if (lie) {
        console.warn('[FS] Location batch err:', lie.message);
        locsFailed += chunk.length;
      } else {
        locsCopied += chunk.length;
      }
    }
    
    closeModal();
    showToast(
      `вң… ${isLao ? 'аәҒа»Ҡаәӯаәҡаәӣаәөа»үаәӘаәіа»ҖаәҘаәұаә”' : 'аё„аёұаё”аёҘаёӯаёҒаёӘаёіа№ҖаёЈа№ҮаёҲ'}: ${zonesCopied} ${isLao ? 'а»ӮаәҠаәҷ' : 'а№ӮаёӢаёҷ'}, ${locsCopied} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'}` +
      (locsFailed > 0 ? ` (${locsFailed} ${isLao ? 'аәҘаә»а»үаәЎа»Җаә«аәҘаә§' : 'аёҘа№үаёЎа№Җаё«аёҘаё§'})` : ''),
      'success'
    );
    
    // Clear state
    _copyState = { zones: [], locsByZone: {}, groups: {}, search: '' };
    
    // Reload
    await loadZonesAndLocations();
    const fmEl = document.getElementById('floorMapContent');
    if (fmEl) loadFloorMap();
    
  } catch (e) {
    console.error('[FS] executeCopyFromSupermart error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

function renderRecentLocations() {
  const recent = JSON.parse(localStorage.getItem('fs_loc_recent') || '[]');
  const row = document.getElementById('locRecentRow');
  const list = document.getElementById('locRecent');
  if (!row || !list) return;
  
  if (!recent.length) {
    row.style.display = 'none';
    return;
  }
  
  row.style.display = 'block';
  list.innerHTML = recent.slice(0, 8).map(code => `
    <div class="loc-recent-chip" onclick="pickRecent('${code}')">${code}</div>
  `).join('');
}

function pickRecent(code) {
  document.getElementById('locInput').value = code;
  onLocInput(code);
}

function saveRecentLocation(code) {
  let recent = JSON.parse(localStorage.getItem('fs_loc_recent') || '[]');
  recent = recent.filter(c => c !== code);  // remove if exists
  recent.unshift(code);  // add to front
  recent = recent.slice(0, 10);  // keep 10
  localStorage.setItem('fs_loc_recent', JSON.stringify(recent));
}

function onLocInput(value) {
  const code = value.trim().toUpperCase();
  const errEl = document.getElementById('locNotFound');
  
  // Clear if empty
  if (!code) {
    if (errEl) errEl.style.display = 'none';
    return;
  }
  
  // Find location
  const found = allLocations.find(l => l.location_code === code);
  
  if (found) {
    loc = found;
    // Auto switch type tab
    if (locationsByType[found.location_type]) {
      currentLocType = found.location_type;
      renderLocationTypes();
    }
    renderSelectedLocation();
    if (errEl) errEl.style.display = 'none';
    log('Location auto-selected:', found);
  } else {
    // Show suggestion аё–а№үаёІаёһаёҙаёЎаёһа№Ңаё„аёЈаёҡ pattern а№Ғаё•а№Ҳа№„аёЎа№ҲаёЎаёө
    if (code.length >= 4 && errEl) {
      errEl.className = 'loc-not-found';
      errEl.style.display = 'block';
      errEl.innerHTML = `вҡ пёҸ ${T('loc_not_found')}: <strong>${code}</strong>`;
    } else if (errEl) {
      errEl.style.display = 'none';
    }
  }
}

function renderSelectedLocation() {
  const el = document.getElementById('locSelected');
  if (!el) return;
  
  if (!loc) {
    el.innerHTML = '';
    return;
  }
  
  el.innerHTML = `
    <div class="loc-selected">
      <div class="loc-selected-icon">рҹ“Қ</div>
      <div class="loc-selected-info">
        <div class="loc-selected-code">${loc.location_code}</div>
        <div class="loc-selected-desc">${loc.description || ''}</div>
      </div>
      <button class="loc-selected-clear" onclick="clearLocation()" title="${T('clear')}">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  `;
}

function clearLocation() {
  loc = null;
  document.getElementById('locInput').value = '';
  const errEl = document.getElementById('locNotFound');
  if (errEl) errEl.style.display = 'none';
  renderSelectedLocation();
}

function toggleBrowse() {
  const grid = document.getElementById('locGrid');
  const btn = document.getElementById('browseToggleBtn');
  if (!grid) return;
  
  if (grid.classList.contains('hidden')) {
    grid.classList.remove('hidden');
    btn.innerHTML = `вҶ‘ <span>${T('hide_browse')}</span>`;
    renderLocationGrid();
  } else {
    grid.classList.add('hidden');
    btn.innerHTML = `вҶ“ <span>${T('browse_all')}</span>`;
  }
}

let locScanner = null;

async function scanLocCode() {
  // а№Җаёӣаёҙаё”аёҒаёҘа№үаёӯаёҮаёӘа№ҒаёҒаёҷ Barcode аё—аёөа№Ҳаё•аёҙаё”аёҡаёҷ Gondola
  showModal(`
    <h3>${T('scan_loc_code')}</h3>
    <p>${T('loc_format_hint')}</p>
    <div id="locScanFrame" style="background:var(--slate-900);border-radius:11px;aspect-ratio:4/3;overflow:hidden;margin-bottom:10px;position:relative;">
      <div id="locReader" style="width:100%;"></div>
    </div>
    <div class="action-row">
      <button class="btn btn-secondary" onclick="stopLocScan()">${T('cancel')}</button>
    </div>
  `);
  
  setTimeout(async () => {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showToast(T('scan_not_supported'), 'error');
      stopLocScan();
      return;
    }
    
    locScanner = new Html5Qrcode("locReader", { verbose: false });
    
    const onLocScanSuccess = (decoded) => {
      stopLocScan();
      document.getElementById('locInput').value = decoded.trim().toUpperCase();
      onLocInput(decoded);
      beep();
    };
    
    // Attempt 1: facingMode environment
    try {
      log('[FS] LocScan Attempt 1: facingMode');
      await locScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 280, height: 160 } },
        onLocScanSuccess,
        () => {}
      );
      fixVideoElement('locReader');
      return;
    } catch (e1) {
      console.warn('[FS] LocScan Attempt 1 failed:', e1?.name, e1?.message);
      try { await locScanner.stop(); } catch(_) {}
      try { locScanner.clear(); } catch(_) {}
      locScanner = new Html5Qrcode("locReader", { verbose: false });
    }
    
    // Attempt 2: enumerate cameras
    try {
      log('[FS] LocScan Attempt 2: enumerate');
      const devices = await Html5Qrcode.getCameras();
      if (!devices || devices.length === 0) throw new Error('No cameras');
      let cam = devices.find(d => /back|rear|environment/i.test(d.label || ''));
      if (!cam) cam = devices[devices.length - 1];
      await locScanner.start(
        cam.id,
        { fps: 10, qrbox: { width: 280, height: 160 } },
        onLocScanSuccess,
        () => {}
      );
      fixVideoElement('locReader');
      return;
    } catch (e2) {
      console.error('[FS] LocScan all attempts failed');
      showToast(getCameraErrorMessage(e2), 'error');
      stopLocScan();
    }
  }, 100);
}

async function stopLocScan() {
  if (locScanner) {
    try { await locScanner.stop(); } catch(e) {}
    locScanner = null;
  }
  closeModal();
}

function renderLocationTypes() {
  const types = ['gondola', 'gondola_top', 'wall', 'wall_top', 'display', 'cashier', 'rack', 'warehouse'];
  const typeIcons = {
    gondola: 'рҹ“Ұ', gondola_top: 'в¬ҶпёҸрҹ“Ұ', 
    wall: 'рҹ§ұ', wall_top: 'в¬ҶпёҸрҹ§ұ',
    display: 'рҹҺҜ', cashier: 'рҹ’°', rack: 'рҹ“җ', warehouse: 'рҹҸӯ'
  };
  
  const tabsEl = document.getElementById('locTypeTabs');
  if (!tabsEl) return;
  
  tabsEl.innerHTML = types
    .filter(type => locationsByType[type] && locationsByType[type].length > 0)
    .map(type => `
      <button class="loc-type-tab ${currentLocType === type ? 'active' : ''}" 
              onclick="selectLocType('${type}')" 
              data-type="${type}">
        ${typeIcons[type]} ${T('loc_' + type)} 
        <span class="loc-type-count">${locationsByType[type].length}</span>
      </button>
    `).join('');
}

function selectLocType(type) {
  currentLocType = type;
  document.querySelectorAll('.loc-type-tab').forEach(t => 
    t.classList.toggle('active', t.dataset.type === type));
  
  // Re-render grid if visible
  const grid = document.getElementById('locGrid');
  if (grid && !grid.classList.contains('hidden')) {
    renderLocationGrid();
  }
}

function renderLocationGrid() {
  const grid = document.getElementById('locGrid');
  if (!grid) return;
  
  let items = locationsByType[currentLocType] || [];
  
  // аё–а№үаёІа№ҖаёҘаё·аёӯаёҒ Gondola аё«аёЈаё·аёӯ Gondola Top а№ғаё«а№үаёҒаёЈаёӯаёҮаё•аёІаёЎ Zone аё—аёөа№Ҳа№ҖаёҘаё·аёӯаёҒ
  if ((currentLocType === 'gondola' || currentLocType === 'gondola_top') && zone) {
    items = items.filter(l => l.zone_id === zone.id);
  }
  
  if (!items.length) {
    grid.innerHTML = `<div style="padding:20px;text-align:center;color:var(--slate-400);font-size:12px;grid-column:1/-1;">${T('no_locations')}</div>`;
    return;
  }
  
  grid.innerHTML = items.map(l => {
    const displayText = l.location_code;
    return `
      <div class="loc-chip" data-loc="${l.location_code}" onclick="selectLocation('${l.location_code}')" title="${l.description || ''}">
        ${displayText}
      </div>
    `;
  }).join('');
}

function selectZone(zoneId) {
  document.querySelectorAll('.zone-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.zone-card[data-zone="${zoneId}"]`)?.classList.add('selected');
  zone = allZones.find(z => z.id == zoneId);
  log('Zone selected:', zone);
  // re-render gondola/gondola_top list to filter by zone
  if (currentLocType === 'gondola' || currentLocType === 'gondola_top') renderLocationGrid();
}

function selectLocation(locCode) {
  loc = allLocations.find(l => l.location_code === locCode);
  if (!loc) return;
  log('Location selected:', loc);
  
  // Update input + display
  const inp = document.getElementById('locInput');
  if (inp) inp.value = locCode;
  renderSelectedLocation();
  
  // Highlight chip if visible
  document.querySelectorAll('.loc-chip').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.loc-chip[data-loc="${locCode}"]`)?.classList.add('selected');
  
  // Hide grid after selection
  const grid = document.getElementById('locGrid');
  const btn = document.getElementById('browseToggleBtn');
  if (grid && !grid.classList.contains('hidden')) {
    grid.classList.add('hidden');
    if (btn) btn.innerHTML = `вҶ“ <span>${T('browse_all')}</span>`;
  }
}

function confirmZoneLocation() {
  if (!zone || !loc) {
    showToast(T('please_select'), 'warning');
    return;
  }
  
  // Save to recent
  saveRecentLocation(loc.location_code);
  
  localStorage.setItem('fs_context', JSON.stringify({
    zone: zone.id, 
    location: loc.location_code,
    locType: currentLocType
  }));
  enterApp();
}

async function logout() {
  localStorage.removeItem('fs_user');
  localStorage.removeItem('fs_branch');
  localStorage.removeItem('fs_context');
  user = null; zone = null; loc = null; branch = null; session = null;
  if (html5QrCode) { try { await html5QrCode.stop(); } catch(e){} }
  document.getElementById('step-zone').classList.remove('active');
  document.getElementById('step-login').classList.add('active');
  document.getElementById('app').classList.remove('active');
  document.getElementById('app').innerHTML = '';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
}

// ==================== BRANCH SWITCHER (Admin) ====================
async function openBranchSwitcher() {
  if (!user || !['admin', 'scc', 'bcs'].includes(user.role)) {
    showToast(lang === 'lo' ? 'аәҡа»Қа»ҲаәЎаәөаәӘаәҙаә”' : 'а№„аёЎа№ҲаёЎаёөаёӘаёҙаё—аёҳаёҙа№Ң', 'error');
    return;
  }
  
  // Load branches
  let branches = window._allBranchesCache;
  if (!branches || !branches.length) {
    const { data } = await sb.from('branches').select('*').eq('is_active', true).order('id');
    branches = data || [];
    window._allBranchesCache = branches;
  }
  
  // Sort: hq вҶ’ warehouse вҶ’ minimart
  const typeOrder = { 'hq': 1, 'super': 1, 'warehouse': 2, 'minimart': 3, 'mini': 3, 'mall': 3 };
  const sorted = [...branches].sort((a, b) => {
    const oa = typeOrder[a.branch_type] || 9;
    const ob = typeOrder[b.branch_type] || 9;
    if (oa !== ob) return oa - ob;
    return (a.code || '').localeCompare(b.code || '');
  });
  
  const isLao = lang === 'lo';
  
  showModal(`
    <h3>рҹҸӘ ${isLao ? 'аәӣа»ҲаәҪаәҷаәӘаәІаәӮаәІ' : 'а№ҖаёӣаёҘаёөа№ҲаёўаёҷаёӘаёІаёӮаёІ'}</h3>

async function switchBranch(newBranchId) {
  if (!user || !['admin', 'scc', 'bcs'].includes(user.role)) {
    showToast(lang === 'lo' ? 'аәҡа»Қа»ҲаәЎаәөаәӘаәҙаә”' : 'а№„аёЎа№ҲаёЎаёөаёӘаёҙаё—аёҳаёҙа№Ң', 'error');
    return;
  }
  
  try {
    // Load branch
    const { data: br, error } = await sb.from('branches').select('*').eq('id', newBranchId).maybeSingle();
    if (error) throw error;
    if (!br) {
      showToast(lang === 'lo' ? 'аәҡа»Қа»Ҳаәһаә»аәҡаәӘаәІаәӮаәІ' : 'а№„аёЎа№ҲаёһаёҡаёӘаёІаёӮаёІ', 'error');
      return;
    }
    
    log('Switching branch:', branch?.code, 'вҶ’', br.code);
    
    branch = br;
    user.active_branch_id = br.id;
    
    // Persist
    localStorage.setItem('fs_branch', JSON.stringify(branch));
    localStorage.setItem('fs_user', JSON.stringify(user));
    localStorage.setItem('fs_last_branch_id', String(branch.id));
    
    // Clear caches that are branch-specific
    window._productCache = null;
    window._varianceData = null;
    window._varianceAllData = null;
    session = null; // clear old session вҖ” а№Ӯаё«аёҘаё”а№ғаё«аёЎа№Ҳаё•аёІаёЎаёӘаёІаёӮаёІ
    
    closeModal();
    showToast('вң… ' + (lang === 'lo' ? `аәӣа»ҲаәҪаәҷа»Җаәӣаәұаәҷ ${br.name_lo || br.code}` : `а№ҖаёӣаёҘаёөа№Ҳаёўаёҷа№Җаёӣа№Үаёҷ ${br.name_th || br.code}`), 'success');
    
    // а№Ӯаё«аёҘаё” zones + session + locations аёӮаёӯаёҮаёӘаёІаёӮаёІа№ғаё«аёЎа№Ҳ
    await loadZonesAndLocations();
    await ensureSession();
    
    // Re-render app (аёЈаёөа№ҖаёҹаёЈаёҠаё«аёҷа№үаёІаё—аёұа№үаёҮаё«аёЎаё”)
    // вҡ пёҸ renderApp() а№„аёЎа№Ҳ return аёӯаё°а№„аёЈ вҖ” аёЎаёұаёҷ mutate DOM а№ҖаёӯаёҮ
    renderApp();
    
  } catch (e) {
    console.error('[FS] switchBranch error:', e);
    toastError(e);
  }
}
