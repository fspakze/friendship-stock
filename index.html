}

// ==================== QUICK ZONE JUMP ====================
// а№ҒаёӘаё”аёҮ Modal а№ҖаёҘаё·аёӯаёҒа№ӮаёӢаёҷаёЈаё§аё”а№ҖаёЈа№Үаё§ а№„аёЎа№Ҳаё•а№үаёӯаёҮ logout
async function openQuickZoneJump() {
  if (!allZones || allZones.length === 0) {
    showToast('No zones', 'error');
    return;
  }
  
  // аё„аёіаёҷаё§аё“аё§а№ҲаёІаёЎаёөаё„аёҷаёҷаёұаёҡа№„аёӣаёҒаёөа№ҲаёҠаёҙа№үаёҷа№ғаёҷ zone аёҷаёөа№үа№ҒаёҘа№үаё§ (аё–а№үаёІаёЎаёө session)
  let countsByZone = {};
  if (session) {
    const { data } = await sb.from('stock_counts')
      .select('zone_id')
      .eq('session_id', session.id)
      .eq('user_id', user.id);
    (data || []).forEach(c => {
      if (c.zone_id) countsByZone[c.zone_id] = (countsByZone[c.zone_id] || 0) + 1;
    });
  }
  
  const zonesHtml = (allZones || []).map(z => {
    const zoneName = lang === 'lo' ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo);
    const isCurrent = zone && zone.id === z.id;
    const count = countsByZone[z.id] || 0;
    return `
      <button class="qzone-card ${isCurrent ? 'is-current' : ''}" onclick="selectQuickZone(${z.id})">
        <div class="qzone-code">${z.code}</div>
        <div class="qzone-name">${zoneName || ''}</div>
        ${count > 0 ? `<div class="qzone-count">${count} ${T('items') || 'аёҠаёҙа№үаёҷ'}</div>` : ''}
        ${isCurrent ? `<div class="qzone-current-badge">${T('current') || 'аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ'}</div>` : ''}
      </button>
    `;
  }).join('');
  
  showModal(`
    <h3>${T('jump_to_zone') || 'а№„аёӣаёўаёұаёҮа№ӮаёӢаёҷ'}</h3>
    <p style="font-size:11px;color:var(--slate-500);margin-bottom:11px;">
      ${T('select_zone_to_jump') || 'а№ҖаёҘаё·аёӯаёҒа№ӮаёӢаёҷаё—аёөа№Ҳаё•а№үаёӯаёҮаёҒаёІаёЈа№„аёӣ'}
    </p>
    <div class="qzone-grid">
      ${zonesHtml}
    </div>
    <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel')}</button>
  `);
}

async function selectQuickZone(zoneId) {
  const z = (allZones || []).find(zz => zz.id == zoneId);
  if (!z) return;
  
  // If already on this zone, just close
  if (zone && zone.id === z.id) {
    closeModal();
    return;
  }
  
  // Clear location (since it belongs to old zone)
  zone = z;
  loc = null;
  
  // Update localStorage
  localStorage.setItem('fs_zone_loc', JSON.stringify({
    zone: zone.id,
    location: null
  }));
  
  closeModal();
  
  // Go to zone selection step to pick a new location
  showToast(`Zone: ${z.code}`, 'success');
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  showZoneStep();
  
  // Auto-select the zone we just picked
  setTimeout(() => {
    if (typeof selectZone === 'function') selectZone(z.id);
  }, 200);
}

// ==================== QUICK LOCATION PICKER (for no-zone branches) ====================
// аёӘаёіаё«аёЈаёұаёҡаёӘаёІаёӮаёІаё—аёөа№Ҳаёӣаёҙаё” zones вҖ” а№ғаё«а№ү Counter а№ҖаёҘаё·аёӯаёҒ location аё•аёЈаёҮаёҲаёІаёҒ scan page
async function openQuickLocPicker(forceMode = false) {
  const isLao = lang === 'lo';
  
  if (!allLocations || allLocations.length === 0) {
    showToast(isLao ? 'аәҡа»Қа»ҲаәЎаәөаә•аәіа»Ға»ңа»ҲаәҮ' : 'а№„аёЎа№ҲаёЎаёөаё•аёіа№Ғаё«аёҷа№ҲаёҮ', 'warning');
    return;
  }
  
  // Group by Gondola number (same logic as Floor Map)
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return { 
      groupKey: numMatch[1], 
      groupLabel: `Gondola ${numMatch[1]}`,
      type: numMatch[2], 
      bay: parseInt(numMatch[3]) || 0 
    };
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      else if (prefix === 'D') label = 'Display';
      else if (prefix === 'C') label = 'Cashier';
      else if (prefix === 'R') label = 'Rack';
      return { groupKey: 'z' + prefix, groupLabel: label, type: prefix, bay: parseInt(letterMatch[2]) || 0 };
    }
    return { groupKey: 'zzz', groupLabel: '?', type: '?', bay: 0 };
  }
  
  // Group locations
  const groups = {};
  allLocations.forEach(l => {
    const p = parseCode(l.location_code);
    if (!groups[p.groupKey]) groups[p.groupKey] = { label: p.groupLabel, items: [] };
    groups[p.groupKey].items.push({ ...l, _parsed: p });
  });
  
  // Sort
  const sortedGroups = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
  sortedGroups.forEach(([_, g]) => {
    g.items.sort((a, b) => {
      if (a._parsed.type !== b._parsed.type) return a._parsed.type.localeCompare(b._parsed.type);
      return a._parsed.bay - b._parsed.bay;
    });
  });
  
  // Recent locations (last 5)
  const recentCodes = JSON.parse(localStorage.getItem('fs_loc_recent') || '[]');
  const recentLocs = recentCodes.slice(0, 5)
    .map(code => allLocations.find(l => l.location_code === code))
    .filter(Boolean);
  
  let html = `
    <h3 style="display:flex;align-items:center;gap:7px;">
      рҹ“Қ ${forceMode 
        ? (isLao ? 'аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒ Gondola' : 'аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒ Gondola') 
        : (isLao ? 'а»ҖаәҘаә·аәӯаәҒаә•аәіа»Ға»ңа»ҲаәҮ' : 'а№ҖаёҘаё·аёӯаёҒаё•аёіа№Ғаё«аёҷа№ҲаёҮ')}
    </h3>
    
    ${forceMode ? `
      <p style="font-size:11px;color:var(--violet-600);margin-bottom:9px;background:var(--violet-100);padding:7px 11px;border-radius:7px;border-left:3px solid var(--violet-500);">
        рҹҺҜ ${isLao 
          ? 'а»ҖаәҘаә·аәӯаәҒ Gondola аә—аәөа»ҲаәҲаә°а»ҖаәӮаә»а»үаәІаәҷаәұаәҡ/аәӘаә°а»ҒаәҒаәҷ вҖ” аә—аәёаәҒаәӘаәҙаәҷаә„а»үаәІаә—аәөа»ҲаәӘаә°а»ҒаәҒаәҷаәҲаә°аәңаә№аәҒаәҒаәұаәҡ Gondola аәҷаәөа»ү' 
          : 'а№ҖаёҘаё·аёӯаёҒ Gondola аё—аёөа№ҲаёҲаё°а№ҖаёӮа№үаёІаёҷаёұаёҡ/аёӘа№ҒаёҒаёҷ вҖ” аё—аёёаёҒаёӘаёҙаёҷаё„а№үаёІаё—аёөа№ҲаёӘа№ҒаёҒаёҷаёҲаё°аёңаё№аёҒаёҒаёұаёҡ Gondola аёҷаёөа№ү'}
      </p>
    ` : ''}
    
    <!-- Search -->
    <div style="margin-bottom:9px;">
      <input type="text" id="quickLocSearch" 
             placeholder="рҹ”Қ ${isLao ? 'аә„аә»а»үаәҷаә«аәІ (а»ҖаәҠаәұа»Ҳаәҷ: 01A01, W028)...' : 'аё„а№үаёҷаё«аёІ (а№ҖаёҠа№Ҳаёҷ: 01A01, W028)...'}"
             oninput="filterQuickLocList(this.value)"
             autocomplete="off" autocapitalize="characters"
             style="width:100%;padding:9px 12px;border:2px solid var(--violet-300);border-radius:9px;font-size:13px;font-weight:600;font-family:'Space Grotesk',monospace;text-transform:uppercase;letter-spacing:1px;">
    </div>
  `;
  
  // Recent section
  if (recentLocs.length > 0) {
    html += `
      <div style="margin-bottom:11px;">
        <div style="font-size:10px;color:var(--slate-500);font-weight:700;text-transform:uppercase;margin-bottom:5px;">
          рҹ•җ ${isLao ? 'а»ғаәҠа»үаәҘа»ҲаәІаәӘаәёаә”' : 'а№ғаёҠа№үаёҘа№ҲаёІаёӘаёёаё”'}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;">
          ${recentLocs.map(l => `
            <button onclick="selectQuickLoc('${l.location_code}')" 
                    style="background:var(--amber-100);color:var(--amber-500);border:1px solid var(--amber-300);border-radius:6px;padding:5px 11px;font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;cursor:pointer;">
              ${l.location_code}
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  // Groups
  html += `<div id="quickLocList" style="max-height:340px;overflow-y:auto;background:var(--slate-50);border-radius:9px;padding:7px;">`;
  
  sortedGroups.forEach(([_, group]) => {
    html += `
      <div style="margin-bottom:9px;">
        <div style="font-size:11px;color:var(--violet-600);font-weight:800;font-family:'Space Grotesk',monospace;padding:4px 7px;background:var(--violet-100);border-radius:5px;display:inline-block;margin-bottom:5px;">
          ${group.label} (${group.items.length})
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(80px, 1fr));gap:4px;">
    `;
    group.items.forEach(l => {
      const isCurrent = loc && loc.location_code === l.location_code;
      html += `
        <button onclick="selectQuickLoc('${l.location_code}')" 
                class="qloc-item" data-code="${l.location_code}"
                style="background:${isCurrent ? 'var(--violet-500)' : 'white'};color:${isCurrent ? 'white' : 'var(--slate-900)'};border:1px solid ${isCurrent ? 'var(--violet-500)' : 'var(--slate-200)'};border-radius:6px;padding:7px 5px;font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;cursor:pointer;text-align:center;">
          ${l.location_code}
        </button>
      `;
    });
    html += '</div></div>';
  });
  
  html += '</div>';
  
  // а№ғаёҷ force mode вҶ’ а№„аёЎа№ҲаёЎаёөаёӣаёёа№ҲаёЎ cancel (аё•а№үаёӯаёҮа№ҖаёҘаё·аёӯаёҒ) | normal вҶ’ аёЎаёө cancel
  if (!forceMode) {
    html += `<button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel')}</button>`;
  } else {
    html += `<div style="margin-top:11px;font-size:10px;color:var(--slate-500);text-align:center;font-style:italic;">
      рҹ’Ў ${isLao ? 'аә•а»үаәӯаәҮа»ҖаәҘаә·аәӯаәҒ Gondola аәҒа»ҲаәӯаәҷаәҲаәҙа»ҲаәҮаәӘаә°а»ҒаәҒаәҷа»„аә”а»ү' : 'аё•а№үаёӯаёҮа№ҖаёҘаё·аёӯаёҒ Gondola аёҒа№Ҳаёӯаёҷаё–аё¶аёҮаёӘа№ҒаёҒаёҷа№„аё”а№ү'}
    </div>`;
  }
  
  showModal(html);
  
  setTimeout(() => {
    document.getElementById('quickLocSearch')?.focus();
  }, 100);
}

function filterQuickLocList(searchVal) {
  const search = (searchVal || '').toLowerCase().trim();
  const items = document.querySelectorAll('.qloc-item');
  items.forEach(it => {
    const code = (it.dataset.code || '').toLowerCase();
    it.style.display = code.includes(search) ? '' : 'none';
  });
  // Hide empty groups
  document.querySelectorAll('#quickLocList > div').forEach(group => {
    const visibleItems = group.querySelectorAll('.qloc-item:not([style*="display: none"])');
    group.style.display = visibleItems.length > 0 ? '' : 'none';
  });
}

function selectQuickLoc(locationCode) {
  const newLoc = allLocations.find(l => l.location_code === locationCode);
  if (!newLoc) return;
  
  loc = newLoc;
  
  // Save to recent (max 8)
  let recent = JSON.parse(localStorage.getItem('fs_loc_recent') || '[]');
  recent = [locationCode, ...recent.filter(c => c !== locationCode)].slice(0, 8);
  localStorage.setItem('fs_loc_recent', JSON.stringify(recent));
  
  // Save to fs_context
  const ctx = JSON.parse(localStorage.getItem('fs_context') || '{}');
  ctx.location = locationCode;
  localStorage.setItem('fs_context', JSON.stringify(ctx));
  
  closeModal();
  showToast(`рҹ“Қ ${locationCode}`, 'success');
  
  // Re-render scan page to update the location badge
  if (typeof goPage === 'function') {
    const activeTab = document.querySelector('.tab.active');
    if (activeTab?.dataset.page === 'scan') {
      goPage('scan');
    }
  }
}

// ==================== SESSION ====================
async function ensureSession() {
  if (!branch) {
    log('ERROR: No branch for session');
    return null;
  }
  
  log('Ensuring session for branch:', branch.id);
  
  const { data: existing, error: selErr } = await sb
    .from('stock_sessions')
    .select('*')
    .eq('status', 'active')
    .eq('branch_id', branch.id)
    .order('started_at', { ascending: false })
    .limit(1)
    .maybeSingle();
  
  if (selErr) {
    log('Session select error:', selErr);
  }
  
  if (existing) {
    session = existing;
    log('Active session found:', session.id, session.session_name);
    return session;
  }
  
  // Create new session
  const now = new Date();
  const q = 'Q' + (Math.floor(now.getMonth()/3)+1) + '/' + now.getFullYear();
  const sessionName = `${q} - ${branch.name_lo || branch.name_th} ${now.toISOString().slice(0,10)}`;
  
  log('Creating new session:', sessionName);
  
  const { data: newS, error: insErr } = await sb
    .from('stock_sessions')
    .insert({
      session_name: sessionName,
      status: 'active',
      phase: 'counting',
      quarter: q,
      branch_id: branch.id,
      started_by: user.id
    })
    .select()
    .single();
  
  if (insErr) {
    log('Session create error:', insErr);
    showToast('Error creating session: ' + insErr.message, 'error');
    return null;
  }
  
  session = newS;
  log('New session created:', session.id);
  return session;
}

async function enterApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('active');
  
  await ensureSession();
  renderApp();
}

function renderApp() {
  document.getElementById('app').innerHTML = renderShell();

function goPage(page) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.page === page));
  const c = document.getElementById('appContent');
  if (!c) return;
  
  log('Going to page:', page);
  
  // Cleanup Quick Nav when leaving floormap or users
  if (page !== 'floormap' && page !== 'users' && typeof cleanupQuickNav === 'function') {
    cleanupQuickNav();
  }
  // Reset branch filter when leaving users
  if (page !== 'users') {
    _userBranchFilter = null;
  }
  
  if (page === 'scan') {
    c.innerHTML = renderScanPage();
    loadSessionStats();
  } else if (page === 'history') {
    c.innerHTML = renderHistoryPage();
    loadHistory();
  } else if (page === 'tiebreaker') {
    c.innerHTML = renderTiebreakerPage();
    loadTiebreakerList();
  } else if (page === 'dashboard') {
    c.innerHTML = renderDashboardPage();
    loadDashboard();
  } else if (page === 'kpi') {
    c.innerHTML = renderKPIPage();
    loadKPI();
  } else if (page === 'variance') {
    c.innerHTML = renderVariancePage();
    loadVarianceReport();
  } else if (page === 'gapscan') {
    c.innerHTML = renderGapScanPage();
    setTimeout(() => loadGapScanRecent(), 100);
  } else if (page === 'gapreport') {
    c.innerHTML = renderGapReportPage();
    loadGapReport();
  } else if (page === 'users') {
    c.innerHTML = renderUsersPage();
    loadUsers();
  } else if (page === 'settings') {
    c.innerHTML = renderSettingsPage();
    loadSettingsStats();
  } else if (page === 'workflow') {
    c.innerHTML = renderWorkflowPage();
    loadWorkflowList();
  } else if (page === 'floormap') {
    c.innerHTML = renderFloorMapPage();
    loadFloorMap();
  }
  
  updateTbBadge();
}

          рҹ“· ${isLao ? 'аәӘаә°а»ҒаәҒаәҷ' : 'аёӘа№ҒаёҒаёҷ'}
        </button>
      </div>
    </div>
    
    <!-- Product detail card (will appear after scan) -->
    <div id="gapProductCard" style="margin-top:11px;"></div>
    
    <!-- Recent gap scans (last 10) -->
    <div style="margin-top:11px;">
      <div style="font-size:11px;font-weight:700;color:var(--slate-700);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;">
        <span>рҹ“Ӣ ${isLao ? 'аәҒаәІаәҷаәӘаә°а»ҒаәҒаәҷаәҘа»ҲаәІаәӘаәёаә”' : 'аёҒаёІаёЈаёӘа№ҒаёҒаёҷаёҘа№ҲаёІаёӘаёёаё”'}</span>
        <span id="gapRecentCount" style="background:var(--amber-100);color:var(--amber-600);padding:2px 7px;border-radius:5px;font-size:10px;">0</span>
      </div>
      <div id="gapRecentList"></div>
    </div>
  `;
}

// ==================== GAP SCAN: LOOKUP ====================
async function onGapBarcodeEnter() {
  const input = document.getElementById('gapBarcodeInput');
  if (!input) return;
  const barcode = input.value.trim();
  if (!barcode) return;
  await lookupGapProduct(barcode);
  input.value = '';
}

async function lookupGapProduct(barcode) {
  const isLao = lang === 'lo';
  const cardEl = document.getElementById('gapProductCard');
  if (!cardEl) return;
  
  // Check location (аёӘаёІаёӮаёІа№ҖаёҘа№ҮаёҒ)
  const noZones = branch?.use_zones === false;
  if (noZones && !loc) {
    showToast(isLao ? 'аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒаә•аәіа»Ға»ңа»ҲаәҮ' : 'аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒаё•аёіа№Ғаё«аёҷа№ҲаёҮ', 'error');
    return;
  }
  
  cardEl.innerHTML = `
    <div style="background:white;border-radius:11px;padding:14px;text-align:center;">
      <div class="loader" style="margin:0 auto;"></div>
      <div style="font-size:11px;color:var(--slate-500);margin-top:7px;">${isLao ? 'аәҒаәіаәҘаәұаәҮаә„аә»а»үаәҷаә«аәІ...' : 'аёҒаёіаёҘаёұаёҮаё„а№үаёҷаё«аёІ...'}</div>
    </div>
  `;
  
  try {
    // 1. аё«аёІаёӘаёҙаёҷаё„а№үаёІа№ғаёҷ branch аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ
    const { data: product, error } = await sb.from('products')
      .select('*')
      .eq('branch_id', branch.id)
      .eq('barcode', barcode)
      .eq('is_active', true)
      .maybeSingle();
    
    if (error) throw error;
    
    if (!product) {
      cardEl.innerHTML = `
        <div style="background:var(--rose-100);border:2px solid var(--rose-500);border-radius:11px;padding:13px;">
          <div style="font-size:14px;font-weight:800;color:var(--rose-500);display:flex;align-items:center;gap:7px;">
            вҡ пёҸ ${isLao ? 'аәҡа»Қа»Ҳаәһаә»аәҡаәӘаәҙаәҷаә„а»үаәІаәҷаәөа»ү а»ғаәҷаәӘаәІаәӮаәІ' : 'а№„аёЎа№ҲаёһаёҡаёӘаёҙаёҷаё„а№үаёІаёҷаёөа№ү а№ғаёҷаёӘаёІаёӮаёІ'}
          </div>
          <div style="font-size:11px;color:var(--slate-500);font-family:monospace;margin-top:5px;">${barcode}</div>
          <div style="font-size:10px;color:var(--slate-600);margin-top:7px;line-height:1.5;">
            ${isLao 
              ? 'рҹ’Ў аәӘаәҙаәҷаә„а»үаәІаәҷаәөа»үаәҡа»Қа»Ҳа»„аә”а»үаәҷаәіа»ҖаәӮаә»а»үаәІа»ғаәҷ POS вҖ” аәҒаә°аәҘаәёаәҷаәІаәӘаә°а»ҒаәҒаәҷаәӘаәҙаәҷаә„а»үаәІаәӯаә·а»Ҳаәҷ' 
              : 'рҹ’Ў аёӘаёҙаёҷаё„а№үаёІаёҷаёөа№үа№„аёЎа№Ҳа№„аё”а№үаёҷаёіа№ҖаёӮа№үаёІа№ғаёҷ POS вҖ” аёҒаёЈаёёаё“аёІаёӘа№ҒаёҒаёҷаёӘаёҙаёҷаё„а№үаёІаёӯаё·а№Ҳаёҷ'}
          </div>
        </div>
      `;
      return;
    }
    
    // аё«аёІ Pan-O-Gram (аё„аё§аёІаёЎаёҲаёёаёҠаёұа№үаёҷаё§аёІаёҮ) аёӮаёӯаёҮаёӘаёҙаёҷаё„а№үаёІаёҷаёөа№үа№ғаёҷаё•аёіа№Ғаё«аёҷа№ҲаёҮаёҷаёөа№ү
    let shelfCapacity = 0;
    if (loc?.location_code) {
      const { data: pog } = await sb.from('pan_o_grams')
        .select('total_qty')
        .eq('branch_id', branch.id)
        .eq('barcode', barcode)
        .eq('location_code', loc.location_code)
        .maybeSingle();
      shelfCapacity = pog?.total_qty || 0;
    }
    
    // а№ҖаёҒа№Үаёҡа№„аё§а№үаёӘаёіаё«аёЈаёұаёҡ submit
    _gapScanCurrent = {
      product,
      shelfCapacity,
      barcode
    };
    
    renderGapProductCard(product, shelfCapacity);
  } catch (e) {
    console.error('[FS] lookupGapProduct error:', e);
    cardEl.innerHTML = `
      <div style="background:var(--rose-100);color:var(--rose-500);padding:11px;border-radius:9px;font-size:11px;">
        вқҢ ${friendlyError(e)}
      </div>
    `;
  }
}

function renderGapProductCard(product, shelfCapacity) {
  const isLao = lang === 'lo';
  const cardEl = document.getElementById('gapProductCard');
  if (!cardEl) return;
  
  const name = isLao ? (product.name_lo || product.name_th) : (product.name_th || product.name_lo);
  const unit = isLao ? (product.unit_lo || 'аәҠаәҙа»үаәҷ') : (product.unit_th || 'аёҠаёҙа№үаёҷ');
  const posQty = product.pos_qty || 0;
  
  // Determine action: replenish (аёЎаёөа№ғаёҷаё„аёҘаёұаёҮ) vs purchase (аё«аёЎаё”аё•а№үаёӯаёҮ PO)
  const isReplenish = posQty > 0;
  const actionColor = isReplenish ? 'var(--amber-500)' : 'var(--rose-500)';
  const actionBg = isReplenish 
    ? 'linear-gradient(135deg,var(--amber-100),var(--amber-50))' 
    : 'linear-gradient(135deg,var(--rose-100),var(--rose-50))';
  const actionIcon = isReplenish ? 'рҹ“Ұ' : 'рҹӣ’';
  const actionTitle = isReplenish 
    ? (isLao ? 'аәЎаәөаәўаә№а»Ҳа»ғаәҷаә„аәұаәҮ вҖ” аәӘаә»а»ҲаәҮа»Җаә•аәөаәЎа»ңа»үаәІаә®а»үаәІаәҷ' : 'аёЎаёөаёӯаёўаё№а№Ҳа№ғаёҷаё„аёҘаёұаёҮ вҖ” аёӘа№ҲаёҮа№Җаё•аёҙаёЎаё«аёҷа№үаёІаёЈа№үаёІаёҷ')
    : (isLao ? 'а»қаә»аә”аә„аәұаәҮ вҖ” аәӘаә»а»ҲаәҮаәҲаәұаә”аәҠаә·а»ү PO' : 'аё«аёЎаё”аё„аёҘаёұаёҮ вҖ” аёӘа№ҲаёҮаёҲаёұаё”аёӢаё·а№үаёӯ PO');
  
  // Suggest gap qty: from shelf capacity (Pan-O-Gram)
  // If no Pan-O-Gram вҶ’ default 1
  const suggestedQty = shelfCapacity > 0 ? shelfCapacity : 1;
  
  cardEl.innerHTML = `
    <div style="background:white;border:2px solid ${actionColor};border-radius:13px;padding:13px;">
      <!-- Product info -->
      <div style="margin-bottom:11px;">
        <div style="font-size:14px;font-weight:800;color:var(--slate-900);line-height:1.3;">${name}</div>
        <div style="font-size:10px;color:var(--slate-500);font-family:monospace;margin-top:2px;">${product.barcode}</div>
        ${loc?.location_code ? `
          <div style="display:inline-block;background:var(--violet-100);color:var(--violet-600);padding:2px 8px;border-radius:5px;font-size:10px;font-weight:700;font-family:'Space Grotesk',monospace;margin-top:5px;">
            рҹ“Қ ${loc.location_code}
          </div>
        ` : ''}
      </div>
      
      <!-- Stock status (BIG) -->
      <div style="background:${actionBg};border-left:4px solid ${actionColor};border-radius:9px;padding:11px;margin-bottom:11px;">
        <div style="font-size:11px;font-weight:800;color:${actionColor};display:flex;align-items:center;gap:7px;">
          ${actionIcon} ${actionTitle}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:7px;">
          <div style="background:white;padding:7px;border-radius:7px;text-align:center;">
            <div style="font-size:9px;color:var(--slate-500);font-weight:700;text-transform:uppercase;">${isLao ? 'а»ғаәҷаә„аәұаәҮ POS' : 'а№ғаёҷаё„аёҘаёұаёҮ POS'}</div>
            <div style="font-size:22px;font-weight:800;color:${actionColor};font-family:'Space Grotesk',monospace;line-height:1;">${posQty}</div>
            <div style="font-size:9px;color:var(--slate-500);">${unit}</div>
          </div>
          <div style="background:white;padding:7px;border-radius:7px;text-align:center;">
            <div style="font-size:9px;color:var(--slate-500);font-weight:700;text-transform:uppercase;">${isLao ? 'аә„аә§аәІаәЎаәҲаәёаәҠаәұа»үаәҷ' : 'аё„аё§аёІаёЎаёҲаёёаёҠаёұа№үаёҷ'}</div>
            <div style="font-size:22px;font-weight:800;color:var(--violet-600);font-family:'Space Grotesk',monospace;line-height:1;">${shelfCapacity || 'вҖ”'}</div>
            <div style="font-size:9px;color:var(--slate-500);">${shelfCapacity > 0 ? unit : (isLao ? 'аәҡа»Қа»ҲаәЎаәөаәңаәұаәҮ' : 'а№„аёЎа№ҲаёЎаёөаёңаёұаёҮ')}</div>
          </div>
        </div>
      </div>
      
      <!-- Gap quantity input -->
      <div style="margin-bottom:11px;">
        <label style="font-size:11px;font-weight:700;color:var(--slate-700);display:block;margin-bottom:5px;">
          рҹ“Ҡ ${isLao ? 'аәҲаәіаәҷаә§аәҷаә—аәөа»Ҳаә•а»үаәӯаәҮа»Җаә•аәөаәЎ' : 'аёҲаёіаёҷаё§аёҷаё—аёөа№Ҳаё•а№үаёӯаёҮа№Җаё•аёҙаёЎ'}
        </label>
        <div style="display:flex;gap:7px;align-items:center;">
          <button onclick="adjustGapQty(-1)" style="background:var(--slate-200);border:none;width:36px;height:36px;border-radius:7px;font-size:18px;font-weight:800;cursor:pointer;">вҲ’</button>
          <input type="number" id="gapQtyInput" value="${suggestedQty}" min="1" 
                 style="flex:1;text-align:center;font-size:22px;font-weight:800;font-family:'Space Grotesk',monospace;color:${actionColor};padding:7px;border:2px solid ${actionColor};border-radius:7px;">
          <button onclick="adjustGapQty(1)" style="background:var(--slate-200);border:none;width:36px;height:36px;border-radius:7px;font-size:18px;font-weight:800;cursor:pointer;">+</button>
        </div>
        ${shelfCapacity > 0 ? `
          <div style="font-size:9px;color:var(--slate-500);margin-top:3px;text-align:center;">
            рҹ’Ў ${isLao ? 'а»Ғаәҷаә°аәҷаәі' : 'а№Ғаёҷаё°аёҷаёі'}: ${shelfCapacity} ${unit} (${isLao ? 'аә•аәІаәЎаә„аә§аәІаәЎаәҲаәёаәҠаәұа»үаәҷ' : 'аё•аёІаёЎаё„аё§аёІаёЎаёҲаёёаёҠаёұа№үаёҷ'})
          </div>
        ` : ''}
      </div>
      
      <!-- Note -->
      <div style="margin-bottom:11px;">
        <label style="font-size:11px;font-weight:700;color:var(--slate-700);display:block;margin-bottom:3px;">
          рҹ“қ ${isLao ? 'а»қаәІаәҚа»Җаә«аә” (аәҡа»Қа»ҲаәҡаәұаәҮаә„аәұаәҡ)' : 'аё«аёЎаёІаёўа№Җаё«аё•аёё (а№„аёЎа№ҲаёҡаёұаёҮаё„аёұаёҡ)'}
        </label>
        <input type="text" id="gapNoteInput" 
               placeholder="${isLao ? 'а»ҖаәҠаәұа»Ҳаәҷ: аә”а»Ҳаә§аәҷ, аәӘаәҙаәҷаә„а»үаәІаәӮаәІаәҚаә”аәө...' : 'а№ҖаёҠа№Ҳаёҷ: аё”а№Ҳаё§аёҷ, аёӘаёҙаёҷаё„а№үаёІаёӮаёІаёўаё”аёө...'}"
               class="form-input" style="font-size:11px;padding:8px;">
      </div>
      
      <!-- Actions -->
      <div style="display:flex;gap:7px;">
        <button class="btn btn-secondary" onclick="cancelGapScan()" style="flex:1;padding:13px;">
          ${isLao ? 'аәҚаә»аәҒа»ҖаәҘаәөаәҒ' : 'аёўаёҒа№ҖаёҘаёҙаёҒ'}
        </button>
        <button class="btn btn-primary" onclick="submitGapScan()" 
                style="flex:1.5;padding:13px;background:linear-gradient(135deg,${actionColor},${actionColor});font-weight:800;">
          ${actionIcon} ${isReplenish 
            ? (isLao ? 'аәӘа»Ҳаә»аәҮа»Җаә•аәөаәЎ' : 'аёӘа№ҲаёҮа№Җаё•аёҙаёЎ') 
            : (isLao ? 'аәӘа»Ҳаә»аәҮаәӘаәұа»ҲаәҮаәҠаә·а»ү' : 'аёӘа№ҲаёҮаёӘаёұа№ҲаёҮаёӢаё·а№үаёӯ')}
        </button>
      </div>
    </div>
  `;
}

function adjustGapQty(delta) {
  const input = document.getElementById('gapQtyInput');
  if (!input) return;
  const cur = parseInt(input.value) || 0;
  const newVal = Math.max(1, cur + delta);
  input.value = newVal;
}

function cancelGapScan() {
  _gapScanCurrent = null;
  const cardEl = document.getElementById('gapProductCard');
  if (cardEl) cardEl.innerHTML = '';
}

// ==================== GAP SCAN: SUBMIT ====================
async function submitGapScan() {
  const isLao = lang === 'lo';
  if (!_gapScanCurrent) return;
  
  const qtyInput = document.getElementById('gapQtyInput');
  const noteInput = document.getElementById('gapNoteInput');
  const gapQty = parseInt(qtyInput?.value) || 1;
  const note = noteInput?.value.trim() || null;
  
  const { product, shelfCapacity } = _gapScanCurrent;
  const actionType = product.pos_qty > 0 ? 'replenish' : 'purchase';
  
  // Save to DB
  try {
    const insertData = {
      branch_id: branch.id,
      session_id: session?.id || null,
      user_id: user.id,
      product_id: product.id,
      barcode: product.barcode,
      product_name: isLao ? (product.name_lo || product.name_th) : (product.name_th || product.name_lo),
      location_code: loc?.location_code || null,
      gondola_code: loc?.gondola_code || loc?.location_code || null,
      gap_qty: gapQty,
      pos_qty_at_scan: product.pos_qty || 0,
      shelf_capacity: shelfCapacity,
      status: 'pending',
      action_type: actionType,
      note: note
    };
    
    const { data, error } = await sb.from('gap_scans')
      .insert(insertData)
      .select()
      .single();
    
    if (error) throw error;
    
    beep();
    const successMsg = actionType === 'replenish'
      ? (isLao ? 'вң… аәӘаә»а»ҲаәҮа»Җаә•аәөаәЎаә„аәұаәҮ' : 'вң… аёӘа№ҲаёҮа№Җаё•аёҙаёЎаё„аёҘаёұаёҮ')
      : (isLao ? 'вң… аәӘа»Ҳаә»аәҮаәӘаәұа»ҲаәҮаәҠаә·а»ү PO' : 'вң… аёӘа№ҲаёҮаёӘаёұа№ҲаёҮаёӢаё·а№үаёӯ PO');
    showToast(successMsg, 'success');
    
    // Clear card + refresh list
    _gapScanCurrent = null;
    const cardEl = document.getElementById('gapProductCard');
    if (cardEl) cardEl.innerHTML = '';
    loadGapScanRecent();
  } catch (e) {
    console.error('[FS] submitGapScan error:', e);
    toastError(e);
  }
}

// ==================== GAP SCAN: RECENT LIST ====================
async function loadGapScanRecent() {
  const isLao = lang === 'lo';
  const listEl = document.getElementById('gapRecentList');
  const countEl = document.getElementById('gapRecentCount');
  if (!listEl) return;
  
  try {
    const { data, error } = await sb.from('gap_scans')
      .select('*, users(full_name)')
      .eq('branch_id', branch.id)
      .eq('user_id', user.id)
      .order('created_at', { ascending: false })
      .limit(10);
    
    if (error) throw error;
    
    if (countEl) countEl.textContent = (data || []).length;
    
    if (!data || data.length === 0) {
      listEl.innerHTML = `
        <div style="text-align:center;padding:25px;color:var(--slate-400);background:white;border-radius:9px;">
          <div style="font-size:32px;margin-bottom:5px;">рҹ“ӯ</div>
          <div style="font-size:11px;color:var(--slate-500);">
            ${isLao ? 'аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷ' : 'аёўаёұаёҮа№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ'}

      html += `
        <div style="background:${bg};border-left:3px solid ${color};border-radius:7px;padding:7px 9px;margin-bottom:5px;display:flex;align-items:center;gap:7px;font-size:10px;">
          <div style="font-size:16px;flex-shrink:0;">${icon}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;color:var(--slate-900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
              ${g.product_name || g.barcode}

            <div style="font-size:9px;color:var(--slate-500);">
              ${g.location_code ? `рҹ“Қ ${g.location_code} вҖў ` : ''}${time}

async function toggleGapScan() {
  const btn = document.getElementById('gapScanBtn');
  const frame = document.getElementById('gapScanFrame');
  const placeholder = document.getElementById('gapScanPlaceholder');
  const isLao = lang === 'lo';
  
  if (window._gapScanner && window._gapScanner.isScanning) {
    // Stop
    try {
      await window._gapScanner.stop();
      window._gapScanner = null;
    } catch(e) {}
    if (placeholder) placeholder.style.display = 'flex';
    if (btn) btn.innerHTML = `рҹ“· ${isLao ? 'аәӘаә°а»ҒаәҒаәҷ' : 'аёӘа№ҒаёҒаёҷ'}`;
    return;
  }
  
  // Start
  if (!window.Html5Qrcode) {
    showToast('Camera library not loaded', 'error');
    return;
  }
  
  if (placeholder) placeholder.style.display = 'none';
  if (btn) btn.innerHTML = `вҸ№ ${isLao ? 'аәўаәёаә”' : 'аё«аёўаёёаё”'}`;
  
  // Create scanner container
  let scannerEl = document.getElementById('gapScannerInner');
  if (!scannerEl) {
    scannerEl = document.createElement('div');
    scannerEl.id = 'gapScannerInner';
    scannerEl.style.cssText = 'width:100%;height:100%;';
    frame.appendChild(scannerEl);
  }
  
  try {
    window._gapScanner = new Html5Qrcode('gapScannerInner');
    await window._gapScanner.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: { width: 250, height: 100 } },
      async (decoded) => {
        await window._gapScanner.stop();
        window._gapScanner = null;
        if (placeholder) placeholder.style.display = 'flex';
        if (btn) btn.innerHTML = `рҹ“· ${isLao ? 'аәӘаә°а»ҒаәҒаәҷ' : 'аёӘа№ҒаёҒаёҷ'}`;
        await lookupGapProduct(decoded);
      },
      () => {}
    );
  } catch (e) {
    console.error('[FS] Gap camera error:', e);
    showToast(friendlyError(e), 'error');
    if (placeholder) placeholder.style.display = 'flex';
    if (btn) btn.innerHTML = `рҹ“· ${isLao ? 'аәӘаә°а»ҒаәҒаәҷ' : 'аёӘа№ҒаёҒаёҷ'}`;
  }
}

// Aggregate gaps by product (аёЈаё§аёЎаё«аёҘаёІаёў gap entry аёӮаёӯаёҮ product а№Җаё”аёөаёўаё§аёҒаёұаёҷ)
function aggregateGaps(gaps) {
  const agg = {};
  gaps.forEach(g => {
    const key = g.product_id || g.barcode;
    if (!agg[key]) {
      agg[key] = {
        product_id: g.product_id,
        barcode: g.barcode,
        product_name: g.product_name,
        product: g.products,
        total_gap_qty: 0,
        entries: [],
        gondolas: new Set()
      };
    }
    agg[key].total_gap_qty += (g.gap_qty || 0);
    agg[key].entries.push(g);
    if (g.gondola_code) agg[key].gondolas.add(g.gondola_code);
  });
  return Object.values(agg).map(a => ({ ...a, gondolas: Array.from(a.gondolas) }));
}

}

// Detect аё§а№ҲаёІаёЈаёұаёҷа№ғаёҷ PWA mode (Add to Home Screen / Installed) аё«аёЈаё·аёӯа№ҖаёӣаёҘа№ҲаёІ
function isPWAMode() {
  // iOS: standalone navigator property
  if (window.navigator.standalone === true) return true;
  // Android/Chrome: display-mode media query
  if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return true;
  if (window.matchMedia && window.matchMedia('(display-mode: fullscreen)').matches) return true;
  if (window.matchMedia && window.matchMedia('(display-mode: minimal-ui)').matches) return true;
  // Referrer android-app://
  if (document.referrer.startsWith('android-app://')) return true;
  return false;
}

// аёӮаёӯ camera permission а№Ғаёҡаёҡ explicit аёҒа№Ҳаёӯаёҷ (аёҠа№Ҳаё§аёў PWA mode аёҡаёҷ iOS/Android)
// аёӘа№ҲаёҮаё„аё·аёҷ { granted: true/false, error?: string }
async function requestCameraPermission() {
  log('[FS] Requesting camera permission, PWA mode:', isPWAMode());
  
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return { granted: false, error: 'mediaDevices_not_supported' };
  }
  
  try {
    // аёӮаёӯ stream а№Ғаёҡаёҡ minimal а№Җаёһаё·а№Ҳаёӯ trigger permission prompt
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });
    
    // аёӣаёҙаё” stream аё—аёұаёҷаё—аёө (а№ҖаёЈаёІа№Ғаё„а№Ҳаё•а№үаёӯаёҮаёҒаёІаёЈ permission, scanner аёҲаё°а№Җаёӣаёҙаё”аёӮаёӯаёҮаё•аёұаё§а№ҖаёӯаёҮ)
    stream.getTracks().forEach(t => t.stop());
    
    log('[FS] Camera permission granted');
    return { granted: true };
  } catch (e) {
    console.error('[FS] Camera permission denied:', e?.name, e?.message);
    return { 
      granted: false, 
      error: e?.name || 'unknown',
      message: e?.message
    };
  }
}

function getScannerConfig() {
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) || 
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /Android/i.test(ua);
  
  // formats аё—аёөа№ҲаёҲаё°аёӯа№ҲаёІаёҷ вҖ” аё„аёЈаёӯаёҡаё„аёҘаёёаёЎаёҡаёІаёЈа№Ңа№Ӯаё„а№үаё”аёӘаёҙаёҷаё„а№үаёІаё—аёұа№Ҳаё§а№„аёӣ
  const formats = (typeof Html5QrcodeSupportedFormats !== 'undefined') ? [
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.CODE_93,
    Html5QrcodeSupportedFormats.ITF,
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.DATA_MATRIX
  ] : undefined;
  
  // qrbox а№Ғаёҡаёҡ dynamic
  const qrboxFunc = (vw, vh) => {
    const minEdge = Math.min(vw, vh);
    const w = Math.floor(minEdge * 0.85);
    const h = Math.floor(w * 0.45);
    return { width: w, height: h };
  };
  
  // Resolution аё—аёөа№ҲаёӣаёҘаёӯаё”аё аёұаёўаё•а№Ҳаёӯаё—аёёаёҒ device
  // Android аё«аёҘаёІаёўаёЈаёёа№Ҳаёҷа№„аёЎа№Ҳ support 1920x1080 аё—аёіа№ғаё«а№үаёҲаёӯаё”аёі вҖ” а№ғаёҠа№ү 1280x720 max
  // аё–аёӯаё” min аёӯаёӯаёҒа№Җаёһаё·а№Ҳаёӯа№ғаё«а№ү browser а№ҖаёҘаё·аёӯаёҒаё„аё§аёІаёЎаёҘаё°а№Җаёӯаёөаёўаё”аё—аёөа№Ҳ device аё—аёіа№„аё”а№ү
  const videoConstraints = {
    facingMode: "environment",  // а№„аёЎа№Ҳа№ғаёҠа№ү ideal/exact вҖ” а№ғаёҠа№ү string аё•аёЈаёҮа№Ҷ аёӣаёҘаёӯаё”аё аёұаёўаёҒаё§а№ҲаёІ
    width: { ideal: 1280 },
    height: { ideal: 720 }
  };
  
  return {
    fps: 10,                                        // аёҘаёҮ fps аёҲаёІаёҒ 15вҶ’10 аёӣаёҘаёӯаё”аё аёұаёўаё—аёёаёҒ device
    qrbox: qrboxFunc,
    aspectRatio: 1.333,
    disableFlip: false,
    formatsToSupport: formats,
    rememberLastUsedCamera: true,
    // BarcodeDetector API вҖ” а№Җаёӣаёҙаё”а№ғаё«а№ү Android а№ғаёҠа№ү (аё—аёіаёҮаёІаёҷа№ҖаёЈа№Үаё§) аёӣаёҙаё”а№ғаё«а№ү iOS (buggy)
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: !isIOS
    },
    videoConstraints: videoConstraints
  };
}

// а№ҒаёҒа№ү video element а№ғаё«а№үаё—аёіаёҮаёІаёҷа№„аё”а№үаё—аёёаёҒ device (iOS + Android)
function fixVideoElement(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  const applyFix = () => {
    const videos = container.querySelectorAll('video');
    videos.forEach(v => {
      // iOS аё•а№үаёӯаёҮаёҒаёІаёЈ playsinline а№„аёЎа№ҲаёҮаёұа№үаёҷ fullscreen аё«аёЈаё·аёӯа№„аёЎа№Ҳа№ҖаёҘа№Ҳаёҷ
      v.setAttribute('playsinline', 'true');
      v.setAttribute('webkit-playsinline', 'true');
      v.setAttribute('autoplay', 'true');
      v.setAttribute('muted', 'true');
      v.muted = true;
      v.playsInline = true;
      v.autoplay = true;
      
      // Style аёҡаёұаёҮаё„аёұаёҡ
      v.style.objectFit = 'cover';
      v.style.width = '100%';
      v.style.height = '100%';
      v.style.background = '#000';
      
      // Force play (Android Chrome аёҡаёІаёҮаё„аёЈаёұа№үаёҮа№„аёЎа№Ҳ auto-play)
      if (v.paused || v.readyState < 2) {
        v.play().catch(err => {
          console.warn('[FS] video.play() failed:', err.message);
        });
      }
    });
  };
  
  // Apply аё«аёҘаёІаёўа№Ҷ аё„аёЈаёұа№үаёҮа№Җаёһаё·а№Ҳаёӯ safety (Android Chrome render video element а№Ғаёҡаёҡ delayed)
  setTimeout(applyFix, 100);
  setTimeout(applyFix, 500);
  setTimeout(applyFix, 1200);
}

// Fallback start: аё–а№үаёІ facingMode fail аёҘаёӯаёҮ enumerate cameras а№ҒаёҘа№үаё§а№ҖаёҘаё·аёӯаёҒ back camera
async function tryStartScannerFallback(scannerInstance, containerId, onSuccess) {
  try {
    log('[FS] Falling back to camera enumeration');
    const devices = await Html5Qrcode.getCameras();
    log('[FS] Cameras found:', devices?.length || 0);
    
    if (!devices || devices.length === 0) {
      throw new Error('No cameras available');
    }
    
    // аё«аёІ back camera (аёҘаёіаё”аёұаёҡаёҠаё·а№Ҳаёӯаёҡа№ҲаёҮаёҡаёӯаёҒ)
    let backCamera = devices.find(d => /back|rear|environment/i.test(d.label || ''));
    if (!backCamera) {
      // аё–а№үаёІа№„аёЎа№Ҳа№ҖаёҲаёӯаёҲаёІаёҒаёҠаё·а№Ҳаёӯ а№ғаёҠа№үаё•аёұаё§аёӘаёёаё”аё—а№үаёІаёў (аёЎаёұаёҒаёҲаё°а№Җаёӣа№Үаёҷ back camera)
      backCamera = devices[devices.length - 1];
    }
    log('[FS] Using camera:', backCamera.label, backCamera.id);
    
    const config = getScannerConfig();
    delete config.videoConstraints; // а№ғаёҠа№ү device id аё•аёЈаёҮа№Ҷ а№„аёЎа№Ҳаё•а№үаёӯаёҮаёЎаёө constraints
    
    await scannerInstance.start(
      backCamera.id,
      config,
      onSuccess,
      () => {}
    );
    
    fixVideoElement(containerId);
    return true;
  } catch (e) {
    console.error('[FS] Fallback also failed:', e);
    throw e;
  }
}

function getCameraErrorMessage(err) {
  const msg = (err?.message || err?.toString() || '').toLowerCase();
  const name = (err?.name || '').toLowerCase();
  
  // HTTPS required
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    return T('scan_https_required');
  }
  
  // Permission denied
  if (name.includes('notallowed') || name.includes('permission') || 
      msg.includes('permission') || msg.includes('denied') || msg.includes('notallowed')) {
    return T('scan_permission_denied');
  }
  
  // No camera found
  if (name.includes('notfound') || msg.includes('not found') || msg.includes('no camera') ||
      msg.includes('requested device not found')) {
    return T('scan_no_camera');
  }
  
  // Camera in use
  if (name.includes('notreadable') || name.includes('inuse') || 
      msg.includes('in use') || msg.includes('could not start')) {
    return T('scan_in_use');
  }
  
  // Not supported
  if (name.includes('notsupported') || msg.includes('not supported') || 
      msg.includes('mediadevices') || msg.includes('getusermedia')) {
    return T('scan_not_supported');
  }
  
  // Default
  return T('scan_error');
}

async function startScan() {
  // Helper: log а№„аёӣ console а№Җаёһаё·а№Ҳаёӯ debug (аё–а№үаёІаё•а№үаёӯаёҮаёҒаёІаёЈаё”аё№ а№Җаёӣаёҙаё” DevTools)
  const scanLog = (msg, level = 'info') => {
    const prefix = { info: 'В·', warn: 'вҡ ', error: 'вң—', ok: 'вң“' };
    console.log(`[FS Scan] ${prefix[level] || ''} ${msg}`);
  };
  
  scanLog('=== Scan started ===', 'ok');
  scanLog('UA: ' + navigator.userAgent.substring(0, 60));
  scanLog('PWA mode: ' + (isPWAMode() ? 'YES' : 'NO'));
  scanLog('Protocol: ' + location.protocol);
  scanLog('Html5Qrcode loaded: ' + (typeof Html5Qrcode !== 'undefined'));
  if (window._html5QrcodeLoadedFrom) {
    scanLog('CDN: ' + window._html5QrcodeLoadedFrom.substring(0, 50), 'ok');
  }
  
  document.getElementById('scanPlaceholder').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('startScanBtn').style.display = 'none';
  document.getElementById('stopScanBtn').style.display = 'flex';
  document.getElementById('scanFrame').classList.add('scanning');
  
  // аё–а№үаёІ library аёўаёұаёҮа№„аёЎа№Ҳа№Ӯаё«аёҘаё” аёЈаёӯ + retry аёӘаё№аёҮаёӘаёёаё” 8 аё§аёҙаёҷаёІаё—аёө
  if (typeof Html5Qrcode === 'undefined') {
    scanLog('Library not loaded yet, waiting...', 'warn');
    let retries = 0;
    const maxRetries = 16; // 16 Г— 500ms = 8s
    while (typeof Html5Qrcode === 'undefined' && retries < maxRetries) {
      await new Promise(r => setTimeout(r, 500));
      retries++;
    }
    
    if (typeof Html5Qrcode === 'undefined') {
      scanLog('CRITICAL: Library failed to load from all CDNs!', 'error');
      showToast(T('scan_not_supported') || 'а№„аёЎа№ҲаёӘаёІаёЎаёІаёЈаё–а№Ӯаё«аёҘаё”аё•аёұаё§аёӘа№ҒаёҒаёҷ аёҒаёЈаёёаё“аёІаё•аёЈаё§аёҲаёӘаёӯаёҡа№Җаё„аёЈаё·аёӯаёӮа№ҲаёІаёў', 'error');
      stopScan();
      return;
    }
    scanLog('Library loaded after ' + (retries * 0.5) + 's', 'ok');
  }
  
  // а№ҖаёҠа№Үаё„ browser support
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    scanLog('mediaDevices.getUserMedia not available', 'error');
    showToast(T('scan_not_supported'), 'error');
    stopScan();
    return;
  }
  
  // а№ҖаёҠа№Үаё„ HTTPS
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    scanLog('Not HTTPS - camera blocked', 'error');
    showToast(T('scan_https_required') || 'аё•а№үаёӯаёҮа№ғаёҠа№ү HTTPS', 'error');
    stopScan();
    return;
  }
  
  html5QrCode = new Html5Qrcode("reader", { verbose: false });
  scanLog('Html5Qrcode instance created');
  
  const onScanSuccess = (decoded) => { 
    scanLog('Scanned: ' + decoded, 'ok');
    beep();
    stopScan(); 
    lookupProduct(decoded); 
  };
  
  // аё§аёҙаёҳаёөаё—аёөа№Ҳ 1: facingMode + minimal config
  try {
    scanLog('Attempt 1: facingMode environment');
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 280, height: 160 } },
      onScanSuccess,
      () => {}
    );
    scanLog('SUCCESS (Attempt 1)', 'ok');
    fixVideoElement('reader');
    return;
  } catch (e1) {
    scanLog('Attempt 1 FAILED: ' + (e1?.name || '?') + ' - ' + (e1?.message || '?').substring(0, 80), 'warn');
    
    try { await html5QrCode.stop(); } catch(_) {}
    try { html5QrCode.clear(); } catch(_) {}
    html5QrCode = new Html5Qrcode("reader", { verbose: false });
    
    // аё§аёҙаёҳаёөаё—аёөа№Ҳ 2: enumerate cameras
    try {
      scanLog('Attempt 2: enumerating cameras');
      const devices = await Html5Qrcode.getCameras();
      scanLog('Cameras found: ' + (devices?.length || 0));
      
      if (!devices || devices.length === 0) {
        throw new Error('No cameras');
      }
      
      let cam = devices.find(d => /back|rear|environment/i.test(d.label || ''));
      if (!cam) cam = devices[devices.length - 1];
      scanLog('Using camera: ' + (cam.label || cam.id.substring(0, 20)));
      
      await html5QrCode.start(
        cam.id,
        { fps: 10, qrbox: { width: 280, height: 160 } },
        onScanSuccess,
        () => {}
      );
      scanLog('SUCCESS (Attempt 2)', 'ok');
      fixVideoElement('reader');
      return;
    } catch (e2) {
      scanLog('Attempt 2 FAILED: ' + (e2?.name || '?') + ' - ' + (e2?.message || '?').substring(0, 80), 'warn');
      
      try { await html5QrCode.stop(); } catch(_) {}
      try { html5QrCode.clear(); } catch(_) {}
      html5QrCode = new Html5Qrcode("reader", { verbose: false });
      
      // аё§аёҙаёҳаёөаё—аёөа№Ҳ 3: direct getUserMedia test + retry
      try {
        scanLog('Attempt 3: direct getUserMedia test');
        const testStream = await navigator.mediaDevices.getUserMedia({ 
          video: true, 
          audio: false 
        });
        testStream.getTracks().forEach(t => t.stop());
        await new Promise(r => setTimeout(r, 500));
        
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 280, height: 160 } },
          onScanSuccess,
          () => {}
        );
        scanLog('SUCCESS (Attempt 3)', 'ok');
        fixVideoElement('reader');
        return;
      } catch (e3) {
        scanLog('All attempts failed', 'error');
        console.error('[FS] e1:', e1);
        console.error('[FS] e2:', e2);
        console.error('[FS] e3:', e3);
        
        const errName = (e3?.name || '').toLowerCase();
        const isPermErr = errName.includes('notallowed') || 
                          (e3?.message || '').toLowerCase().includes('permission');
        
        if (isPermErr && isPWAMode()) {
          stopScan();
          showPWAPermissionHelp();
        } else {
          showToast(getCameraErrorMessage(e1), 'error');
          stopScan();
        }
      }
    }
  }
}

          <div style="font-size:9px;color:var(--slate-500);margin-top:5px;padding-top:5px;border-top:1px dashed var(--slate-200);">
            вҡ пёҸ ${isLao 
              ? 'аә”аә¶аәҮа»ҖаәҠаәһаәІаә°аәҠаә·а»Ҳ/аә«аә»аә§а»ңа»Ҳаә§аәҚ/аәҘаәІаә„аәІ вҖ” POS = 0 (аәҡа»Қа»Ҳаә”аә¶аәҮаәӘаә°аә•а»ӢаәӯаәҒаәҲаәІаәҒ ' + sourceName + ')' 
              : 'аё”аё¶аёҮа№ҖаёүаёһаёІаё°аёҠаё·а№Ҳаёӯ/аё«аёҷа№Ҳаё§аёў/аёЈаёІаё„аёІ вҖ” POS = 0 (а№„аёЎа№Ҳаё”аё¶аёҮаёӘаё•а№ҠаёӯаёҒаёҲаёІаёҒ ' + sourceName + ')'}
          </div>
        </div>
        
        <div style="display:flex;gap:6px;">
          <button class="btn btn-secondary" onclick="cancelClonePrompt()" 
                  style="flex:1;padding:11px;font-size:11px;font-weight:700;">
            ${isLao ? 'аәҚаә»аәҒа»ҖаәҘаәөаәҒ' : 'аёўаёҒа№ҖаёҘаёҙаёҒ'}
          </button>
          <button class="btn btn-primary" onclick="confirmCloneFromOther()" 
                  style="flex:1.5;padding:11px;font-size:11px;font-weight:800;background:linear-gradient(135deg,var(--amber-500),var(--rose-500));">
            вһ• ${isLao ? 'а»Җаәһаәөа»ҲаәЎа»ҖаәӮаә»а»үаәІаәӘаәІаәӮаәІ' : 'а№Җаёһаёҙа№ҲаёЎа№ҖаёӮа№үаёІаёӘаёІаёӮаёІ'} (POS=0)
          </button>
        </div>
      </div>
    `;
    return;
  }
  
  // STEP 4: а№„аёЎа№Ҳа№ҖаёҲаёӯа№ҖаёҘаёўаё—аёұа№үаёҮаёЈаё°аёҡаёҡ вҶ’ а№ғаё«а№үаёҒаёЈаёӯаёҒа№ғаё«аёЎа№Ҳ
  log('Not found anywhere');
  document.getElementById('productCard').innerHTML = `
    <div class="product-card" style="border-left-color: var(--rose-500);">
      <div class="product-name" style="color: var(--rose-500);">вҡ пёҸ ${T('product_not_found')}</div>
      <div class="product-barcode">${barcode}</div>
      <div style="font-size:10px;color:var(--slate-500);margin-top:6px;">
        ${isLao ? `аәҡа»Қа»Ҳаәһаә»аәҡа»ғаәҷ ${branch.code} а»ҒаәҘаә°аәҡа»Қа»ҲаәЎаәөа»ғаәҷаәӘаәІаәӮаәІаәӯаә·а»Ҳаәҷ` : `а№„аёЎа№Ҳаёһаёҡа№ғаёҷ ${branch.code} а№ҒаёҘаё°а№„аёЎа№ҲаёЎаёөа№ғаёҷаёӘаёІаёӮаёІаёӯаё·а№Ҳаёҷ`}
      </div>
      <button class="btn btn-amber" onclick="openNewSKUModal('${barcode}')" style="margin-top:8px;">
        ${T('add_new_sku')}
      </button>
    </div>
  `;
}

// ==================== CLONE FROM OTHER BRANCH (Manual Confirm) ====================
function cancelClonePrompt() {
  window._pendingCloneData = null;
  document.getElementById('productCard').innerHTML = '';
  curProduct = null;
  showToast(lang === 'lo' ? 'вҶ©пёҸ аәҚаә»аәҒа»ҖаәҘаәөаәҒ' : 'вҶ©пёҸ аёўаёҒа№ҖаёҘаёҙаёҒ', 'success');
}

async function confirmCloneFromOther() {
  const otherData = window._pendingCloneData;
  if (!otherData) return;
  const isLao = lang === 'lo';
  
  try {
    const cloneData = {
      barcode: otherData.barcode,
      name_th: otherData.name_th,
      name_lo: otherData.name_lo,
      unit_th: otherData.unit_th,
      unit_lo: otherData.unit_lo,
      category_id: otherData.category_id,
      cost_price: otherData.cost_price,
      sell_price: otherData.sell_price,
      pos_qty: 0,  // а№ҖаёЈаёҙа№ҲаёЎаё—аёөа№Ҳ 0 вҖ” аёӮаёӯаёҮаёӘаёІаёӮаёІаёҷаёөа№үа№„аёЎа№ҲаёЎаёө POS data
      is_active: true,
      is_markdown: otherData.is_markdown,
      gondola_code: null,
      branch_id: branch.id
    };
    
    const { data: cloned, error: cloneErr } = await sb
      .from('products')
      .insert(cloneData)
      .select()
      .single();
    
    if (cloneErr) {
      showToast(`Error: ${cloneErr.message}`, 'error');
      return;
    }
    
    window._pendingCloneData = null;
    showToast(isLao 
      ? `вң… а»Җаәһаәөа»ҲаәЎа»ғаәҷ ${branch.code} а»ҒаәҘа»үаә§ (POS=0)` 
      : `вң… а№Җаёһаёҙа№ҲаёЎа№ғаёҷ ${branch.code} а№ҒаёҘа№үаё§ (POS=0)`, 'success');
    
    curProduct = cloned;
    renderProduct(cloned);
  } catch (e) {
    console.error('[FS] confirmCloneFromOther error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}
// ==================== END CLONE PROMPT ====================

function renderProduct(p) {
  const name = lang === 'lo' ? (p.name_lo || p.name_th) : (p.name_th || p.name_lo);
  const unit = lang === 'lo' ? (p.unit_lo || p.unit_th || 'pcs') : (p.unit_th || p.unit_lo || 'аёҠаёҙа№үаёҷ');
  const price = Number(p.sell_price || 0).toLocaleString();
  const r = user.role;
  const isAdmin = ['admin', 'scc', 'bcs'].includes(r);
  const isVerifier = ['verifier', 'audit'].includes(r);
  const isCTL = r === 'ctl';
  const canEditPog = ['admin', 'scc', 'bcs', 'ctl', 'verifier', 'counter'].includes(r);
  
  let labelText = T('count_label');
  let modeClass = '';
  if (isVerifier) { labelText = T('verify_label'); modeClass = 'audit-mode'; }
  if (isCTL) { labelText = T('tiebreaker_label'); modeClass = 'tiebreaker-mode'; }
  
  const metaSection = isAdmin ? `
    <div class="product-meta">
      <div class="meta-item"><div class="meta-label">${T('pos_qty')}</div><div class="meta-value mono">${p.pos_qty || 0} ${unit}</div></div>
      <div class="meta-item"><div class="meta-label">${T('sell_price')}</div><div class="meta-value mono">вӮӯ ${price}</div></div>
    </div>` : `
    <div class="product-meta" style="grid-template-columns: 1fr;">
      <div class="meta-item" style="background: var(--teal-50);">
        <div class="meta-label">${T('unit_label')}</div>
        <div class="meta-value mono">${unit}</div>
      </div>
    </div>`;
  
  const mdWarning = p.is_markdown ? `<div class="md-badge">MD ${p.barcode.substring(0,3)}</div>` : '';
  const startValue = isAdmin ? (p.pos_qty || 0) : 0;
  
  document.getElementById('productCard').innerHTML = `
    <div class="product-card ${modeClass}">
      ${mdWarning}
      <div class="product-name">${name}</div>
      <div class="product-barcode">${p.barcode}</div>
      ${metaSection}
      
      <!-- Pan-O-Gram section (аёҲаё°а№Ӯаё«аёҘаё”аёӮа№үаёӯаёЎаё№аёҘ async) -->
      <div id="pogSection" style="margin-top:9px;"></div>
      
      <div class="count-section ${modeClass}">
        <div class="count-label">${labelText}</div>
        <div class="count-controls">
          <button class="count-btn" onclick="adjustCount(-1)">вҲ’</button>
          <input class="count-input mono" id="countInput" type="number" inputmode="numeric" value="${startValue}" min="0">
          <button class="count-btn" onclick="adjustCount(1)">+</button>
        </div>
      </div>
      <textarea class="note-input" id="noteInput" rows="2" placeholder="${T('note_placeholder')}"></textarea>
      <div class="action-row">
        <button class="btn btn-secondary" onclick="cancelCount()">${T('cancel')}</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveCount()">${T('save')}</button>
      </div>
    </div>
  `;
  setTimeout(() => {
    const inp = document.getElementById('countInput');
    if (inp) { inp.focus(); inp.select(); }
  }, 100);
  
  // Async: а№Ӯаё«аёҘаё”аёӮа№үаёӯаёЎаё№аёҘ Pan-O-Gram аёӮаёӯаёҮаёӘаёҙаёҷаё„а№үаёІаёҷаёөа№үаё—аёөа№Ҳ location аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ
  if (canEditPog && loc?.location_code) {
    loadPanOGramForProduct(p, loc.location_code);
  }
}

// ==================== PAN-O-GRAM ====================
// а№ҖаёҒа№ҮаёҡаёӮа№үаёӯаёЎаё№аёҘ Pan-O-Gram аёӮаёӯаёҮ product аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ (cache аёЈаё°аё«аё§а№ҲаёІаёҮ scan)
let _currentPog = null;

async function loadPanOGramForProduct(product, locationCode) {
  const sec = document.getElementById('pogSection');
  if (!sec) return;
  
  _currentPog = null;
  
  // а№Ӯаё«аёҘаё” Pan-O-Gram аё—аёёаёҒаё•аёіа№Ғаё«аёҷа№ҲаёҮаёӮаёӯаёҮаёӘаёҙаёҷаё„а№үаёІаёҷаёөа№үа№ғаёҷ branch
  // а№„аёЎа№Ҳ filter location а№ҖаёһаёЈаёІаё°аёӯаёўаёІаёҒа№Җаё«а№Үаёҷаё–а№үаёІаёЎаёөаё«аёҘаёІаёў location
  const { data, error } = await sb
    .from('pan_o_grams')
    .select('*')
    .eq('branch_id', branch.id)
    .eq('barcode', product.barcode)
    .order('location_code')
    .order('shelf')
    .order('seq_in_shelf');
  
  if (error) {
    log('Load Pan-O-Gram error:', error);
    return;
  }
  
  const all = data || [];
  const atCurrent = all.filter(p => p.location_code === locationCode);
  const atOthers = all.filter(p => p.location_code !== locationCode);
  
  const isLao = lang === 'lo';
  
  let html = `
    <div style="background:linear-gradient(135deg,var(--violet-100),var(--sky-100));border:1px solid var(--violet-300);border-radius:10px;padding:9px 11px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
        <div style="font-size:11px;font-weight:700;color:var(--violet-600);display:flex;align-items:center;gap:5px;">
          рҹ“җ Pan-O-Gram
        </div>
        <button onclick="openPanOGramModal('${product.barcode}', '${locationCode}')" 
                style="background:var(--violet-500);color:white;border:none;border-radius:5px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;">
          ${atCurrent.length > 0 ? `+ ${isLao ? 'а»Җаәһаәөа»ҲаәЎаә•аәіа»Ға»ңа»ҲаәҮ' : 'а№Җаёһаёҙа№ҲаёЎаё•аёіа№Ғаё«аёҷа№ҲаёҮ'}` : `+ ${isLao ? 'аәӘа»үаәІаәҮ' : 'аёӘаёЈа№үаёІаёҮ'}`}
        </button>
      </div>
  `;
  
  if (atCurrent.length === 0 && atOthers.length === 0) {
    html += `<div style="font-size:10px;color:var(--slate-500);font-style:italic;">
      ${isLao ? 'аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷ Pan-O-Gram аәӘаәіаәҘаәұаәҡаәӘаәҙаәҷаә„а»үаәІаәҷаәөа»ү' : 'аёўаёұаёҮа№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ Pan-O-Gram аёӘаёіаё«аёЈаёұаёҡаёӘаёҙаёҷаё„а№үаёІаёҷаёөа№ү'}
    </div>`;
  } else {
    // а№ҒаёӘаё”аёҮаё•аёіа№Ғаё«аёҷа№ҲаёҮа№ғаёҷ location аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ
    if (atCurrent.length > 0) {
      html += `<div style="font-size:10px;color:var(--violet-600);font-weight:600;margin-bottom:4px;">
        ${isLao ? 'а»ғаәҷ' : 'а№ғаёҷ'} ${locationCode}:
      </div>`;
      atCurrent.forEach(pog => {
        html += renderPogChip(pog, true);
      });
    }
    
    // а№ҒаёӘаё”аёҮаё•аёіа№Ғаё«аёҷа№ҲаёҮа№ғаёҷ location аёӯаё·а№Ҳаёҷа№Ҷ (аё–а№үаёІаёЎаёө)
    if (atOthers.length > 0) {
      html += `<div style="font-size:10px;color:var(--slate-500);font-weight:600;margin:7px 0 4px;">
        ${isLao ? 'аәўаә№а»Ҳаәҡа»Ҳаәӯаәҷаәӯаә·а»Ҳаәҷ' : 'аёӯаёўаё№а№Ҳаё—аёөа№Ҳаёӯаё·а№Ҳаёҷ'} (${atOthers.length}):
      </div>`;
      atOthers.forEach(pog => {
        html += renderPogChip(pog, false);
      });
    }
  }
  
  html += '</div>';
  sec.innerHTML = html;
  
  // Cache а№Җаёһаё·а№Ҳаёӯа№ғаёҠа№үа№ғаёҷ save
  _currentPog = atCurrent[0] || null;
  
  // рҹҺҜ Auto-open Pan-O-Gram modal а№ҖаёЎаё·а№Ҳаёӯ:
  // 1. аёӘаёҙаёҷаё„а№үаёІаёҷаёөа№үаёўаёұаёҮа№„аёЎа№ҲаёЎаёө PoG аё—аёөа№Ҳ location аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ (atCurrent.length === 0)
  // 2. а№ҒаёҘаё°аёўаёұаёҮа№„аёЎа№Ҳа№Җаё„аёўаёӣаёҸаёҙа№ҖаёӘаёҳаёӘаёіаё«аёЈаёұаёҡаёӘаёҙаёҷаё„а№үаёІаёҷаёөа№үа№ғаёҷ session
  // 3. а№ҒаёҘаё°аёңаё№а№үа№ғаёҠа№үаёЎаёөаёӘаёҙаё—аёҳаёҙа№Ң (canEditPog а№ҒаёҘа№үаё§а№ҖаёҠа№Үаё„аё•аёӯаёҷ caller)
  if (atCurrent.length === 0) {
    const skipKey = `pog_skip_${branch.id}_${product.barcode}_${locationCode}`;
    const recentlyDeclined = sessionStorage.getItem(skipKey);
    
    if (!recentlyDeclined) {
      // аё«аёҷа№Ҳаё§аёҮа№Җаё§аёҘаёІ 600ms а№ғаё«а№ү render а№ҖаёӘаёЈа№ҮаёҲаёҒа№Ҳаёӯаёҷ + аёңаё№а№үа№ғаёҠа№үа№Җаё«а№Үаёҷ product card
      setTimeout(() => {
        // Double-check: аёңаё№а№үа№ғаёҠа№үаёўаёұаёҮаёӯаёўаё№а№Ҳаё«аёҷа№үаёІаёҷаёөа№үа№ҒаёҘаё° product аё•аёұаё§а№Җаё”аёҙаёЎ
        if (curProduct && curProduct.barcode === product.barcode) {
          openPanOGramModal(product.barcode, locationCode);
        }
      }, 600);
    }
  }
}

function renderPogChip(pog, isCurrent) {
  const bgColor = isCurrent ? 'white' : 'var(--slate-50)';
  const borderColor = isCurrent ? 'var(--violet-500)' : 'var(--slate-300)';
  const isLao = lang === 'lo';
  return `
    <div onclick="openPanOGramModal('${pog.barcode}', '${pog.location_code}', ${pog.id})"
         style="background:${bgColor};border:1px solid ${borderColor};border-radius:7px;padding:6px 9px;margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:8px;">
      <div style="font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;color:var(--slate-900);">
        ${pog.position_code}
      </div>
      <div style="flex:1;font-size:10px;color:var(--slate-600);">
        ${pog.facial}Г—${pog.depth}Г—${pog.stack} = <strong>${pog.total_qty}</strong>
        ${isCurrent ? `<button onclick="event.stopPropagation();usePogExpected(${pog.total_qty})" style="background:var(--emerald-500);color:white;border:none;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:5px;cursor:pointer;">${isLao ? 'а»ғаәҠа»ү' : 'а№ғаёҠа№ү'} вҶ’</button>` : ''}
      </div>
      <div style="font-size:9px;color:var(--violet-500);">вңҸпёҸ</div>
    </div>
  `;
}

// Apply Pan-O-Gram expected quantity to count input
function usePogExpected(qty) {
  const inp = document.getElementById('countInput');
  if (inp) {
    inp.value = qty;
    inp.focus();
    inp.select();
    showToast(`вң… ${lang === 'lo' ? 'а»ғаәҠа»үаә„а»ҲаәІ Pan-O-Gram' : 'а№ғаёҠа№үаё„а№ҲаёІ Pan-O-Gram'}: ${qty}`, 'success');
  }
}

async function openPanOGramModal(barcode, locationCode, editId = null) {
  const isLao = lang === 'lo';
  const isEdit = !!editId;
  
  // аё–а№үаёІ edit вҶ’ а№Ӯаё«аёҘаё”аёӮа№үаёӯаёЎаё№аёҘа№Җаё”аёҙаёЎ
  let existing = null;
  if (isEdit) {
    const { data } = await sb.from('pan_o_grams').select('*').eq('id', editId).maybeSingle();
    existing = data;
  }
  
  // а№Ӯаё«аёҘаё” product info
  const { data: prod } = await sb
    .from('products').select('*')
    .eq('barcode', barcode).eq('branch_id', branch.id).maybeSingle();
  
  const prodName = prod ? (isLao ? (prod.name_lo || prod.name_th) : (prod.name_th || prod.name_lo)) : barcode;
  
  // а№Ӯаё«аёҘаё” PoGs аё—аёөа№ҲаёЎаёөаёӯаёўаё№а№Ҳа№ғаёҷ location аёҷаёөа№ү (а№Җаёһаё·а№Ҳаёӯа№ҖаёӘаёҷаёӯ next seq + cache total per shelf)
  const { data: existingAtLoc } = await sb
    .from('pan_o_grams').select('shelf, seq_in_shelf, total_in_shelf, barcode')
    .eq('branch_id', branch.id).eq('location_code', locationCode)
    .order('shelf').order('seq_in_shelf');
  
  // Cache total_in_shelf per shelf (аёӘаёіаё«аёЈаёұаёҡ auto-fill а№ҖаёЎаё·а№Ҳаёӯа№ҖаёӣаёҘаёөа№ҲаёўаёҷаёҠаёұа№үаёҷ)
  window._pogShelfTotalsCache = {};
  window._pogShelfBarcodesCache = {}; // а№Җаёһаё·а№Ҳаёӯаёҷаёұаёҡ next seq
  (existingAtLoc || []).forEach(p => {
    if (!window._pogShelfTotalsCache[p.shelf]) {
      window._pogShelfTotalsCache[p.shelf] = p.total_in_shelf;
    }
    if (!window._pogShelfBarcodesCache[p.shelf]) {
      window._pogShelfBarcodesCache[p.shelf] = [];
    }
    window._pogShelfBarcodesCache[p.shelf].push(p.barcode);
  });
  
  // Track аё§а№ҲаёІаёңаё№а№үа№ғаёҠа№үа№„аё”а№үа№ҒаёҒа№ү "аё—аёұа№үаёҮаё«аёЎаё”" а№ҖаёӯаёҮаё«аёЈаё·аёӯа№„аёЎа№Ҳ

  window._pogIsEditMode = !!existing;

  showModal(`

    </h3>
    
    <div style="background:var(--slate-50);padding:9px 11px;border-radius:8px;margin-bottom:11px;">
      <div style="font-size:11px;font-weight:700;color:var(--slate-900);">${prodName}</div>
      <div style="font-size:10px;color:var(--slate-500);font-family:monospace;">

               oninput="onPogShelfChange(); updatePogCalc()"
               class="form-input" style="text-align:center;font-weight:700;font-size:16px;padding:8px;font-family:'Space Grotesk',monospace;">

      <div>
        <label style="font-size:10px;color:var(--slate-600);font-weight:700;display:block;margin-bottom:3px;">

        <input type="number" id="pogSeq" value="${defaultSeq}" min="1" max="50" step="1"

      </div>

        <label style="font-size:10px;color:var(--slate-600);font-weight:700;display:block;margin-bottom:3px;">

        </label>
        <input type="number" id="pogTotal" value="${defaultTotal}" min="1" max="50" step="1"
               oninput="onPogTotalManualEdit(); updatePogCalc()"

    </div>
    
    <!-- Position Code Preview -->
    <div style="background:linear-gradient(135deg,var(--violet-100),var(--sky-100));padding:9px 11px;border-radius:8px;margin-bottom:11px;text-align:center;">
      <div style="font-size:10px;color:var(--slate-600);font-weight:700;margin-bottom:2px;">${isLao ? 'аәҘаә°аә«аәұаә”аә•аәіа»Ға»ңа»ҲаәҮ' : 'аёЈаё«аёұаёӘаё•аёіа№Ғаё«аёҷа№ҲаёҮ'}</div>

      </div>
    </div>

    <div style="font-size:11px;color:var(--slate-600);font-weight:700;margin-bottom:5px;">
      ${isLao ? 'аәЎаәҙаә•аәҙаәҒаәІаәҷаә§аәІаәҮ' : 'аёЎаёҙаё•аёҙаёҒаёІаёЈаё§аёІаёҮ'}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px;">

          ${isLao ? 'а»ҖаәҘаәҙаәҒ' : 'аёҘаё¶аёҒ'}
        </label>
        <input type="number" id="pogDepth" value="${existing?.depth || 1}" min="1" max="20" step="1"
               oninput="updatePogCalc()"
               class="form-input" style="text-align:center;font-weight:700;font-size:16px;padding:8px;font-family:'Space Grotesk',monospace;">
      </div>
      <div>
        <label style="font-size:10px;color:var(--slate-600);font-weight:700;display:block;margin-bottom:3px;">
          ${isLao ? 'аәӮаәұа»үаәҷ' : 'аёӮаёұа№үаёҷ'}
        </label>
        <input type="number" id="pogStack" value="${existing?.stack || 1}" min="1" max="20" step="1"
               oninput="updatePogCalc()"

    <!-- Total Qty Preview -->
    <div style="background:linear-gradient(135deg,var(--emerald-100),var(--teal-100));padding:11px;border-radius:9px;margin-bottom:11px;text-align:center;">
      <div style="font-size:10px;color:var(--emerald-500);font-weight:700;text-transform:uppercase;margin-bottom:3px;">

      </div>
      <div id="pogTotalQty" style="font-size:26px;font-weight:800;color:var(--emerald-500);font-family:'Space Grotesk',monospace;">
        ${(existing?.facial || 1) * (existing?.depth || 1) * (existing?.stack || 1)}
      </div>
      <div id="pogFormula" style="font-size:11px;color:var(--slate-600);font-family:'Space Grotesk',monospace;">
        ${existing?.facial || 1} Г— ${existing?.depth || 1} Г— ${existing?.stack || 1}

    </div>
    
    <!-- Notes -->
    <div class="form-group">
      <label class="form-label" style="font-size:10px;">${isLao ? 'а»қаәІаәҚа»Җаә«аә”' : 'аё«аёЎаёІаёўа№Җаё«аё•аёё'}</label>
      <textarea id="pogNotes" rows="2" class="form-input" style="font-size:11px;resize:vertical;">${existing?.notes || ''}</textarea>
    </div>
    
    <div class="action-row">
      ${isEdit ? `<button class="btn btn-danger" onclick="deletePanOGram(${editId})" style="background:var(--rose-500);">${isLao ? 'аәҘаә»аәҡ' : 'аёҘаёҡ'}</button>` : ''}
      <button class="btn btn-secondary" onclick="dismissPogModal('${barcode}', '${locationCode}', false)">${T('cancel')}</button>
      <button class="btn btn-primary" id="pogSaveBtn" onclick="savePanOGram('${barcode}', '${locationCode}', ${editId || 'null'})" style="background:var(--violet-500);">
        ${isLao ? 'аәҡаәұаәҷаә—аә¶аәҒ' : 'аёҡаёұаёҷаё—аё¶аёҒ'}
      </button>
    </div>
    ${!isEdit ? `
      <div style="text-align:center;margin-top:8px;">
        <button onclick="dismissPogModal('${barcode}', '${locationCode}', true)" 
                style="background:none;border:none;color:var(--slate-400);font-size:10px;cursor:pointer;text-decoration:underline;">
          ${isLao ? 'аәҡа»Қа»ҲаәӘа»үаәІаәҮ Pan-O-Gram аәӘаәіаәҘаәұаәҡаәӘаәҙаәҷаә„а»үаәІаәҷаәөа»ү' : 'а№„аёЎа№ҲаёӘаёЈа№үаёІаёҮ Pan-O-Gram аёӘаёіаё«аёЈаёұаёҡаёӘаёҙаёҷаё„а№үаёІаёҷаёөа№ү'}
        </button>
      </div>
    ` : ''}
  `);
}

// Dismiss PoG modal вҖ” if "skipForSession" вҶ’ remember not to auto-open again in this session
function dismissPogModal(barcode, locationCode, skipForSession) {
  if (skipForSession && branch && barcode && locationCode) {
    const skipKey = `pog_skip_${branch.id}_${barcode}_${locationCode}`;
    sessionStorage.setItem(skipKey, '1');
  }
  closeModal();
}

function updatePogCalc() {
  const shelf = parseInt(document.getElementById('pogShelf')?.value || 1);
  const seq = parseInt(document.getElementById('pogSeq')?.value || 1);
  const total = parseInt(document.getElementById('pogTotal')?.value || 1);
  const facial = parseInt(document.getElementById('pogFacial')?.value || 1);
  const depth = parseInt(document.getElementById('pogDepth')?.value || 1);
  const stack = parseInt(document.getElementById('pogStack')?.value || 1);
  
  const posCodeEl = document.getElementById('pogPosCode');
  const totalQtyEl = document.getElementById('pogTotalQty');
  const formulaEl = document.getElementById('pogFormula');
  
  // аё”аё¶аёҮ location code аёҲаёІаёҒ position code аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ
  if (posCodeEl) {
    const parts = posCodeEl.textContent.split('-');
    const locCode = parts[0];
    posCodeEl.textContent = `${locCode}-${shelf}-${seq}-${total}`;
  }
  
  const totalQty = facial * depth * stack;
  if (totalQtyEl) totalQtyEl.textContent = totalQty;
  if (formulaEl) formulaEl.textContent = `${facial} Г— ${depth} Г— ${stack}`;
}

// а№ҖаёЎаё·а№Ҳаёӯаёңаё№а№үа№ғаёҠа№үа№ҒаёҒа№ү "аё—аёұа№үаёҮаё«аёЎаё”" а№ҖаёӯаёҮ вҶ’ flag а№„аё§а№ү аё«а№үаёІаёЎ auto-fill аё—аёұаёҡ
function onPogTotalManualEdit() {
  window._pogTotalManuallyEdited = true;
}

// а№ҖаёЎаё·а№Ҳаёӯаёңаё№а№үа№ғаёҠа№үа№ҖаёӣаёҘаёөа№Ҳаёўаёҷ "аёҠаёұа№үаёҷ" вҶ’ аё–а№үаёІаёўаёұаёҮа№„аёЎа№Ҳа№„аё”а№үа№ҒаёҒа№ү "аё—аёұа№үаёҮаё«аёЎаё”" а№ҖаёӯаёҮ вҶ’ auto-fill аёҲаёІаёҒ cache
function onPogShelfChange() {
  const shelfEl = document.getElementById('pogShelf');
  const totalEl = document.getElementById('pogTotal');
  const seqEl = document.getElementById('pogSeq');
  if (!shelfEl || !totalEl) return;
  
  const newShelf = parseInt(shelfEl.value || 1);
  const cache = window._pogShelfTotalsCache || {};
  const seqCache = window._pogShelfBarcodesCache || {};
  
  // Auto-fill total а№ҖаёүаёһаёІаё°а№ҖаёЎаё·а№ҲаёӯаёўаёұаёҮа№„аёЎа№Ҳа№„аё”а№үа№ҒаёҒа№үа№„аёӮа№ҖаёӯаёҮ
  if (!window._pogTotalManuallyEdited && cache[newShelf]) {
    totalEl.value = cache[newShelf];
    // Visual feedback: highlight аёҠа№Ҳаё§аёҮаёӘаёұа№үаёҷа№Ҷ
    totalEl.style.transition = 'background 0.4s';
    totalEl.style.background = 'var(--emerald-100)';
    setTimeout(() => { totalEl.style.background = ''; }, 600);
  }
  
  // Auto-suggest seq а№Җаёӣа№Үаёҷ next available аёӮаёӯаёҮаёҠаёұа№үаёҷаёҷаёөа№ү (а№ҖаёүаёһаёІаё° create mode)
  if (seqEl && !window._pogIsEditMode) {
    const existingInShelf = (seqCache[newShelf] || []).length;
    seqEl.value = existingInShelf + 1;
  }
}

async function savePanOGram(barcode, locationCode, editId) {
  const isLao = lang === 'lo';
  const errEl = document.getElementById('pogErr');
  const btn = document.getElementById('pogSaveBtn');
  
  const shelf = parseInt(document.getElementById('pogShelf').value);
  const seq = parseInt(document.getElementById('pogSeq').value);
  const total = parseInt(document.getElementById('pogTotal').value);
  const facial = parseInt(document.getElementById('pogFacial').value);
  const depth = parseInt(document.getElementById('pogDepth').value);
  const stack = parseInt(document.getElementById('pogStack').value);
  const notes = document.getElementById('pogNotes').value.trim();
  
  // Validation
  if (!shelf || !seq || !total || !facial || !depth || !stack) {
    errEl.textContent = isLao ? 'аәҒаә°аәҘаәёаәҷаәІа»ғаәӘа»Ҳаә„а»ҲаәІаә—аәёаәҒаәҠа»ҲаәӯаәҮ' : 'аёҒаёЈаёёаё“аёІа№ғаёӘа№Ҳаё„а№ҲаёІаё—аёёаёҒаёҠа№ҲаёӯаёҮ';
    errEl.classList.add('show');
    return;
  }
  if (seq > total) {
    errEl.textContent = isLao 
      ? `аәҘаәіаә”аәұаәҡ (${seq}) аәҡа»Қа»ҲаәӘаәІаәЎаәІаә”а»ҖаәҒаәөаәҷаә—аәұаәҮа»қаә»аә” (${total})` 
      : `аёҘаёіаё”аёұаёҡ (${seq}) аё«а№үаёІаёЎа№ҖаёҒаёҙаёҷаё—аёұа№үаёҮаё«аёЎаё” (${total})`;
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  
  try {
    // Look up product_id
    const { data: prod } = await sb
      .from('products').select('id')
      .eq('barcode', barcode).eq('branch_id', branch.id).maybeSingle();
    
    const payload = {
      branch_id: branch.id,
      product_id: prod?.id || null,
      barcode: barcode,
      location_code: locationCode,
      shelf, seq_in_shelf: seq, total_in_shelf: total,
      facial, depth, stack,
      notes: notes || null,
      created_by: user.id,
      updated_at: new Date().toISOString()
    };
    
    if (editId) {
      // UPDATE
      const { error } = await sb.from('pan_o_grams').update(payload).eq('id', editId);
      if (error) throw error;
      showToast(isLao ? 'вң… аәҡаәұаәҷаә—аә¶аәҒаәӘаәіа»ҖаәҘаәұаә”' : 'вң… аёҡаёұаёҷаё—аё¶аёҒаёӘаёіа№ҖаёЈа№ҮаёҲ', 'success');
    } else {
      // а№ҖаёҠа№Үаё„аё§а№ҲаёІаёЎаёөаё•аёіа№Ғаё«аёҷа№ҲаёҮаёҷаёөа№үаёӯаёўаё№а№Ҳа№ҒаёҘа№үаё§аё«аёЈаё·аёӯа№„аёЎа№Ҳ (аёӘаёҙаёҷаё„а№үаёІа№ғаё”аёҒа№Үаё•аёІаёЎ)
      const { data: existing } = await sb
        .from('pan_o_grams').select('id, barcode')
        .eq('branch_id', branch.id)
        .eq('location_code', locationCode)
        .eq('shelf', shelf)
        .eq('seq_in_shelf', seq)
        .maybeSingle();
      
      if (existing) {
        // аё•аёіа№Ғаё«аёҷа№ҲаёҮаёҷаёөа№үаёЎаёөаё„аёҷа№ғаёҠа№үа№ҒаёҘа№үаё§
        if (existing.barcode === barcode) {
          // аёӘаёҙаёҷаё„а№үаёІа№Җаё”аёөаёўаё§аёҒаёұаёҷ вҶ’ аё–аёІаёЎаё§а№ҲаёІаёҲаё° update аё«аёЈаё·аёӯа№„аёЎа№Ҳ
          const confirmMsg = isLao 
            ? `аәӘаәҙаәҷаә„а»үаәІаәҷаәөа»үаәЎаәөаәўаә№а»Ҳа»ғаәҷаә•аәіа»Ға»ңа»ҲаәҮаәҷаәөа»үа»ҒаәҘа»үаә§ вҖ” аә•а»үаәӯаәҮаәҒаәІаәҷаәӯаәұаәҡа»Җаә”аә”аәҡа»Қ?`
            : `аёӘаёҙаёҷаё„а№үаёІаёҷаёөа№үаёЎаёөа№ғаёҷаё•аёіа№Ғаё«аёҷа№ҲаёҮаёҷаёөа№үа№ҒаёҘа№үаё§ вҖ” аё•а№үаёӯаёҮаёҒаёІаёЈаёӯаёұаёӣа№Җаё”аё•аё«аёЈаё·аёӯа№„аёЎа№Ҳ?`;
          if (!confirm(confirmMsg)) {
            btn.disabled = false;
            return;
          }
          const { error } = await sb.from('pan_o_grams').update(payload).eq('id', existing.id);
          if (error) throw error;
          showToast(isLao ? 'вң… аәӯаәұаәҡа»Җаә”аә”а»ҒаәҘа»үаә§' : 'вң… аёӯаёұаёӣа№Җаё”аё•а№ҒаёҘа№үаё§', 'success');
        } else {
          // аёӘаёҙаёҷаё„а№үаёІаёӯаё·а№Ҳаёҷа№ғаёҠа№үаё•аёіа№Ғаё«аёҷа№ҲаёҮаёҷаёөа№үаёӯаёўаё№а№Ҳ
          errEl.textContent = isLao 
            ? `аә•аәіа»Ға»ңа»ҲаәҮаәҷаәөа»үаәЎаәө ${existing.barcode} а»ғаәҠа»үаәўаә№а»Ҳа»ҒаәҘа»үаә§` 
            : `аё•аёіа№Ғаё«аёҷа№ҲаёҮаёҷаёөа№үаёЎаёө ${existing.barcode} а№ғаёҠа№үаёӯаёўаё№а№Ҳа№ҒаёҘа№үаё§`;
          errEl.classList.add('show');
          btn.disabled = false;
          return;
        }
      } else {
        // INSERT а№ғаё«аёЎа№Ҳ
        payload.created_at = new Date().toISOString();
        const { error } = await sb.from('pan_o_grams').insert(payload);
        if (error) throw error;
        showToast(isLao ? 'вң… аәӘа»үаәІаәҮаәӘаәіа»ҖаәҘаәұаә”' : 'вң… аёӘаёЈа№үаёІаёҮаёӘаёіа№ҖаёЈа№ҮаёҲ', 'success');
      }
    }
    
    closeModal();
    // Refresh Pan-O-Gram section
    if (curProduct) {
      loadPanOGramForProduct(curProduct, locationCode);
    }
  } catch (e) {
    console.error('[FS] savePanOGram error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
  }
}

async function deletePanOGram(id) {
  const isLao = lang === 'lo';
  
  // аё”аё¶аёҮаёЈаёІаёўаёҘаё°а№Җаёӯаёөаёўаё”аёӘаёҙаёҷаё„а№үаёІаёҒа№Ҳаёӯаёҷ confirm
  const { data: pog } = await sb.from('pan_o_grams')
    .select('*, products(name_th, name_lo)')
    .eq('id', id)
    .maybeSingle();
  
  if (!pog) {
    showToast(isLao ? 'аәҡа»Қа»Ҳаәһаә»аәҡ Pan-O-Gram' : 'а№„аёЎа№Ҳаёһаёҡ Pan-O-Gram', 'error');
    return;
  }
  
  const prodName = isLao 
    ? (pog.products?.name_lo || pog.products?.name_th || pog.barcode)
    : (pog.products?.name_th || pog.products?.name_lo || pog.barcode);
  
  const confirmMsg = isLao
    ? `рҹ—‘пёҸ аәҘаә»аәҡ Pan-O-Gram?\n\nаәӘаәҙаәҷаә„а»үаәІ: ${prodName}\nаә•аәіа»Ға»ңа»ҲаәҮ: ${pog.location_code} аәҠаәұа»үаәҷ${pog.shelf} аәҘаәіаә”аәұаәҡ${pog.seq_in_shelf}\nаә„аә§аәІаәЎаәҲаәё: ${pog.total_qty} аәҠаәҙа»үаәҷ\n\nвҡ пёҸ аәҒаәІаәҷаәҘаә»аәҡ Pan-O-Gram аәҡа»Қа»ҲаәҒаә°аә—аә»аәҡаәҒаәұаәҡаәҒаәІаәҷаәҷаәұаәҡаәӘаә°аә•а»ӢаәӯаәҒаә—аәөа»Ҳаәҡаәұаәҷаә—аә¶аәҒа»„аә§а»үа»ҒаәҘа»үаә§`
    : `рҹ—‘пёҸ аёҘаёҡ Pan-O-Gram?\n\nаёӘаёҙаёҷаё„а№үаёІ: ${prodName}\nаё•аёіа№Ғаё«аёҷа№ҲаёҮ: ${pog.location_code} аёҠаёұа№үаёҷ${pog.shelf} аёҘаёіаё”аёұаёҡ${pog.seq_in_shelf}\nаё„аё§аёІаёЎаёҲаёё: ${pog.total_qty} аёҠаёҙа№үаёҷ\n\nвҡ пёҸ аёҒаёІаёЈаёҘаёҡ Pan-O-Gram а№„аёЎа№ҲаёҒаёЈаё°аё—аёҡаёҒаёұаёҡаёҒаёІаёЈаёҷаёұаёҡаёӘаё•а№ҠаёӯаёҒаё—аёөа№Ҳаёҡаёұаёҷаё—аё¶аёҒа№„аё§а№үа№ҒаёҘа№үаё§`;
  
  if (!confirm(confirmMsg)) return;
  
  try {
    const { error } = await sb.from('pan_o_grams').delete().eq('id', id);
    if (error) throw error;
    showToast(isLao ? 'рҹ—‘пёҸ аәҘаә»аәҡа»ҒаәҘа»үаә§' : 'рҹ—‘пёҸ аёҘаёҡа№ҒаёҘа№үаё§', 'success');
    closeModal();
    if (curProduct) loadPanOGramForProduct(curProduct, loc?.location_code);
  } catch (e) {
    toastError(e);
  }
}

async function loadPanOGramManager() {
  if (!branch) return;
  
  // Load all Pan-O-Grams for this branch + products info
  const { data: pogs, error } = await sb
    .from('pan_o_grams')
    .select('*, products(name_th, name_lo, unit_th, unit_lo, sell_price)')
    .eq('branch_id', branch.id)
    .order('location_code')
    .order('shelf')
    .order('seq_in_shelf');
  
  if (error) {
    document.getElementById('pogMgrLoader').innerHTML = 'вқҢ Error: ' + error.message;
    return;
  }
  
  _pogManagerData = pogs || [];
  document.getElementById('pogMgrLoader').style.display = 'none';
  const content = document.getElementById('pogMgrContent');
  content.style.display = 'block';
  renderPanOGramManager();
}

function renderPogListView(items) {
  const isLao = lang === 'lo';
  if (items.length === 0) {
    return `<div style="text-align:center;padding:25px;color:var(--slate-400);font-size:11px;">
      ${isLao ? 'аәҡа»Қа»Ҳаәһаә»аәҡ' : 'а№„аёЎа№Ҳаёһаёҡ'}
    </div>`;
  }
  
  // Group by location вҶ’ shelf
  const byLoc = {};
  items.forEach(p => {
    if (!byLoc[p.location_code]) byLoc[p.location_code] = {};
    if (!byLoc[p.location_code][p.shelf]) byLoc[p.location_code][p.shelf] = [];
    byLoc[p.location_code][p.shelf].push(p);
  });
  
  let html = '';
  for (const locCode of Object.keys(byLoc).sort()) {
    const shelves = byLoc[locCode];
    const allInLoc = Object.values(shelves).flat();
    const locTotal = allInLoc.reduce((s, p) => s + (p.total_qty || 0), 0);
    
    // а№ҖаёҠа№Үаё„аё§а№ҲаёІа№ғаёҷ loc аёҷаёөа№үа№ҖаёҘаё·аёӯаёҒаё—аёұа№үаёҮаё«аёЎаё”а№„аё«аёЎ
    const idsInLoc = allInLoc.map(p => p.id);
    const allSelected = idsInLoc.length > 0 && idsInLoc.every(id => _pogMgrSelected.has(id));
    const someSelected = idsInLoc.some(id => _pogMgrSelected.has(id));
    
    html += `
      <div style="margin-bottom:9px;">
        <div style="background:linear-gradient(135deg,var(--sky-100),white);border:1px solid var(--sky-300);border-radius:8px;padding:6px 9px;margin-bottom:5px;display:flex;align-items:center;gap:7px;">
          <div onclick="togglePogLocationSelect('${locCode}')" 
               style="cursor:pointer;font-size:16px;user-select:none;flex-shrink:0;"
               title="${isLao ? 'а»ҖаәҘаә·аәӯаәҒаә—аәұаәҮа»қаә»аә”' : 'а№ҖаёҘаё·аёӯаёҒаё—аёұа№үаёҮаё«аёЎаё”'}">
            ${allSelected ? 'вҳ‘пёҸ' : someSelected ? 'рҹҹЎ' : 'в¬ң'}
          </div>
          <span style="font-weight:800;color:var(--sky-600);font-family:'Space Grotesk',monospace;font-size:13px;">рҹ“Қ ${locCode}</span>
          <button onclick="event.stopPropagation();openEditPogLocationModal('${locCode}')"
                  title="${isLao ? 'аәӣа»ҲаәҪаәҷ Gondola' : 'а№ҖаёӣаёҘаёөа№Ҳаёўаёҷ Gondola'}"
                  style="background:var(--sky-100);color:var(--sky-600);border:1px solid var(--sky-300);border-radius:5px;padding:2px 7px;font-size:10px;font-weight:700;cursor:pointer;">
            вңҸпёҸ ${isLao ? 'аәӣа»ҲаәҪаәҷ' : 'а№ҖаёӣаёҘаёөа№Ҳаёўаёҷ'}
          </button>
          <span style="font-size:10px;color:var(--slate-500);margin-left:auto;">
            ${allInLoc.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'} вҖў ${locTotal} ${isLao ? 'аәҠаәҙа»үаәҷ' : 'аёҠаёҙа№үаёҷ'}
          </span>
        </div>
    `;

          </div>
      `;
      items.forEach(p => {

              ${isSelected ? 'вҳ‘пёҸ' : 'в¬ң'}

            <div onclick="openPanOGramModal('${p.barcode}', '${p.location_code}', ${p.id})" 
                 style="background:var(--violet-100);color:var(--violet-600);width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;font-family:'Space Grotesk',monospace;flex-shrink:0;cursor:pointer;">
