function renderPogVisualLayout(items) {
  const isLao = lang === 'lo';
  if (items.length === 0) {
    return `<div style="text-align:center;padding:25px;color:var(--slate-400);font-size:11px;">
      ${isLao ? 'аәҡа»Қа»Ҳаәһаә»аәҡ' : 'а№„аёЎа№Ҳаёһаёҡ'}
    </div>`;
  }
  
  // Group by location
  const byLoc = {};
  items.forEach(p => {
    if (!byLoc[p.location_code]) byLoc[p.location_code] = [];
    byLoc[p.location_code].push(p);
  });
  
  const locCodes = Object.keys(byLoc).sort();
  
  // Helper: render one location
  const renderOneLocation = (locCode, locItems) => {
    // Group by shelf
    const byShelf = {};
    locItems.forEach(p => {
      if (!byShelf[p.shelf]) byShelf[p.shelf] = [];
      byShelf[p.shelf].push(p);
    });
    
    // Sort shelves ASCENDING (shelf 1 = top, shelf 2 = below, ...)
    // аё•аёІаёЎаё„аё§аёІаёЎа№Җаёӣа№ҮаёҷаёҲаёЈаёҙаёҮаёӮаёӯаёҮаёҠаёұа№үаёҷаё§аёІаёҮ: аёҠаёұа№үаёҷ 1 аёӯаёўаё№а№Ҳаёҡаёҷ
    const sortedShelves = Object.keys(byShelf).sort((a, b) => parseInt(a) - parseInt(b));
    const locTotalQty = locItems.reduce((s, p) => s + (p.total_qty || 0), 0);
    
    let html = `
      <div style="margin-bottom:11px;text-align:center;background:linear-gradient(135deg,var(--violet-100),var(--sky-100));padding:8px;border-radius:9px;">
        <div style="font-size:10px;color:var(--slate-600);font-weight:700;">${isLao ? 'аәЎаәёаәЎаәЎаәӯаәҮаәҠаәұа»үаәҷаә§аәІаәҮ' : 'аёЎаёёаёЎаёЎаёӯаёҮаёҠаёұа№үаёҷаё§аёІаёҮ'}</div>
        <div style="font-size:16px;font-weight:800;color:var(--violet-600);font-family:'Space Grotesk',monospace;">рҹ“Қ ${locCode}</div>
        <div style="font-size:10px;color:var(--slate-600);">
          ${locItems.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'} вҖў ${locTotalQty} ${isLao ? 'аәҠаәҙа»үаәҷ' : 'аёҠаёҙа№үаёҷ'}
        </div>
      </div>
      
      <div style="background:#1e293b;padding:11px;border-radius:11px;margin-bottom:14px;">
    `;
    
    sortedShelves.forEach(shelf => {
      const shelfItems = byShelf[shelf].sort((a, b) => a.seq_in_shelf - b.seq_in_shelf);
      const totalInShelf = shelfItems[0]?.total_in_shelf || shelfItems.length;
      const shelfTotalQty = shelfItems.reduce((s, p) => s + (p.total_qty || 0), 0);
      
      // Build slots (filled + empty)
      const slots = [];
      for (let i = 1; i <= totalInShelf; i++) {
        slots.push(shelfItems.find(x => x.seq_in_shelf === i) || null);
      }
      
      html += `
        <div style="background:#334155;padding:7px;border-radius:8px;margin-bottom:6px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
            <span style="color:#fbbf24;font-weight:800;font-size:11px;font-family:'Space Grotesk',monospace;">
              ${isLao ? 'аәҠаәұа»үаәҷ' : 'аёҠаёұа№үаёҷ'} ${shelf}
            </span>
            <span style="color:#94a3b8;font-size:9px;">${shelfItems.length}/${totalInShelf} вҖў ${shelfTotalQty} ${isLao ? 'аәҠаәҙа»үаәҷ' : 'аёҠаёҙа№үаёҷ'}</span>
          </div>
          <!-- Horizontal scroll: аёҠаёұа№үаёҷаё§аёІаёҮаёҲаёЈаёҙаёҮ = а№Ғаё–аё§а№Җаё”аёөаёўаё§аё•а№ҲаёӯаёҠаёұа№үаёҷ -->
          <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#475569 #1e293b;">
      `;
      
      slots.forEach((slot, i) => {
        if (slot) {
          const name = isLao ? (slot.products?.name_lo || slot.barcode) : (slot.products?.name_th || slot.barcode);
          const shortName = (name || '').substring(0, 14);
          // Color by stack height
          const intensity = Math.min(slot.stack, 5);
          const bgs = ['#10b981', '#0ea5e9', '#8b5cf6', '#f59e0b', '#ef4444'];
          const bg = bgs[intensity - 1] || '#64748b';
          
          html += `
            <button onclick="openPanOGramModal('${slot.barcode}', '${slot.location_code}', ${slot.id})"
                    title="${name} вҖў аёҘаёіаё”аёұаёҡ ${slot.seq_in_shelf}/${totalInShelf}"
                    style="background:${bg};border:none;border-radius:6px;padding:5px 4px;text-align:center;cursor:pointer;color:white;overflow:hidden;min-height:54px;min-width:68px;width:68px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;gap:1px;">
              <div style="font-size:9px;font-weight:800;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${shortName}</div>
              <div style="font-size:8px;opacity:0.9;font-family:'Space Grotesk',monospace;">${slot.facial}Г—${slot.depth}Г—${slot.stack}</div>
              <div style="font-size:11px;font-weight:800;font-family:'Space Grotesk',monospace;">${slot.total_qty}</div>
            </button>
          `;
        } else {
          // Empty slot
          html += `
            <div title="аё•аёіа№Ғаё«аёҷа№ҲаёҮаё§а№ҲаёІаёҮ аёҘаёіаё”аёұаёҡ ${i + 1}" 
                 style="background:rgba(255,255,255,0.05);border:1px dashed #475569;border-radius:6px;padding:5px 4px;text-align:center;min-height:54px;min-width:68px;width:68px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#475569;font-size:9px;gap:2px;">
              <div style="font-size:14px;">вҠҳ</div>
              <div style="font-size:8px;font-family:'Space Grotesk',monospace;">${i + 1}</div>
            </div>
          `;
        }
      });
      
      html += `</div></div>`;
    });
    
    html += `</div>`;
    return html;
  };
  
  // Render all locations
  let html = '';
  if (locCodes.length > 1) {
    html += `<div style="font-size:11px;color:var(--violet-600);font-weight:700;margin-bottom:7px;padding:5px 9px;background:var(--violet-100);border-radius:7px;">
      рҹ“Қ ${isLao ? 'аәӘаә°аә–аәІаәҷаә—аәөа»Ҳ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'} ${locCodes.length} ${isLao ? 'аәҲаәёаә”' : 'аёҲаёёаё”'} вҖў 
      ${isLao ? 'аәҒаә»аә” filter а»Җаәһаә·а»Ҳаәӯа»Җаәҡаәҙа»ҲаәҮаәӘаә°аә–аәІаәҷаә—аәөа»Ҳаә”аәҪаә§' : 'аёҒаё” filter а№Җаёһаё·а№Ҳаёӯаё”аё№аё•аёіа№Ғаё«аёҷа№ҲаёҮа№Җаё”аёөаёўаё§'}
    </div>`;
  }
  
  locCodes.forEach(code => {
    html += renderOneLocation(code, byLoc[code]);
  });
  
  // Legend
  html += `
    <div style="font-size:9px;color:var(--slate-500);margin-top:7px;text-align:center;background:white;padding:6px;border-radius:7px;border:1px solid var(--slate-200);">
      рҹ’Ў ${isLao ? 'аәӘаәө = аә„аә§аәІаәЎаәӘаә№аәҮаәӮаәұа»үаәҷаә§аәІаәҮ' : 'аёӘаёө = аё„аё§аёІаёЎаёӘаё№аёҮаёӮаёұа№үаёҷаё§аёІаёҮ'}<br>
      <span style="color:#10b981;font-weight:700;">рҹҹў 1</span>
      <span style="color:#0ea5e9;font-weight:700;">рҹ”ө 2</span>
      <span style="color:#8b5cf6;font-weight:700;">рҹҹЈ 3</span>
      <span style="color:#f59e0b;font-weight:700;">рҹҹЎ 4</span>
      <span style="color:#ef4444;font-weight:700;">рҹ”ҙ 5+</span>
      <br><span style="font-size:8px;color:var(--slate-400);">вҶ”пёҸ ${isLao ? 'а»ҖаәҘаә·а»ҲаәӯаәҷаәҠа»үаәІаәҚ-аәӮаә§аәІ аә–а»үаәІаәЎаәөаә«аәҘаәІаәҚаә•аәіа»Ға»ңа»ҲаәҮ' : 'а№ҖаёҘаё·а№ҲаёӯаёҷаёӢа№үаёІаёў-аёӮаё§аёІ аё–а№үаёІаёЎаёөаё«аёҘаёІаёўаё•аёіа№Ғаё«аёҷа№ҲаёҮ'}</span>
    </div>
  `;
  
  return html;
}

  clearTimeout(window._pogSearchTimer);

}

function setPogView(view) {

// ==================== POG BULK SELECT ====================
let _pogMgrSelected = new Set();

function togglePogSelect(id) {
  if (_pogMgrSelected.has(id)) {
    _pogMgrSelected.delete(id);
  } else {
    _pogMgrSelected.add(id);
  }
  renderPanOGramManager();
}

function togglePogLocationSelect(locCode) {
  // а№ҖаёҘаё·аёӯаёҒ/аёўаёҒа№ҖаёҘаёҙаёҒаё—аёёаёҒ PoG а№ғаёҷ location аёҷаёөа№ү
  const items = (_pogManagerData || []).filter(p => p.location_code === locCode);
  const ids = items.map(p => p.id);
  const allSelected = ids.every(id => _pogMgrSelected.has(id));
  
  if (allSelected) {
    ids.forEach(id => _pogMgrSelected.delete(id));
  } else {
    ids.forEach(id => _pogMgrSelected.add(id));
  }
  renderPanOGramManager();
}

function toggleAllPogSelect() {
  // Apply аё•аёІаёЎ current filter
  const all = _pogManagerData || [];
  let filtered = all;
  if (_pogManagerFilter.location) filtered = filtered.filter(p => p.location_code === _pogManagerFilter.location);
  if (_pogManagerFilter.search) {
    const s = _pogManagerFilter.search.toLowerCase();
    filtered = filtered.filter(p => 
      (p.barcode || '').toLowerCase().includes(s) ||
      (p.products?.name_lo || '').toLowerCase().includes(s) ||
      (p.products?.name_th || '').toLowerCase().includes(s) ||
      (p.location_code || '').toLowerCase().includes(s)
    );
  }
  
  const allSelected = filtered.length > 0 && filtered.every(p => _pogMgrSelected.has(p.id));
  if (allSelected) {
    _pogMgrSelected.clear();
  } else {
    filtered.forEach(p => _pogMgrSelected.add(p.id));
  }
  renderPanOGramManager();
}

async function bulkDeletePog() {
  const isLao = lang === 'lo';
  if (_pogMgrSelected.size === 0) return;
  
  const ids = Array.from(_pogMgrSelected);
  const items = (_pogManagerData || []).filter(p => ids.includes(p.id));
  
  // Preview
  const preview = items.slice(0, 5).map(p => `${p.position_code} (${p.barcode})`).join('\n');
  const more = items.length > 5 ? `\n... +${items.length - 5} ${isLao ? 'аәӯаә·а»Ҳаәҷа»Ҷ' : 'аёӯаё·а№Ҳаёҷа№Ҷ'}` : '';
  
  const msg = isLao 
    ? `аәҘаә»аәҡ ${items.length} аә•аәіа»Ға»ңа»ҲаәҮ Pan-O-Gram?\n\n${preview}${more}`
    : `аёҘаёҡ ${items.length} аё•аёіа№Ғаё«аёҷа№ҲаёҮ Pan-O-Gram?\n\n${preview}${more}`;
  
  if (!confirm(msg)) return;
  
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәҘаә»аәҡ...' : 'вҸі аёҒаёіаёҘаёұаёҮаёҘаёҡ...', 'success');
  
  try {
    const { error } = await sb.from('pan_o_grams').delete().in('id', ids);
    if (error) throw error;
    
    _pogMgrSelected.clear();
    showToast(`рҹ—‘пёҸ ${isLao ? 'аәҘаә»аәҡа»ҒаәҘа»үаә§' : 'аёҘаёҡа№ҒаёҘа№үаё§'} ${ids.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'}`, 'success');
    
    // Reload
    await loadPanOGramManager();
    loadSettingsStats();
  } catch (e) {
    console.error('[FS] bulkDeletePog error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function bulkMovePogToLocation() {
  const isLao = lang === 'lo';
  if (_pogMgrSelected.size === 0) return;
  
  const ids = Array.from(_pogMgrSelected);
  const items = (_pogManagerData || []).filter(p => ids.includes(p.id));
  
  // Load available locations
  if (!allLocations || allLocations.length === 0) {
    await loadZonesAndLocations();
  }
  
  // Group locations by Gondola number for display
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return { groupKey: numMatch[1], groupLabel: `Gondola ${numMatch[1]}` };
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      return { groupKey: 'z' + prefix, groupLabel: label };
    }
    return { groupKey: 'zzz', groupLabel: '?' };
  }
  
  const groups = {};
  (allLocations || []).forEach(l => {
    const p = parseCode(l.location_code);
    if (!groups[p.groupKey]) groups[p.groupKey] = { label: p.groupLabel, items: [] };
    groups[p.groupKey].items.push(l);
  });
  const sortedGroups = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
  
  // List of unique source locations
  const sourceLocs = [...new Set(items.map(p => p.location_code))];
  
  showModal(`
    <h3>рҹ”„ ${isLao ? 'аәҚа»үаәІаәҚ Pan-O-Gram' : 'аёўа№үаёІаёў Pan-O-Gram'}</h3>
    
    <div style="background:var(--violet-100);border-left:3px solid var(--violet-500);padding:9px 11px;border-radius:7px;margin-bottom:11px;">
      <div style="font-size:11px;color:var(--violet-600);font-weight:700;margin-bottom:5px;">
        рҹҺҜ ${isLao ? 'аәҚа»үаәІаәҚ' : 'аёўа№үаёІаёў'} <strong>${items.length}</strong> ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'}
      </div>
      <div style="font-size:10px;color:var(--slate-700);">
        ${isLao ? 'аәҲаәІаәҒ' : 'аёҲаёІаёҒ'}: ${sourceLocs.slice(0, 3).join(', ')}${sourceLocs.length > 3 ? `, +${sourceLocs.length - 3}` : ''}
      </div>
    </div>
    
    <p style="font-size:11px;color:var(--slate-600);margin-bottom:9px;">
      ${isLao ? 'а»ҖаәҘаә·аәӯаәҒ Gondola аәӣаәІаәҚаә—аәІаәҮ' : 'а№ҖаёҘаё·аёӯаёҒ Gondola аёӣаёҘаёІаёўаё—аёІаёҮ'}:
    </p>
    
    <div style="margin-bottom:9px;">
      <input type="text" id="movePogSearch" 
             placeholder="рҹ”Қ ${isLao ? 'аә„аә»а»үаәҷаә«аәІ...' : 'аё„а№үаёҷаё«аёІ...'}"
             oninput="filterMovePogList(this.value)"
             autocomplete="off" autocapitalize="characters"
             style="width:100%;padding:8px 11px;border:2px solid var(--violet-300);border-radius:8px;font-size:12px;font-weight:600;font-family:'Space Grotesk',monospace;text-transform:uppercase;">
    </div>
    
    <div id="movePogList" style="max-height:340px;overflow-y:auto;background:var(--slate-50);border-radius:9px;padding:7px;">
      ${sortedGroups.map(([_, g]) => `
        <div style="margin-bottom:9px;">
          <div style="font-size:11px;color:var(--violet-600);font-weight:800;padding:4px 7px;background:var(--violet-100);border-radius:5px;display:inline-block;margin-bottom:5px;">
            ${g.label} (${g.items.length})
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(80px, 1fr));gap:4px;">
            ${g.items.map(l => `
              <button onclick="confirmMovePog('${l.location_code}')" 
                      class="move-pog-item" data-code="${l.location_code}"
                      style="background:white;color:var(--slate-900);border:1px solid var(--slate-200);border-radius:6px;padding:7px 5px;font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;cursor:pointer;text-align:center;">
                ${l.location_code}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    
    <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel')}</button>
  `);
}

function filterMovePogList(val) {
  const search = (val || '').toLowerCase().trim();
  const items = document.querySelectorAll('.move-pog-item');
  items.forEach(it => {
    const code = (it.dataset.code || '').toLowerCase();
    it.style.display = code.includes(search) ? '' : 'none';
  });
  document.querySelectorAll('#movePogList > div').forEach(group => {
    const visible = group.querySelectorAll('.move-pog-item:not([style*="display: none"])');
    group.style.display = visible.length > 0 ? '' : 'none';
  });
}

async function confirmMovePog(targetLocCode) {
  const isLao = lang === 'lo';
  const ids = Array.from(_pogMgrSelected);
  const items = (_pogManagerData || []).filter(p => ids.includes(p.id));
  
  if (!confirm(isLao 
    ? `аәҚа»үаәІаәҚ ${items.length} аә•аәіа»Ға»ңа»ҲаәҮа»„аәӣ ${targetLocCode}?\n\nвҡ пёҸ shelf/seq аәҲаә°аә„аә»аәҮа»Җаә”аәөаәЎ вҖ” аәҒаә§аә”а»Җаәҡаәҙа»ҲаәҮаә§а»ҲаәІаәҡа»Қа»ҲаәЎаәө conflict`
    : `аёўа№үаёІаёў ${items.length} аё•аёіа№Ғаё«аёҷа№ҲаёҮа№„аёӣ ${targetLocCode}?\n\nвҡ пёҸ shelf/seq аёҲаё°аё„аёҮа№Җаё”аёҙаёЎ вҖ” аё•аёЈаё§аёҲаё”аё№аё§а№ҲаёІа№„аёЎа№ҲаёЎаёө conflict`)) return;

  try {
    let movedCount = 0;
    let failedCount = 0;
    
    // Update one by one (а№ҖаёһаёЈаёІаё°аёӯаёІаёҲ conflict аёҒаёұаёҡ unique constraint)
    for (const id of ids) {
      try {
        const { error } = await sb.from('pan_o_grams')
          .update({ location_code: targetLocCode })
          .eq('id', id);
        if (error) {
          console.warn('[FS] Move PoG err:', error);
          failedCount++;
        } else {
          movedCount++;
        }
      } catch (e) {
        failedCount++;
      }
    }
    
    closeModal();
    _pogMgrSelected.clear();
    
    showToast(
      `вң… ${isLao ? 'аәҚа»үаәІаәҚа»ҒаәҘа»үаә§' : 'аёўа№үаёІаёўа№ҒаёҘа№үаё§'} ${movedCount}/${ids.length}` +
      (failedCount > 0 ? ` (${failedCount} ${isLao ? 'аәҘаә»а»үаәЎа»Җаә«аәҘаә§ - аәЎаәө conflict' : 'аёҘа№үаёЎа№Җаё«аёҘаё§ - аёЎаёө conflict'})` : ''),
      failedCount > 0 ? 'warning' : 'success'
    );
    
    await loadPanOGramManager();
    loadSettingsStats();
  } catch (e) {
    console.error('[FS] confirmMovePog error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function openEditPogLocationModal(currentLocCode) {
  const isLao = lang === 'lo';
  
  // Count items in this location
  const itemsInLoc = (_pogManagerData || []).filter(p => p.location_code === currentLocCode);
  
  if (!allLocations || allLocations.length === 0) {
    await loadZonesAndLocations();
  }
  
  // Group locations
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return { groupKey: numMatch[1], groupLabel: `Gondola ${numMatch[1]}` };
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      return { groupKey: 'z' + prefix, groupLabel: label };
    }
    return { groupKey: 'zzz', groupLabel: '?' };
  }
  
  const groups = {};
  (allLocations || []).forEach(l => {
    if (l.location_code === currentLocCode) return; // skip current
    const p = parseCode(l.location_code);
    if (!groups[p.groupKey]) groups[p.groupKey] = { label: p.groupLabel, items: [] };
    groups[p.groupKey].items.push(l);
  });
  const sortedGroups = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
  
  showModal(`
    <h3>вңҸпёҸ ${isLao ? 'аәӣа»ҲаәҪаәҷ Gondola' : 'а№ҖаёӣаёҘаёөа№Ҳаёўаёҷ Gondola'}</h3>
    
    <div style="background:var(--violet-100);border-left:3px solid var(--violet-500);padding:9px 11px;border-radius:7px;margin-bottom:11px;">
      <div style="font-size:11px;color:var(--violet-600);font-weight:700;margin-bottom:5px;">
        рҹ“Қ ${isLao ? 'аәҲаәІаәҒ' : 'аёҲаёІаёҒ'}: <strong style="font-family:'Space Grotesk',monospace;">${currentLocCode}</strong>
      </div>
      <div style="font-size:10px;color:var(--slate-700);">
        ${itemsInLoc.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ Pan-O-Gram' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ Pan-O-Gram'}
      </div>
    </div>
    
    <p style="font-size:11px;color:var(--slate-600);margin-bottom:9px;">
      рҹ”„ ${isLao ? 'а»ҖаәҘаә·аәӯаәҒ Gondola а»ға»қа»Ҳ' : 'а№ҖаёҘаё·аёӯаёҒ Gondola а№ғаё«аёЎа№Ҳ'}:
    </p>
    
    <div style="margin-bottom:9px;">
      <input type="text" id="editLocSearch" 
             placeholder="рҹ”Қ ${isLao ? 'аә„аә»а»үаәҷаә«аәІ...' : 'аё„а№үаёҷаё«аёІ...'}"
             oninput="filterEditLocList(this.value)"
             autocomplete="off" autocapitalize="characters"
             style="width:100%;padding:8px 11px;border:2px solid var(--sky-300);border-radius:8px;font-size:12px;font-weight:600;font-family:'Space Grotesk',monospace;text-transform:uppercase;">
    </div>
    
    <div id="editLocList" style="max-height:340px;overflow-y:auto;background:var(--slate-50);border-radius:9px;padding:7px;">
      ${sortedGroups.map(([_, g]) => `
        <div style="margin-bottom:9px;">
          <div style="font-size:11px;color:var(--sky-600);font-weight:800;padding:4px 7px;background:var(--sky-100);border-radius:5px;display:inline-block;margin-bottom:5px;">
            ${g.label} (${g.items.length})
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(80px, 1fr));gap:4px;">
            ${g.items.map(l => `
              <button onclick="confirmEditPogLocation('${currentLocCode}', '${l.location_code}')" 
                      class="edit-loc-item" data-code="${l.location_code}"
                      style="background:white;color:var(--slate-900);border:1px solid var(--slate-200);border-radius:6px;padding:7px 5px;font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;cursor:pointer;text-align:center;">
                ${l.location_code}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    
    <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel')}</button>
  `);
}

function filterEditLocList(val) {
  const search = (val || '').toLowerCase().trim();
  const items = document.querySelectorAll('.edit-loc-item');
  items.forEach(it => {
    const code = (it.dataset.code || '').toLowerCase();
    it.style.display = code.includes(search) ? '' : 'none';
  });
  document.querySelectorAll('#editLocList > div').forEach(group => {
    const visible = group.querySelectorAll('.edit-loc-item:not([style*="display: none"])');
    group.style.display = visible.length > 0 ? '' : 'none';
  });
}

// ==================== EXPORT EXCEL ====================
async function exportPanOGramExcel() {
  const isLao = lang === 'lo';
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәӘа»үаәІаәҮ Excel...' : 'вҸі аёҒаёіаёҘаёұаёҮаёӘаёЈа№үаёІаёҮ Excel...', 'success');
  
  try {
    // Load all PoGs for this branch
    const { data: pogs, error } = await sb
      .from('pan_o_grams')
      .select('*, products(name_th, name_lo, unit_th, unit_lo, sell_price, pos_qty)')
      .eq('branch_id', branch.id)
      .order('location_code').order('shelf').order('seq_in_shelf');
    
    if (error) throw error;
    if (!pogs || pogs.length === 0) {
      showToast(isLao ? 'вҡ пёҸ аәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷ' : 'вҡ пёҸ а№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ', 'warning');
      return;
    }
    
    const wb = XLSX.utils.book_new();
    
    // Sheet 1: Pan-O-Gram (аёЈаёІаёўаёҘаё°а№Җаёӯаёөаёўаё”а№Җаё•а№ҮаёЎ)
    const sheet1 = [
      ['Location', 'Shelf', 'Seq', 'Total in Shelf', 'Position Code',
       'Barcode', 'Name LO', 'Name TH', 'Unit',
       'Facial', 'Depth', 'Stack', 'Shelf Capacity',
       'POS Qty', 'Sell Price (вӮӯ)', 'Total Value (вӮӯ)', 'Notes', 'Created']
    ];
    pogs.forEach(p => {
      const sellPrice = p.products?.sell_price || 0;
      const value = (p.total_qty || 0) * sellPrice;
      sheet1.push([
        p.location_code, p.shelf, p.seq_in_shelf, p.total_in_shelf, p.position_code,
        p.barcode,
        p.products?.name_lo || '',
        p.products?.name_th || '',
        p.products?.unit_lo || p.products?.unit_th || '',
        p.facial, p.depth, p.stack, p.total_qty,
        p.products?.pos_qty || 0, sellPrice, value,
        p.notes || '',
        p.created_at ? new Date(p.created_at).toLocaleString() : ''
      ]);
    });
    const ws1 = XLSX.utils.aoa_to_sheet(sheet1);
    ws1['!cols'] = [
      {wch:9},{wch:6},{wch:5},{wch:7},{wch:14},
      {wch:16},{wch:30},{wch:30},{wch:7},
      {wch:6},{wch:6},{wch:6},{wch:14},
      {wch:8},{wch:11},{wch:13},{wch:18},{wch:18}
    ];
    XLSX.utils.book_append_sheet(wb, ws1, 'Pan-O-Gram');
    
    // Sheet 2: Shelf Capacity Template (аёӘаёіаё«аёЈаёұаёҡ Counter а№ғаёҠа№үаёҷаёұаёҡ)
    const sheet2 = [
      ['Position Code', 'Location', 'Shelf', 'Seq',
       'Barcode', 'Name', 'Unit',
       'Shelf Capacity (Per Planogram)', 'Actual Count', 'Variance', 'Notes']
    ];
    pogs.forEach(p => {
      const name = p.products?.name_lo || p.products?.name_th || p.barcode;
      const unit = p.products?.unit_lo || p.products?.unit_th || '';
      sheet2.push([
        p.position_code, p.location_code, p.shelf, p.seq_in_shelf,
        p.barcode, name, unit,
        p.total_qty, '', '', ''
      ]);
    });
    const ws2 = XLSX.utils.aoa_to_sheet(sheet2);
    ws2['!cols'] = [
      {wch:14},{wch:9},{wch:6},{wch:5},
      {wch:16},{wch:30},{wch:7},
      {wch:18},{wch:11},{wch:9},{wch:18}
    ];
    // Add formula for Variance column = Actual - Expected
    for (let i = 2; i <= pogs.length + 1; i++) {
      ws2[`J${i}`] = { t: 'n', f: `IF(I${i}="","",I${i}-H${i})` };
    }
    XLSX.utils.book_append_sheet(wb, ws2, 'Shelf Capacity');
    
    // Sheet 3: Summary by Location
    const byLoc = {};
    pogs.forEach(p => {
      if (!byLoc[p.location_code]) byLoc[p.location_code] = {
        items: 0, totalQty: 0, totalValue: 0, shelves: new Set()
      };
      byLoc[p.location_code].items++;
      byLoc[p.location_code].totalQty += (p.total_qty || 0);
      byLoc[p.location_code].totalValue += (p.total_qty || 0) * (p.products?.sell_price || 0);
      byLoc[p.location_code].shelves.add(p.shelf);
    });
    
    const sheet3 = [['Location', 'Items', 'Shelves', 'Total Qty', 'Total Value (вӮӯ)']];
    Object.keys(byLoc).sort().forEach(loc => {
      const s = byLoc[loc];
      sheet3.push([loc, s.items, s.shelves.size, s.totalQty, Math.round(s.totalValue)]);
    });
    // Total row
    const totalItems = pogs.length;
    const totalQty = pogs.reduce((s, p) => s + (p.total_qty || 0), 0);
    const totalValue = pogs.reduce((s, p) => s + (p.total_qty || 0) * (p.products?.sell_price || 0), 0);
    sheet3.push([]);
    sheet3.push(['TOTAL', totalItems, 'вҖ”', totalQty, Math.round(totalValue)]);
    
    const ws3 = XLSX.utils.aoa_to_sheet(sheet3);
    ws3['!cols'] = [{wch:10},{wch:7},{wch:8},{wch:11},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws3, 'Summary');
    
    const fileName = `Pan-O-Gram_${branch.code}_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, fileName);
    
    showToast(`вң… ${isLao ? 'аә”аәІаә§а»Ӯаә«аәҘаә”а»ҒаәҘа»үаә§' : 'аё”аёІаё§аёҷа№Ңа№Ӯаё«аёҘаё”а№ҒаёҘа№үаё§'} (${pogs.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'})`, 'success');
  } catch (e) {
    console.error('[FS] Export Pan-O-Gram error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

      <div style="font-size:11px;color:var(--slate-600);font-weight:700;margin-bottom:5px;">

      .slice(0, 20);

          </div>
        </div>
      `;
    });
    
    if (Object.keys(byLoc).length > 20) {
      html += `<div style="text-align:center;font-size:10px;color:var(--slate-500);font-style:italic;padding:5px;">
        ... ${isLao ? 'а»ҒаәҘаә°аәӯаәөаәҒ' : 'а№ҒаёҘаё°аёӯаёөаёҒ'} ${Object.keys(byLoc).length - 20} ${isLao ? 'аәӘаә°аә–аәІаәҷаә—аәөа»Ҳ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'}
      </div>`;
    }
    
    html += `</div>`;
    content.innerHTML = html;
  } catch (e) {
    document.getElementById('precountLoader').innerHTML = 'вқҢ Error: ' + e.message;
  }
}

// ==================== BACKUP REMINDER ====================
function getBackupReminderInterval() {
  const v = localStorage.getItem('fs_backup_reminder_interval');
  return v !== null ? parseInt(v) : 7; // default 7 days
}

  showToast(msg, 'success');
}

// ==================== BACKUP HISTORY HELPERS ====================
function getBackupHistoryKey() {
  return `fs_backup_history_${branch?.id || 'global'}`;
}

function loadBackupHistory() {
  try {
    const raw = localStorage.getItem(getBackupHistoryKey());
    return raw ? JSON.parse(raw) : [];
  } catch (e) { return []; }
}

function addBackupHistoryEntry(entry) {
  try {
    const history = loadBackupHistory();
    // Generate checksum from entry size + timestamp (lightweight)
    const newEntry = {
      timestamp: Date.now(),
      created_at: new Date().toISOString(),
      created_by: user?.username || 'unknown',
      branch_id: branch?.id,
      branch_code: branch?.code,
      ...entry
    };
    history.unshift(newEntry);
    // а№ҖаёҒа№Үаёҡа№Ғаё„а№Ҳ 20 аёЈаёІаёўаёҒаёІаёЈаёҘа№ҲаёІаёӘаёёаё” (аёҒаёұаёҷ localStorage а№Җаё•а№ҮаёЎ)
    const trimmed = history.slice(0, 20);
    localStorage.setItem(getBackupHistoryKey(), JSON.stringify(trimmed));
  } catch (e) {
    console.error('[FS] addBackupHistoryEntry error:', e);
  }
}

// ==================== EXPORT FULL JSON ====================
async function exportFullBackupJSON() {
  const isLao = lang === 'lo';
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәӘа»үаәІаәҮ Full Backup...' : 'вҸі аёҒаёіаёҘаёұаёҮаёӘаёЈа№үаёІаёҮ Full Backup...', 'success');
  
  try {
    const backup = {
      _meta: {
        app: 'Friendship Stock',
        version: '4.1',
        branch_id: branch.id,
        branch_code: branch.code,
        branch_name: branch.name_th || branch.name_lo,
        created_at: new Date().toISOString(),
        created_by: user.username,
        type: 'full',
        tables: []
      }
    };
    
    let totalRecords = 0;
    
    for (const t of BACKUP_TABLES) {
      let query = sb.from(t.key).select('*');
      if (t.branchField) query = query.eq(t.branchField, branch.id);
      
      const { data, error } = await query;
      if (error) {
        console.warn(`[FS] Backup ${t.key} error:`, error);
        backup[t.key] = { error: error.message };
        continue;
      }
      
      // Sanitize: remove password_hash from users
      if (t.key === 'users' && data) {
        backup[t.key] = data.map(u => {
          const { password_hash, ...safe } = u;
          return safe;
        });
      } else {
        backup[t.key] = data || [];
      }
      
      totalRecords += (data?.length || 0);
      backup._meta.tables.push({ name: t.key, count: data?.length || 0 });
    }
    
    backup._meta.total_records = totalRecords;
    
    // Download
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const fileName = `backup-${branch.code}-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);
    
    // Save backup timestamp (epoch ms)
    localStorage.setItem(`fs_last_backup_${branch.id}`, String(Date.now()));
    
    // Add to history
    addBackupHistoryEntry({
      type: 'json',
      filename: fileName,
      total_records: totalRecords,
      size_kb: Math.round(json.length / 1024),
      tables: Object.keys(backup).filter(k => k !== '_meta').length
    });
    
    // Refresh manager
    showToast(`вң… ${isLao ? 'аәӘаәіаә®аәӯаәҮаәӘаәіа»ҖаәҘаәұаә”' : 'аёӘаёіаёЈаёӯаёҮаёӘаёіа№ҖаёЈа№ҮаёҲ'}: ${totalRecords.toLocaleString()} records`, 'success');
    loadBackupManager();
  } catch (e) {
    console.error('[FS] Full backup error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

// ==================== EXPORT FULL EXCEL ====================
async function exportFullBackupExcel() {
  const isLao = lang === 'lo';
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәӘа»үаәІаәҮ Excel...' : 'вҸі аёҒаёіаёҘаёұаёҮаёӘаёЈа№үаёІаёҮ Excel...', 'success');
  
  try {
    const wb = XLSX.utils.book_new();
    let totalRecords = 0;
    
    // Meta sheet
    const metaSheet = [
      ['Friendship Stock вҖ” Full Backup'],
      [],
      ['Branch', branch.code + ' - ' + (branch.name_th || branch.name_lo)],
      ['Created', new Date().toLocaleString()],
      ['Created by', user.username],
      [],
      ['Table', 'Count', 'Branch Filter']
    ];
    
    for (const t of BACKUP_TABLES) {
      let query = sb.from(t.key).select('*');
      if (t.branchField) query = query.eq(t.branchField, branch.id);
      
      const { data, error } = await query;
      if (error || !data) {
        metaSheet.push([t.key, 0, error?.message || 'no data']);
        continue;
      }
      
      // Sanitize: remove password_hash
      const sanitized = t.key === 'users' 
        ? data.map(u => { const { password_hash, ...safe } = u; return safe; })
        : data;
      
      if (sanitized.length > 0) {
        const ws = XLSX.utils.json_to_sheet(sanitized);
        XLSX.utils.book_append_sheet(wb, ws, t.key.substring(0, 30));
      }
      
      totalRecords += sanitized.length;
      metaSheet.push([t.key, sanitized.length, t.branchField ? branch.code : 'all']);
    }
    
    metaSheet.push([]);
    metaSheet.push(['TOTAL', totalRecords]);
    
    const wsMeta = XLSX.utils.aoa_to_sheet(metaSheet);
    wsMeta['!cols'] = [{wch:25},{wch:12},{wch:18}];
    XLSX.utils.book_append_sheet(wb, wsMeta, '_meta', true);
    
    const fileName = `backup-${branch.code}-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
    XLSX.writeFile(wb, fileName);
    
    localStorage.setItem(`fs_last_backup_${branch.id}`, String(Date.now()));
    
    // Add to history
    addBackupHistoryEntry({
      type: 'excel',
      filename: fileName,
      total_records: totalRecords,
      size_kb: 0,  // а№„аёЎа№ҲаёЈаё№а№үаёӮаёҷаёІаё”аё•аёӯаёҷаёҷаёөа№ү
      tables: BACKUP_TABLES.length
    });
    
    showToast(`вң… ${isLao ? 'аәӘаәіаә®аәӯаәҮ Excel аәӘаәіа»ҖаәҘаәұаә”' : 'аёӘаёіаёЈаёӯаёҮ Excel аёӘаёіа№ҖаёЈа№ҮаёҲ'}: ${totalRecords.toLocaleString()} records`, 'success');
    loadBackupManager();
  } catch (e) {
    console.error('[FS] Excel backup error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

             style="width:100%;padding:10px;border:2px dashed var(--violet-300);border-radius:9px;font-size:11px;cursor:pointer;background:var(--violet-50);">
    </div>
    
    <div id="restorePreview" style="display:none;"></div>
    
    <div class="action-row" style="margin-top:11px;">
      <button class="btn btn-secondary" onclick="closeModal(); openBackupManager();" style="flex:1;">${T('cancel')}</button>
    </div>
  `);
}

async function onRestoreFileSelected(event) {
  const isLao = lang === 'lo';
  const file = event.target.files[0];
  if (!file) return;
  
  const previewEl = document.getElementById('restorePreview');
  previewEl.style.display = 'block';
  previewEl.innerHTML = `
    <div style="text-align:center;padding:15px;color:var(--slate-400);">
      <div class="loader" style="margin:0 auto 8px;"></div>
      <div style="font-size:11px;">${isLao ? 'аәҒаәіаәҘаәұаәҮаәӯа»ҲаәІаәҷа»„аәҹаәҘа»Ң...' : 'аёҒаёіаёҘаёұаёҮаёӯа№ҲаёІаёҷа№„аёҹаёҘа№Ң...'}</div>
    </div>
  `;
  
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    
    // Validate structure
    if (!data._meta) {
      throw new Error(isLao ? 'а»„аәҹаәҘа»Ңаәҡа»Қа»Ҳаә–аә·аәҒаә•а»үаәӯаәҮ вҖ” аәҡа»Қа»ҲаәЎаәө metadata' : 'а№„аёҹаёҘа№Ңа№„аёЎа№Ҳаё–аё№аёҒаё•а№үаёӯаёҮ вҖ” а№„аёЎа№ҲаёЎаёө metadata');
    }
    
    // Store for confirmation
    window._restoreData = data;
    
    // Count records per table
    const tableCounts = {};
    let totalRecords = 0;
    BACKUP_TABLES.forEach(t => {
      const records = data[t.key];
      if (Array.isArray(records)) {
        tableCounts[t.key] = records.length;
        totalRecords += records.length;
      } else {
        tableCounts[t.key] = 0;
      }
    });
    
    const meta = data._meta;
    const backupDate = meta.created_at ? new Date(meta.created_at).toLocaleString(isLao ? 'lo-LA' : 'th-TH') : '?';
    
    // Check branch match
    const branchMatch = !meta.branch_id || meta.branch_id === branch.id;

          ? `а»„аәҹаәҘа»Ңаәҷаәөа»үаәЎаәІаәҲаәІаәҒаәӘаәІаәӮаәІ <strong>${meta.branch_code || '?'}</strong> а»Ғаә•а»Ҳаәӣаә°аәҲаәёаәҡаәұаәҷаә—а»ҲаәІаәҷаәўаә№а»ҲаәӘаәІаәӮаәІ <strong>${branch.code}</strong>` 
          : `а№„аёҹаёҘа№Ңаёҷаёөа№үаёЎаёІаёҲаёІаёҒаёӘаёІаёӮаёІ <strong>${meta.branch_code || '?'}</strong> а№Ғаё•а№ҲаёӣаёұаёҲаёҲаёёаёҡаёұаёҷаё„аёёаё“аёӯаёўаё№а№ҲаёӘаёІаёӮаёІ <strong>${branch.code}</strong>`}

          вҖў ${isLao ? 'аәӘа»үаәІаәҮа»Ӯаә”аәҚ' : 'аёӘаёЈа№үаёІаёҮа№Ӯаё”аёў'}: ${meta.created_by || '?'}<br>

        <input type="text" id="restoreConfirm" class="form-input" placeholder='${isLao ? 'аәһаәҙаәЎ "RESTORE"' : 'аёһаёҙаёЎаёһа№Ң "RESTORE"'}' style="font-size:11px;padding:8px;background:white;margin-top:5px;font-family:'Space Grotesk',monospace;text-transform:uppercase;">
      </div>

      <button class="btn btn-danger" onclick="executeRestore()"

        рҹ”„ ${isLao ? 'аә”аәіа»ҖаәҷаәөаәҷаәҒаәІаәҷаәҒаә№а»үаә„аә·аәҷ' : 'аё”аёіа№ҖаёҷаёҙаёҷаёҒаёІаёЈаёҒаё№а№үаё„аё·аёҷ'}

async function executeRestore() {
  const isLao = lang === 'lo';
  const errEl = document.getElementById('restoreErr');
  const pwd = document.getElementById('restorePwd').value;
  const confirmText = document.getElementById('restoreConfirm').value.trim().toUpperCase();
  
  // Validate
  if (!pwd) {
    errEl.textContent = isLao ? 'аәҒаә°аәҘаәёаәҷаәІа»ғаәӘа»Ҳ password' : 'аёҒаёЈаёёаё“аёІа№ғаёӘа№Ҳ password';
    errEl.style.display = 'block';
    return;
  }
  if (confirmText !== 'RESTORE') {
    errEl.textContent = isLao ? 'аәҒаә°аәҘаәёаәҷаәІаәһаәҙаәЎ "RESTORE"' : 'аёҒаёЈаёёаё“аёІаёһаёҙаёЎаёһа№Ң "RESTORE"';
    errEl.style.display = 'block';
    return;
  }
  
  // Get selected tables
  const checked = Array.from(document.querySelectorAll('.restoreTableCb:checked')).map(cb => cb.value);
  if (checked.length === 0) {
    errEl.textContent = isLao ? 'аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒаә•аәІаә•аә°аәҘаәІаәҮ' : 'аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒаё•аёІаёЈаёІаёҮ';
    errEl.style.display = 'block';
    return;
  }
  
  // Verify admin password
  try {
    const hash = await hashPassword(pwd);
    const { data: adminCheck } = await sb.from('users')
      .select('id, role, username')
      .eq('username', user.username)
      .eq('password_hash', hash)
      .eq('is_active', true)
      .maybeSingle();
    
    if (!adminCheck || adminCheck.role !== 'admin') {
      errEl.textContent = isLao ? 'Password аәҡа»Қа»Ҳаә–аә·аәҒаә•а»үаәӯаәҮ аә«аәјаә· аәҡа»Қа»ҲаәЎаәөаәӘаәҙаә”' : 'Password а№„аёЎа№Ҳаё–аё№аёҒаё•а№үаёӯаёҮ аё«аёЈаё·аёӯа№„аёЎа№ҲаёЎаёөаёӘаёҙаё—аёҳаёҙа№Ң';
      errEl.style.display = 'block';
      return;
    }
  } catch (e) {
    errEl.textContent = friendlyError(e);
    errEl.style.display = 'block';
    return;
  }
  
  const data = window._restoreData;
  if (!data) {
    errEl.textContent = isLao ? 'аәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷ вҖ” аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒа»„аәҹаәҘа»Ңа»ға»қа»Ҳ' : 'а№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ вҖ” аёҒаёЈаёёаё“аёІа№ҖаёҘаё·аёӯаёҒа№„аёҹаёҘа№Ңа№ғаё«аёЎа№Ҳ';
    errEl.style.display = 'block';
    return;
  }
  
  log('Executing restore for tables:', checked);
  
  // Show progress
  closeModal();
  showModal(`
    <h3>рҹ”„ ${isLao ? 'аәҒаәіаәҘаәұаәҮаәҒаә№а»үаә„аә·аәҷ' : 'аёҒаёіаёҘаёұаёҮаёҒаё№а№үаё„аё·аёҷ'}</h3>
    <div id="restoreStatus" style="margin-top:11px;font-size:11px;color:var(--slate-600);text-align:center;">
      ${isLao ? 'аәҒаәіаәҘаәұаәҮа»ҖаәҘаәөа»ҲаәЎ...' : 'аёҒаёіаёҘаёұаёҮа№ҖаёЈаёҙа№ҲаёЎ...'}
    </div>
    <div id="restoreList" style="margin-top:11px;background:var(--slate-50);border-radius:7px;padding:5px;max-height:250px;overflow-y:auto;"></div>
  `);
  
  const stats = { success: 0, fail: 0, totalInserted: 0 };
  const listEl = document.getElementById('restoreList');
  const statusEl = document.getElementById('restoreStatus');
  
  for (const tableKey of checked) {
    const tableMeta = BACKUP_TABLES.find(t => t.key === tableKey);
    const records = data[tableKey];
    if (!Array.isArray(records) || records.length === 0) continue;
    
    const label = isLao ? tableMeta.label_lo : tableMeta.label_th;
    statusEl.textContent = `вҸі ${label}: ${records.length.toLocaleString()} records`;
    
    let tableSuccess = true;
    let inserted = 0;
    
    try {
      // Filter by branch_id аё–а№үаёІаё•аёІаёЈаёІаёҮ branch-specific
      let recordsToRestore = records;
      if (tableMeta.branchField) {
        // Filter а№ғаё«а№үа№Җаё«аёҘаё·аёӯа№ҖаёүаёһаёІаё° branch аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ + override branch_id
        recordsToRestore = records
          .filter(r => !r[tableMeta.branchField] || r[tableMeta.branchField] === branch.id || r[tableMeta.branchField] === data._meta?.branch_id)
          .map(r => ({ ...r, [tableMeta.branchField]: branch.id }));
      }
      
      // Strip id а№Җаёһаё·а№Ҳаёӯ upsert а№ғаё«аёЎа№Ҳ (аёӣа№үаёӯаёҮаёҒаёұаёҷ conflict)
      // вң… а№ғаёҠа№ү upsert аё•аёІаёЎ unique constraint
      // а№Җаёӣа№Үаёҷ batch аёӮаёӯаёҮ 100 records аё•а№Ҳаёӯаё„аёЈаёұа№үаёҮ
      const BATCH_SIZE = 100;
      for (let i = 0; i < recordsToRestore.length; i += BATCH_SIZE) {
        const batch = recordsToRestore.slice(i, i + BATCH_SIZE);
        // Strip id field аёҒа№Ҳаёӯаёҷ upsert (а№ғаё«а№ү DB generate а№ғаё«аёЎа№Ҳ аё«аёЈаё·аёӯ upsert аё•аёІаёЎ unique key)
        const cleaned = batch.map(r => {
          const { id, ...rest } = r;
          return rest;
        });
        
        const { error } = await sb.from(tableKey).insert(cleaned);
        if (error) {
          log('Restore error for', tableKey, error.message);
          // аёҘаёӯаёҮа№ғаё«аёЎа№Ҳа№Ғаёҡаёҡ upsert аё–а№үаёІ insert fail
          throw error;
        }
        inserted += batch.length;
      }
      
      stats.success++;
      stats.totalInserted += inserted;
      listEl.innerHTML += `
        <div style="background:var(--emerald-50);border-left:3px solid var(--emerald-500);padding:5px 9px;margin-bottom:3px;border-radius:5px;font-size:10px;">
          вң… ${tableMeta.icon} ${label}: ${inserted.toLocaleString()} ${isLao ? 'аәҒаә№а»үаә„аә·аәҷа»ҒаәҘа»үаә§' : 'аёҒаё№а№үаё„аё·аёҷа№ҒаёҘа№үаё§'}
        </div>
      `;
    } catch (e) {
      stats.fail++;
      listEl.innerHTML += `
        <div style="background:var(--rose-50);border-left:3px solid var(--rose-500);padding:5px 9px;margin-bottom:3px;border-radius:5px;font-size:10px;">
          вқҢ ${tableMeta.icon} ${label}: ${e.message?.substring(0, 60) || 'failed'}
        </div>
      `;
    }
  }
  
  statusEl.textContent = isLao ? 'вң… аәҒаә№а»үаә„аә·аәҷаәӘаәіа»ҖаәҘаәұаә”' : 'вң… аёҒаё№а№үаё„аё·аёҷаёӘаёіа№ҖаёЈа№ҮаёҲ';
  
  await new Promise(r => setTimeout(r, 1500));
  closeModal();
  
  showModal(`
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-size:42px;">${stats.fail === 0 ? 'вң…' : 'вҡ пёҸ'}</div>
      <h3 style="margin-top:5px;">${isLao ? 'аәҒаә№а»үаә„аә·аәҷаәӘаәіа»ҖаәҘаәұаә”' : 'аёҒаё№а№үаё„аё·аёҷаёӘаёіа№ҖаёЈа№ҮаёҲ'}</h3>
    </div>
    <div style="background:var(--slate-50);padding:11px;border-radius:9px;font-size:11px;text-align:center;">
      <strong style="color:var(--emerald-500);">${stats.success}</strong> ${isLao ? 'аәӘаәіа»ҖаәҘаәұаә”' : 'аёӘаёіа№ҖаёЈа№ҮаёҲ'} вҖў 
      <strong style="color:var(--rose-500);">${stats.fail}</strong> ${isLao ? 'аәңаәҙаә”аәһаәІаә”' : 'аёңаёҙаё”аёһаёҘаёІаё”'}<br>
      ${isLao ? 'аәҘаә§аәЎ' : 'аёЈаё§аёЎ'} <strong>${stats.totalInserted.toLocaleString()}</strong> records
    </div>
    <button class="btn btn-primary" onclick="closeModal(); location.reload();" style="width:100%;margin-top:11px;">
      рҹ”„ ${isLao ? 'Reload App' : 'Reload App'}
    </button>
  `);
  
  window._restoreData = null;
}

// ==================== EXPORT SINGLE TABLE ====================
async function exportTableJSON(tableName) {
  const isLao = lang === 'lo';
  const tableInfo = BACKUP_TABLES.find(t => t.key === tableName);
  if (!tableInfo) return;
  
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәӘа»үаәІаәҮ...' : 'вҸі аёҒаёіаёҘаёұаёҮаёӘаёЈа№үаёІаёҮ...', 'success');
  
  try {
    let query = sb.from(tableName).select('*');
    if (tableInfo.branchField) query = query.eq(tableInfo.branchField, branch.id);
    
    const { data, error } = await query;
    if (error) throw error;
    if (!data || data.length === 0) {
      showToast(isLao ? 'вҡ пёҸ аәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷ' : 'вҡ пёҸ а№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ', 'warning');
      return;
    }
    
    // Sanitize
    const sanitized = tableName === 'users' 
      ? data.map(u => { const { password_hash, ...safe } = u; return safe; })
      : data;
    
    const exportData = {
      _meta: {
        app: 'Friendship Stock',
        table: tableName,
        branch_code: tableInfo.branchField ? branch.code : 'all',
        count: sanitized.length,
        created_at: new Date().toISOString()
      },
      data: sanitized
    };
    
    const json = JSON.stringify(exportData, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const fileName = `${tableName}-${branch.code}-${new Date().toISOString().slice(0,10)}.json`;
    
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);
    
    showToast(`вң… ${sanitized.length.toLocaleString()} records`, 'success');
  } catch (e) {
    console.error('[FS] Table backup error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function exportTableExcel(tableName) {
  const isLao = lang === 'lo';
  const tableInfo = BACKUP_TABLES.find(t => t.key === tableName);
  if (!tableInfo) return;
  
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәӘа»үаәІаәҮ Excel...' : 'вҸі аёҒаёіаёҘаёұаёҮаёӘаёЈа№үаёІаёҮ Excel...', 'success');
  
  try {
    let query = sb.from(tableName).select('*');
    if (tableInfo.branchField) query = query.eq(tableInfo.branchField, branch.id);
    
    const { data, error } = await query;
    if (error) throw error;
    if (!data || data.length === 0) {
      showToast(isLao ? 'вҡ пёҸ аәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷ' : 'вҡ пёҸ а№„аёЎа№ҲаёЎаёөаёӮа№үаёӯаёЎаё№аёҘ', 'warning');
      return;
    }
    
    // Sanitize
    const sanitized = tableName === 'users' 
      ? data.map(u => { const { password_hash, ...safe } = u; return safe; })
      : data;
    
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(sanitized);
    XLSX.utils.book_append_sheet(wb, ws, tableName.substring(0, 30));
    
    const fileName = `${tableName}-${branch.code}-${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, fileName);
    
    showToast(`вң… ${sanitized.length.toLocaleString()} records`, 'success');
  } catch (e) {
    console.error('[FS] Table Excel error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function loadZoneManager() {
  if (!branch) return;
  
  const [zonesRes, locsRes] = await Promise.all([
    sb.from('zones').select('*').eq('branch_id', branch.id).order('sort_order').order('code'),
    sb.from('location_master').select('*').eq('branch_id', branch.id).eq('is_active', true).order('location_code')
  ]);
  
  if (zonesRes.error) {
    document.getElementById('zoneMgrLoader').innerHTML = 'вқҢ Error: ' + zonesRes.error.message;
    return;
  }
  
  _zoneMgrData = {
    zones: zonesRes.data || [],
    locations: locsRes.data || []
  };
  
  document.getElementById('zoneMgrLoader').style.display = 'none';
  const content = document.getElementById('zoneMgrContent');
  content.style.display = 'block';
  renderZoneManager();
}

let _zoneMgrSelected = new Set();

function toggleZoneSelect(zoneId) {
  if (_zoneMgrSelected.has(zoneId)) {
    _zoneMgrSelected.delete(zoneId);
  } else {
    _zoneMgrSelected.add(zoneId);
  }
  renderZoneManager();
}

function toggleAllZoneSelect() {
  const zones = _zoneMgrData?.zones || [];
  if (_zoneMgrSelected.size === zones.length) {
    _zoneMgrSelected.clear();
  } else {
    _zoneMgrSelected = new Set(zones.map(z => z.id));
  }
  renderZoneManager();
}

async function toggleBranchUseZones() {
  const isLao = lang === 'lo';
  
  if (!['admin', 'scc'].includes(user.role)) {
    showToast(isLao ? 'аәҡа»Қа»ҲаәЎаәөаәӘаәҙаә”' : 'а№„аёЎа№ҲаёЎаёөаёӘаёҙаё—аёҳаёҙа№Ң', 'error');
    return;
  }
  
  if (!branch) return;
  
  const currentValue = branch.use_zones !== false;
  const newValue = !currentValue;
  
  // Confirm
  const branchName = isLao ? (branch.name_lo || branch.code) : (branch.name_th || branch.code);
  let msg;
  if (newValue) {
    msg = isLao 
      ? `а»Җаәӣаәөаә”аәҘаә°аәҡаә»аәҡа»ӮаәҠаәҷ аәӘаәіаәҘаәұаәҡ ${branchName}?\n\nCounter аәҲаә°аә•а»үаәӯаәҮа»ҖаәҘаә·аәӯаәҒа»ӮаәҠаәҷаәҒа»ҲаәӯаәҷаәӘаә°а»ҒаәҒаәҷ`
      : `а№Җаёӣаёҙаё”аёЈаё°аёҡаёҡа№ӮаёӢаёҷ аёӘаёіаё«аёЈаёұаёҡ ${branchName}?\n\nCounter аёҲаё°аё•а№үаёӯаёҮа№ҖаёҘаё·аёӯаёҒа№ӮаёӢаёҷаёҒа№ҲаёӯаёҷаёӘа№ҒаёҒаёҷ`;
  } else {
    msg = isLao 
      ? `аәӣаәҙаә”аәҘаә°аәҡаә»аәҡа»ӮаәҠаәҷ аәӘаәіаәҘаәұаәҡ ${branchName}?\n\nвң… Counter аәӘаә°а»ҒаәҒаәҷа»„аә”а»үа»„аә§аәӮаә¶а»үаәҷ аәҡа»Қа»Ҳаә•а»үаәӯаәҮа»ҖаәҘаә·аәӯаәҒа»ӮаәҠаәҷ\nвң… а»ӮаәҠаәҷаә—аәөа»ҲаәЎаәөаәҚаәұаәҮа»ҖаәҒаәұаәҡа»„аә§а»ү (аәҡа»Қа»Ҳа»„аә”а»үаәҘаә»аәҡ)\nвң… Pan-O-Gram + Stock Counts аәҚаәұаәҮа»Җаә®аәұаә”аә§аәҪаәҒаәӣаә»аәҒаәҒаә°аә•аәҙ`
      : `аёӣаёҙаё”аёЈаё°аёҡаёҡа№ӮаёӢаёҷ аёӘаёіаё«аёЈаёұаёҡ ${branchName}?\n\nвң… Counter аёӘа№ҒаёҒаёҷа№„аё”а№үа№ҖаёЈа№Үаё§аёӮаё¶а№үаёҷ а№„аёЎа№Ҳаё•а№үаёӯаёҮа№ҖаёҘаё·аёӯаёҒа№ӮаёӢаёҷ\nвң… а№ӮаёӢаёҷаё—аёөа№ҲаёЎаёөаёўаёұаёҮа№ҖаёҒа№Үаёҡа№„аё§а№ү (а№„аёЎа№Ҳа№„аё”а№үаёҘаёҡ)\nвң… Pan-O-Gram + Stock Counts аёўаёұаёҮаё—аёіаёҮаёІаёҷаёӣаёҒаё•аёҙ`;
  }
  
  if (!confirm(msg)) return;
  
  try {
    // 1. Update DB + return data а№Җаёһаё·а№Ҳаёӯ verify
    const { data: updatedRows, error } = await sb.from('branches')
      .update({ use_zones: newValue })
      .eq('id', branch.id)
      .select();
    
    if (error) {
      console.error('[FS] DB update error:', error);
      
      // аё–а№үаёІа№Җаёӣа№Үаёҷ error column а№„аёЎа№ҲаёЎаёө вҶ’ а№ҒаёҲа№үаёҮ admin аё•а№үаёӯаёҮаёЈаёұаёҷ SQL
      if (error.message && (error.message.includes('use_zones') || error.message.includes('column'))) {
        showToast(
          isLao 
            ? 'вқҢ аәҒаә°аәҘаәёаәҷаәІ run SQL 28-branches-use-zones.sql аәҒа»Ҳаәӯаәҷ' 
            : 'вқҢ аёҒаёЈаёёаё“аёІ run SQL 28-branches-use-zones.sql аёҒа№Ҳаёӯаёҷ', 
          'error'
        );
      } else {
        showToast('DB Error: ' + error.message, 'error');
      }
      return;
    }
    
    // 2. Verify аё§а№ҲаёІа№„аё”а№ү update аёҲаёЈаёҙаёҮ
    if (!updatedRows || updatedRows.length === 0) {
      showToast(isLao ? 'вқҢ аәҡа»Қа»ҲаәӘаәІаәЎаәІаә”аәӯаәұаәҡа»Җаә”аә”а»„аә”а»ү' : 'вқҢ а№„аёЎа№ҲаёӘаёІаёЎаёІаёЈаё–аёӯаёұаёӣа№Җаё”аё•а№„аё”а№ү', 'error');
      return;
    }
    
    const verifiedRow = updatedRows[0];
    log('Branch updated:', verifiedRow.code, 'use_zones:', verifiedRow.use_zones);
    
    // 3. Update local branch object (а№ғаёҠа№үаё„а№ҲаёІаёҲаёЈаёҙаёҮаёҲаёІаёҒ DB)
    branch.use_zones = verifiedRow.use_zones;
    
    // 4. Update localStorage вҖ” key аё–аё№аёҒаё•а№үаёӯаёҮаё„аё·аёӯ "fs_branch"
    try {
      localStorage.setItem('fs_branch', JSON.stringify(branch));
    } catch (e) {
      log('localStorage update warning:', e);
    }
    
    showToast(
      newValue 
        ? (isLao ? 'вң… а»Җаәӣаәөаә”аәҘаә°аәҡаә»аәҡа»ӮаәҠаәҷа»ҒаәҘа»үаә§' : 'вң… а№Җаёӣаёҙаё”аёЈаё°аёҡаёҡа№ӮаёӢаёҷа№ҒаёҘа№үаё§')
        : (isLao ? 'вҸёпёҸ аәӣаәҙаә”аәҘаә°аәҡаә»аәҡа»ӮаәҠаәҷа»ҒаәҘа»үаә§' : 'вҸёпёҸ аёӣаёҙаё”аёЈаё°аёҡаёҡа№ӮаёӢаёҷа№ҒаёҘа№үаё§'),
      'success'
    );
    
    // Re-render settings page
    if (typeof renderSettingsPage === 'function') {
      const c = document.getElementById('appContent');
      if (c) c.innerHTML = renderSettingsPage();
      loadSettingsStats();
    }
  } catch (e) {
    console.error('[FS] toggleBranchUseZones error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function bulkDeleteZones() {
  const isLao = lang === 'lo';
  if (_zoneMgrSelected.size === 0) return;
  
  const selectedZones = (_zoneMgrData?.zones || []).filter(z => _zoneMgrSelected.has(z.id));
  
  // аёҷаёұаёҡ locations аё—аёөа№ҲаёҲаё°а№„аё”а№үаёЈаёұаёҡаёңаёҘаёҒаёЈаё°аё—аёҡ
  const affectedLocCount = (_zoneMgrData?.locations || []).filter(l => _zoneMgrSelected.has(l.zone_id)).length;
  
  // а№ҒаёӘаё”аёҮ list аёӮаёӯаёҮа№ӮаёӢаёҷаё—аёөа№ҲаёҲаё°аёҘаёҡ
  const zonesPreview = selectedZones.slice(0, 5).map(z => `${z.code} (${isLao ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo)})`).join('\n');
  const more = selectedZones.length > 5 ? `\n... +${selectedZones.length - 5} ${isLao ? 'аәӯаә·а»Ҳаәҷа»Ҷ' : 'аёӯаё·а№Ҳаёҷа№Ҷ'}` : '';
  
  let confirmMsg = isLao 
    ? `аәҘаә»аәҡ ${selectedZones.length} а»ӮаәҠаәҷ?\n\n${zonesPreview}${more}`
    : `аёҘаёҡ ${selectedZones.length} а№ӮаёӢаёҷ?\n\n${zonesPreview}${more}`;
  
  if (affectedLocCount > 0) {
    confirmMsg += isLao
      ? `\n\nвҡ пёҸ ${affectedLocCount} аә•аәіа»Ға»ңа»ҲаәҮаәҲаә°аәҒаәІаәҚа»Җаәӣаәұаәҷ "аәҡа»Қа»ҲаәЎаәөа»ӮаәҠаәҷ"`
      : `\n\nвҡ пёҸ ${affectedLocCount} аё•аёіа№Ғаё«аёҷа№ҲаёҮаёҲаё°аёҒаёҘаёІаёўа№Җаёӣа№Үаёҷ "а№„аёЎа№ҲаёЎаёөа№ӮаёӢаёҷ"`;
  }
  
  if (!confirm(confirmMsg)) return;
  
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәҘаә»аәҡ...' : 'вҸі аёҒаёіаёҘаёұаёҮаёҘаёҡ...', 'success');
  
  try {
    const ids = Array.from(_zoneMgrSelected);
    
    // 1. аёӣаёҘаё” zone_id аёӮаёӯаёҮ locations аё—аёөа№Ҳа№ғаёҠа№ү zones а№Җаё«аёҘа№ҲаёІаёҷаёөа№ү
    const { error: ue } = await sb.from('location_master')
      .update({ zone_id: null })
      .in('zone_id', ids)
      .eq('branch_id', branch.id);
    if (ue) throw ue;
    
    // 2. аёҘаёҡ zones
    const { error: de } = await sb.from('zones').delete().in('id', ids);
    if (de) throw de;
    
    // Clear selection
    _zoneMgrSelected.clear();
    
    showToast(`рҹ—‘пёҸ ${isLao ? 'аәҘаә»аәҡа»ҒаәҘа»үаә§' : 'аёҘаёҡа№ҒаёҘа№үаё§'} ${ids.length} ${isLao ? 'а»ӮаәҠаәҷ' : 'а№ӮаёӢаёҷ'}`, 'success');
    
    // Reload manager + Floor Map
    await loadZoneManager();
    await loadZonesAndLocations();
    const fmEl = document.getElementById('floorMapContent');
    if (fmEl) loadFloorMap();
  } catch (e) {
    console.error('[FS] bulkDeleteZones error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function saveZone() {
  const isLao = lang === 'lo';
  const id = document.getElementById('zoneFormId').value;
  const isEdit = !!id;
  
  const code = document.getElementById('zoneFormCode').value.trim().toUpperCase();
  const name_lo = document.getElementById('zoneFormNameLo').value.trim();
  const name_th = document.getElementById('zoneFormNameTh').value.trim() || name_lo;
  const color = document.getElementById('zoneFormColor').value;
  const sort_order = parseInt(document.getElementById('zoneFormSort').value) || 0;
  const activeEl = document.getElementById('zoneFormActive');
  const is_active = activeEl ? activeEl.value === 'true' : true;
  
  const errEl = document.getElementById('zoneFormErr');
  
  if (!code || !name_lo) {
    errEl.textContent = isLao ? 'аәҒаә°аәҘаәёаәҷаәІа»ғаәӘа»Ҳ Code + аәҠаә·а»Ҳ' : 'аёҒаёЈаёёаё“аёІа№ғаёӘа№Ҳ Code + аёҠаё·а№Ҳаёӯ';
    errEl.classList.add('show');
    return;
  }
  
  try {
    if (isEdit) {
      const upd = { name_lo, name_th, color, sort_order, is_active, updated_at: new Date().toISOString() };
      const { error } = await sb.from('zones').update(upd).eq('id', id);
      if (error) throw error;
      showToast(`вң… ${isLao ? 'аәҡаәұаәҷаә—аә¶аәҒ' : 'аёҡаёұаёҷаё—аё¶аёҒ'}`, 'success');
    } else {
      const { error } = await sb.from('zones').insert({
        branch_id: branch.id,
        code, name_lo, name_th, color, sort_order, is_active: true
      });
      if (error) throw error;
      showToast(`вң… ${isLao ? 'аәӘа»үаәІаәҮаәӘаәіа»ҖаәҘаәұаә”' : 'аёӘаёЈа№үаёІаёҮаёӘаёіа№ҖаёЈа№ҮаёҲ'}`, 'success');
    }
    openZoneManager(); // reload
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  }
}

async function deleteZone(zoneId) {
  const isLao = lang === 'lo';
  
  // а№ҖаёҠа№Үаё„аё§а№ҲаёІаёЎаёө locations аёӯаёўаё№а№Ҳа№ғаёҷа№ӮаёӢаёҷаёҷаёөа№үа№„аё«аёЎ
  const locCount = _zoneMgrData.locations.filter(l => l.zone_id === zoneId).length;
  
  let confirmMsg = isLao ? 'аәҘаә»аәҡа»ӮаәҠаәҷаәҷаәөа»ү?' : 'аёҘаёҡа№ӮаёӢаёҷаёҷаёөа№ү?';
  if (locCount > 0) {
    confirmMsg = isLao 
      ? `а»ӮаәҠаәҷаәҷаәөа»үаәЎаәө ${locCount} аә•аәіа»Ға»ңа»ҲаәҮ вҖ” аә•аәіа»Ға»ңа»ҲаәҮа»Җаә«аәҘаә»а»ҲаәІаәҷаәөа»үаәҲаә°аәҒаәІаәҚа»Җаәӣаәұаәҷ "аәҡа»Қа»ҲаәЎаәөа»ӮаәҠаәҷ"\nаәҚа»үаәӯаәҷаәҚаәұаәҷаәҘаә»аәҡ?`
      : `а№ӮаёӢаёҷаёҷаёөа№үаёЎаёө ${locCount} аё•аёіа№Ғаё«аёҷа№ҲаёҮ вҖ” аё•аёіа№Ғаё«аёҷа№ҲаёҮа№Җаё«аёҘа№ҲаёІаёҷаёөа№үаёҲаё°аёҒаёҘаёІаёўа№Җаёӣа№Үаёҷ "а№„аёЎа№ҲаёЎаёөа№ӮаёӢаёҷ"\nаёўаё·аёҷаёўаёұаёҷаёҘаёҡ?`;
  }
  
  if (!confirm(confirmMsg)) return;
  
  try {
    // Soft delete: set is_active=false instead of hard delete
    // а№Җаёһаё·а№ҲаёӯаёЈаёұаёҒаё©аёІ historical data
    const { error: ue } = await sb.from('location_master')
      .update({ zone_id: null })
      .eq('zone_id', zoneId).eq('branch_id', branch.id);
    if (ue) throw ue;
    
    const { error: de } = await sb.from('zones').delete().eq('id', zoneId);
    if (de) throw de;
    
    showToast(`рҹ—‘пёҸ ${isLao ? 'аәҘаә»аәҡа»ҒаәҘа»үаә§' : 'аёҘаёҡа№ҒаёҘа№үаё§'}`, 'success');
    openZoneManager();
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

function renderZoneLocationsList(search, filter) {
  const isLao = lang === 'lo';
  const zoneId = _zoneMgrSelectedZone;
  const allLocs = _zoneMgrData?.locations || [];
  const s = (search || '').toLowerCase().trim();
  
  // Apply filter
  let filtered = allLocs;
  if (filter === 'in_zone') {
    filtered = allLocs.filter(l => l.zone_id === zoneId);
  } else if (filter === 'not_in_zone') {
    filtered = allLocs.filter(l => l.zone_id !== zoneId);
  } else if (filter === 'no_zone') {
    filtered = allLocs.filter(l => !l.zone_id);
  }
  
  // Apply search
  if (s) {
    filtered = filtered.filter(l => (l.location_code || '').toLowerCase().includes(s));
  }
  
  // Update stats
  const statsEl = document.getElementById('zoneLocStats');
  if (statsEl) {
    const inZone = allLocs.filter(l => l.zone_id === zoneId).length;
    statsEl.innerHTML = `
      <strong style="color:var(--sky-600);">${inZone}</strong> ${isLao ? 'а»ғаәҷа»ӮаәҠаәҷ' : 'а№ғаёҷа№ӮаёӢаёҷ'} вҖў 
      <strong style="color:var(--slate-700);">${filtered.length}</strong> ${isLao ? 'аәҒаәӯаәҮ' : 'аёҒаёЈаёӯаёҮ'}
    `;
  }
  
  const listEl = document.getElementById('zoneLocList');
  if (!listEl) return;
  
  if (filtered.length === 0) {
    listEl.innerHTML = `<div style="text-align:center;padding:25px;color:var(--slate-400);font-size:11px;">
      ${isLao ? 'аәҡа»Қа»Ҳаәһаә»аәҡ' : 'а№„аёЎа№Ҳаёһаёҡ'}
    </div>`;
    return;
  }
  
  // Parse + group by Gondola Number (same logic as Floor Map)
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return { groupKey: numMatch[1], groupLabel: `Gondola ${numMatch[1]}`, type: numMatch[2], bay: parseInt(numMatch[3]) || 0 };
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      else if (prefix === 'D') label = 'Display';
      return { groupKey: 'z' + prefix, groupLabel: label, type: prefix, bay: parseInt(letterMatch[2]) || 0 };
    }
    return { groupKey: 'zzz', groupLabel: '?', type: '?', bay: 0 };
  }
  
  const groups = {};
  filtered.forEach(l => {
    const p = parseCode(l.location_code);
    if (!groups[p.groupKey]) {
      groups[p.groupKey] = { label: p.groupLabel, items: [] };
    }
    groups[p.groupKey].items.push({ ...l, _parsed: p });
  });
  
  // Sort groups
  const sortedGroups = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
  
  let html = '';
  sortedGroups.forEach(([gKey, g]) => {
    g.items.sort((a, b) => {
      if (a._parsed.type !== b._parsed.type) return a._parsed.type.localeCompare(b._parsed.type);
      return a._parsed.bay - b._parsed.bay;
    });
    
    const inZoneCount = g.items.filter(l => l.zone_id === zoneId).length;
    const isAllInZone = inZoneCount === g.items.length;
    
    html += `
      <div style="margin-bottom:7px;">
        <div style="background:white;border:1px solid var(--slate-200);border-radius:7px;padding:7px 9px;display:flex;align-items:center;gap:7px;margin-bottom:4px;">
          <span style="font-family:'Space Grotesk',monospace;font-weight:800;font-size:11px;color:var(--slate-900);flex:1;">
            ${g.label}
          </span>
          <span style="font-size:10px;color:var(--slate-500);">
            ${inZoneCount}/${g.items.length}
          </span>
          <button onclick="toggleGroupInZone('${gKey}', ${zoneId || 'null'})" 
                  style="background:${isAllInZone ? 'var(--rose-100)' : 'var(--emerald-100)'};color:${isAllInZone ? 'var(--rose-500)' : 'var(--emerald-500)'};border:none;border-radius:4px;padding:3px 8px;font-size:10px;font-weight:700;cursor:pointer;">
            ${isAllInZone ? (isLao ? 'вң• аәӣаә»аә”' : 'вң• аёӣаёҘаё”') : 'вң… ' + (isLao ? 'аәҒаәіаәҷаә»аә”' : 'аёҒаёіаё«аёҷаё”')}
          </button>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(80px, 1fr));gap:4px;padding-left:8px;">
    `;
    
    g.items.forEach(loc => {
      const inThisZone = loc.zone_id === zoneId;
      html += `
        <div onclick="toggleLocationZone(${loc.id}, ${zoneId || 'null'})"
             style="background:${inThisZone ? 'var(--emerald-100)' : 'white'};border:1px solid ${inThisZone ? 'var(--emerald-500)' : 'var(--slate-200)'};border-radius:6px;padding:4px 6px;font-family:'Space Grotesk',monospace;font-size:10px;font-weight:700;color:var(--slate-900);text-align:center;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:3px;">
          ${inThisZone ? 'вң“' : ''}
          ${loc.location_code}
        </div>
      `;
    });
    
    html += '</div></div>';
  });
  
  listEl.innerHTML = html;
}

async function toggleLocationZone(locId, zoneId) {
  const loc = _zoneMgrData.locations.find(l => l.id === locId);
  if (!loc) return;
  
  const newZoneId = loc.zone_id === zoneId ? null : zoneId;
  
  try {
    const { error } = await sb.from('location_master')
      .update({ zone_id: newZoneId })
      .eq('id', locId);
    if (error) throw error;
    
    loc.zone_id = newZoneId;
    
    // Re-render
    const search = document.getElementById('zoneLocSearch')?.value || '';
    const filter = document.getElementById('zoneLocFilter')?.value || 'in_zone';
    renderZoneLocationsList(search, filter);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function toggleGroupInZone(groupKey, zoneId) {
  const isLao = lang === 'lo';
  const allLocs = _zoneMgrData?.locations || [];
  
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return numMatch[1];
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) return 'z' + letterMatch[1];
    return 'zzz';
  }
  
  const inGroup = allLocs.filter(l => parseCode(l.location_code) === groupKey);
  if (inGroup.length === 0) return;
  
  const allInZone = inGroup.every(l => l.zone_id === zoneId);
  const newZoneId = allInZone ? null : zoneId;
  
  showToast(isLao ? 'вҸі аәҒаәіаәҘаәұаәҮаәӯаәұаәҡа»Җаә”аә”...' : 'вҸі аёҒаёіаёҘаёұаёҮаёӯаёұаёӣа№Җаё”аё•...', 'success');
  
  try {
    const ids = inGroup.map(l => l.id);
    const { error } = await sb.from('location_master')
      .update({ zone_id: newZoneId })
      .in('id', ids);
    if (error) throw error;
    
    // Update local cache
    inGroup.forEach(l => { l.zone_id = newZoneId; });
    
    const search = document.getElementById('zoneLocSearch')?.value || '';
    const filter = document.getElementById('zoneLocFilter')?.value || 'in_zone';
    renderZoneLocationsList(search, filter);
    showToast(`вң… ${inGroup.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'}`, 'success');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function bulkAssignToZone(zoneId, useFilter) {
  const isLao = lang === 'lo';
  
  if (!useFilter) return;
  
  const search = document.getElementById('zoneLocSearch')?.value || '';
  const filter = document.getElementById('zoneLocFilter')?.value || 'all';
  
  // Re-compute filtered list (same as renderZoneLocationsList)
  const allLocs = _zoneMgrData?.locations || [];
  const targetZone = _zoneMgrSelectedZone;
  const s = search.toLowerCase().trim();
  
  let filtered = allLocs;
  if (filter === 'in_zone') filtered = allLocs.filter(l => l.zone_id === targetZone);
  else if (filter === 'not_in_zone') filtered = allLocs.filter(l => l.zone_id !== targetZone);
  else if (filter === 'no_zone') filtered = allLocs.filter(l => !l.zone_id);
  
  if (s) filtered = filtered.filter(l => (l.location_code || '').toLowerCase().includes(s));
  
  if (filtered.length === 0) {
    showToast(isLao ? 'аәҡа»Қа»ҲаәЎаәөаә•аәіа»Ға»ңа»ҲаәҮ' : 'а№„аёЎа№ҲаёЎаёөаё•аёіа№Ғаё«аёҷа№ҲаёҮ', 'warning');
    return;
  }
  
  const action = zoneId === null 
    ? (isLao ? 'аәӣаә»аә”аәӯаәӯаәҒ' : 'аёӣаёҘаё”аёӯаёӯаёҒ')
    : (isLao ? 'аәҒаәіаәҷаә»аә”а»ӮаәҠаәҷ' : 'аёҒаёіаё«аёҷаё”а№ӮаёӢаёҷ');
  
  if (!confirm(`${action} ${filtered.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'}?`)) return;
  
  try {
    const ids = filtered.map(l => l.id);
    // Use zoneId from arg (when assigning to current zone) OR null
    const newZoneId = zoneId === null ? null : targetZone;
    
    const { error } = await sb.from('location_master')
      .update({ zone_id: newZoneId })
      .in('id', ids);
    if (error) throw error;
    
    filtered.forEach(l => { l.zone_id = newZoneId; });
    
    renderZoneLocationsList(search, filter);
    showToast(`вң… ${filtered.length} ${isLao ? 'аә•аәіа»Ға»ңа»ҲаәҮ' : 'аё•аёіа№Ғаё«аёҷа№ҲаёҮ'}`, 'success');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

function adjustCount(delta) {
  const inp = document.getElementById('countInput');
  if (!inp) return;
  let v = parseInt(inp.value) || 0;
  inp.value = Math.max(0, v + delta);
}

function cancelCount() {
  curProduct = null;
  curTask = null;

}

async function saveCount() {
  if (!curProduct) {
    showToast('No product selected', 'error');
    return;
  }
  if (!session) {
    showToast(T('locked_session'), 'error');
    log('ERROR: No session when saving');
    return;
  }
  
  // Workflow check - Counter/Verifier аё•а№үаёӯаёҮа№ғаё«а№ү CTL а№Җаёӣаёҙаё”аёҒа№Ҳаёӯаёҷ
  const r = user.role;
  if (['counter', 'staff', 'verifier', 'audit'].includes(r) && loc?.location_code) {
    const { data: gs } = await sb.from('gondola_status')
      .select('status, active_counter_id, active_verifier_id')
      .eq('session_id', session.id)
      .eq('location_code', loc.location_code)
      .maybeSingle();
    
    const isCounter = ['counter', 'staff'].includes(r);
    const isVerifier = ['verifier', 'audit'].includes(r);
    
    if (!gs) {
      showToast(T('gondola_locked'), 'warning');
      saveBtn.disabled = false;
      saveBtn.innerHTML = T('save');
      return;
    }
    
    if (isCounter && !['open_for_counting', 'counting'].includes(gs.status)) {
      showToast(T('gondola_locked') + ' (Status: ' + gs.status + ')', 'warning');
      const saveBtn = document.getElementById('saveBtn');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = T('save'); }
      return;
    }
    
    if (isVerifier && !['open_for_verify', 'verifying'].includes(gs.status)) {
      showToast(T('gondola_locked') + ' (Status: ' + gs.status + ')', 'warning');
      const saveBtn = document.getElementById('saveBtn');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = T('save'); }
      return;
    }
    
    // Update status to counting/verifying аё–а№үаёІаёўаёұаёҮа№„аёЎа№Ҳа№ғаёҠа№Ҳ
    if (isCounter && gs.status === 'open_for_counting') {
      await sb.from('gondola_status').update({
        status: 'counting',
        active_counter_id: user.id,
        counting_started_at: new Date().toISOString()
      }).eq('session_id', session.id).eq('location_code', loc.location_code);
    }
    if (isVerifier && gs.status === 'open_for_verify') {
      await sb.from('gondola_status').update({
        status: 'verifying',
        active_verifier_id: user.id,
        verifying_started_at: new Date().toISOString()
      }).eq('session_id', session.id).eq('location_code', loc.location_code);
    }
  }
  
  const count = parseInt(document.getElementById('countInput').value) || 0;
  const note = document.getElementById('noteInput').value.trim();
  const saveBtn = document.getElementById('saveBtn');
  
  saveBtn.disabled = true;
  saveBtn.innerHTML = `<span class="loader"></span> ${T('saving')}`;
  
  // Determine count_role
  let countRole = 'counter';
  if (['verifier', 'audit'].includes(r)) countRole = 'verifier';
  else if (r === 'ctl') countRole = 'ctl_tiebreaker';
  else if (['admin', 'scc', 'bcs'].includes(r)) countRole = 'manager_final';
  
  const insertData = {
    session_id: session.id,
    branch_id: branch?.id || user.branch_id,
    product_id: curProduct.id,
    zone_id: zone?.id || null,
    location_code: loc?.location_code || null,
    gondola_code: loc?.location_code || null,  // а№ҖаёҒа№Үаёҡ Location а№Җаё•а№ҮаёЎа№Җаёӣа№Үаёҷ gondola_code аё”а№үаё§аёў
    user_id: user.id,
    counted_qty: count,
    pos_qty_snapshot: curProduct.pos_qty || 0,
    count_role: countRole,
    is_markdown: curProduct.is_markdown || false,
    note: note || null,
  };
  
  log('Saving count:', insertData);
  
  const { data, error } = await sb.from('stock_counts').insert(insertData).select().single();
  
  if (error) {
    console.error('[FS] Save error:', error);
    showToast('Error: ' + error.message, 'error');
    saveBtn.disabled = false;
    saveBtn.innerHTML = T('save');
    return;
  }
  
  log('Saved successfully:', data);
  
  // Show feedback based on workflow_status
  let toastMsg = T('saved');
  let toastType = 'success';
  if (data.workflow_status === 'matched') {
    toastMsg = 'вң“ ' + T('matched');
  } else if (data.workflow_status === 'needs_audit') {
    toastMsg = 'вҡ пёҸ ' + T('need_tb');
    toastType = 'warning';
  }
  
  showToast(toastMsg, toastType);
  cancelCount();
  await loadSessionStats();
  updateTbBadge();
}

// ==================== STATS ====================
async function loadSessionStats() {
  if (!session) return;
  
  const r = user.role;
  const isAdmin = ['admin', 'scc', 'bcs'].includes(r);
  
  log('Loading stats for session:', session.id, 'user:', user.id);
  
  // аё”аё¶аёҮа№ҖаёүаёһаёІаё°аёӮаёӯаёҮ user аёҷаёөа№ү (а№„аёЎа№Ҳа№ғаёҠа№Ҳаё—аёұа№үаёҮаё«аёЎаё”)
  const { data, error } = await sb.from('stock_counts')
    .select('counted_qty, pos_qty_snapshot, diff')
    .eq('session_id', session.id)
    .eq('user_id', user.id);
  
  if (error) {
    log('Stats error:', error);
    return;
  }
  
  log('My counts:', (data || []).length);
  
  const items = data || [];
  const totalScanned = items.length;
  const totalQty = items.reduce((s, x) => s + (x.counted_qty || 0), 0);
  const totalDiff = items.reduce((s, x) => s + (x.diff || 0), 0);
  
  const sEl = document.getElementById('statScanned');
  const tEl = document.getElementById('statTotal');
  const dEl = document.getElementById('statDiff');
  const dCard = document.getElementById('statDiffCard');
  
  if (sEl) sEl.textContent = totalScanned.toLocaleString();
  if (tEl) tEl.textContent = totalQty.toLocaleString();
  
  if (isAdmin) {
    if (dEl) dEl.textContent = (totalDiff > 0 ? '+' : '') + totalDiff.toLocaleString();
  } else {
    if (dCard) {
      dCard.style.display = 'none';
      const parent = dCard.parentElement;
      if (parent) parent.style.gridTemplateColumns = '1fr 1fr';
    }
  }
}

// Apply both filter (zone) and search at the same time
function applyHistoryFilters() {
  const items = window._histItems || [];
  const zoneFilter = window._histZoneFilter || 'all';
  const search = (window._histSearch || '').toLowerCase().trim();
  
  let filtered = zoneFilter === 'all' ? items : items.filter(it => String(it.zone_id) === String(zoneFilter));
  
  if (search) {
    filtered = filtered.filter(it => {
      const p = it.products || {};
      const name_th = (p.name_th || '').toLowerCase();
      const name_lo = (p.name_lo || '').toLowerCase();
      const barcode = (p.barcode || '').toLowerCase();
      const loc = (it.location_code || it.gondola_code || '').toLowerCase();
      return name_th.includes(search) || name_lo.includes(search) || barcode.includes(search) || loc.includes(search);
    });
  }
  
  renderHistoryList(filtered);

function buildHistoryFilterBar(items) {
  const filterBar = document.getElementById('histFilterBar');
  if (!filterBar) return;
  
  // Get unique zones from items
  const zoneMap = {};
  items.forEach(item => {
    const zid = item.zone_id;
    if (!zid) return;
    if (!zoneMap[zid]) {
      const z = (allZones || []).find(zz => zz.id == zid);
      zoneMap[zid] = {
        id: zid,
        code: z?.code || '?',
        name: z ? (lang === 'lo' ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo)) : '?',
        count: 0
      };
    }
    zoneMap[zid].count++;
  });
  
  const zoneList = Object.values(zoneMap).sort((a, b) => a.code.localeCompare(b.code));
  
  if (zoneList.length === 0) {
    filterBar.style.display = 'none';
    return;
  }
  
  filterBar.style.display = 'flex';
  filterBar.innerHTML = `
    <button class="hist-chip active" data-zone="all" onclick="filterHistByZone('all', this)">
      ${T('all_zones') || 'аё—аёұа№үаёҮаё«аёЎаё”'} <span class="hist-chip-count">${items.length}</span>
    </button>
    ${zoneList.map(z => `
      <button class="hist-chip" data-zone="${z.id}" onclick="filterHistByZone('${z.id}', this)" title="${z.name}">
        ${z.code} <span class="hist-chip-count">${z.count}</span>
      </button>
    `).join('')}
  `;
}

function filterHistByZone(zoneFilter, btnEl) {
  // toggle active state
  document.querySelectorAll('#histFilterBar .hist-chip').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  
  window._histZoneFilter = zoneFilter;
  applyHistoryFilters();
}

function renderHistoryList(items) {
  const list = document.getElementById('histList');
  if (!list) return;
  
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_history')}</p></div>`;
    return;
  }
  
  const isAdmin = ['admin', 'scc', 'bcs'].includes(user.role);
  
  // Group by Zone вҶ’ Location
  const groups = {};
  items.forEach(item => {
    const zid = item.zone_id || 'no_zone';
    const loc = item.location_code || item.gondola_code || '?';
    const groupKey = `${zid}__${loc}`;
    if (!groups[groupKey]) {
      const z = (allZones || []).find(zz => zz.id == item.zone_id);
      groups[groupKey] = {
        zone_id: item.zone_id,
        zone_code: z?.code || '',
        zone_name: z ? (lang === 'lo' ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo)) : '',
        location_code: loc,
        items: []
      };
    }
    groups[groupKey].items.push(item);
  });
  
  // Sort groups by zone code вҶ’ location
  const sortedGroups = Object.values(groups).sort((a, b) => {
    if (a.zone_code !== b.zone_code) return (a.zone_code || '').localeCompare(b.zone_code || '');
    return (a.location_code || '').localeCompare(b.location_code || '');
  });
  
  list.innerHTML = sortedGroups.map(grp => {
    const groupHeader = `
      <div class="hist-group-header">
        <div class="hist-group-zone">
          <span class="hist-group-zone-code">${grp.zone_code || 'вҖ”'}</span>
          ${grp.zone_name ? `<span class="hist-group-zone-name">${grp.zone_name}</span>` : ''}
        </div>
        <div class="hist-group-loc">рҹ“Қ ${grp.location_code}</div>
        <div class="hist-group-count">${grp.items.length} ${T('items') || 'аёҠаёҙа№үаёҷ'}</div>
      </div>
    `;
    
    const rows = grp.items.map(item => {
      const p = item.products || {};
      const name = lang === 'lo' ? (p.name_lo || p.name_th || '?') : (p.name_th || p.name_lo || '?');
      const diff = item.diff || 0;
      const cls = isAdmin ? (diff === 0 ? 'match' : (diff > 0 ? 'diff-plus' : 'diff-minus')) : 'match';
      const diffText = isAdmin ? (diff === 0 ? 'вң“' : (diff > 0 ? `+${diff}` : `${diff}`)) : 'вң“';
      const diffCls = isAdmin ? (diff === 0 ? 'diff-match-text' : (diff > 0 ? 'diff-plus-text' : 'diff-minus-text')) : 'diff-match-text';
      
      const varLevel = (isAdmin && item.variance_level) ? `<span class="var-level var-level-${item.variance_level}">L${item.variance_level}</span>` : '';
      const mdBadge = item.is_markdown ? '<span class="md-badge" style="margin-left:4px;">MD</span>' : '';
      
      // Show time only (date in header makes it cleaner)
      const time = new Date(item.counted_at).toLocaleTimeString(lang === 'lo' ? 'lo-LA' : 'th-TH', {
        hour: '2-digit', minute: '2-digit'
      });
      
      return `
        <div class="history-item clickable ${cls}" onclick="openEditCount('${item.id}')">
          <div class="history-content">
            <div class="history-name">${name}${mdBadge}</div>
            <div class="history-meta">${p.barcode || ''} вҖў ${time} вҖў <span class="${diffCls}">${diffText}</span> ${varLevel}</div>
          </div>
          <div class="history-qty mono">${item.counted_qty}</div>
          <div style="color:var(--slate-400);font-size:14px;margin-left:4px;">вңҸпёҸ</div>
        </div>
      `;
    }).join('');
    
    return `<div class="hist-group" data-zone-id="${grp.zone_id || ''}">${groupHeader}${rows}</div>`;
  }).join('');
}

function adjustEditCount(delta) {
  const inp = document.getElementById('editCountInput');
  if (!inp) return;
  let v = parseInt(inp.value) || 0;
  inp.value = Math.max(0, v + delta);
}

async function saveEditCount() {
  const id = document.getElementById('editCountId').value;
  const newQty = parseInt(document.getElementById('editCountInput').value) || 0;
  const newNote = document.getElementById('editNoteInput').value.trim();
  const btn = document.getElementById('saveEditBtn');
  
  if (!id) return;
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span> ${T('saving')}`;
  
  const { error } = await sb.from('stock_counts').update({
    counted_qty: newQty,
    note: newNote || null,
    updated_at: new Date().toISOString()
  }).eq('id', id);
  
  if (error) {
    log('Update error:', error);
    showToast('Error: ' + error.message, 'error');
    btn.disabled = false;
    btn.innerHTML = T('save');
    return;
  }
  
  log('Count updated:', id, 'new qty:', newQty);
  showToast(T('updated'), 'success');
  closeModal();
  
  // Reload current page
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) goPage(activeTab.dataset.page);
  
  updateTbBadge();
}

function confirmDeleteCount() {
  const id = document.getElementById('editCountId').value;
  if (!id) return;
  
  if (confirm(T('delete_confirm'))) {
    deleteCount(id);
  }
}

async function deleteCount(id) {
  log('Deleting count:', id);
  
  const { error } = await sb.from('stock_counts').delete().eq('id', id);
  
  if (error) {
    log('Delete error:', error);
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  showToast(T('deleted'), 'success');
  closeModal();
  
  // Reload current page
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) goPage(activeTab.dataset.page);
  
  updateTbBadge();
}
