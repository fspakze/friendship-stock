function onPosFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  log('POS file selected:', file.name);
  showToast(T('importing'), '');
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      
      // аё«аёІ sheet аёҠаё·а№Ҳаёӯ Products
      const sheetName = wb.SheetNames.find(n => 
        n.toLowerCase().includes('product') || n.toLowerCase().includes('item')
      ) || wb.SheetNames[wb.SheetNames.length - 1]; // а№ҖаёӯаёІ sheet аёӘаёёаё”аё—а№үаёІаёў
      
      const ws = wb.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(ws, { defval: null });
      
      log('Parsed sheet:', sheetName, 'rows:', json.length);
      
      // Normalize column names
      const products = [];
      json.forEach(row => {
        const barcode = row['Barcode*'] || row['Barcode'] || row['barcode'] || row['BARCODE'];
        if (!barcode) return;
        
        const name_lo = row['Name LO*'] || row['Name LO'] || row['Product Name LO*'] || 
                        row['Product Name LO'] || row['name_lo'] || '';
        const name_th = row['Name TH'] || row['Name TH*'] || row['Product Name TH'] || 
                        row['Product Name TH*'] || row['name_th'] || '';
        
        if (!name_lo && !name_th) return;
        
        // Branch Code (optional - аё–а№үаёІа№„аёЎа№ҲаёЎаёө вҶ’ а№ғаёҠа№ү branch аёӮаёӯаёҮ user)
        const branchCode = row['Branch Code'] || row['Branch'] || row['branch_code'] || 
                           row['BRANCH'] || null;
        
        const product = {
          barcode: String(barcode).trim(),
          name_lo: name_lo || name_th || '',
          name_th: name_th || name_lo || '',
          unit_lo: row['Unit LO'] || row['unit_lo'] || 'аәӯаәұаәҷ',
          unit_th: row['Unit TH'] || row['unit_th'] || 'аёҠаёҙа№үаёҷ',
          pos_qty: parseInt(row['POS Qty*'] || row['POS Qty'] || row['pos_qty'] || 0) || 0,
          sell_price: parseFloat(row['Sell Price*'] || row['Sell Price (LAK)*'] || row['Sell Price'] || row['sell_price'] || 0) || 0,
          gondola_code: row['Gondola Code'] || row['gondola_code'] || null,
          is_markdown: row['Is Markdown'] === true || row['Is Markdown'] === 'TRUE' || row['Is Markdown'] === 'true',
          branch_code: branchCode ? String(branchCode).trim().toUpperCase() : null
        };
        
        if (product.barcode && (product.name_lo || product.name_th)) {
          products.push(product);
        }
      });
      
      if (!products.length) {
        showToast(T('no_products_found'), 'error');
        return;
      }
      
      log('Valid products:', products.length);
      _pendingImport = products;
      showImportPreview(products);
      
    } catch (err) {
      console.error('[FS] Import parse error:', err);
      showToast(T('file_invalid') + ': ' + err.message, 'error');
    }
  };
  
  reader.readAsArrayBuffer(file);
  // Reset input
  event.target.value = '';
}

// ==================== BRANCH CODE MATCHING (Shared) ====================
// а№ғаёҠа№ү scoring + penalty а№Җаёһаё·а№ҲаёӯаёҲаёұаё”аёҒаёІаёЈаёҒаёЈаё“аёө ambiguous (а№ҖаёҠа№Ҳаёҷ TRADING аёЎаёөа№ғаёҷ 2 аёӘаёІаёӮаёІ)
function matchBranchByCode(fileCode, allBranches) {
  if (!fileCode) return null;
  allBranches = allBranches || window._allBranchesCache || [];
  const fc = String(fileCode).toUpperCase().trim();
  
  // 1. Direct code match
  let match = allBranches.find(b => (b.code || '').toUpperCase() === fc);
  if (match) return match.id;
  
  // 2. Name match вҖ” аёҘаёІаё§ + а№„аё—аёў
  match = allBranches.find(b => {
    const nameLo = (b.name_lo || '').toUpperCase();
    const nameTh = (b.name_th || '').toUpperCase();
    return nameLo === fc || nameTh === fc;
  });
  if (match) return match.id;
  
  // 3. Token-based with SCORING
  const tokenize = (s) => {
    const upper = String(s || '').toUpperCase();
    const ascii = upper.replace(/[^\x20-\x7E]/g, ' ');
    return ascii.split(/[\s\-_]+/).filter(t => t.length >= 2);
  };
  
  const fcTokens = tokenize(fileCode);
  if (fcTokens.length === 0) return null;
  
  const scored = [];
  
  allBranches.forEach(b => {
    const candidates = `${b.code || ''} ${b.name_lo || ''} ${b.name_th || ''}`;
    const bTokens = tokenize(candidates);
    
    let score = 0;
    fcTokens.forEach(ft => {
      let best = 0;
      bTokens.forEach(bt => {
        if (bt === ft) {
          best = Math.max(best, 10);
        } else if (ft.length >= 4 && bt.length >= 4) {
          if (bt.startsWith(ft) && bt.length > ft.length) {
            best = Math.max(best, 3);
          } else if (ft.startsWith(bt) && ft.length > bt.length) {
            best = Math.max(best, 3);
          }
        }
      });
      score += best;
    });
    
    let penalty = 0;
    bTokens.forEach(bt => {
      if (bt.length >= 4) {
        const found = fcTokens.some(ft => 
          bt === ft || (ft.length >= 4 && (bt.startsWith(ft) || ft.startsWith(bt)))
        );
        if (!found) penalty += 2;
      }
    });
    
    const finalScore = score - penalty;
    if (finalScore > 0) {
      scored.push({ score: finalScore, branch: b });
    }
  });
  
  if (scored.length === 0) return null;
  
  scored.sort((a, b) => b.score - a.score);
  return scored[0].branch.id;
}

// ==================== BRANCH CODE MISMATCH CHECK ====================
function checkBranchCodeMismatch() {
  if (!_pendingImport) return;
  const isLao = lang === 'lo';
  const warnEl = document.getElementById('branchMismatchWarning');
  const sel = document.getElementById('importBranchDest');
  if (!warnEl || !sel) return;
  
  const destBranchId = parseInt(sel.value);
  const destBranchOption = sel.options[sel.selectedIndex];
  const destBranchText = destBranchOption?.text || '';
  
  // аё«аёІ branch code аёҲаёІаёҒ option text а№ҖаёҠа№Ҳаёҷ "FS-SUPERMART (SUPERMART)"
  const destBranchCodeMatch = destBranchText.match(/\(([^)]+)\)/);
  const destBranchCode = destBranchCodeMatch ? destBranchCodeMatch[1].replace(' вң“', '').trim() : '';
  
  // аё«аёІ branch codes а№ғаёҷ file
  const branchCodesInFile = [...new Set(
    _pendingImport.map(p => p.branch_code).filter(x => x)
  )];
  
  if (branchCodesInFile.length === 0) {
    warnEl.style.display = 'none';
    return;
  }
  
  // а№ғаёҠа№ү branches cache (аёЎаёөаё—аёұа№үаёҮаё«аёЎаё”) а№Җаёһаё·а№Ҳаёӯ match аё—аёөа№Ҳа№ҒаёЎа№Ҳаёҷаёўаёі
  const allBranches = window._allBranchesCache || [];
  
  // а№ҖаёҠа№Үаё„аё§а№ҲаёІа№Ғаё•а№ҲаёҘаё° Branch Code а№ғаёҷа№„аёҹаёҘа№Ң match аёҒаёұаёҡаёӘаёІаёӮаёІаёӣаёҘаёІаёўаё—аёІаёҮаё«аёЈаё·аёӯа№„аёЎа№Ҳ
  const matchingResults = branchCodesInFile.map(fileCode => ({
    fileCode,
    matchedBranchId: matchBranchByCode(fileCode, allBranches)
  }));
  
  const allMatchDest = matchingResults.every(r => r.matchedBranchId === destBranchId);
  const noMatchAtAll = matchingResults.every(r => r.matchedBranchId === null);
  
  if (allMatchDest) {
    // вң… аё—аёёаёҒ Branch Code а№ғаёҷа№„аёҹаёҘа№Ң match аёҒаёұаёҡаёӘаёІаёӮаёІаёӣаёҘаёІаёўаё—аёІаёҮ
    warnEl.style.display = 'block';
    warnEl.dataset.severity = 'match';
    warnEl.innerHTML = `
      <div style="background:var(--emerald-100);border-left:3px solid var(--emerald-500);padding:7px 9px;border-radius:6px;font-size:10px;color:var(--emerald-700);">
        вң… ${isLao 
          ? 'Branch Code а»ғаәҷа»„аәҹаәҘа»Ң аәҒаә»аәҮаәҒаәұаәҡаәӘаәІаәӮаәІаәӣаәІаәҚаә—аәІаәҮ' 
          : 'Branch Code а№ғаёҷа№„аёҹаёҘа№Ң аё•аёЈаёҮаёҒаёұаёҡаёӘаёІаёӮаёІаёӣаёҘаёІаёўаё—аёІаёҮ'}
      </div>
    `;
  } else if (noMatchAtAll) {
    // вҡ пёҸ Branch Code а№ғаёҷа№„аёҹаёҘа№Ңа№„аёЎа№Ҳаё•аёЈаёҮаёҒаёұаёҡаёӘаёІаёӮаёІа№„аё«аёҷа№ҖаёҘаёўа№ғаёҷаёЈаё°аёҡаёҡ
    warnEl.style.display = 'block';
    warnEl.dataset.severity = 'unknown';
    warnEl.innerHTML = `
      <div style="background:var(--amber-100);border-left:3px solid var(--amber-500);padding:9px 11px;border-radius:7px;color:#92400e;">
        <div style="font-size:11px;font-weight:800;margin-bottom:4px;">
          в„№пёҸ ${isLao ? 'аәҡа»Қа»ҲаәӘаәІаәЎаәІаә”аәҒаә§аә”аәӘаәӯаәҡ Branch Code' : 'а№„аёЎа№ҲаёӘаёІаёЎаёІаёЈаё–аё•аёЈаё§аёҲаёӘаёӯаёҡ Branch Code'}
        </div>
        <div style="font-size:10px;line-height:1.6;">
          ${isLao ? 'Branch Code а»ғаәҷа»„аәҹаәҘа»Ң' : 'Branch Code а№ғаёҷа№„аёҹаёҘа№Ң'}: <strong>${branchCodesInFile.join(', ')}</strong><br>
          ${isLao ? 'аәҡа»Қа»ҲаәҒаә»аәҮаәҒаәұаәҡаәӘаәІаәӮаәІа»ғаә”а»Ҷ а»ғаәҷаәҘаә°аәҡаә»аәҡ вҶ’ аәҲаә°а»ғаәҠа»үаәӘаәІаәӮаәІаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ' : 'а№„аёЎа№Ҳаё•аёЈаёҮаёҒаёұаёҡаёӘаёІаёӮаёІа№ғаё”а№Ҷ а№ғаёҷаёЈаё°аёҡаёҡ вҶ’ аёҲаё°а№ғаёҠа№үаёӘаёІаёӮаёІаё—аёөа№Ҳа№ҖаёҘаё·аёӯаёҒ'}
        </div>
      </div>
    `;
  } else {
    // вқҢ Branch Code а№ғаёҷа№„аёҹаёҘа№Ң match аёҒаёұаёҡаёӘаёІаёӮаёІаёӯаё·а№Ҳаёҷ (а№„аёЎа№Ҳа№ғаёҠа№ҲаёӘаёІаёӮаёІаёӣаёҘаёІаёўаё—аёІаёҮ)
    const wrongMatches = matchingResults.filter(r => r.matchedBranchId !== null && r.matchedBranchId !== destBranchId);
    const matchedBranchCodes = wrongMatches.map(r => {
      const b = allBranches.find(bb => bb.id === r.matchedBranchId);
      return `${r.fileCode} вҶ’ ${b?.code || '?'}`;
    });
    
    warnEl.style.display = 'block';
    warnEl.dataset.severity = 'mismatch';
    warnEl.innerHTML = `
      <div style="background:var(--rose-100);border:2px solid var(--rose-500);padding:9px 11px;border-radius:7px;color:#9f1239;">
        <div style="font-size:11px;font-weight:800;display:flex;align-items:center;gap:5px;margin-bottom:4px;">
          вҡ пёҸ ${isLao ? 'аәҒаә§аә”аәӘаәӯаәҡ: Branch Code аәҡа»Қа»ҲаәҒаә»аәҮаәҒаәұаәҷ!' : 'аё•аёЈаё§аёҲаёӘаёӯаёҡ: Branch Code а№„аёЎа№Ҳаё•аёЈаёҮаёҒаёұаёҷ!'}
        </div>
        <div style="font-size:10px;line-height:1.6;">
          вҖў ${isLao ? 'а»„аәҹаәҘа»ҢаәЎаәөаәӮа»Қа»үаәЎаә№аәҷаәӮаәӯаәҮаәӘаәІаәӮаәІ' : 'а№„аёҹаёҘа№ҢаёЎаёөаёӮа№үаёӯаёЎаё№аёҘаёӮаёӯаёҮаёӘаёІаёӮаёІ'}: <strong>${matchedBranchCodes.join(', ')}</strong><br>
          вҖў ${isLao ? 'аәӘаәІаәӮаәІаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ' : 'аёӘаёІаёӮаёІаё—аёөа№Ҳа№ҖаёҘаё·аёӯаёҒ'}: <strong>${destBranchCode}</strong><br>
          <span style="color:#7f1d1d;font-weight:700;">
            вҡ пёҸ ${isLao 
              ? 'аәҒаәІаәҷ Import аәӯаәІаә”а»Җаә®аәұаә”а»ғаә«а»үаәӮа»Қа»үаәЎаә№аәҷаәңаәҙаә”аәӘаәІаәӮаәІ!' 
              : 'аёҒаёІаёЈ Import аёӯаёІаёҲаё—аёіа№ғаё«а№үаёӮа№үаёӯаёЎаё№аёҘаёңаёҙаё”аёӘаёІаёӮаёІ!'}
          </span>
        </div>
        <div style="margin-top:7px;background:white;padding:6px 8px;border-radius:5px;font-size:9px;color:var(--slate-600);">
          рҹ’Ў ${isLao 
            ? 'аәҒаә§аә”аәӘаәӯаәҡ: 1) а»„аәҹаәҘа»Ң POS аә„аә·аәӮаәӯаәҮаәӘаәІаәӮаәІа»ғаә” 2) а»ҖаәҘаә·аәӯаәҒаәӘаәІаәӮаәІа»ғаә«а»үаәҒаә»аәҮаәҒаәұаәҷ' 
            : 'аё•аёЈаё§аёҲаёӘаёӯаёҡ: 1) а№„аёҹаёҘа№Ң POS а№Җаёӣа№ҮаёҷаёӮаёӯаёҮаёӘаёІаёӮаёІа№„аё«аёҷ 2) а№ҖаёҘаё·аёӯаёҒаёӘаёІаёӮаёІа№ғаё«а№үаё•аёЈаёҮаёҒаёұаёҷ'}
        </div>
      </div>
    `;
  }

// ==================== MULTI-BRANCH IMPORT ====================
function onMultiBranchToggle() {
  const cb = document.getElementById('multiBranchMode');
  const breakdown = document.getElementById('multiBranchBreakdown');
  const singleSection = document.getElementById('singleBranchSection');
  const warnEl = document.getElementById('branchMismatchWarning');
  if (!cb) return;
  
  const isLao = lang === 'lo';
  
  if (cb.checked) {
    // рҹҢҗ Multi-Branch Mode ON
    if (singleSection) singleSection.style.display = 'none';
    if (warnEl) warnEl.style.display = 'none';
    
    // аё„аёіаёҷаё§аё“аёӘаёЈаёёаёӣа№Ғаё•а№ҲаёҘаё°аёӘаёІаёӮаёІ
    const allBranches = window._allBranchesCache || [];
    const groupByBranch = {};
    let unknownCount = 0;
    
    _pendingImport.forEach(p => {
      const branchId = matchBranchByCode(p.branch_code, allBranches);
      if (branchId === null) {
        unknownCount++;
      } else {
        if (!groupByBranch[branchId]) {
          groupByBranch[branchId] = { count: 0, totalQty: 0, totalValue: 0 };
        }
        groupByBranch[branchId].count++;
        groupByBranch[branchId].totalQty += (p.pos_qty || 0);
        groupByBranch[branchId].totalValue += (p.pos_qty || 0) * (p.sell_price || 0);
      }
    });
    
    const fmt = new Intl.NumberFormat('th-TH');
    
    // Render breakdown
    let html = `
      <div style="font-size:11px;font-weight:800;color:var(--sky-700);margin-bottom:7px;">
        рҹ“Ҡ ${isLao ? 'аәҒаә°аәҲаәІаәҚаә•аәІаәЎаәӘаәІаәӮаәІ' : 'аёҒаёЈаё°аёҲаёІаёўаё•аёІаёЎаёӘаёІаёӮаёІ'}:
      </div>
    `;
    
    // Sort branches by count desc
    const sortedBranchIds = Object.keys(groupByBranch).sort((a, b) => 
      groupByBranch[b].count - groupByBranch[a].count
    );
    
    sortedBranchIds.forEach(bId => {
      const b = allBranches.find(x => x.id === parseInt(bId));
      if (!b) return;
      const stats = groupByBranch[bId];
      const displayName = isLao ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo);
      
      html += `
        <div style="display:flex;align-items:center;gap:7px;padding:5px 7px;margin-bottom:3px;background:var(--emerald-50);border-left:3px solid var(--emerald-500);border-radius:5px;font-size:10px;">
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;color:var(--slate-900);">${displayName}</div>
            <div style="font-size:9px;color:var(--slate-500);font-family:monospace;">${b.code}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-weight:800;color:var(--emerald-700);font-family:'Space Grotesk',monospace;">
              ${stats.count.toLocaleString()} ${isLao ? 'аәӘаәҙаәҷаә„а»үаәІ' : 'аёЈаёІаёўаёҒаёІаёЈ'}
            </div>
            <div style="font-size:9px;color:var(--slate-500);font-family:'Space Grotesk',monospace;">
              ${stats.totalQty.toLocaleString()} ${isLao ? 'аәҠаәҙа»үаәҷ' : 'аёҠаёҙа№үаёҷ'} вҖў вӮӯ${fmt.format(stats.totalValue)}
            </div>
          </div>
        </div>
      `;
    });
    
    if (unknownCount > 0) {
      const defaultBranchId = parseInt(document.getElementById('importBranchDest')?.value || branch?.id);
      const defaultBranch = allBranches.find(b => b.id === defaultBranchId);
      const defaultName = defaultBranch 
        ? (isLao ? (defaultBranch.name_lo || defaultBranch.name_th) : (defaultBranch.name_th || defaultBranch.name_lo)) 
        : '?';
      
      html += `
        <div style="background:var(--amber-100);border-left:3px solid var(--amber-500);border-radius:5px;padding:7px 9px;margin-top:5px;font-size:10px;color:#92400e;">
          вҡ пёҸ ${isLao 
            ? `${unknownCount.toLocaleString()} аәӘаәҙаәҷаә„а»үаәІ аәҡа»Қа»ҲаәЎаәө Branch Code аә«аәјаә· аәҡа»Қа»Ҳаә®аә№а»үаәҲаәұаәҒ вҶ’ аәҲаә°а»ғаәӘа»Ҳа»ғаәҷ <strong>${defaultName}</strong>` 
            : `${unknownCount.toLocaleString()} аёӘаёҙаёҷаё„а№үаёІ а№„аёЎа№ҲаёЎаёө Branch Code аё«аёЈаё·аёӯа№„аёЎа№ҲаёЈаё№а№үаёҲаёұаёҒ вҶ’ аёҲаё°а№ғаёӘа№Ҳа№ғаёҷ <strong>${defaultName}</strong>`}
        </div>
      `;
    }
    
    if (breakdown) {
      breakdown.style.display = 'block';
      breakdown.innerHTML = html;
    }
  } else {
    // рҹҸӘ Single Branch Mode
    if (singleSection) singleSection.style.display = 'block';
    if (breakdown) breakdown.style.display = 'none';
    // Re-check mismatch
    checkBranchCodeMismatch();
  }
}

// ==================== EXECUTE MULTI-BRANCH IMPORT ====================
async function executeMultiBranchImport() {
  const isLao = lang === 'lo';
  const snapName = document.getElementById('importSnapName')?.value.trim() || 'Multi-Branch Import';
  const defaultBranchId = parseInt(document.getElementById('importBranchDest')?.value || branch?.id || 1);
  
  // 1. аёҒаёҘаёёа№ҲаёЎаёӮа№үаёӯаёЎаё№аёҘаё•аёІаёЎаёӘаёІаёӮаёІ
  const allBranches = window._allBranchesCache || [];
  const branchGroups = {};
  let unknownItems = [];
  
  _pendingImport.forEach(p => {
    const matchedId = matchBranchByCode(p.branch_code, allBranches);
    const targetId = matchedId || defaultBranchId;
    
    if (!branchGroups[targetId]) branchGroups[targetId] = [];
    branchGroups[targetId].push(p);
    
    if (matchedId === null) unknownItems.push(p);
  });
  
  const branchIds = Object.keys(branchGroups).map(Number);
  const totalBranches = branchIds.length;
  const totalItems = _pendingImport.length;
  
  // Confirm
  const branchNames = branchIds.map(bId => {
    const b = allBranches.find(x => x.id === bId);
    const name = b ? (isLao ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo)) : '?';
    return `вҖў ${name}: ${branchGroups[bId].length.toLocaleString()} ${isLao ? 'аәӘаәҙаәҷаә„а»үаәІ' : 'аёЈаёІаёўаёҒаёІаёЈ'}`;
  }).join('\n');
  
  const confirmMsg = isLao
    ? `рҹҢҗ Import аә«аәјаәІаәҚаәӘаәІаәӮаәІ\n\nаәҘаә§аәЎ ${totalItems.toLocaleString()} аәӘаәҙаәҷаә„а»үаәІ а»ғаәҷ ${totalBranches} аәӘаәІаәӮаәІ:\n\n${branchNames}\n\nаә•а»үаәӯаәҮаәҒаәІаәҷаә”аәіа»Җаәҷаәөаәҷаә•а»Қа»Ҳаәҡа»Қ?`
    : `рҹҢҗ Import аё«аёҘаёІаёўаёӘаёІаёӮаёІ\n\nаёЈаё§аёЎ ${totalItems.toLocaleString()} аёӘаёҙаёҷаё„а№үаёІ а№ғаёҷ ${totalBranches} аёӘаёІаёӮаёІ:\n\n${branchNames}\n\nаё•а№үаёӯаёҮаёҒаёІаёЈаё”аёіа№Җаёҷаёҙаёҷаё•а№Ҳаёӯаё«аёЈаё·аёӯа№„аёЎа№Ҳ?`;
  
  if (!confirm(confirmMsg)) return;
  
  // Show progress modal
  closeModal();
  showModal(`
    <h3>рҹҢҗ ${isLao ? 'аәҒаәіаәҘаәұаәҮаәҷаәіа»ҖаәӮаә»а»үаәІ аә«аәјаәІаәҚаәӘаәІаәӮаәІ' : 'аёҒаёіаёҘаёұаёҮаёҷаёіа№ҖаёӮа№үаёІ аё«аёҘаёІаёўаёӘаёІаёӮаёІ'}</h3>
    <p style="font-size:11px;color:var(--slate-500);margin-bottom:11px;">
      ${totalItems.toLocaleString()} ${isLao ? 'аәӘаәҙаәҷаә„а»үаәІ' : 'аёЈаёІаёўаёҒаёІаёЈ'} Г— ${totalBranches} ${isLao ? 'аәӘаәІаәӮаәІ' : 'аёӘаёІаёӮаёІ'}
    </p>
    
    <!-- Progress Bar -->
    <div style="background:var(--slate-100);border-radius:8px;height:24px;overflow:hidden;margin-bottom:9px;position:relative;">
      <div id="mbProgressBar" style="background:linear-gradient(90deg,var(--sky-500),var(--violet-500));height:100%;width:0%;transition:width 0.3s;border-radius:8px;"></div>
      <div id="mbProgressText" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--slate-900);">0%</div>
    </div>
    
    <!-- Current branch status -->
    <div id="mbStatusText" style="font-size:11px;color:var(--slate-600);text-align:center;margin-bottom:9px;">
      ${isLao ? 'аәҒаәіаәҘаәұаәҮа»ҖаәҘаәөа»ҲаәЎ...' : 'аёҒаёіаёҘаёұаёҮа№ҖаёЈаёҙа№ҲаёЎ...'}
    </div>
    
    <!-- Per-Branch Progress List -->
    <div id="mbBranchList" style="max-height:280px;overflow-y:auto;background:var(--slate-50);border-radius:7px;padding:5px;"></div>
    
    <div id="mbErrDetail" style="background:var(--rose-100);color:var(--rose-500);padding:8px 11px;border-radius:7px;font-size:11px;display:none;margin-top:9px;"></div>
  `);
  
  // Initial render of branch list
  const renderBranchList = (statuses) => {
    const listEl = document.getElementById('mbBranchList');
    if (!listEl) return;
    let html = '';
    branchIds.forEach(bId => {
      const b = allBranches.find(x => x.id === bId);
      const name = b ? (isLao ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo)) : '?';
      const code = b?.code || '';
      const s = statuses[bId] || { status: 'pending', new: 0, updated: 0 };
      
      let icon = 'вҸі';
      let color = 'var(--slate-400)';
      let bg = 'white';
      if (s.status === 'running') { icon = 'вҸі'; color = 'var(--sky-600)'; bg = 'var(--sky-50)'; }
      else if (s.status === 'done') { icon = 'вң…'; color = 'var(--emerald-500)'; bg = 'var(--emerald-50)'; }
      else if (s.status === 'error') { icon = 'вқҢ'; color = 'var(--rose-500)'; bg = 'var(--rose-50)'; }
      
      html += `
        <div style="background:${bg};border-radius:5px;padding:5px 8px;margin-bottom:3px;display:flex;align-items:center;gap:7px;font-size:10px;">
          <span style="font-size:14px;flex-shrink:0;">${icon}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;color:${color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</div>
            <div style="font-size:9px;color:var(--slate-500);font-family:monospace;">${code}</div>
          </div>
          <div style="text-align:right;flex-shrink:0;font-size:9px;">
            <div style="font-family:'Space Grotesk',monospace;color:var(--slate-700);">
              ${branchGroups[bId].length.toLocaleString()} ${isLao ? 'аәӘаәҙаәҷаә„а»үаәІ' : 'аёЈаёІаёўаёҒаёІаёЈ'}
            </div>
            ${s.status === 'done' ? `<div style="color:var(--emerald-600);font-family:'Space Grotesk',monospace;">+${s.new || 0} / вҶ»${s.updated || 0}</div>` : ''}
          </div>
        </div>
      `;
    });
    listEl.innerHTML = html;
  };
  
  // Initialize statuses
  const statuses = {};
  branchIds.forEach(bId => { statuses[bId] = { status: 'pending', new: 0, updated: 0 }; });
  renderBranchList(statuses);
  
  // Process each branch
  const BATCH_SIZE = 500;
  let completedBranches = 0;
  const aggStats = { new: 0, updated: 0, errors: 0 };
  
  for (const bId of branchIds) {
    const products = branchGroups[bId];
    const b = allBranches.find(x => x.id === bId);
    const branchName = b ? (isLao ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo)) : '?';
    
    statuses[bId].status = 'running';
    renderBranchList(statuses);
    
    const statusEl = document.getElementById('mbStatusText');
    if (statusEl) {
      statusEl.textContent = `${completedBranches + 1}/${totalBranches}: ${branchName}`;
    }
    
    const numBatches = Math.ceil(products.length / BATCH_SIZE);
    let branchNew = 0, branchUpdated = 0, branchError = null;
    
    for (let i = 0; i < numBatches; i++) {
      const chunk = products.slice(i * BATCH_SIZE, (i + 1) * BATCH_SIZE);
      const isLastBatch = (i === numBatches - 1);
      
      try {
        const { data, error } = await sb.rpc('import_pos_products_batch', {
          p_branch_id: bId,
          p_user_id: user.id,
          p_products: chunk,
          p_is_last_batch: isLastBatch,
          p_snapshot_name: isLastBatch ? `${snapName} (${branchName})` : null,
          p_session_id: null,
          p_total_count: products.length
        });
        if (error) throw error;
        const r = data || {};
        branchNew += (r.new_products || 0);
        branchUpdated += (r.updated_products || 0);
      } catch (e) {
        console.error('[FS] Multi-branch import error:', branchName, e);
        branchError = e.message || String(e);
        break;
      }
    }
    
    if (branchError) {
      statuses[bId].status = 'error';
      aggStats.errors++;
    } else {
      statuses[bId].status = 'done';
      statuses[bId].new = branchNew;
      statuses[bId].updated = branchUpdated;
      aggStats.new += branchNew;
      aggStats.updated += branchUpdated;
    }
    
    completedBranches++;
    const pct = Math.round((completedBranches / totalBranches) * 100);
    const bar = document.getElementById('mbProgressBar');
    const txt = document.getElementById('mbProgressText');
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = pct + '%';
    renderBranchList(statuses);
  }
  
  // Final summary
  await new Promise(r => setTimeout(r, 500));
  closeModal();
  
  showModal(`
    <div style="text-align:center;margin-bottom:14px;">
      <div style="font-size:42px;">${aggStats.errors === 0 ? 'вң…' : 'вҡ пёҸ'}</div>
      <h3 style="color:${aggStats.errors === 0 ? 'var(--emerald-500)' : 'var(--amber-500)'};margin-top:5px;">
        ${aggStats.errors === 0 
          ? (isLao ? 'аәҷаәіа»ҖаәӮаә»а»үаәІаәӘаәіа»ҖаәҘаәұаә”' : 'аёҷаёіа№ҖаёӮа№үаёІаёӘаёіа№ҖаёЈа№ҮаёҲ')
          : (isLao ? 'аәҷаәіа»ҖаәӮаә»а»үаәІаәӘаәіа»ҖаәҘаәұаә”аәҡаәІаәҮаәӘа»Ҳаә§аәҷ' : 'аёҷаёіа№ҖаёӮа№үаёІаёӘаёіа№ҖаёЈа№ҮаёҲаёҡаёІаёҮаёӘа№Ҳаё§аёҷ')}
      </h3>
    </div>
    
    <div style="background:var(--slate-50);padding:13px;border-radius:11px;margin-bottom:11px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;text-align:center;">
        <div>
          <div style="font-size:9px;color:var(--slate-500);text-transform:uppercase;font-weight:700;">${isLao ? 'аәӘаәІаәӮаәІ' : 'аёӘаёІаёӮаёІ'}</div>
          <div style="font-size:22px;font-weight:800;color:var(--violet-600);font-family:'Space Grotesk',monospace;">${totalBranches}</div>
        </div>
        <div>
          <div style="font-size:9px;color:var(--slate-500);text-transform:uppercase;font-weight:700;">${isLao ? 'аәӘаәҙаәҷаә„а»үаәІ' : 'аёӘаёҙаёҷаё„а№үаёІ'}</div>
          <div style="font-size:22px;font-weight:800;color:var(--sky-600);font-family:'Space Grotesk',monospace;">${totalItems.toLocaleString()}</div>
        </div>
        <div>
          <div style="font-size:9px;color:var(--emerald-500);text-transform:uppercase;font-weight:700;">+ ${isLao ? 'а»ға»қа»Ҳ' : 'а№ғаё«аёЎа№Ҳ'}</div>
          <div style="font-size:18px;font-weight:800;color:var(--emerald-500);font-family:'Space Grotesk',monospace;">${aggStats.new.toLocaleString()}</div>
        </div>
        <div>
          <div style="font-size:9px;color:var(--sky-600);text-transform:uppercase;font-weight:700;">вҶ» ${isLao ? 'аәӣаәұаәҡаәӣаәёаәҮ' : 'аёӣаёЈаёұаёҡаёӣаёЈаёёаёҮ'}</div>
          <div style="font-size:18px;font-weight:800;color:var(--sky-600);font-family:'Space Grotesk',monospace;">${aggStats.updated.toLocaleString()}</div>
        </div>
      </div>
      ${aggStats.errors > 0 ? `
        <div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--slate-200);text-align:center;">
          <div style="color:var(--rose-500);font-size:11px;font-weight:700;">
            вқҢ ${isLao ? 'аәӘаәІаәӮаәІаә—аәөа»Ҳ аёңаәҙаә”аёһаёҘаёІаё”' : 'аёӘаёІаёӮаёІаё—аёөа№Ҳаёңаёҙаё”аёһаёҘаёІаё”'}: ${aggStats.errors}
          </div>
        </div>
      ` : ''}
    </div>
    
    <button class="btn btn-primary" onclick="closeModal()" style="width:100%;">${isLao ? 'аәӣаәҙаә”' : 'аёӣаёҙаё”'}</button>
  `);
  
  _pendingImport = null;
}

async function executeImport() {
  if (!_pendingImport || !_pendingImport.length) {
    showToast(T('no_products_found'), 'error');
    return;
  }
  
  // рҹҢҗ а№ҖаёҠа№Үаё„аё§а№ҲаёІа№Җаёӣа№Үаёҷ Multi-Branch Mode аё«аёЈаё·аёӯа№„аёЎа№Ҳ
  const multiBranchCb = document.getElementById('multiBranchMode');
  const isMultiBranch = multiBranchCb && multiBranchCb.checked;
  
  if (isMultiBranch) {
    return executeMultiBranchImport();
  }
  
  // ===== аё•а№ҲаёӯаёҲаёІаёҒаёҷаёөа№үаё„аё·аёӯ Single Branch (original logic) =====
  const snapName = document.getElementById('importSnapName').value.trim();
  const branchDestEl = document.getElementById('importBranchDest');
  const destBranchId = branchDestEl ? parseInt(branchDestEl.value) : (branch?.id || 1);
  const destBranchName = branchDestEl 
    ? branchDestEl.options[branchDestEl.selectedIndex]?.text 
    : (branch?.code || '?');
  
  // рҹӣЎпёҸ Branch Code Mismatch Guard
  const warnEl = document.getElementById('branchMismatchWarning');
  const hasMismatchWarning = warnEl && warnEl.dataset.severity === 'mismatch';
  if (hasMismatchWarning) {
    const isLao = lang === 'lo';
    const confirmed = confirm(isLao
      ? `вҡ пёҸ аә„аәіа»Җаә•аә·аәӯаәҷ!\n\nBranch Code а»ғаәҷа»„аәҹаәҘа»Ң аәҡа»Қа»ҲаәҒаә»аәҮаәҒаәұаәҡаәӘаәІаәӮаәІаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ\n\nаәҒаәІаәҷ Import аәҷаәөа»ү аәӯаәІаә”а»Җаә®аәұаә”а»ғаә«а»үаәӮа»Қа»үаәЎаә№аәҷ POS аәңаәҙаә”аәӘаәІаәӮаәІ!\n\nаә•а»үаәӯаәҮаәҒаәІаәҷаә”аәіа»Җаәҷаәөаәҷаә•а»Қа»Ҳаәҡа»Қ?`
      : `вҡ пёҸ аё„аёіа№Җаё•аё·аёӯаёҷ!\n\nBranch Code а№ғаёҷа№„аёҹаёҘа№Ң а№„аёЎа№Ҳаё•аёЈаёҮаёҒаёұаёҡаёӘаёІаёӮаёІаё—аёөа№Ҳа№ҖаёҘаё·аёӯаёҒ\n\nаёҒаёІаёЈ Import аёҷаёөа№ү аёӯаёІаёҲаё—аёіа№ғаё«а№үаёӮа№үаёӯаёЎаё№аёҘ POS аёңаёҙаё”аёӘаёІаёӮаёІ!\n\nаё•а№үаёӯаёҮаёҒаёІаёЈаё”аёіа№Җаёҷаёҙаёҷаё•а№Ҳаёӯаё«аёЈаё·аёӯа№„аёЎа№Ҳ?`);
    if (!confirmed) return;
  }
  
  const btn = document.getElementById('importBtn');
  const errEl = document.getElementById('importErr');
  
  btn.disabled = true;
  
  const total = _pendingImport.length;
  const BATCH_SIZE = 500;
  const totalBatches = Math.ceil(total / BATCH_SIZE);
  
  log('Executing import:', total, 'products to branch_id:', destBranchId, 'in', totalBatches, 'batches');
  
  // Replace modal content with progress UI
  closeModal();
  showModal(`
    <h3>${T('importing') || 'аёҒаёіаёҘаёұаёҮаёҷаёіа№ҖаёӮа№үаёІ...'}</h3>
    <p style="font-size:11px;color:var(--slate-500);margin-bottom:11px;">
      ${total.toLocaleString()} аёЈаёІаёўаёҒаёІаёЈ вҖ” а№Ғаёҡа№ҲаёҮ ${totalBatches} batch
    </p>
    
    <div style="background:var(--slate-100);border-radius:8px;height:24px;overflow:hidden;margin-bottom:9px;position:relative;">
      <div id="importProgressBar" style="background:linear-gradient(90deg,var(--teal-500),var(--teal-600));height:100%;width:0%;transition:width 0.3s;border-radius:8px;"></div>
      <div id="importProgressText" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--slate-900);">0%</div>
    </div>
    
    <div id="importStatusText" style="font-size:11px;color:var(--slate-600);text-align:center;margin-bottom:8px;">
      ${T('preparing') || 'а№Җаё•аёЈаёөаёўаёЎаёӮа№үаёӯаёЎаё№аёҘ...'}
    </div>
    
    <!-- Stats grid -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:9px;">
      <div style="background:var(--teal-100);padding:7px 5px;border-radius:7px;text-align:center;">
        <div style="font-size:9px;color:var(--teal-700);text-transform:uppercase;font-weight:700;">${T('products_new') || 'New'}</div>
        <div id="impNew" style="font-size:15px;font-weight:800;color:var(--teal-700);font-family:'Space Grotesk',monospace;">0</div>
      </div>
      <div style="background:var(--sky-100);padding:7px 5px;border-radius:7px;text-align:center;">
        <div style="font-size:9px;color:var(--sky-600);text-transform:uppercase;font-weight:700;">${T('products_updated') || 'Updated'}</div>
        <div id="impUpdated" style="font-size:15px;font-weight:800;color:var(--sky-600);font-family:'Space Grotesk',monospace;">0</div>
      </div>
      <div style="background:var(--amber-100);padding:7px 5px;border-radius:7px;text-align:center;">
        <div style="font-size:9px;color:#92400e;text-transform:uppercase;font-weight:700;">Batch</div>
        <div id="impBatch" style="font-size:15px;font-weight:800;color:#92400e;font-family:'Space Grotesk',monospace;">0/${totalBatches}</div>
      </div>
    </div>
    
    <div id="importErrDetail" style="background:var(--rose-100);color:var(--rose-500);padding:8px 11px;border-radius:7px;font-size:11px;display:none;"></div>
  `);
  
  // Helper: update progress UI
  const updateProgress = (batchIdx, stats, statusText) => {
    const pct = Math.round((batchIdx / totalBatches) * 100);
    const bar = document.getElementById('importProgressBar');
    const txt = document.getElementById('importProgressText');
    const stat = document.getElementById('importStatusText');
    const batch = document.getElementById('impBatch');
    const newEl = document.getElementById('impNew');
    const updEl = document.getElementById('impUpdated');
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = pct + '%';
    if (stat && statusText) stat.textContent = statusText;
    if (batch) batch.textContent = `${batchIdx}/${totalBatches}`;
    if (newEl) newEl.textContent = (stats.new_products || 0).toLocaleString();
    if (updEl) updEl.textContent = (stats.updated_products || 0).toLocaleString();
  };
  
  const aggStats = {
    total_processed: 0,
    new_products: 0,
    updated_products: 0,
    deactivated_products: 0,
    total_value: 0
  };
  
  try {
    // Loop аё—аёі batch аё—аёөаёҘаё°аёҠаёёаё”
    for (let i = 0; i < totalBatches; i++) {
      const start = i * BATCH_SIZE;
      const end = Math.min(start + BATCH_SIZE, total);
      const chunk = _pendingImport.slice(start, end);
      const isLast = (i === totalBatches - 1);
      
      updateProgress(i, aggStats, `Batch ${i + 1}/${totalBatches}: ${start.toLocaleString()}-${end.toLocaleString()}`);
      
      // аёӘа№ҲаёҮ batch аёҷаёөа№ү вҖ” а№„аёЎа№ҲаёӘа№ҲаёҮ snapshot_name аё–а№үаёІа№„аёЎа№Ҳа№ғаёҠа№Ҳ batch аёӘаёёаё”аё—а№үаёІаёў
      // (snapshot аёҲаё°аё–аё№аёҒаёҡаёұаёҷаё—аё¶аёҒа№ғаёҷ batch аёӘаёёаё”аё—а№үаёІаёўа№Җаё—а№ҲаёІаёҷаёұа№үаёҷ)
      const { data, error } = await sb.rpc('import_pos_products_batch', {
        p_branch_id: destBranchId,
        p_user_id: user.id,
        p_products: chunk,
        p_is_last_batch: isLast,
        p_snapshot_name: isLast ? snapName : null,
        p_session_id: session?.id || null,
        p_total_count: total
      });
      
      if (error) {
        // Retry аё„аёЈаёұа№үаёҮа№Җаё”аёөаёўаё§ аё–а№үаёІ fail
        log('Batch', i + 1, 'failed, retrying...', error.message);
        await new Promise(r => setTimeout(r, 1000));
        const { data: retryData, error: retryError } = await sb.rpc('import_pos_products_batch', {
          p_branch_id: destBranchId,
          p_user_id: user.id,
          p_products: chunk,
          p_is_last_batch: isLast,
          p_snapshot_name: isLast ? snapName : null,
          p_session_id: session?.id || null,
          p_total_count: total
        });
        if (retryError) throw retryError;
        const r = retryData || {};
        aggStats.total_processed += (r.total_processed || 0);
        aggStats.new_products += (r.new_products || 0);
        aggStats.updated_products += (r.updated_products || 0);
        aggStats.deactivated_products += (r.deactivated_products || 0);
        aggStats.total_value += (r.total_value || 0);
      } else {
        const r = data || {};
        aggStats.total_processed += (r.total_processed || 0);
        aggStats.new_products += (r.new_products || 0);
        aggStats.updated_products += (r.updated_products || 0);
        aggStats.deactivated_products += (r.deactivated_products || 0);
        aggStats.total_value += (r.total_value || 0);
      }
    }
    
    updateProgress(totalBatches, aggStats, 'а№ҖаёӘаёЈа№ҮаёҲаёӘаёҙа№үаёҷ!');
    
    // аёЈаёӯ 500ms а№ғаё«а№ү user а№Җаё«а№Үаёҷ 100%
    await new Promise(r => setTimeout(r, 500));
    
    closeModal();
    
    // Show success summary
    showModal(`
      <div style="text-align:center;margin-bottom:14px;">
        <div style="font-size:36px;">вң…</div>
        <div style="font-size:16px;font-weight:700;color:var(--emerald-500);margin-top:5px;">${T('import_success')}</div>
      </div>
      
      <div style="background:var(--emerald-100);padding:12px;border-radius:10px;">
        <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;font-weight:700;margin-bottom:9px;text-align:center;">${T('import_summary')}</div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">
          <div style="background:white;padding:9px;border-radius:7px;text-align:center;">
            <div style="font-size:20px;font-weight:700;color:var(--emerald-500);">${aggStats.total_processed.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--slate-600);">${T('products_total')}</div>
          </div>
          <div style="background:white;padding:9px;border-radius:7px;text-align:center;">
            <div style="font-size:20px;font-weight:700;color:var(--teal-700);">${aggStats.new_products.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--slate-600);">${T('products_new')}</div>
          </div>
          <div style="background:white;padding:9px;border-radius:7px;text-align:center;">
            <div style="font-size:20px;font-weight:700;color:var(--sky-600);">${aggStats.updated_products.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--slate-600);">${T('products_updated')}</div>
          </div>
          <div style="background:white;padding:9px;border-radius:7px;text-align:center;">
            <div style="font-size:20px;font-weight:700;color:var(--rose-500);">${aggStats.deactivated_products.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--slate-600);">${T('products_removed')}</div>
          </div>
        </div>
        
        <div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--slate-200);text-align:center;">
          <div style="font-size:9px;color:var(--slate-500);">Total Value</div>
          <div style="font-size:14px;font-weight:700;color:var(--slate-900);">вӮӯ ${(aggStats.total_value || 0).toLocaleString()}</div>
        </div>
      </div>
      
      <button class="btn btn-primary" onclick="closeModal();loadSettingsStats();" style="margin-top:12px;background:var(--emerald-500);">
        вң“ ${T('continue')}
      </button>
    `);
    
    _pendingImport = null;
    
  } catch (e) {
    console.error('[FS] Import error:', e);
    const errDetail = document.getElementById('importErrDetail');
    if (errDetail) {
      errDetail.textContent = 'Error: ' + (e.message || e);
      errDetail.style.display = 'block';
    } else {
      showToast('Import error: ' + (e.message || e), 'error');
    }
  }
}

  `);
}

async function previewVariance() {
  if (!session) {
    showToast('No active session', 'warning');
    return;
  }
  
  const l1pct = parseFloat(document.getElementById('vsL1Pct').value);
  const l1val = parseFloat(document.getElementById('vsL1Val').value);
  const l2pct = parseFloat(document.getElementById('vsL2Pct').value);
  const l2val = parseFloat(document.getElementById('vsL2Val').value);
  const l3pct = parseFloat(document.getElementById('vsL3Pct').value);
  const l3val = parseFloat(document.getElementById('vsL3Val').value);
  const method = document.getElementById('vsMethod').value;
  
  const { data, error } = await sb.rpc('preview_variance_change', {
    p_branch_id: branch.id,
    p_session_id: session.id,
    p_l1_pct: l1pct,
    p_l1_val: l1val,
    p_l2_pct: l2pct,
    p_l2_val: l2val,
    p_l3_pct: l3pct,
    p_l3_val: l3val,
    p_method: method
  });
  
  if (error) {
    showToast('Preview error: ' + error.message, 'error');
    return;
  }
  
  const cur = data?.current || {l1:0,l2:0,l3:0,l4:0};
  const prev = data?.preview || {l1:0,l2:0,l3:0,l4:0};
  const total = data?.total || 0;
  
  const previewEl = document.getElementById('vsPreview');
  const contentEl = document.getElementById('vsPreviewContent');
  
  const renderLevel = (lv, color, curVal, prevVal) => {
    const diff = prevVal - curVal;
    const diffText = diff === 0 ? 'вҖ“' : (diff > 0 ? `+${diff}` : `${diff}`);
    const diffColor = diff === 0 ? 'var(--slate-500)' : (diff > 0 ? 'var(--rose-500)' : 'var(--emerald-500)');
    return `
      <div style="display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.5);">
        <span style="background:var(--${color}-500);color:white;padding:1px 7px;border-radius:4px;font-weight:700;font-size:10px;">L${lv}</span>
        <span style="font-size:11px;font-weight:600;color:var(--slate-700);">${curVal}</span>
        <span style="font-size:11px;font-weight:700;color:var(--sky-600);">вҶ’ ${prevVal}</span>
        <span style="font-size:10px;font-weight:700;color:${diffColor};">${diffText}</span>
      </div>
    `;
  };
  
  contentEl.innerHTML = `
    <div style="font-size:10px;color:var(--slate-600);margin-bottom:5px;">Total ${total} counts</div>
    <div style="display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;font-size:9px;color:var(--slate-500);font-weight:700;text-transform:uppercase;padding-bottom:4px;">
      <span>Lv</span><span>аёӣаёұаёҲаёҲаёёаёҡаёұаёҷ</span><span>а№ғаё«аёЎа№Ҳ</span><span>О”</span>
    </div>
    ${renderLevel(1, 'emerald', cur.l1, prev.l1)}
    ${renderLevel(2, 'amber', cur.l2, prev.l2)}
    ${renderLevel(3, 'rose', cur.l3, prev.l3)}
    ${renderLevel(4, 'rose', cur.l4, prev.l4)}
  `;
  
  previewEl.style.display = 'block';
}

async function saveVarianceSettings() {
  const errEl = document.getElementById('vsErr');
  const btn = document.getElementById('vsSaveBtn');
  errEl.classList.remove('show');
  
  const l1pct = parseFloat(document.getElementById('vsL1Pct').value);
  const l1val = parseFloat(document.getElementById('vsL1Val').value);
  const l2pct = parseFloat(document.getElementById('vsL2Pct').value);
  const l2val = parseFloat(document.getElementById('vsL2Val').value);
  const l3pct = parseFloat(document.getElementById('vsL3Pct').value);
  const l3val = parseFloat(document.getElementById('vsL3Val').value);
  const method = document.getElementById('vsMethod').value;
  
  // Validation
  if (l1pct >= l2pct || l2pct >= l3pct) {
    errEl.textContent = '% аё•а№үаёӯаёҮа№ҖаёЈаёөаёўаёҮаёҘаёіаё”аёұаёҡ: L1 < L2 < L3';
    errEl.classList.add('show');
    return;
  }
  if (l1val >= l2val || l2val >= l3val) {
    errEl.textContent = 'аёЎаё№аёҘаё„а№ҲаёІ аё•а№үаёӯаёҮа№ҖаёЈаёөаёўаёҮаёҘаёіаё”аёұаёҡ: L1 < L2 < L3';
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span>`;
  
  try {
    // Upsert
    const { error } = await sb.from('variance_settings').upsert({
      branch_id: branch.id,
      l1_max_percent: l1pct,
      l1_max_value: l1val,
      l2_max_percent: l2pct,
      l2_max_value: l2val,
      l3_max_percent: l3pct,
      l3_max_value: l3val,
      use_percent_or_value: method,
      updated_by: user.id,
      updated_at: new Date().toISOString()
    }, { onConflict: 'branch_id' });
    
    if (error) throw error;
    
    log('Variance settings saved');
    
    // Auto-recalculate аё–а№үаёІаёЎаёө session
    if (session) {
      await sb.rpc('recalculate_variance_for_session', {
        p_session_id: session.id
      });
      log('Recalculated session counts');
    }
    
    showToast(`вң… ${T('settings_saved')}`, 'success');
    closeModal();
    
    // Reload dashboard if there
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) goPage(activeTab.dataset.page);
    
  } catch (e) {
    console.error('[FS] Variance save error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `рҹ’ҫ ${T('save_settings')}`;
  }
}

// ==================== EXPORT EXCEL (with ExcelJS - Full Formatting) ====================
const XL_COLORS = {
  teal: '0F766E', tealLight: 'CCFBF1',
  amber: 'F59E0B', amberLight: 'FEF3C7',
  rose: 'F43F5E', roseLight: 'FFE4E6',
  emerald: '10B981', emeraldLight: 'D1FAE5',
  violet: '7C3AED', violetLight: 'EDE9FE',
  sky: '0284C7', skyLight: 'E0F2FE',
  slate900: '0F172A', slate700: '334155', slate500: '64748B',
  slate200: 'E2E8F0', slate100: 'F1F5F9'
};

function xlStyleHeader(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 11, bold: true, color: { argb: 'FFFFFFFF' } };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
  cell.border = {
    left: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    right: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    top: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    bottom: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } }
  };
}

function xlStyleData(cell, opts = {}) {
  cell.font = { name: 'Calibri', size: opts.size || 10, bold: opts.bold || false, color: { argb: 'FF' + (opts.color || XL_COLORS.slate900) } };
  cell.alignment = { horizontal: opts.align || 'left', vertical: 'middle', wrapText: true };
  cell.border = {
    left: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    right: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    top: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    bottom: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } }
  };
  if (opts.fill) {
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[opts.fill] } };
  }
}

function xlStyleTitle(cell, color = 'teal', size = 18) {
  cell.font = { name: 'Calibri', size: size, bold: true, color: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'left', vertical: 'middle' };
}

function xlStyleSection(cell, color = 'violet') {
  cell.font = { name: 'Calibri', size: 12, bold: true, color: { argb: 'FFFFFFFF' } };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'left', vertical: 'middle', indent: 1 };
}

function xlStyleKpiValue(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 22, bold: true, color: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'center', vertical: 'middle' };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color + 'Light'] } };
}

function xlStyleKpiLabel(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 9, color: { argb: 'FF' + XL_COLORS.slate500 } };
  cell.alignment = { horizontal: 'center', vertical: 'middle' };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color + 'Light'] } };
}

async function exportToExcel(mode = 'full') {
  if (!session) {
    showToast(T('locked_session'), 'error');
    return;
  }
  
  if (typeof ExcelJS === 'undefined') {
    showToast('ExcelJS not loaded - please refresh page', 'error');
    return;
  }
  
  showToast(T('exporting'), '');
  log('Exporting Excel with formatting, mode:', mode);
  
  try {
    // Load all data
    const [countsRes, gondolaRes, expiryRes, newSkuRes] = await Promise.all([
      sb.from('stock_counts').select(`
        id, counted_at, count_role, location_code, gondola_code, zone_id,
        counted_qty, pos_qty_snapshot, diff, variance_level, workflow_status, note,
        products(barcode, name_th, name_lo, unit_th, unit_lo, sell_price),
        users(full_name, username)
      `).eq('session_id', session.id).order('counted_at', { ascending: false }),
      
      sb.from('v_gondola_progress').select('*').eq('session_id', session.id).order('location_code'),
      
      sb.from('expiry_damage_log').select(`
        *, products(barcode, name_th, name_lo, sell_price), users(full_name)
      `).eq('session_id', session.id).order('created_at', { ascending: false }),
      
      sb.from('new_sku_log').select(`
        *, users(full_name)
      `).eq('session_id', session.id).order('created_at', { ascending: false })
    ]);
    
  // Load variance settings а№Җаёһаё·а№Ҳаёӯа№ҒаёӘаё”аёҮ threshold а№ғаёҷ report
  let vsL1Pct = 2, vsL1Val = 30000, vsL2Pct = 5, vsL2Val = 100000, vsL3Pct = 10, vsL3Val = 300000;
  try {
    const { data: vs } = await sb.from('variance_settings')
      .select('*').eq('branch_id', branch?.id).maybeSingle();
    if (vs) {
      vsL1Pct = vs.l1_max_percent; vsL1Val = vs.l1_max_value;
      vsL2Pct = vs.l2_max_percent; vsL2Val = vs.l2_max_value;
      vsL3Pct = vs.l3_max_percent; vsL3Val = vs.l3_max_value;
    }
  } catch (e) { log('vs load skip:', e); }
  
  window._varianceThresholds = { vsL1Pct, vsL1Val, vsL2Pct, vsL2Val, vsL3Pct, vsL3Val };
  
  const counts = countsRes.data || [];
    const gondolas = gondolaRes.data || [];
    const expiries = expiryRes.data || [];
    const newSkus = newSkuRes.data || [];
    
    log('Loaded for export:', { counts: counts.length, gondolas: gondolas.length });
    
    // Create workbook
    const wb = new ExcelJS.Workbook();
    wb.creator = 'Friendship Stock System';
    wb.created = new Date();
    
    // ============ SHEET 1: SUMMARY ============
    if (mode === 'full') {
      buildSummarySheet(wb, counts, gondolas);
    }
    
    // ============ SHEET 2: COUNTS DETAIL ============
    if (mode === 'full' || mode === 'counts') {
      buildCountsSheet(wb, counts);
    }
    
    // ============ SHEET 3: VARIANCE ANALYSIS ============
    if (mode === 'full' || mode === 'variance') {
      buildVarianceSheet(wb, counts);
    }
    
    // ============ SHEET 4: GONDOLA PROGRESS ============
    if (mode === 'full') {
      buildGondolaSheet(wb, gondolas);
    }
    
    // ============ SHEET 5: COUNTER PERFORMANCE ============
    if (mode === 'full') {
      buildPerformanceSheet(wb, counts);
    }
    
    // ============ SHEET 6: TIEBREAKER LOG ============
    if (mode === 'full') {
      const { data: tbData } = await sb.from('v_needs_tiebreaker').select('*').eq('session_id', session.id);
      buildTiebreakerSheet(wb, tbData || []);
    }
    
    // ============ SHEET 7: EXPIRY & NEW SKU ============
    if (mode === 'full') {
      buildExpirySheet(wb, expiries, newSkus);
    }
    
    // Save
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    
    const dateStr = new Date().toISOString().slice(0, 10);
    const sessionLabel = (session.session_name || 'Session').replace(/[^a-zA-Z0-9-]/g, '_').substring(0, 30);
    const filename = `Stock-Count-Report-${sessionLabel}-${dateStr}.xlsx`;
    
    saveAs(blob, filename);
    
    showToast(`вң… ${T('export_success')}: ${filename}`, 'success');
    log('Export complete:', filename);
    
  } catch (e) {
    console.error('[FS] Export error:', e);
    showToast('Export error: ' + e.message, 'error');
  }
}

function buildSummarySheet(wb, counts, gondolas) {
  const ws = wb.addWorksheet('Summary', { views: [{ showGridLines: false }] });
  
  // Title
  ws.mergeCells('A1:H1');
  ws.getCell('A1').value = 'STOCK COUNT REPORT';
  xlStyleTitle(ws.getCell('A1'), 'teal', 22);
  ws.getRow(1).height = 32;
  
  ws.mergeCells('A2:H2');
  ws.getCell('A2').value = 'Friendship Supermart - Pakse, Laos';
  ws.getCell('A2').font = { name: 'Calibri', size: 12, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  // Metadata
  const meta = [
    ['Report Date:', new Date().toLocaleString('en-GB')],
    ['Session Name:', session.session_name || ''],
    ['Branch:', branch?.name_th || branch?.name_lo || 'PAKSE'],
    ['Reported By:', user.full_name || ''],
    ['Phase:', session.phase || 'active'],
  ];
  meta.forEach(([label, val], idx) => {
    const row = 4 + idx;
    ws.getCell(`A${row}`).value = label;
    ws.getCell(`A${row}`).font = { name: 'Calibri', size: 10, bold: true, color: { argb: 'FF' + XL_COLORS.slate700 } };
    ws.getCell(`A${row}`).alignment = { horizontal: 'right' };
    ws.mergeCells(`B${row}:D${row}`);
    ws.getCell(`B${row}`).value = val;
    ws.getCell(`B${row}`).font = { name: 'Calibri', size: 10, color: { argb: 'FF' + XL_COLORS.slate900 } };
  });
  
  // KPI Section
  ws.mergeCells('A10:H10');
  ws.getCell('A10').value = '  KEY PERFORMANCE INDICATORS';
  xlStyleSection(ws.getCell('A10'), 'teal');
  ws.getRow(10).height = 22;
  
  // Calculate KPIs
  const totalSkus = counts.length;
  const totalItems = counts.reduce((s, c) => s + (c.counted_qty || 0), 0);
  const l1Count = counts.filter(c => c.variance_level === 1).length;
  const accuracy = totalSkus > 0 ? (l1Count / totalSkus) : 0;
  let shrinkage = 0;
  counts.forEach(c => {
    if ((c.diff || 0) < 0) shrinkage += Math.abs(c.diff) * (c.products?.sell_price || 0);
  });
  
  // 4 KPI cards
  const kpis = [
    { label: 'Total SKUs Counted', value: totalSkus, color: 'teal', fmt: '#,##0' },
    { label: 'Total Items', value: totalItems, color: 'sky', fmt: '#,##0' },
    { label: 'Accuracy', value: accuracy, color: 'emerald', fmt: '0.0%' },
    { label: 'Shrinkage Value', value: shrinkage, color: 'rose', fmt: '#,##0" K"' },
  ];
  
  kpis.forEach((kpi, i) => {
    const startCol = i * 2 + 2; // B, D, F, H
    const colStart = String.fromCharCode(64 + startCol);
    const colEnd = String.fromCharCode(64 + startCol + 1);
    
    ws.mergeCells(`${colStart}12:${colEnd}12`);
    ws.getCell(`${colStart}12`).value = kpi.value;
    ws.getCell(`${colStart}12`).numFmt = kpi.fmt;
    xlStyleKpiValue(ws.getCell(`${colStart}12`), kpi.color);
    
    ws.mergeCells(`${colStart}13:${colEnd}13`);
    ws.getCell(`${colStart}13`).value = kpi.label;
    xlStyleKpiLabel(ws.getCell(`${colStart}13`), kpi.color);
  });
  
  ws.getRow(12).height = 42;
  ws.getRow(13).height = 20;
  
  // Variance Breakdown
  ws.mergeCells('A15:H15');
  ws.getCell('A15').value = '  VARIANCE BREAKDOWN';
  xlStyleSection(ws.getCell('A15'), 'amber');
  ws.getRow(15).height = 22;
  
  ['Level', 'Description', 'Count', '%', 'Action Required'].forEach((h, i) => {
    const cell = ws.getCell(17, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'slate500');
  });
  if (true) { ws.mergeCells('E17:H17'); }
  ws.getRow(17).height = 22;
  
  const vt = window._varianceThresholds || { vsL1Pct: 2, vsL1Val: 30000, vsL2Pct: 5, vsL2Val: 100000, vsL3Pct: 10, vsL3Val: 300000 };
  const fmtK = (v) => v >= 1000 ? `${v/1000}K` : `${v}`;
  
  const variances = [
    ['L1', `Auto Adjust (<${vt.vsL1Pct}% & <${fmtK(vt.vsL1Val)})`, counts.filter(c => c.variance_level === 1).length, 'emerald', 'Approve automatically'],
    ['L2', `Explain (${vt.vsL1Pct}-${vt.vsL2Pct}% or ${fmtK(vt.vsL1Val)}-${fmtK(vt.vsL2Val)})`, counts.filter(c => c.variance_level === 2).length, 'amber', 'Manager must add explanation'],
    ['L3', `Mandatory Recount (>${vt.vsL2Pct}% or >${fmtK(vt.vsL2Val)})`, counts.filter(c => c.variance_level === 3).length, 'rose', 'Re-count required'],
    ['L4', `Investigation (>${vt.vsL3Pct}% or >${fmtK(vt.vsL3Val)})`, counts.filter(c => c.variance_level === 4).length, 'rose', 'Escalate to investigation'],
  ];
  
  variances.forEach((v, idx) => {
    const r = 18 + idx;
    ws.getCell(`A${r}`).value = v[0];
    ws.getCell(`B${r}`).value = v[1];
    ws.getCell(`C${r}`).value = v[2];
    ws.getCell(`D${r}`).value = totalSkus > 0 ? v[2] / totalSkus : 0;
    ws.mergeCells(`E${r}:H${r}`);
    ws.getCell(`E${r}`).value = v[4];
    
    xlStyleData(ws.getCell(`A${r}`), { align: 'center', bold: true, color: v[3], fill: v[3] + 'Light', size: 11 });
    xlStyleData(ws.getCell(`B${r}`));
    xlStyleData(ws.getCell(`C${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`D${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`E${r}`));
    ws.getCell(`D${r}`).numFmt = '0.0%';
  });
  
  // Gondola Progress
  ws.mergeCells('A23:H23');
  ws.getCell('A23').value = '  GONDOLA PROGRESS';
  xlStyleSection(ws.getCell('A23'), 'violet');
  ws.getRow(23).height = 22;
  
  ['Status', 'Description', 'Count', '%'].forEach((h, i) => {
    const cell = ws.getCell(25, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'slate500');
  });
  ws.getRow(25).height = 22;
  
  const gondoTotal = gondolas.length;
  const gondoStats = [
    ['Completed', 'Done & Verified', gondolas.filter(g => g.status === 'completed').length, 'emerald'],
    ['In Progress', 'Counting/Verifying', gondolas.filter(g => ['counting', 'verifying', 'tiebreaker'].includes(g.status)).length, 'teal'],
    ['Waiting', 'Waiting for next step', gondolas.filter(g => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed'].includes(g.status)).length, 'amber'],
    ['Not Started', 'Closed/Not opened', gondolas.filter(g => ['closed', 'open_for_counting'].includes(g.status)).length, 'slate500'],
  ];
  
  gondoStats.forEach((g, idx) => {
    const r = 26 + idx;
    ws.getCell(`A${r}`).value = g[0];
    ws.getCell(`B${r}`).value = g[1];
    ws.getCell(`C${r}`).value = g[2];
    ws.getCell(`D${r}`).value = gondoTotal > 0 ? g[2] / gondoTotal : 0;
    
    const lightFill = g[3] === 'slate500' ? 'slate100' : g[3] + 'Light';
    xlStyleData(ws.getCell(`A${r}`), { align: 'center', bold: true, color: g[3], fill: lightFill, size: 11 });
    xlStyleData(ws.getCell(`B${r}`));
    xlStyleData(ws.getCell(`C${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`D${r}`), { align: 'center' });
    ws.getCell(`D${r}`).numFmt = '0.0%';
  });
  
  // Notes
  ws.getCell('A31').value = 'Notes:';
  ws.getCell('A31').font = { name: 'Calibri', size: 11, bold: true, color: { argb: 'FF' + XL_COLORS.slate700 } };
  ['вҖў L1 (Auto): Approved without action',
   'вҖў L2 (Explain): Manager adds note',
   'вҖў L3 (Recount): New count required',

function buildCountsSheet(wb, counts) {
  const ws = wb.addWorksheet('Counts Detail', { views: [{ showGridLines: false, state: 'frozen', ySplit: 3 }] });
  
  ws.mergeCells('A1:P1');
  ws.getCell('A1').value = 'STOCK COUNTS - DETAILED LIST';
  xlStyleTitle(ws.getCell('A1'), 'teal', 16);
  ws.getRow(1).height = 28;
  
  const headers = [
    'Count ID', 'Counted At', 'User', 'Role', 'Location', 'Zone', 'Barcode', 'Product Name',
    'Unit Price (K)', 'POS Qty', 'Counted Qty', 'Unit', 'Diff', 'Var Level', 'Workflow', 'Note'
  ];
  headers.forEach((h, i) => {
    const cell = ws.getCell(3, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'teal');
  });
  ws.getRow(3).height = 32;
  
  counts.forEach((c, idx) => {
    const r = 4 + idx;
    const p = c.products || {};
    const u = c.users || {};
    const name = (lang === 'lo' ? p.name_lo : p.name_th) || p.name_th || p.name_lo || '';
    
    const row = [
      c.id?.substring(0, 8) || '',
      c.counted_at ? new Date(c.counted_at).toLocaleString('en-GB') : '',
      u.full_name || u.username || '',
      c.count_role || '',
      c.location_code || c.gondola_code || '',
      c.zone_id || '',
      p.barcode || '',
      name,
      p.sell_price || 0,
      c.pos_qty_snapshot || 0,
      c.counted_qty || 0,
      p.unit_th || p.unit_lo || 'pcs',
      c.diff || 0,
      c.variance_level || '',
      c.workflow_status || '',
      c.note || ''
    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [4, 6, 12, 14, 15].includes(col) ? 'center' : ([9, 10, 11, 13].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });
    });
    
    // Number formats
    ws.getCell(r, 9).numFmt = '#,##0';
    ws.getCell(r, 10).numFmt = '#,##0';
    ws.getCell(r, 11).numFmt = '#,##0';
    ws.getCell(r, 13).numFmt = '#,##0;[Red](#,##0);"-"';
    
    // Color-code Diff
    const diff = c.diff || 0;
    if (diff < 0) ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
    else if (diff > 0) ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.amberLight } };
    else ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
    
    // Color-code Variance Level
    const lv = c.variance_level || 0;
    if (lv >= 3) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
    else if (lv === 2) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.amberLight } };
    else if (lv === 1) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
  });
  
  // Column widths
  const widths = [10, 18, 14, 11, 10, 7, 16, 32, 12, 9, 11, 8, 10, 11, 13, 28];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  // Auto filter
  if (counts.length > 0) {
    ws.autoFilter = { from: { row: 3, column: 1 }, to: { row: 3, column: 16 } };
  }
}

function buildVarianceSheet(wb, counts) {
  const ws = wb.addWorksheet('Variance Analysis', { views: [{ showGridLines: false, state: 'frozen', ySplit: 4 }] });
  
  ws.mergeCells('A1:K1');
  ws.getCell('A1').value = 'VARIANCE ANALYSIS - Items Requiring Attention';
  xlStyleTitle(ws.getCell('A1'), 'rose', 16);
  
  ws.mergeCells('A2:K2');
  ws.getCell('A2').value = 'Sorted by Variance Level (highest first) | Filter L3-L4 for critical items';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  const headers = ['Priority', 'Location', 'Barcode', 'Product Name', 'POS Qty', 'Counted Qty', 'Diff', 'Diff %', 'Value Impact (K)', 'Var Level', 'Action'];
  headers.forEach((h, i) => {
    const cell = ws.getCell(4, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'rose');
  });
  ws.getRow(4).height = 32;
  
  const sorted = [...counts].filter(c => (c.variance_level || 0) >= 2)
    .sort((a, b) => (b.variance_level || 0) - (a.variance_level || 0));
  
  sorted.forEach((c, idx) => {
    const r = 5 + idx;
    const p = c.products || {};
    const lv = c.variance_level || 1;
    const priority = lv === 4 ? 'рҹ”ҙ HIGH' : lv === 3 ? 'рҹҹ  MED' : 'рҹҹЎ LOW';
    const action = lv === 4 ? 'Investigate' : lv === 3 ? 'Recount' : 'Explain';
    const pctDiff = c.pos_qty_snapshot > 0 ? (c.diff || 0) / c.pos_qty_snapshot : 0;
    const valueImpact = (c.diff || 0) * (p.sell_price || 0);
    
    const row = [
      priority, c.location_code || c.gondola_code || '', p.barcode || '',
      (lang === 'lo' ? p.name_lo : p.name_th) || '',
      c.pos_qty_snapshot || 0, c.counted_qty || 0, c.diff || 0,
      pctDiff, valueImpact, lv, action
    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [1, 10].includes(col) ? 'center' : ([5, 6, 7, 8, 9].includes(col) ? 'right' : 'left');
      const fill = lv === 4 ? 'roseLight' : lv === 3 ? 'amberLight' : 'tealLight';
      xlStyleData(cell, { align, size: 9, fill: col === 1 ? fill : null });
    });
    
    ws.getCell(r, 7).numFmt = '#,##0;[Red](#,##0)';
    ws.getCell(r, 8).numFmt = '0.0%';
    ws.getCell(r, 9).numFmt = '#,##0" K"';
  });
  
  const widths = [10, 11, 16, 30, 9, 11, 10, 9, 14, 10, 28];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  if (sorted.length > 0) {
    ws.autoFilter = { from: { row: 4, column: 1 }, to: { row: 4, column: 11 } };
  }
}

function buildGondolaSheet(wb, gondolas) {
  const ws = wb.addWorksheet('Gondola Progress', { views: [{ showGridLines: false, state: 'frozen', ySplit: 7 }] });
  
  ws.mergeCells('A1:L1');
  ws.getCell('A1').value = 'GONDOLA WORKFLOW PROGRESS';
  xlStyleTitle(ws.getCell('A1'), 'violet', 16);
  
  ws.mergeCells('A2:L2');
  ws.getCell('A2').value = 'Status of each location being counted';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  // Stats
  const total = gondolas.length;
  const completed = gondolas.filter(g => g.status === 'completed').length;
  const inProgress = gondolas.filter(g => ['counting', 'verifying'].includes(g.status)).length;
  
  [

    valCell.font = { name: 'Calibri', size: 14, bold: true, color: { argb: 'FF' + XL_COLORS.violet } };
    valCell.alignment = { horizontal: 'center' };
  });
  
  const headers = ['Location', 'Type', 'Zone', 'Gondola #', 'Status', 'Counter', 'Counter Qty', 'Verifier', 'Verifier Qty', 'Time (min)', 'Opened', 'Completed'];
  headers.forEach((h, i) => {

      g.opened_at ? new Date(g.opened_at).toLocaleString('en-GB') : '',

    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;

      const align = [1, 2, 3, 4, 5, 10].includes(col) ? 'center' : ([7, 9].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });

    // Status color
    const statusFill = {
      'completed': 'emeraldLight',
      'counting': 'tealLight',

    }[g.status];

      ws.getCell(r, 5).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[statusFill] } };

function buildPerformanceSheet(wb, counts) {
  const ws = wb.addWorksheet('Counter Performance', { views: [{ showGridLines: false, state: 'frozen', ySplit: 4 }] });
  
  ws.mergeCells('A1:H1');
  ws.getCell('A1').value = 'COUNTER & VERIFIER PERFORMANCE';
  xlStyleTitle(ws.getCell('A1'), 'sky', 16);
  
  ws.mergeCells('A2:H2');
  ws.getCell('A2').value = 'Productivity & Accuracy by User';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  const headers = ['User', 'Role', 'SKUs Counted', 'Total Items', 'Locations', 'L1 Counts', 'Issues (L2-L4)', 'Accuracy %'];
  headers.forEach((h, i) => {
    const cell = ws.getCell(4, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'sky');
  });
  ws.getRow(4).height = 32;
  
  const perfMap = {};
  counts.forEach(c => {
    const u = c.users || {};
    const key = u.full_name || u.username || 'Unknown';
    if (!perfMap[key]) {
      perfMap[key] = { name: key, role: c.count_role, skus: 0, items: 0, locations: new Set(), l1: 0, issues: 0 };
    }
    perfMap[key].skus++;
    perfMap[key].items += c.counted_qty || 0;
    if (c.location_code || c.gondola_code) perfMap[key].locations.add(c.location_code || c.gondola_code);
    if (c.variance_level === 1) perfMap[key].l1++;
    if ((c.variance_level || 0) >= 2) perfMap[key].issues++;
  });
  
  Object.values(perfMap).forEach((p, idx) => {
    const r = 5 + idx;
    const accuracy = p.skus > 0 ? (p.l1 / p.skus) : 0;
    const row = [p.name, p.role, p.skus, p.items, p.locations.size, p.l1, p.issues, accuracy];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [2].includes(col) ? 'center' : ([3, 4, 5, 6, 7].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });
    });
    
    ws.getCell(r, 8).numFmt = '0.0%';
    // Color accuracy
    if (accuracy >= 0.95) ws.getCell(r, 8).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
    else if (accuracy < 0.90) ws.getCell(r, 8).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
  });
  
  const widths = [14, 11, 13, 12, 11, 11, 14, 12];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  if (Object.keys(perfMap).length > 0) {
    ws.autoFilter = { from: { row: 4, column: 1 }, to: { row: 4, column: 8 } };
  }
}

      <div class="fm-legend-item"><span class="fm-legend-box" style="background:var(--amber-500);"></span><span>${T('status_verifying')}</span></div>
      <div class="fm-legend-item"><span class="fm-legend-box" style="background:var(--rose-500);"></span><span>${T('status_tiebreaker_needed')}</span></div>
      <div class="fm-legend-item"><span class="fm-legend-box" style="background:var(--emerald-500);"></span><span>${T('completed_lo')}</span></div>
