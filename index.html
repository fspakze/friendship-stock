        const typeColor = (b.branch_type === 'hq' || b.branch_type === 'super') ? 'var(--amber-100)' :
                          (b.branch_type === 'warehouse') ? 'var(--violet-100)' : 'var(--sky-100)';
        const typeText = (b.branch_type === 'hq' || b.branch_type === 'super') ? (isLao ? 'ສາຂາຫຼັກ' : 'สาขาหลัก') :
                         (b.branch_type === 'warehouse') ? (isLao ? 'ຄັງສິນຄ້າ' : 'คลังสินค้า') : 'Mini Mart';
        return `
          <button 
            onclick="switchBranch(${b.id})" 
            ${isCurrent ? 'disabled' : ''}
            style="
              text-align:left;
              padding:11px 13px;
              border-radius:9px;
              border:2px solid ${isCurrent ? 'var(--emerald-500)' : 'var(--slate-200)'};
              background:${isCurrent ? 'var(--emerald-100)' : 'white'};
              cursor:${isCurrent ? 'default' : 'pointer'};
              transition:all 0.15s;
              display:flex;
              align-items:center;
              gap:11px;
              opacity:${isCurrent ? '0.7' : '1'};
            "
            ${!isCurrent ? `onmouseover="this.style.borderColor='var(--violet-500)';this.style.background='var(--violet-100)'" onmouseout="this.style.borderColor='var(--slate-200)';this.style.background='white'"` : ''}
          >
            <div style="font-size:24px;flex-shrink:0;">${typeIcon}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-weight:700;font-size:13px;color:var(--slate-900);">${displayName}</div>
              <div style="font-size:10px;color:var(--slate-500);font-family:monospace;margin-top:1px;">${b.code}</div>
            </div>
            <div style="background:${typeColor};padding:3px 8px;border-radius:5px;font-size:9px;font-weight:700;color:var(--slate-700);text-transform:uppercase;">
              ${typeText}
            </div>
            ${isCurrent ? `<div style="color:var(--emerald-500);font-size:18px;">✓</div>` : ''}
          </button>
        `;
      }).join('')}
    </div>
    
    <div class="action-row" style="margin-top:12px;">
      <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;">${T('cancel')}</button>
    </div>
  `);
}

async function switchBranch(newBranchId) {
  if (!user || !['admin', 'scc', 'bcs'].includes(user.role)) {
    showToast(lang === 'lo' ? 'ບໍ່ມີສິດ' : 'ไม่มีสิทธิ์', 'error');
    return;
  }
  
  try {
    // Load branch
    const { data: br, error } = await sb.from('branches').select('*').eq('id', newBranchId).maybeSingle();
    if (error) throw error;
    if (!br) {
      showToast(lang === 'lo' ? 'ບໍ່ພົບສາຂາ' : 'ไม่พบสาขา', 'error');
      return;
    }
    
    log('Switching branch:', branch?.code, '→', br.code);
    
    branch = br;
    user.active_branch_id = br.id;
    
    // Persist
    localStorage.setItem('fs_branch', JSON.stringify(branch));
    localStorage.setItem('fs_user', JSON.stringify(user));
    localStorage.setItem('fs_last_branch_id', String(branch.id));
    
    // Clear caches that are branch-specific
    window._productCache = null;
    
    closeModal();
    showToast('✅ ' + (lang === 'lo' ? `ປ່ຽນເປັນ ${br.name_lo || br.code}` : `เปลี่ยนเป็น ${br.name_th || br.code}`), 'success');
    
    // Re-render app (รีเฟรชหน้าทั้งหมด)
    document.getElementById('app').innerHTML = renderApp();
    
    // Re-enter current page
    const activeTab = document.querySelector('.tab.active');
    const currentPage = activeTab?.dataset.page || 'scan';
    setTimeout(() => goPage(currentPage), 50);
    
  } catch (e) {
    console.error('[FS] switchBranch error:', e);
    showToast('Error: ' + (e.message || e), 'error');
  }
}

function changeZone() {
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  showZoneStep();
}

// ==================== QUICK ZONE JUMP ====================
// แสดง Modal เลือกโซนรวดเร็ว ไม่ต้อง logout
async function openQuickZoneJump() {
  if (!allZones || allZones.length === 0) {
    showToast('No zones', 'error');
    return;
  }
  
  // คำนวณว่ามีคนนับไปกี่ชิ้นใน zone นี้แล้ว (ถ้ามี session)
  let countsByZone = {};
  if (session) {
    const { data } = await sb.from('stock_counts')
      .select('zone_id')
      .eq('session_id', session.id)
      .eq('user_id', user.id);
    (data || []).forEach(c => {
      if (c.zone_id) countsByZone[c.zone_id] = (countsByZone[c.zone_id] || 0) + 1;
    });
  }
  
  const zonesHtml = (allZones || []).map(z => {
    const zoneName = lang === 'lo' ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo);
    const isCurrent = zone && zone.id === z.id;
    const count = countsByZone[z.id] || 0;
    return `
      <button class="qzone-card ${isCurrent ? 'is-current' : ''}" onclick="selectQuickZone(${z.id})">
        <div class="qzone-code">${z.code}</div>
        <div class="qzone-name">${zoneName || ''}</div>
        ${count > 0 ? `<div class="qzone-count">${count} ${T('items') || 'ชิ้น'}</div>` : ''}
        ${isCurrent ? `<div class="qzone-current-badge">${T('current') || 'ปัจจุบัน'}</div>` : ''}
      </button>
    `;
  }).join('');
  
  showModal(`
    <h3>${T('jump_to_zone') || 'ไปยังโซน'}</h3>
    <p style="font-size:11px;color:var(--slate-500);margin-bottom:11px;">
      ${T('select_zone_to_jump') || 'เลือกโซนที่ต้องการไป'}
    </p>
    <div class="qzone-grid">
      ${zonesHtml}
    </div>
    <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel')}</button>
  `);
}

async function selectQuickZone(zoneId) {
  const z = (allZones || []).find(zz => zz.id == zoneId);
  if (!z) return;
  
  // If already on this zone, just close
  if (zone && zone.id === z.id) {
    closeModal();
    return;
  }
  
  // Clear location (since it belongs to old zone)
  zone = z;
  loc = null;
  
  // Update localStorage
  localStorage.setItem('fs_zone_loc', JSON.stringify({
    zone: zone.id,
    location: null
  }));
  
  closeModal();
  
  // Go to zone selection step to pick a new location
  showToast(`Zone: ${z.code}`, 'success');
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  showZoneStep();
  
  // Auto-select the zone we just picked
  setTimeout(() => {
    if (typeof selectZone === 'function') selectZone(z.id);
  }, 200);
}

// ==================== QUICK LOCATION PICKER (for no-zone branches) ====================
// สำหรับสาขาที่ปิด zones — ให้ Counter เลือก location ตรงจาก scan page
async function openQuickLocPicker(forceMode = false) {
  const isLao = lang === 'lo';
  
  if (!allLocations || allLocations.length === 0) {
    showToast(isLao ? 'ບໍ່ມີຕຳແໜ່ງ' : 'ไม่มีตำแหน่ง', 'warning');
    return;
  }
  
  // Group by Gondola number (same logic as Floor Map)
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return { 
      groupKey: numMatch[1], 
      groupLabel: `Gondola ${numMatch[1]}`,
      type: numMatch[2], 
      bay: parseInt(numMatch[3]) || 0 
    };
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      else if (prefix === 'D') label = 'Display';
      else if (prefix === 'C') label = 'Cashier';
      else if (prefix === 'R') label = 'Rack';
      return { groupKey: 'z' + prefix, groupLabel: label, type: prefix, bay: parseInt(letterMatch[2]) || 0 };
    }
    return { groupKey: 'zzz', groupLabel: '?', type: '?', bay: 0 };
  }
  
  // Group locations
  const groups = {};
  allLocations.forEach(l => {
    const p = parseCode(l.location_code);
    if (!groups[p.groupKey]) groups[p.groupKey] = { label: p.groupLabel, items: [] };
    groups[p.groupKey].items.push({ ...l, _parsed: p });
  });
  
  // Sort
  const sortedGroups = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
  sortedGroups.forEach(([_, g]) => {
    g.items.sort((a, b) => {
      if (a._parsed.type !== b._parsed.type) return a._parsed.type.localeCompare(b._parsed.type);
      return a._parsed.bay - b._parsed.bay;
    });
  });
  
  // Recent locations (last 5)
  const recentCodes = JSON.parse(localStorage.getItem('fs_loc_recent') || '[]');
  const recentLocs = recentCodes.slice(0, 5)
    .map(code => allLocations.find(l => l.location_code === code))
    .filter(Boolean);
  
  let html = `
    <h3 style="display:flex;align-items:center;gap:7px;">
      📍 ${forceMode 
        ? (isLao ? 'ກະລຸນາເລືອກ Gondola' : 'กรุณาเลือก Gondola') 
        : (isLao ? 'ເລືອກຕຳແໜ່ງ' : 'เลือกตำแหน่ง')}
    </h3>
    
    ${forceMode ? `
      <p style="font-size:11px;color:var(--violet-600);margin-bottom:9px;background:var(--violet-100);padding:7px 11px;border-radius:7px;border-left:3px solid var(--violet-500);">
        🎯 ${isLao 
          ? 'ເລືອກ Gondola ທີ່ຈະເຂົ້ານັບ/ສະແກນ — ທຸກສິນຄ້າທີ່ສະແກນຈະຜູກກັບ Gondola ນີ້' 
          : 'เลือก Gondola ที่จะเข้านับ/สแกน — ทุกสินค้าที่สแกนจะผูกกับ Gondola นี้'}
      </p>
    ` : ''}
    
    <!-- Search -->
    <div style="margin-bottom:9px;">
      <input type="text" id="quickLocSearch" 
             placeholder="🔍 ${isLao ? 'ຄົ້ນຫາ (ເຊັ່ນ: 01A01, W028)...' : 'ค้นหา (เช่น: 01A01, W028)...'}"
             oninput="filterQuickLocList(this.value)"
             autocomplete="off" autocapitalize="characters"
             style="width:100%;padding:9px 12px;border:2px solid var(--violet-300);border-radius:9px;font-size:13px;font-weight:600;font-family:'Space Grotesk',monospace;text-transform:uppercase;letter-spacing:1px;">
    </div>
  `;
  
  // Recent section
  if (recentLocs.length > 0) {
    html += `
      <div style="margin-bottom:11px;">
        <div style="font-size:10px;color:var(--slate-500);font-weight:700;text-transform:uppercase;margin-bottom:5px;">
          🕐 ${isLao ? 'ໃຊ້ລ່າສຸດ' : 'ใช้ล่าสุด'}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;">
          ${recentLocs.map(l => `
            <button onclick="selectQuickLoc('${l.location_code}')" 
                    style="background:var(--amber-100);color:var(--amber-500);border:1px solid var(--amber-300);border-radius:6px;padding:5px 11px;font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;cursor:pointer;">
              ${l.location_code}
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  // Groups
  html += `<div id="quickLocList" style="max-height:340px;overflow-y:auto;background:var(--slate-50);border-radius:9px;padding:7px;">`;
  
  sortedGroups.forEach(([_, group]) => {
    html += `
      <div style="margin-bottom:9px;">
        <div style="font-size:11px;color:var(--violet-600);font-weight:800;font-family:'Space Grotesk',monospace;padding:4px 7px;background:var(--violet-100);border-radius:5px;display:inline-block;margin-bottom:5px;">
          ${group.label} (${group.items.length})
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(80px, 1fr));gap:4px;">
    `;
    group.items.forEach(l => {
      const isCurrent = loc && loc.location_code === l.location_code;
      html += `
        <button onclick="selectQuickLoc('${l.location_code}')" 
                class="qloc-item" data-code="${l.location_code}"
                style="background:${isCurrent ? 'var(--violet-500)' : 'white'};color:${isCurrent ? 'white' : 'var(--slate-900)'};border:1px solid ${isCurrent ? 'var(--violet-500)' : 'var(--slate-200)'};border-radius:6px;padding:7px 5px;font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;cursor:pointer;text-align:center;">
          ${l.location_code}
        </button>
      `;
    });
    html += '</div></div>';
  });
  
  html += '</div>';
  
  // ใน force mode → ไม่มีปุ่ม cancel (ต้องเลือก) | normal → มี cancel
  if (!forceMode) {
    html += `<button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel')}</button>`;
  } else {
    html += `<div style="margin-top:11px;font-size:10px;color:var(--slate-500);text-align:center;font-style:italic;">
      💡 ${isLao ? 'ຕ້ອງເລືອກ Gondola ກ່ອນຈິ່ງສະແກນໄດ້' : 'ต้องเลือก Gondola ก่อนถึงสแกนได้'}
    </div>`;
  }
  
  showModal(html);
  
  setTimeout(() => {
    document.getElementById('quickLocSearch')?.focus();
  }, 100);
}

function filterQuickLocList(searchVal) {
  const search = (searchVal || '').toLowerCase().trim();
  const items = document.querySelectorAll('.qloc-item');
  items.forEach(it => {
    const code = (it.dataset.code || '').toLowerCase();
    it.style.display = code.includes(search) ? '' : 'none';
  });
  // Hide empty groups
  document.querySelectorAll('#quickLocList > div').forEach(group => {
    const visibleItems = group.querySelectorAll('.qloc-item:not([style*="display: none"])');
    group.style.display = visibleItems.length > 0 ? '' : 'none';
  });
}

function selectQuickLoc(locationCode) {
  const newLoc = allLocations.find(l => l.location_code === locationCode);
  if (!newLoc) return;
  
  loc = newLoc;
  
  // Save to recent (max 8)
  let recent = JSON.parse(localStorage.getItem('fs_loc_recent') || '[]');
  recent = [locationCode, ...recent.filter(c => c !== locationCode)].slice(0, 8);
  localStorage.setItem('fs_loc_recent', JSON.stringify(recent));
  
  // Save to fs_context
  const ctx = JSON.parse(localStorage.getItem('fs_context') || '{}');
  ctx.location = locationCode;
  localStorage.setItem('fs_context', JSON.stringify(ctx));
  
  closeModal();
  showToast(`📍 ${locationCode}`, 'success');
  
  // Re-render scan page to update the location badge
  if (typeof goPage === 'function') {
    const activeTab = document.querySelector('.tab.active');
    if (activeTab?.dataset.page === 'scan') {
      goPage('scan');
    }
  }
}

// ==================== SESSION ====================
async function ensureSession() {
  if (!branch) {
    log('ERROR: No branch for session');
    return null;
  }
  
  log('Ensuring session for branch:', branch.id);
  
  const { data: existing, error: selErr } = await sb
    .from('stock_sessions')
    .select('*')
    .eq('status', 'active')
    .eq('branch_id', branch.id)
    .order('started_at', { ascending: false })
    .limit(1)
    .maybeSingle();
  
  if (selErr) {
    log('Session select error:', selErr);
  }
  
  if (existing) {
    session = existing;
    log('Active session found:', session.id, session.session_name);
    return session;
  }
  
  // Create new session
  const now = new Date();
  const q = 'Q' + (Math.floor(now.getMonth()/3)+1) + '/' + now.getFullYear();
  const sessionName = `${q} - ${branch.name_lo || branch.name_th} ${now.toISOString().slice(0,10)}`;
  
  log('Creating new session:', sessionName);
  
  const { data: newS, error: insErr } = await sb
    .from('stock_sessions')
    .insert({
      session_name: sessionName,
      status: 'active',
      phase: 'counting',
      quarter: q,
      branch_id: branch.id,
      started_by: user.id
    })
    .select()
    .single();
  
  if (insErr) {
    log('Session create error:', insErr);
    showToast('Error creating session: ' + insErr.message, 'error');
    return null;
  }
  
  session = newS;
  log('New session created:', session.id);
  return session;
}

function goPage(page) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.page === page));
  const c = document.getElementById('appContent');
  if (!c) return;
  
  log('Going to page:', page);
  
  // Cleanup Quick Nav when leaving floormap or users
  if (page !== 'floormap' && page !== 'users' && typeof cleanupQuickNav === 'function') {
    cleanupQuickNav();
  }
  // Reset branch filter when leaving users
  if (page !== 'users') {
    _userBranchFilter = null;
  }
  
  if (page === 'scan') {
    c.innerHTML = renderScanPage();
    loadSessionStats();
  } else if (page === 'history') {
    c.innerHTML = renderHistoryPage();
    loadHistory();
  } else if (page === 'tiebreaker') {
    c.innerHTML = renderTiebreakerPage();
    loadTiebreakerList();
  } else if (page === 'dashboard') {
    c.innerHTML = renderDashboardPage();
    loadDashboard();
  } else if (page === 'kpi') {
    c.innerHTML = renderKPIPage();
    loadKPI();
  } else if (page === 'variance') {
    c.innerHTML = renderVariancePage();
    loadVarianceReport();
  } else if (page === 'users') {
    c.innerHTML = renderUsersPage();
    loadUsers();
  } else if (page === 'settings') {
    c.innerHTML = renderSettingsPage();
    loadSettingsStats();
  } else if (page === 'workflow') {
    c.innerHTML = renderWorkflowPage();
    loadWorkflowList();
  } else if (page === 'floormap') {
    c.innerHTML = renderFloorMapPage();
    loadFloorMap();
  }
  
  updateTbBadge();
}

// Detect ว่ารันใน PWA mode (Add to Home Screen / Installed) หรือเปล่า
function isPWAMode() {
  // iOS: standalone navigator property
  if (window.navigator.standalone === true) return true;
  // Android/Chrome: display-mode media query
  if (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) return true;
  if (window.matchMedia && window.matchMedia('(display-mode: fullscreen)').matches) return true;
  if (window.matchMedia && window.matchMedia('(display-mode: minimal-ui)').matches) return true;
  // Referrer android-app://
  if (document.referrer.startsWith('android-app://')) return true;
  return false;
}

// ขอ camera permission แบบ explicit ก่อน (ช่วย PWA mode บน iOS/Android)
// ส่งคืน { granted: true/false, error?: string }
async function requestCameraPermission() {
  log('[FS] Requesting camera permission, PWA mode:', isPWAMode());
  
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return { granted: false, error: 'mediaDevices_not_supported' };
  }
  
  try {
    // ขอ stream แบบ minimal เพื่อ trigger permission prompt
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "environment" },
      audio: false
    });
    
    // ปิด stream ทันที (เราแค่ต้องการ permission, scanner จะเปิดของตัวเอง)
    stream.getTracks().forEach(t => t.stop());
    
    log('[FS] Camera permission granted');
    return { granted: true };
  } catch (e) {
    console.error('[FS] Camera permission denied:', e?.name, e?.message);
    return { 
      granted: false, 
      error: e?.name || 'unknown',
      message: e?.message
    };
  }
}

function getScannerConfig() {
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) || 
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  const isAndroid = /Android/i.test(ua);
  
  // formats ที่จะอ่าน — ครอบคลุมบาร์โค้ดสินค้าทั่วไป
  const formats = (typeof Html5QrcodeSupportedFormats !== 'undefined') ? [
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.CODE_93,
    Html5QrcodeSupportedFormats.ITF,
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.DATA_MATRIX
  ] : undefined;
  
  // qrbox แบบ dynamic
  const qrboxFunc = (vw, vh) => {
    const minEdge = Math.min(vw, vh);
    const w = Math.floor(minEdge * 0.85);
    const h = Math.floor(w * 0.45);
    return { width: w, height: h };
  };
  
  // Resolution ที่ปลอดภัยต่อทุก device
  // Android หลายรุ่นไม่ support 1920x1080 ทำให้จอดำ — ใช้ 1280x720 max
  // ถอด min ออกเพื่อให้ browser เลือกความละเอียดที่ device ทำได้
  const videoConstraints = {
    facingMode: "environment",  // ไม่ใช้ ideal/exact — ใช้ string ตรงๆ ปลอดภัยกว่า
    width: { ideal: 1280 },
    height: { ideal: 720 }
  };
  
  return {
    fps: 10,                                        // ลง fps จาก 15→10 ปลอดภัยทุก device
    qrbox: qrboxFunc,
    aspectRatio: 1.333,
    disableFlip: false,
    formatsToSupport: formats,
    rememberLastUsedCamera: true,
    // BarcodeDetector API — เปิดให้ Android ใช้ (ทำงานเร็ว) ปิดให้ iOS (buggy)
    experimentalFeatures: {
      useBarCodeDetectorIfSupported: !isIOS
    },
    videoConstraints: videoConstraints
  };
}

// แก้ video element ให้ทำงานได้ทุก device (iOS + Android)
function fixVideoElement(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return;
  
  const applyFix = () => {
    const videos = container.querySelectorAll('video');
    videos.forEach(v => {
      // iOS ต้องการ playsinline ไม่งั้น fullscreen หรือไม่เล่น
      v.setAttribute('playsinline', 'true');
      v.setAttribute('webkit-playsinline', 'true');
      v.setAttribute('autoplay', 'true');
      v.setAttribute('muted', 'true');
      v.muted = true;
      v.playsInline = true;
      v.autoplay = true;
      
      // Style บังคับ
      v.style.objectFit = 'cover';
      v.style.width = '100%';
      v.style.height = '100%';
      v.style.background = '#000';
      
      // Force play (Android Chrome บางครั้งไม่ auto-play)
      if (v.paused || v.readyState < 2) {
        v.play().catch(err => {
          console.warn('[FS] video.play() failed:', err.message);
        });
      }
    });
  };
  
  // Apply หลายๆ ครั้งเพื่อ safety (Android Chrome render video element แบบ delayed)
  setTimeout(applyFix, 100);
  setTimeout(applyFix, 500);
  setTimeout(applyFix, 1200);
}

// Fallback start: ถ้า facingMode fail ลอง enumerate cameras แล้วเลือก back camera
async function tryStartScannerFallback(scannerInstance, containerId, onSuccess) {
  try {
    log('[FS] Falling back to camera enumeration');
    const devices = await Html5Qrcode.getCameras();
    log('[FS] Cameras found:', devices?.length || 0);
    
    if (!devices || devices.length === 0) {
      throw new Error('No cameras available');
    }
    
    // หา back camera (ลำดับชื่อบ่งบอก)
    let backCamera = devices.find(d => /back|rear|environment/i.test(d.label || ''));
    if (!backCamera) {
      // ถ้าไม่เจอจากชื่อ ใช้ตัวสุดท้าย (มักจะเป็น back camera)
      backCamera = devices[devices.length - 1];
    }
    log('[FS] Using camera:', backCamera.label, backCamera.id);
    
    const config = getScannerConfig();
    delete config.videoConstraints; // ใช้ device id ตรงๆ ไม่ต้องมี constraints
    
    await scannerInstance.start(
      backCamera.id,
      config,
      onSuccess,
      () => {}
    );
    
    fixVideoElement(containerId);
    return true;
  } catch (e) {
    console.error('[FS] Fallback also failed:', e);
    throw e;
  }
}

function getCameraErrorMessage(err) {
  const msg = (err?.message || err?.toString() || '').toLowerCase();
  const name = (err?.name || '').toLowerCase();
  
  // HTTPS required
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    return T('scan_https_required');
  }
  
  // Permission denied
  if (name.includes('notallowed') || name.includes('permission') || 
      msg.includes('permission') || msg.includes('denied') || msg.includes('notallowed')) {
    return T('scan_permission_denied');
  }
  
  // No camera found
  if (name.includes('notfound') || msg.includes('not found') || msg.includes('no camera') ||
      msg.includes('requested device not found')) {
    return T('scan_no_camera');
  }
  
  // Camera in use
  if (name.includes('notreadable') || name.includes('inuse') || 
      msg.includes('in use') || msg.includes('could not start')) {
    return T('scan_in_use');
  }
  
  // Not supported
  if (name.includes('notsupported') || msg.includes('not supported') || 
      msg.includes('mediadevices') || msg.includes('getusermedia')) {
    return T('scan_not_supported');
  }
  
  // Default
  return T('scan_error');
}

async function startScan() {
  // Helper: log ไป console เพื่อ debug (ถ้าต้องการดู เปิด DevTools)
  const scanLog = (msg, level = 'info') => {
    const prefix = { info: '·', warn: '⚠', error: '✗', ok: '✓' };
    console.log(`[FS Scan] ${prefix[level] || ''} ${msg}`);
  };
  
  scanLog('=== Scan started ===', 'ok');
  scanLog('UA: ' + navigator.userAgent.substring(0, 60));
  scanLog('PWA mode: ' + (isPWAMode() ? 'YES' : 'NO'));
  scanLog('Protocol: ' + location.protocol);
  scanLog('Html5Qrcode loaded: ' + (typeof Html5Qrcode !== 'undefined'));
  if (window._html5QrcodeLoadedFrom) {
    scanLog('CDN: ' + window._html5QrcodeLoadedFrom.substring(0, 50), 'ok');
  }
  
  document.getElementById('scanPlaceholder').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('startScanBtn').style.display = 'none';
  document.getElementById('stopScanBtn').style.display = 'flex';
  document.getElementById('scanFrame').classList.add('scanning');
  
  // ถ้า library ยังไม่โหลด รอ + retry สูงสุด 8 วินาที
  if (typeof Html5Qrcode === 'undefined') {
    scanLog('Library not loaded yet, waiting...', 'warn');
    let retries = 0;
    const maxRetries = 16; // 16 × 500ms = 8s
    while (typeof Html5Qrcode === 'undefined' && retries < maxRetries) {
      await new Promise(r => setTimeout(r, 500));
      retries++;
    }
    
    if (typeof Html5Qrcode === 'undefined') {
      scanLog('CRITICAL: Library failed to load from all CDNs!', 'error');
      showToast(T('scan_not_supported') || 'ไม่สามารถโหลดตัวสแกน กรุณาตรวจสอบเครือข่าย', 'error');
      stopScan();
      return;
    }
    scanLog('Library loaded after ' + (retries * 0.5) + 's', 'ok');
  }
  
  // เช็ค browser support
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    scanLog('mediaDevices.getUserMedia not available', 'error');
    showToast(T('scan_not_supported'), 'error');
    stopScan();
    return;
  }
  
  // เช็ค HTTPS
  if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
    scanLog('Not HTTPS - camera blocked', 'error');
    showToast(T('scan_https_required') || 'ต้องใช้ HTTPS', 'error');
    stopScan();
    return;
  }
  
  html5QrCode = new Html5Qrcode("reader", { verbose: false });
  scanLog('Html5Qrcode instance created');
  
  const onScanSuccess = (decoded) => { 
    scanLog('Scanned: ' + decoded, 'ok');
    beep();
    stopScan(); 
    lookupProduct(decoded); 
  };
  
  // วิธีที่ 1: facingMode + minimal config
  try {
    scanLog('Attempt 1: facingMode environment');
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 280, height: 160 } },
      onScanSuccess,
      () => {}
    );
    scanLog('SUCCESS (Attempt 1)', 'ok');
    fixVideoElement('reader');
    return;
  } catch (e1) {
    scanLog('Attempt 1 FAILED: ' + (e1?.name || '?') + ' - ' + (e1?.message || '?').substring(0, 80), 'warn');
    
    try { await html5QrCode.stop(); } catch(_) {}
    try { html5QrCode.clear(); } catch(_) {}
    html5QrCode = new Html5Qrcode("reader", { verbose: false });
    
    // วิธีที่ 2: enumerate cameras
    try {
      scanLog('Attempt 2: enumerating cameras');
      const devices = await Html5Qrcode.getCameras();
      scanLog('Cameras found: ' + (devices?.length || 0));
      
      if (!devices || devices.length === 0) {
        throw new Error('No cameras');
      }
      
      let cam = devices.find(d => /back|rear|environment/i.test(d.label || ''));
      if (!cam) cam = devices[devices.length - 1];
      scanLog('Using camera: ' + (cam.label || cam.id.substring(0, 20)));
      
      await html5QrCode.start(
        cam.id,
        { fps: 10, qrbox: { width: 280, height: 160 } },
        onScanSuccess,
        () => {}
      );
      scanLog('SUCCESS (Attempt 2)', 'ok');
      fixVideoElement('reader');
      return;
    } catch (e2) {
      scanLog('Attempt 2 FAILED: ' + (e2?.name || '?') + ' - ' + (e2?.message || '?').substring(0, 80), 'warn');
      
      try { await html5QrCode.stop(); } catch(_) {}
      try { html5QrCode.clear(); } catch(_) {}
      html5QrCode = new Html5Qrcode("reader", { verbose: false });
      
      // วิธีที่ 3: direct getUserMedia test + retry
      try {
        scanLog('Attempt 3: direct getUserMedia test');
        const testStream = await navigator.mediaDevices.getUserMedia({ 
          video: true, 
          audio: false 
        });
        testStream.getTracks().forEach(t => t.stop());
        await new Promise(r => setTimeout(r, 500));
        
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 280, height: 160 } },
          onScanSuccess,
          () => {}
        );
        scanLog('SUCCESS (Attempt 3)', 'ok');
        fixVideoElement('reader');
        return;
      } catch (e3) {
        scanLog('All attempts failed', 'error');
        console.error('[FS] e1:', e1);
        console.error('[FS] e2:', e2);
        console.error('[FS] e3:', e3);
        
        const errName = (e3?.name || '').toLowerCase();
        const isPermErr = errName.includes('notallowed') || 
                          (e3?.message || '').toLowerCase().includes('permission');
        
        if (isPermErr && isPWAMode()) {
          stopScan();
          showPWAPermissionHelp();
        } else {
          showToast(getCameraErrorMessage(e1), 'error');
          stopScan();
        }
      }
    }
  }
}

    </div>`;
  
  const mdWarning = p.is_markdown ? `<div class="md-badge">MD ${p.barcode.substring(0,3)}</div>` : '';
  const startValue = isAdmin ? (p.pos_qty || 0) : 0;
  
  document.getElementById('productCard').innerHTML = `
    <div class="product-card ${modeClass}">
      ${mdWarning}
      <div class="product-name">${name}</div>
      <div class="product-barcode">${p.barcode}</div>
      ${metaSection}
      
      <!-- Pan-O-Gram section (จะโหลดข้อมูล async) -->
      <div id="pogSection" style="margin-top:9px;"></div>
      
      <div class="count-section ${modeClass}">
        <div class="count-label">${labelText}</div>
        <div class="count-controls">
          <button class="count-btn" onclick="adjustCount(-1)">−</button>
          <input class="count-input mono" id="countInput" type="number" inputmode="numeric" value="${startValue}" min="0">
          <button class="count-btn" onclick="adjustCount(1)">+</button>
        </div>
      </div>
      <textarea class="note-input" id="noteInput" rows="2" placeholder="${T('note_placeholder')}"></textarea>
      <div class="action-row">
        <button class="btn btn-secondary" onclick="cancelCount()">${T('cancel')}</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveCount()">${T('save')}</button>
      </div>
    </div>
  `;
  setTimeout(() => {
    const inp = document.getElementById('countInput');
    if (inp) { inp.focus(); inp.select(); }
  }, 100);
  
  // Async: โหลดข้อมูล Pan-O-Gram ของสินค้านี้ที่ location ปัจจุบัน
  if (canEditPog && loc?.location_code) {
    loadPanOGramForProduct(p, loc.location_code);
  }
}

// ==================== PAN-O-GRAM ====================
// เก็บข้อมูล Pan-O-Gram ของ product ปัจจุบัน (cache ระหว่าง scan)
let _currentPog = null;

async function loadPanOGramForProduct(product, locationCode) {
  const sec = document.getElementById('pogSection');
  if (!sec) return;
  
  _currentPog = null;
  
  // โหลด Pan-O-Gram ทุกตำแหน่งของสินค้านี้ใน branch
  // ไม่ filter location เพราะอยากเห็นถ้ามีหลาย location
  const { data, error } = await sb
    .from('pan_o_grams')
    .select('*')
    .eq('branch_id', branch.id)
    .eq('barcode', product.barcode)
    .order('location_code')
    .order('shelf')
    .order('seq_in_shelf');
  
  if (error) {
    log('Load Pan-O-Gram error:', error);
    return;
  }
  
  const all = data || [];
  const atCurrent = all.filter(p => p.location_code === locationCode);
  const atOthers = all.filter(p => p.location_code !== locationCode);
  
  const isLao = lang === 'lo';
  
  let html = `
    <div style="background:linear-gradient(135deg,var(--violet-100),var(--sky-100));border:1px solid var(--violet-300);border-radius:10px;padding:9px 11px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
        <div style="font-size:11px;font-weight:700;color:var(--violet-600);display:flex;align-items:center;gap:5px;">
          📐 Pan-O-Gram
        </div>
        <button onclick="openPanOGramModal('${product.barcode}', '${locationCode}')" 
                style="background:var(--violet-500);color:white;border:none;border-radius:5px;padding:4px 9px;font-size:10px;font-weight:700;cursor:pointer;">
          ${atCurrent.length > 0 ? `+ ${isLao ? 'ເພີ່ມຕຳແໜ່ງ' : 'เพิ่มตำแหน่ง'}` : `+ ${isLao ? 'ສ້າງ' : 'สร้าง'}`}
        </button>
      </div>
  `;
  
  if (atCurrent.length === 0 && atOthers.length === 0) {
    html += `<div style="font-size:10px;color:var(--slate-500);font-style:italic;">
      ${isLao ? 'ຍັງບໍ່ມີຂໍ້ມູນ Pan-O-Gram ສຳລັບສິນຄ້ານີ້' : 'ยังไม่มีข้อมูล Pan-O-Gram สำหรับสินค้านี้'}
    </div>`;
  } else {
    // แสดงตำแหน่งใน location ปัจจุบัน
    if (atCurrent.length > 0) {
      html += `<div style="font-size:10px;color:var(--violet-600);font-weight:600;margin-bottom:4px;">
        ${isLao ? 'ໃນ' : 'ใน'} ${locationCode}:
      </div>`;
      atCurrent.forEach(pog => {
        html += renderPogChip(pog, true);
      });
    }
    
    // แสดงตำแหน่งใน location อื่นๆ (ถ้ามี)
    if (atOthers.length > 0) {
      html += `<div style="font-size:10px;color:var(--slate-500);font-weight:600;margin:7px 0 4px;">
        ${isLao ? 'ຢູ່ບ່ອນອື່ນ' : 'อยู่ที่อื่น'} (${atOthers.length}):
      </div>`;
      atOthers.forEach(pog => {
        html += renderPogChip(pog, false);
      });
    }
  }
  
  html += '</div>';
  sec.innerHTML = html;
  
  // Cache เพื่อใช้ใน save
  _currentPog = atCurrent[0] || null;
  
  // 🎯 Auto-open Pan-O-Gram modal เมื่อ:
  // 1. สินค้านี้ยังไม่มี PoG ที่ location ปัจจุบัน (atCurrent.length === 0)
  // 2. และยังไม่เคยปฏิเสธสำหรับสินค้านี้ใน session
  // 3. และผู้ใช้มีสิทธิ์ (canEditPog แล้วเช็คตอน caller)
  if (atCurrent.length === 0) {
    const skipKey = `pog_skip_${branch.id}_${product.barcode}_${locationCode}`;
    const recentlyDeclined = sessionStorage.getItem(skipKey);
    
    if (!recentlyDeclined) {
      // หน่วงเวลา 600ms ให้ render เสร็จก่อน + ผู้ใช้เห็น product card
      setTimeout(() => {
        // Double-check: ผู้ใช้ยังอยู่หน้านี้และ product ตัวเดิม
        if (curProduct && curProduct.barcode === product.barcode) {
          openPanOGramModal(product.barcode, locationCode);
        }
      }, 600);
    }
  }
}

function renderPogChip(pog, isCurrent) {
  const bgColor = isCurrent ? 'white' : 'var(--slate-50)';
  const borderColor = isCurrent ? 'var(--violet-500)' : 'var(--slate-300)';
  const isLao = lang === 'lo';
  return `
    <div onclick="openPanOGramModal('${pog.barcode}', '${pog.location_code}', ${pog.id})"
         style="background:${bgColor};border:1px solid ${borderColor};border-radius:7px;padding:6px 9px;margin-bottom:4px;cursor:pointer;display:flex;align-items:center;gap:8px;">
      <div style="font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;color:var(--slate-900);">
        ${pog.position_code}
      </div>
      <div style="flex:1;font-size:10px;color:var(--slate-600);">
        ${pog.facial}×${pog.depth}×${pog.stack} = <strong>${pog.total_qty}</strong>
        ${isCurrent ? `<button onclick="event.stopPropagation();usePogExpected(${pog.total_qty})" style="background:var(--emerald-500);color:white;border:none;border-radius:4px;padding:1px 6px;font-size:9px;font-weight:700;margin-left:5px;cursor:pointer;">${isLao ? 'ໃຊ້' : 'ใช้'} →</button>` : ''}
      </div>
      <div style="font-size:9px;color:var(--violet-500);">✏️</div>
    </div>
  `;
}

// Apply Pan-O-Gram expected quantity to count input
function usePogExpected(qty) {
  const inp = document.getElementById('countInput');
  if (inp) {
    inp.value = qty;
    inp.focus();
    inp.select();
    showToast(`✅ ${lang === 'lo' ? 'ໃຊ້ຄ່າ Pan-O-Gram' : 'ใช้ค่า Pan-O-Gram'}: ${qty}`, 'success');
  }
}

async function openPanOGramModal(barcode, locationCode, editId = null) {

  // ถ้า edit → โหลดข้อมูลเดิม

  if (isEdit) {
    const { data } = await sb.from('pan_o_grams').select('*').eq('id', editId).maybeSingle();
    existing = data;
  }
  
  // โหลด product info
  const { data: prod } = await sb
    .from('products').select('*')
    .eq('barcode', barcode).eq('branch_id', branch.id).maybeSingle();
  
  const prodName = prod ? (isLao ? (prod.name_lo || prod.name_th) : (prod.name_th || prod.name_lo)) : barcode;
  
  // โหลด PoGs ที่มีอยู่ใน location นี้ (เพื่อเสนอ next seq + cache total per shelf)
  const { data: existingAtLoc } = await sb
    .from('pan_o_grams').select('shelf, seq_in_shelf, total_in_shelf, barcode')
    .eq('branch_id', branch.id).eq('location_code', locationCode)
    .order('shelf').order('seq_in_shelf');
  
  // Cache total_in_shelf per shelf (สำหรับ auto-fill เมื่อเปลี่ยนชั้น)
  window._pogShelfTotalsCache = {};
  window._pogShelfBarcodesCache = {}; // เพื่อนับ next seq

    if (!window._pogShelfTotalsCache[p.shelf]) {
      window._pogShelfTotalsCache[p.shelf] = p.total_in_shelf;
    }
    if (!window._pogShelfBarcodesCache[p.shelf]) {
      window._pogShelfBarcodesCache[p.shelf] = [];

    window._pogShelfBarcodesCache[p.shelf].push(p.barcode);

  // Track ว่าผู้ใช้ได้แก้ "ทั้งหมด" เองหรือไม่
  // ถ้ายังไม่แก้ → auto-fill เมื่อเปลี่ยนชั้น

  window._pogTotalManuallyEdited = !!existing;
  window._pogIsEditMode = !!existing;
  
  // เสนอ default ตามข้อมูลเดิมหรือ next available
  const defaultShelf = existing?.shelf || (existingAtLoc?.length ? existingAtLoc[existingAtLoc.length - 1].shelf : 1);
  const defaultSeq = existing?.seq_in_shelf ||

      ${isEdit ? `<span style="background:var(--amber-500);color:white;padding:2px 7px;border-radius:4px;font-size:10px;">${isLao ? 'ແກ້ໄຂ' : 'แก้ไข'}</span>` : ''}
    </h3>
    
    <div style="background:var(--slate-50);padding:9px 11px;border-radius:8px;margin-bottom:11px;">
      <div style="font-size:11px;font-weight:700;color:var(--slate-900);">${prodName}</div>

        ${barcode} • Loc: <strong>${locationCode}</strong>

    </div>
    
    <div class="error-msg" id="pogErr"></div>
    
    <!-- Row 1: Shelf + Seq + Total -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px;">
      <div>
        <label style="font-size:10px;color:var(--slate-600);font-weight:700;display:block;margin-bottom:3px;">
          ${isLao ? 'ຊັ້ນ' : 'ชั้น'}
        </label>
        <input type="number" id="pogShelf" value="${defaultShelf}" min="1" max="20" step="1"
               oninput="onPogShelfChange(); updatePogCalc()"
               class="form-input" style="text-align:center;font-weight:700;font-size:16px;padding:8px;font-family:'Space Grotesk',monospace;">
      </div>
      <div>
        <label style="font-size:10px;color:var(--slate-600);font-weight:700;display:block;margin-bottom:3px;">
          ${isLao ? 'ລຳດັບ' : 'ลำดับ'}
        </label>
        <input type="number" id="pogSeq" value="${defaultSeq}" min="1" max="50" step="1"
               oninput="updatePogCalc()"
               class="form-input" style="text-align:center;font-weight:700;font-size:16px;padding:8px;font-family:'Space Grotesk',monospace;">
      </div>
      <div>
        <label style="font-size:10px;color:var(--slate-600);font-weight:700;display:block;margin-bottom:3px;">
          ${isLao ? 'ທັງໝົດ' : 'ทั้งหมด'}
        </label>
        <input type="number" id="pogTotal" value="${defaultTotal}" min="1" max="50" step="1"
               oninput="onPogTotalManualEdit(); updatePogCalc()"
               class="form-input" style="text-align:center;font-weight:700;font-size:16px;padding:8px;font-family:'Space Grotesk',monospace;">
      </div>
    </div>
    
    <!-- Position Code Preview -->
    <div style="background:linear-gradient(135deg,var(--violet-100),var(--sky-100));padding:9px 11px;border-radius:8px;margin-bottom:11px;text-align:center;">
      <div style="font-size:10px;color:var(--slate-600);font-weight:700;margin-bottom:2px;">${isLao ? 'ລະຫັດຕຳແໜ່ງ' : 'รหัสตำแหน่ง'}</div>
      <div id="pogPosCode" style="font-size:18px;font-weight:800;color:var(--violet-600);font-family:'Space Grotesk',monospace;letter-spacing:0.5px;">

    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:9px;">
      <div>

      </div>

        </label>
        <input type="number" id="pogStack" value="${existing?.stack || 1}" min="1" max="20" step="1"

               class="form-input" style="text-align:center;font-weight:700;font-size:16px;padding:8px;font-family:'Space Grotesk',monospace;">

    <div style="background:linear-gradient(135deg,var(--emerald-100),var(--teal-100));padding:11px;border-radius:9px;margin-bottom:11px;text-align:center;">

      <button class="btn btn-primary" id="pogSaveBtn" onclick="savePanOGram('${barcode}', '${locationCode}', ${editId || 'null'})" style="background:var(--violet-500);">

          ${isLao ? 'ບໍ່ສ້າງ Pan-O-Gram ສຳລັບສິນຄ້ານີ້' : 'ไม่สร้าง Pan-O-Gram สำหรับสินค้านี้'}

// Dismiss PoG modal — if "skipForSession" → remember not to auto-open again in this session
function dismissPogModal(barcode, locationCode, skipForSession) {
  if (skipForSession && branch && barcode && locationCode) {
    const skipKey = `pog_skip_${branch.id}_${barcode}_${locationCode}`;
    sessionStorage.setItem(skipKey, '1');
  }
  closeModal();
}

function updatePogCalc() {
  const shelf = parseInt(document.getElementById('pogShelf')?.value || 1);
  const seq = parseInt(document.getElementById('pogSeq')?.value || 1);
  const total = parseInt(document.getElementById('pogTotal')?.value || 1);
  const facial = parseInt(document.getElementById('pogFacial')?.value || 1);
  const depth = parseInt(document.getElementById('pogDepth')?.value || 1);
  const stack = parseInt(document.getElementById('pogStack')?.value || 1);
  
  const posCodeEl = document.getElementById('pogPosCode');
  const totalQtyEl = document.getElementById('pogTotalQty');
  const formulaEl = document.getElementById('pogFormula');
  
  // ดึง location code จาก position code ปัจจุบัน
  if (posCodeEl) {
    const parts = posCodeEl.textContent.split('-');
    const locCode = parts[0];
    posCodeEl.textContent = `${locCode}-${shelf}-${seq}-${total}`;
  }
  
  const totalQty = facial * depth * stack;
  if (totalQtyEl) totalQtyEl.textContent = totalQty;
  if (formulaEl) formulaEl.textContent = `${facial} × ${depth} × ${stack}`;
}

// เมื่อผู้ใช้แก้ "ทั้งหมด" เอง → flag ไว้ ห้าม auto-fill ทับ
function onPogTotalManualEdit() {
  window._pogTotalManuallyEdited = true;
}

// เมื่อผู้ใช้เปลี่ยน "ชั้น" → ถ้ายังไม่ได้แก้ "ทั้งหมด" เอง → auto-fill จาก cache
function onPogShelfChange() {
  const shelfEl = document.getElementById('pogShelf');
  const totalEl = document.getElementById('pogTotal');
  const seqEl = document.getElementById('pogSeq');
  if (!shelfEl || !totalEl) return;
  
  const newShelf = parseInt(shelfEl.value || 1);
  const cache = window._pogShelfTotalsCache || {};
  const seqCache = window._pogShelfBarcodesCache || {};
  
  // Auto-fill total เฉพาะเมื่อยังไม่ได้แก้ไขเอง
  if (!window._pogTotalManuallyEdited && cache[newShelf]) {
    totalEl.value = cache[newShelf];
    // Visual feedback: highlight ช่วงสั้นๆ
    totalEl.style.transition = 'background 0.4s';
    totalEl.style.background = 'var(--emerald-100)';
    setTimeout(() => { totalEl.style.background = ''; }, 600);
  }
  
  // Auto-suggest seq เป็น next available ของชั้นนี้ (เฉพาะ create mode)
  if (seqEl && !window._pogIsEditMode) {
    const existingInShelf = (seqCache[newShelf] || []).length;
    seqEl.value = existingInShelf + 1;
  }
}

async function savePanOGram(barcode, locationCode, editId) {
  const isLao = lang === 'lo';
  const errEl = document.getElementById('pogErr');
  const btn = document.getElementById('pogSaveBtn');
  
  const shelf = parseInt(document.getElementById('pogShelf').value);
  const seq = parseInt(document.getElementById('pogSeq').value);
  const total = parseInt(document.getElementById('pogTotal').value);
  const facial = parseInt(document.getElementById('pogFacial').value);
  const depth = parseInt(document.getElementById('pogDepth').value);
  const stack = parseInt(document.getElementById('pogStack').value);
  const notes = document.getElementById('pogNotes').value.trim();
  
  // Validation
  if (!shelf || !seq || !total || !facial || !depth || !stack) {
    errEl.textContent = isLao ? 'ກະລຸນາໃສ່ຄ່າທຸກຊ່ອງ' : 'กรุณาใส่ค่าทุกช่อง';
    errEl.classList.add('show');
    return;
  }
  if (seq > total) {
    errEl.textContent = isLao 
      ? `ລຳດັບ (${seq}) ບໍ່ສາມາດເກີນທັງໝົດ (${total})` 
      : `ลำดับ (${seq}) ห้ามเกินทั้งหมด (${total})`;
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  
  try {
    // Look up product_id
    const { data: prod } = await sb
      .from('products').select('id')
      .eq('barcode', barcode).eq('branch_id', branch.id).maybeSingle();
    
    const payload = {
      branch_id: branch.id,
      product_id: prod?.id || null,
      barcode: barcode,
      location_code: locationCode,
      shelf, seq_in_shelf: seq, total_in_shelf: total,
      facial, depth, stack,
      notes: notes || null,
      created_by: user.id,
      updated_at: new Date().toISOString()
    };
    
    if (editId) {
      // UPDATE
      const { error } = await sb.from('pan_o_grams').update(payload).eq('id', editId);
      if (error) throw error;
      showToast(isLao ? '✅ ບັນທຶກສຳເລັດ' : '✅ บันทึกสำเร็จ', 'success');
    } else {
      // เช็คว่ามีตำแหน่งนี้อยู่แล้วหรือไม่ (สินค้าใดก็ตาม)
      const { data: existing } = await sb
        .from('pan_o_grams').select('id, barcode')
        .eq('branch_id', branch.id)
        .eq('location_code', locationCode)
        .eq('shelf', shelf)
        .eq('seq_in_shelf', seq)
        .maybeSingle();
      
      if (existing) {
        // ตำแหน่งนี้มีคนใช้แล้ว
        if (existing.barcode === barcode) {
          // สินค้าเดียวกัน → ถามว่าจะ update หรือไม่
          const confirmMsg = isLao 
            ? `ສິນຄ້ານີ້ມີຢູ່ໃນຕຳແໜ່ງນີ້ແລ້ວ — ຕ້ອງການອັບເດດບໍ?`
            : `สินค้านี้มีในตำแหน่งนี้แล้ว — ต้องการอัปเดตหรือไม่?`;
          if (!confirm(confirmMsg)) {
            btn.disabled = false;
            return;
          }
          const { error } = await sb.from('pan_o_grams').update(payload).eq('id', existing.id);
          if (error) throw error;
          showToast(isLao ? '✅ ອັບເດດແລ້ວ' : '✅ อัปเดตแล้ว', 'success');
        } else {
          // สินค้าอื่นใช้ตำแหน่งนี้อยู่
          errEl.textContent = isLao 
            ? `ຕຳແໜ່ງນີ້ມີ ${existing.barcode} ໃຊ້ຢູ່ແລ້ວ` 
            : `ตำแหน่งนี้มี ${existing.barcode} ใช้อยู่แล้ว`;
          errEl.classList.add('show');
          btn.disabled = false;
          return;
        }
      } else {
        // INSERT ใหม่
        payload.created_at = new Date().toISOString();
        const { error } = await sb.from('pan_o_grams').insert(payload);
        if (error) throw error;
        showToast(isLao ? '✅ ສ້າງສຳເລັດ' : '✅ สร้างสำเร็จ', 'success');
      }
    }
    
    closeModal();
    // Refresh Pan-O-Gram section
    if (curProduct) {
      loadPanOGramForProduct(curProduct, locationCode);
    }
  } catch (e) {
    console.error('[FS] savePanOGram error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
  }
}

async function deletePanOGram(id) {
  const isLao = lang === 'lo';
  if (!confirm(isLao ? 'ລົບ Pan-O-Gram ນີ້?' : 'ลบ Pan-O-Gram นี้?')) return;
  
  try {
    const { error } = await sb.from('pan_o_grams').delete().eq('id', id);
    if (error) throw error;
    showToast(isLao ? '🗑️ ລົບແລ້ວ' : '🗑️ ลบแล้ว', 'success');
    closeModal();
    if (curProduct) loadPanOGramForProduct(curProduct, loc?.location_code);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

    .from('pan_o_grams')
    .select('*, products(name_th, name_lo, unit_th, unit_lo, sell_price)')

function renderPogVisualLayout(items) {
  const isLao = lang === 'lo';
  if (items.length === 0) {
    return `<div style="text-align:center;padding:25px;color:var(--slate-400);font-size:11px;">
      ${isLao ? 'ບໍ່ພົບ' : 'ไม่พบ'}
    </div>`;
  }
  
  // Group by location
  const byLoc = {};
  items.forEach(p => {
    if (!byLoc[p.location_code]) byLoc[p.location_code] = [];
    byLoc[p.location_code].push(p);
  });
  
  const locCodes = Object.keys(byLoc).sort();
  
  // Helper: render one location
  const renderOneLocation = (locCode, locItems) => {
    // Group by shelf
    const byShelf = {};
    locItems.forEach(p => {
      if (!byShelf[p.shelf]) byShelf[p.shelf] = [];
      byShelf[p.shelf].push(p);
    });
    
    // Sort shelves ASCENDING (shelf 1 = top, shelf 2 = below, ...)
    // ตามความเป็นจริงของชั้นวาง: ชั้น 1 อยู่บน
    const sortedShelves = Object.keys(byShelf).sort((a, b) => parseInt(a) - parseInt(b));
    const locTotalQty = locItems.reduce((s, p) => s + (p.total_qty || 0), 0);
    
    let html = `
      <div style="margin-bottom:11px;text-align:center;background:linear-gradient(135deg,var(--violet-100),var(--sky-100));padding:8px;border-radius:9px;">
        <div style="font-size:10px;color:var(--slate-600);font-weight:700;">${isLao ? 'ມຸມມອງຊັ້ນວາງ' : 'มุมมองชั้นวาง'}</div>
        <div style="font-size:16px;font-weight:800;color:var(--violet-600);font-family:'Space Grotesk',monospace;">📍 ${locCode}</div>
        <div style="font-size:10px;color:var(--slate-600);">
          ${locItems.length} ${isLao ? 'ຕຳແໜ່ງ' : 'ตำแหน่ง'} • ${locTotalQty} ${isLao ? 'ຊິ້ນ' : 'ชิ้น'}
        </div>
      </div>
      
      <div style="background:#1e293b;padding:11px;border-radius:11px;margin-bottom:14px;">
    `;
    
    sortedShelves.forEach(shelf => {
      const shelfItems = byShelf[shelf].sort((a, b) => a.seq_in_shelf - b.seq_in_shelf);
      const totalInShelf = shelfItems[0]?.total_in_shelf || shelfItems.length;
      const shelfTotalQty = shelfItems.reduce((s, p) => s + (p.total_qty || 0), 0);
      
      // Build slots (filled + empty)
      const slots = [];
      for (let i = 1; i <= totalInShelf; i++) {
        slots.push(shelfItems.find(x => x.seq_in_shelf === i) || null);
      }
      
      html += `
        <div style="background:#334155;padding:7px;border-radius:8px;margin-bottom:6px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;">
            <span style="color:#fbbf24;font-weight:800;font-size:11px;font-family:'Space Grotesk',monospace;">
              ${isLao ? 'ຊັ້ນ' : 'ชั้น'} ${shelf}
            </span>
            <span style="color:#94a3b8;font-size:9px;">${shelfItems.length}/${totalInShelf} • ${shelfTotalQty} ${isLao ? 'ຊິ້ນ' : 'ชิ้น'}</span>
          </div>
          <!-- Horizontal scroll: ชั้นวางจริง = แถวเดียวต่อชั้น -->
          <div style="display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:#475569 #1e293b;">
      `;
      
      slots.forEach((slot, i) => {
        if (slot) {
          const name = isLao ? (slot.products?.name_lo || slot.barcode) : (slot.products?.name_th || slot.barcode);
          const shortName = (name || '').substring(0, 14);
          // Color by stack height
          const intensity = Math.min(slot.stack, 5);
          const bgs = ['#10b981', '#0ea5e9', '#8b5cf6', '#f59e0b', '#ef4444'];
          const bg = bgs[intensity - 1] || '#64748b';
          
          html += `
            <button onclick="openPanOGramModal('${slot.barcode}', '${slot.location_code}', ${slot.id})"
                    title="${name} • ลำดับ ${slot.seq_in_shelf}/${totalInShelf}"
                    style="background:${bg};border:none;border-radius:6px;padding:5px 4px;text-align:center;cursor:pointer;color:white;overflow:hidden;min-height:54px;min-width:68px;width:68px;flex-shrink:0;display:flex;flex-direction:column;justify-content:center;gap:1px;">
              <div style="font-size:9px;font-weight:800;line-height:1.1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${shortName}</div>
              <div style="font-size:8px;opacity:0.9;font-family:'Space Grotesk',monospace;">${slot.facial}×${slot.depth}×${slot.stack}</div>
              <div style="font-size:11px;font-weight:800;font-family:'Space Grotesk',monospace;">${slot.total_qty}</div>
            </button>
          `;
        } else {
          // Empty slot
          html += `
            <div title="ตำแหน่งว่าง ลำดับ ${i + 1}" 
                 style="background:rgba(255,255,255,0.05);border:1px dashed #475569;border-radius:6px;padding:5px 4px;text-align:center;min-height:54px;min-width:68px;width:68px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#475569;font-size:9px;gap:2px;">
              <div style="font-size:14px;">⊘</div>
              <div style="font-size:8px;font-family:'Space Grotesk',monospace;">${i + 1}</div>
            </div>
          `;
        }
      });
      
      html += `</div></div>`;
    });
    
    html += `</div>`;
    return html;
  };
  
  // Render all locations
  let html = '';
  if (locCodes.length > 1) {
    html += `<div style="font-size:11px;color:var(--violet-600);font-weight:700;margin-bottom:7px;padding:5px 9px;background:var(--violet-100);border-radius:7px;">
      📍 ${isLao ? 'ສະຖານທີ່' : 'ตำแหน่ง'} ${locCodes.length} ${isLao ? 'ຈຸດ' : 'จุด'} • 
      ${isLao ? 'ກົດ filter ເພື່ອເບິ່ງສະຖານທີ່ດຽວ' : 'กด filter เพื่อดูตำแหน่งเดียว'}
    </div>`;
  }
  
  locCodes.forEach(code => {
    html += renderOneLocation(code, byLoc[code]);
  });
  
  // Legend
  html += `
    <div style="font-size:9px;color:var(--slate-500);margin-top:7px;text-align:center;background:white;padding:6px;border-radius:7px;border:1px solid var(--slate-200);">
      💡 ${isLao ? 'ສີ = ຄວາມສູງຂັ້ນວາງ' : 'สี = ความสูงขั้นวาง'}<br>
      <span style="color:#10b981;font-weight:700;">🟢 1</span>
      <span style="color:#0ea5e9;font-weight:700;">🔵 2</span>
      <span style="color:#8b5cf6;font-weight:700;">🟣 3</span>
      <span style="color:#f59e0b;font-weight:700;">🟡 4</span>

      <br><span style="font-size:8px;color:var(--slate-400);">↔️ ${isLao ? 'ເລື່ອນຊ້າຍ-ຂວາ ຖ້າມີຫລາຍຕຳແໜ່ງ' : 'เลื่อนซ้าย-ขวา ถ้ามีหลายตำแหน่ง'}</span>
    </div>

  return html;
}

}

// ==================== POG BULK SELECT ====================
let _pogMgrSelected = new Set();

function togglePogSelect(id) {
  if (_pogMgrSelected.has(id)) {
    _pogMgrSelected.delete(id);
  } else {
    _pogMgrSelected.add(id);
  }
  renderPanOGramManager();
}

function togglePogLocationSelect(locCode) {
  // เลือก/ยกเลิกทุก PoG ใน location นี้
  const items = (_pogManagerData || []).filter(p => p.location_code === locCode);
  const ids = items.map(p => p.id);
  const allSelected = ids.every(id => _pogMgrSelected.has(id));
  
  if (allSelected) {
    ids.forEach(id => _pogMgrSelected.delete(id));
  } else {
    ids.forEach(id => _pogMgrSelected.add(id));
  }
  renderPanOGramManager();
}

function toggleAllPogSelect() {
  // Apply ตาม current filter
  const all = _pogManagerData || [];
  let filtered = all;
  if (_pogManagerFilter.location) filtered = filtered.filter(p => p.location_code === _pogManagerFilter.location);
  if (_pogManagerFilter.search) {
    const s = _pogManagerFilter.search.toLowerCase();
    filtered = filtered.filter(p => 
      (p.barcode || '').toLowerCase().includes(s) ||
      (p.products?.name_lo || '').toLowerCase().includes(s) ||
      (p.products?.name_th || '').toLowerCase().includes(s) ||
      (p.location_code || '').toLowerCase().includes(s)
    );
  }
  
  const allSelected = filtered.length > 0 && filtered.every(p => _pogMgrSelected.has(p.id));
  if (allSelected) {
    _pogMgrSelected.clear();
  } else {
    filtered.forEach(p => _pogMgrSelected.add(p.id));
  }
  renderPanOGramManager();
}

async function bulkDeletePog() {
  const isLao = lang === 'lo';
  if (_pogMgrSelected.size === 0) return;
  
  const ids = Array.from(_pogMgrSelected);
  const items = (_pogManagerData || []).filter(p => ids.includes(p.id));
  
  // Preview
  const preview = items.slice(0, 5).map(p => `${p.position_code} (${p.barcode})`).join('\n');
  const more = items.length > 5 ? `\n... +${items.length - 5} ${isLao ? 'ອື່ນໆ' : 'อื่นๆ'}` : '';
  
  const msg = isLao 
    ? `ລົບ ${items.length} ຕຳແໜ່ງ Pan-O-Gram?\n\n${preview}${more}`
    : `ลบ ${items.length} ตำแหน่ง Pan-O-Gram?\n\n${preview}${more}`;
  
  if (!confirm(msg)) return;
  
  showToast(isLao ? '⏳ ກຳລັງລົບ...' : '⏳ กำลังลบ...', 'success');
  
  try {
    const { error } = await sb.from('pan_o_grams').delete().in('id', ids);
    if (error) throw error;
    
    _pogMgrSelected.clear();
    showToast(`🗑️ ${isLao ? 'ລົບແລ້ວ' : 'ลบแล้ว'} ${ids.length} ${isLao ? 'ຕຳແໜ່ງ' : 'ตำแหน่ง'}`, 'success');
    
    // Reload
    await loadPanOGramManager();
    loadSettingsStats();
  } catch (e) {
    console.error('[FS] bulkDeletePog error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function bulkMovePogToLocation() {
  const isLao = lang === 'lo';
  if (_pogMgrSelected.size === 0) return;
  
  const ids = Array.from(_pogMgrSelected);
  const items = (_pogManagerData || []).filter(p => ids.includes(p.id));
  
  // Load available locations
  if (!allLocations || allLocations.length === 0) {
    await loadZonesAndLocations();
  }
  
  // Group locations by Gondola number for display
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return { groupKey: numMatch[1], groupLabel: `Gondola ${numMatch[1]}` };
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      return { groupKey: 'z' + prefix, groupLabel: label };
    }
    return { groupKey: 'zzz', groupLabel: '?' };
  }
  
  const groups = {};
  (allLocations || []).forEach(l => {
    const p = parseCode(l.location_code);
    if (!groups[p.groupKey]) groups[p.groupKey] = { label: p.groupLabel, items: [] };
    groups[p.groupKey].items.push(l);
  });
  const sortedGroups = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
  
  // List of unique source locations
  const sourceLocs = [...new Set(items.map(p => p.location_code))];
  
  showModal(`
    <h3>🔄 ${isLao ? 'ຍ້າຍ Pan-O-Gram' : 'ย้าย Pan-O-Gram'}</h3>
    
    <div style="background:var(--violet-100);border-left:3px solid var(--violet-500);padding:9px 11px;border-radius:7px;margin-bottom:11px;">
      <div style="font-size:11px;color:var(--violet-600);font-weight:700;margin-bottom:5px;">
        🎯 ${isLao ? 'ຍ້າຍ' : 'ย้าย'} <strong>${items.length}</strong> ${isLao ? 'ຕຳແໜ່ງ' : 'ตำแหน่ง'}
      </div>
      <div style="font-size:10px;color:var(--slate-700);">
        ${isLao ? 'ຈາກ' : 'จาก'}: ${sourceLocs.slice(0, 3).join(', ')}${sourceLocs.length > 3 ? `, +${sourceLocs.length - 3}` : ''}
      </div>
    </div>
    
    <p style="font-size:11px;color:var(--slate-600);margin-bottom:9px;">
      ${isLao ? 'ເລືອກ Gondola ປາຍທາງ' : 'เลือก Gondola ปลายทาง'}:
    </p>
    
    <div style="margin-bottom:9px;">
      <input type="text" id="movePogSearch" 
             placeholder="🔍 ${isLao ? 'ຄົ້ນຫາ...' : 'ค้นหา...'}"
             oninput="filterMovePogList(this.value)"
             autocomplete="off" autocapitalize="characters"
             style="width:100%;padding:8px 11px;border:2px solid var(--violet-300);border-radius:8px;font-size:12px;font-weight:600;font-family:'Space Grotesk',monospace;text-transform:uppercase;">
    </div>
    
    <div id="movePogList" style="max-height:340px;overflow-y:auto;background:var(--slate-50);border-radius:9px;padding:7px;">
      ${sortedGroups.map(([_, g]) => `
        <div style="margin-bottom:9px;">
          <div style="font-size:11px;color:var(--violet-600);font-weight:800;padding:4px 7px;background:var(--violet-100);border-radius:5px;display:inline-block;margin-bottom:5px;">
            ${g.label} (${g.items.length})
          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill, minmax(80px, 1fr));gap:4px;">
            ${g.items.map(l => `
              <button onclick="confirmMovePog('${l.location_code}')" 
                      class="move-pog-item" data-code="${l.location_code}"
                      style="background:white;color:var(--slate-900);border:1px solid var(--slate-200);border-radius:6px;padding:7px 5px;font-family:'Space Grotesk',monospace;font-size:11px;font-weight:700;cursor:pointer;text-align:center;">
                ${l.location_code}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('')}
    </div>
    
    <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel')}</button>
  `);
}

function filterMovePogList(val) {
  const search = (val || '').toLowerCase().trim();
  const items = document.querySelectorAll('.move-pog-item');
  items.forEach(it => {
    const code = (it.dataset.code || '').toLowerCase();
    it.style.display = code.includes(search) ? '' : 'none';
  });
  document.querySelectorAll('#movePogList > div').forEach(group => {
    const visible = group.querySelectorAll('.move-pog-item:not([style*="display: none"])');
    group.style.display = visible.length > 0 ? '' : 'none';
  });

async function confirmMovePog(targetLocCode) {
  const isLao = lang === 'lo';
  const ids = Array.from(_pogMgrSelected);
  const items = (_pogManagerData || []).filter(p => ids.includes(p.id));
  
  if (!confirm(isLao 
    ? `ຍ້າຍ ${items.length} ຕຳແໜ່ງໄປ ${targetLocCode}?\n\n⚠️ shelf/seq ຈະຄົງເດີມ — ກວດເບິ່ງວ່າບໍ່ມີ conflict`
    : `ย้าย ${items.length} ตำแหน่งไป ${targetLocCode}?\n\n⚠️ shelf/seq จะคงเดิม — ตรวจดูว่าไม่มี conflict`)) return;
  
  showToast(isLao ? '⏳ ກຳລັງຍ້າຍ...' : '⏳ กำลังย้าย...', 'success');
  
  try {
    let movedCount = 0;
    let failedCount = 0;
    
    // Update one by one (เพราะอาจ conflict กับ unique constraint)
    for (const id of ids) {
      try {
        const { error } = await sb.from('pan_o_grams')
          .update({ location_code: targetLocCode })
          .eq('id', id);
        if (error) {
          console.warn('[FS] Move PoG err:', error);
          failedCount++;
        } else {
          movedCount++;
        }
      } catch (e) {
        failedCount++;
      }
    }
    
    closeModal();
    _pogMgrSelected.clear();
    
    showToast(
      `✅ ${isLao ? 'ຍ້າຍແລ້ວ' : 'ย้ายแล้ว'} ${movedCount}/${ids.length}` +
      (failedCount > 0 ? ` (${failedCount} ${isLao ? 'ລົ້ມເຫລວ - ມີ conflict' : 'ล้มเหลว - มี conflict'})` : ''),
      failedCount > 0 ? 'warning' : 'success'
    );
    
    await loadPanOGramManager();
    loadSettingsStats();
  } catch (e) {
    console.error('[FS] confirmMovePog error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

    );
    
    await loadPanOGramManager();
    loadSettingsStats();
  } catch (e) {
    console.error('[FS] confirmEditPogLocation error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

// ==================== EXPORT EXCEL ====================
async function exportPanOGramExcel() {
  const isLao = lang === 'lo';
  showToast(isLao ? '⏳ ກຳລັງສ້າງ Excel...' : '⏳ กำลังสร้าง Excel...', 'success');
  
  try {
    // Load all PoGs for this branch
    const { data: pogs, error } = await sb
      .from('pan_o_grams')
      .select('*, products(name_th, name_lo, unit_th, unit_lo, sell_price, pos_qty)')
      .eq('branch_id', branch.id)
      .order('location_code').order('shelf').order('seq_in_shelf');
    
    if (error) throw error;
    if (!pogs || pogs.length === 0) {
      showToast(isLao ? '⚠️ ບໍ່ມີຂໍ້ມູນ' : '⚠️ ไม่มีข้อมูล', 'warning');
      return;
    }
    
    const wb = XLSX.utils.book_new();
    
    // Sheet 1: Pan-O-Gram (รายละเอียดเต็ม)
    const sheet1 = [
      ['Location', 'Shelf', 'Seq', 'Total in Shelf', 'Position Code',
       'Barcode', 'Name LO', 'Name TH', 'Unit',
       'Facial', 'Depth', 'Stack', 'Shelf Capacity',
       'POS Qty', 'Sell Price (₭)', 'Total Value (₭)', 'Notes', 'Created']
    ];
    pogs.forEach(p => {
      const sellPrice = p.products?.sell_price || 0;
      const value = (p.total_qty || 0) * sellPrice;
      sheet1.push([
        p.location_code, p.shelf, p.seq_in_shelf, p.total_in_shelf, p.position_code,
        p.barcode,
        p.products?.name_lo || '',
        p.products?.name_th || '',
        p.products?.unit_lo || p.products?.unit_th || '',
        p.facial, p.depth, p.stack, p.total_qty,
        p.products?.pos_qty || 0, sellPrice, value,
        p.notes || '',
        p.created_at ? new Date(p.created_at).toLocaleString() : ''
      ]);
    });
    const ws1 = XLSX.utils.aoa_to_sheet(sheet1);
    ws1['!cols'] = [
      {wch:9},{wch:6},{wch:5},{wch:7},{wch:14},
      {wch:16},{wch:30},{wch:30},{wch:7},
      {wch:6},{wch:6},{wch:6},{wch:14},
      {wch:8},{wch:11},{wch:13},{wch:18},{wch:18}
    ];
    XLSX.utils.book_append_sheet(wb, ws1, 'Pan-O-Gram');
    
    // Sheet 2: Shelf Capacity Template (สำหรับ Counter ใช้นับ)
    const sheet2 = [
      ['Position Code', 'Location', 'Shelf', 'Seq',
       'Barcode', 'Name', 'Unit',
       'Shelf Capacity (Per Planogram)', 'Actual Count', 'Variance', 'Notes']
    ];
    pogs.forEach(p => {
      const name = p.products?.name_lo || p.products?.name_th || p.barcode;
      const unit = p.products?.unit_lo || p.products?.unit_th || '';
      sheet2.push([
        p.position_code, p.location_code, p.shelf, p.seq_in_shelf,
        p.barcode, name, unit,
        p.total_qty, '', '', ''
      ]);
    });
    const ws2 = XLSX.utils.aoa_to_sheet(sheet2);
    ws2['!cols'] = [
      {wch:14},{wch:9},{wch:6},{wch:5},
      {wch:16},{wch:30},{wch:7},
      {wch:18},{wch:11},{wch:9},{wch:18}
    ];
    // Add formula for Variance column = Actual - Expected
    for (let i = 2; i <= pogs.length + 1; i++) {
      ws2[`J${i}`] = { t: 'n', f: `IF(I${i}="","",I${i}-H${i})` };
    }
    XLSX.utils.book_append_sheet(wb, ws2, 'Shelf Capacity');
    
    // Sheet 3: Summary by Location
    const byLoc = {};
    pogs.forEach(p => {
      if (!byLoc[p.location_code]) byLoc[p.location_code] = {
        items: 0, totalQty: 0, totalValue: 0, shelves: new Set()
      };
      byLoc[p.location_code].items++;
      byLoc[p.location_code].totalQty += (p.total_qty || 0);
      byLoc[p.location_code].totalValue += (p.total_qty || 0) * (p.products?.sell_price || 0);
      byLoc[p.location_code].shelves.add(p.shelf);
    });
    
    const sheet3 = [['Location', 'Items', 'Shelves', 'Total Qty', 'Total Value (₭)']];
    Object.keys(byLoc).sort().forEach(loc => {
      const s = byLoc[loc];
      sheet3.push([loc, s.items, s.shelves.size, s.totalQty, Math.round(s.totalValue)]);
    });
    // Total row
    const totalItems = pogs.length;
    const totalQty = pogs.reduce((s, p) => s + (p.total_qty || 0), 0);
    const totalValue = pogs.reduce((s, p) => s + (p.total_qty || 0) * (p.products?.sell_price || 0), 0);
    sheet3.push([]);
    sheet3.push(['TOTAL', totalItems, '—', totalQty, Math.round(totalValue)]);
    
    const ws3 = XLSX.utils.aoa_to_sheet(sheet3);
    ws3['!cols'] = [{wch:10},{wch:7},{wch:8},{wch:11},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws3, 'Summary');
    
    const fileName = `Pan-O-Gram_${branch.code}_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, fileName);
    
    showToast(`✅ ${isLao ? 'ດາວໂຫລດແລ້ວ' : 'ดาวน์โหลดแล้ว'} (${pogs.length} ${isLao ? 'ຕຳແໜ່ງ' : 'ตำแหน่ง'})`, 'success');
  } catch (e) {
    console.error('[FS] Export Pan-O-Gram error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

      .from('pan_o_grams')
      .select('*, products(name_th, name_lo, unit_th, unit_lo, sell_price)')

async function exportFullBackupJSON() {
  const isLao = lang === 'lo';
  showToast(isLao ? '⏳ ກຳລັງສ້າງ Full Backup...' : '⏳ กำลังสร้าง Full Backup...', 'success');
  
  try {
    const backup = {
      _meta: {
        app: 'Friendship Stock',
        version: '4.1',
        branch_id: branch.id,
        branch_code: branch.code,
        branch_name: branch.name_th || branch.name_lo,
        created_at: new Date().toISOString(),
        created_by: user.username,
        type: 'full',
        tables: []
      }
    };
    
    let totalRecords = 0;
    
    for (const t of BACKUP_TABLES) {
      let query = sb.from(t.key).select('*');
      if (t.branchField) query = query.eq(t.branchField, branch.id);
      
      const { data, error } = await query;
      if (error) {
        console.warn(`[FS] Backup ${t.key} error:`, error);
        backup[t.key] = { error: error.message };
        continue;
      }
      
      // Sanitize: remove password_hash from users
      if (t.key === 'users' && data) {
        backup[t.key] = data.map(u => {
          const { password_hash, ...safe } = u;
          return safe;
        });
      } else {
        backup[t.key] = data || [];
      }
      
      totalRecords += (data?.length || 0);
      backup._meta.tables.push({ name: t.key, count: data?.length || 0 });
    }
    
    backup._meta.total_records = totalRecords;
    
    // Download
    const json = JSON.stringify(backup, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const fileName = `backup-${branch.code}-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = fileName;
    link.click();
    URL.revokeObjectURL(link.href);
    
    // Save backup timestamp
    localStorage.setItem(`fs_last_backup_${branch.id}`, new Date().toISOString());
    
    // Refresh manager
    showToast(`✅ ${isLao ? 'ສຳຮອງສຳເລັດ' : 'สำรองสำเร็จ'}: ${totalRecords.toLocaleString()} records`, 'success');
    loadBackupManager();
  } catch (e) {
    console.error('[FS] Full backup error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function exportFullBackupExcel() {
  const isLao = lang === 'lo';
  showToast(isLao ? '⏳ ກຳລັງສ້າງ Excel...' : '⏳ กำลังสร้าง Excel...', 'success');
  
  try {
    const wb = XLSX.utils.book_new();
    let totalRecords = 0;
    
    // Meta sheet
    const metaSheet = [
      ['Friendship Stock — Full Backup'],
      [],
      ['Branch', branch.code + ' - ' + (branch.name_th || branch.name_lo)],
      ['Created', new Date().toLocaleString()],
      ['Created by', user.username],
      [],
      ['Table', 'Count', 'Branch Filter']
    ];
    
    for (const t of BACKUP_TABLES) {
      let query = sb.from(t.key).select('*');
      if (t.branchField) query = query.eq(t.branchField, branch.id);
      
      const { data, error } = await query;
      if (error || !data) {
        metaSheet.push([t.key, 0, error?.message || 'no data']);
        continue;
      }
      
      // Sanitize: remove password_hash
      const sanitized = t.key === 'users' 
        ? data.map(u => { const { password_hash, ...safe } = u; return safe; })
        : data;
      
      if (sanitized.length > 0) {
        const ws = XLSX.utils.json_to_sheet(sanitized);
        XLSX.utils.book_append_sheet(wb, ws, t.key.substring(0, 30));
      }
      
      totalRecords += sanitized.length;
      metaSheet.push([t.key, sanitized.length, t.branchField ? branch.code : 'all']);
    }
    
    metaSheet.push([]);
    metaSheet.push(['TOTAL', totalRecords]);
    
    const wsMeta = XLSX.utils.aoa_to_sheet(metaSheet);
    wsMeta['!cols'] = [{wch:25},{wch:12},{wch:18}];
    XLSX.utils.book_append_sheet(wb, wsMeta, '_meta', true);
    
    const fileName = `backup-${branch.code}-${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`;
    XLSX.writeFile(wb, fileName);
    
    localStorage.setItem(`fs_last_backup_${branch.id}`, new Date().toISOString());
    showToast(`✅ ${isLao ? 'ສຳຮອງ Excel ສຳເລັດ' : 'สำรอง Excel สำเร็จ'}: ${totalRecords.toLocaleString()} records`, 'success');
    loadBackupManager();
  } catch (e) {
    console.error('[FS] Excel backup error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function loadZoneManager() {
  if (!branch) return;
  
  const [zonesRes, locsRes] = await Promise.all([
    sb.from('zones').select('*').eq('branch_id', branch.id).order('sort_order').order('code'),
    sb.from('location_master').select('*').eq('branch_id', branch.id).eq('is_active', true).order('location_code')
  ]);
  
  if (zonesRes.error) {
    document.getElementById('zoneMgrLoader').innerHTML = '❌ Error: ' + zonesRes.error.message;
    return;
  }
  
  _zoneMgrData = {
    zones: zonesRes.data || [],
    locations: locsRes.data || []
  };
  
  document.getElementById('zoneMgrLoader').style.display = 'none';
  const content = document.getElementById('zoneMgrContent');
  content.style.display = 'block';
  renderZoneManager();

let _zoneMgrSelected = new Set();

function toggleZoneSelect(zoneId) {
  if (_zoneMgrSelected.has(zoneId)) {
    _zoneMgrSelected.delete(zoneId);
  } else {
    _zoneMgrSelected.add(zoneId);
  }
  renderZoneManager();
}

function toggleAllZoneSelect() {
  const zones = _zoneMgrData?.zones || [];
  if (_zoneMgrSelected.size === zones.length) {
    _zoneMgrSelected.clear();
  } else {
    _zoneMgrSelected = new Set(zones.map(z => z.id));
  }
  renderZoneManager();
}

      ? `ເປີດລະບົບໂຊນ ສຳລັບ ${branchName}?\n\nCounter ຈະຕ້ອງເລືອກໂຊນກ່ອນສະແກນ`
      : `เปิดระบบโซน สำหรับ ${branchName}?\n\nCounter จะต้องเลือกโซนก่อนสแกน`;
  } else {
    msg = isLao 
      ? `ປິດລະບົບໂຊນ ສຳລັບ ${branchName}?\n\n✅ Counter ສະແກນໄດ້ໄວຂຶ້ນ ບໍ່ຕ້ອງເລືອກໂຊນ\n✅ ໂຊນທີ່ມີຍັງເກັບໄວ້ (ບໍ່ໄດ້ລົບ)\n✅ Pan-O-Gram + Stock Counts ຍັງເຮັດວຽກປົກກະຕິ`
      : `ปิดระบบโซน สำหรับ ${branchName}?\n\n✅ Counter สแกนได้เร็วขึ้น ไม่ต้องเลือกโซน\n✅ โซนที่มียังเก็บไว้ (ไม่ได้ลบ)\n✅ Pan-O-Gram + Stock Counts ยังทำงานปกติ`;
  }
  
  if (!confirm(msg)) return;
  
  try {
    // 1. Update DB + return data เพื่อ verify
    const { data: updatedRows, error } = await sb.from('branches')
      .update({ use_zones: newValue })
      .eq('id', branch.id)
      .select();
    
    if (error) {
      console.error('[FS] DB update error:', error);
      
      // ถ้าเป็น error column ไม่มี → แจ้ง admin ต้องรัน SQL
      if (error.message && (error.message.includes('use_zones') || error.message.includes('column'))) {
        showToast(
          isLao 
            ? '❌ ກະລຸນາ run SQL 28-branches-use-zones.sql ກ່ອນ' 
            : '❌ กรุณา run SQL 28-branches-use-zones.sql ก่อน', 
          'error'
        );
      } else {
        showToast('DB Error: ' + error.message, 'error');
      }
      return;
    }
    
    // 2. Verify ว่าได้ update จริง
    if (!updatedRows || updatedRows.length === 0) {
      showToast(isLao ? '❌ ບໍ່ສາມາດອັບເດດໄດ້' : '❌ ไม่สามารถอัปเดตได้', 'error');
      return;
    }
    
    const verifiedRow = updatedRows[0];
    log('Branch updated:', verifiedRow.code, 'use_zones:', verifiedRow.use_zones);
    
    // 3. Update local branch object (ใช้ค่าจริงจาก DB)
    branch.use_zones = verifiedRow.use_zones;
    
    // 4. Update localStorage — key ถูกต้องคือ "fs_branch"
    try {
      localStorage.setItem('fs_branch', JSON.stringify(branch));
    } catch (e) {
      log('localStorage update warning:', e);
    }
    
    showToast(
      newValue 
        ? (isLao ? '✅ ເປີດລະບົບໂຊນແລ້ວ' : '✅ เปิดระบบโซนแล้ว')
        : (isLao ? '⏸️ ປິດລະບົບໂຊນແລ້ວ' : '⏸️ ปิดระบบโซนแล้ว'),
      'success'
    );
    
    // Re-render settings page
    if (typeof renderSettingsPage === 'function') {
      const c = document.getElementById('appContent');
      if (c) c.innerHTML = renderSettingsPage();
      loadSettingsStats();
    }
  } catch (e) {
    console.error('[FS] toggleBranchUseZones error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function bulkDeleteZones() {
  const isLao = lang === 'lo';
  if (_zoneMgrSelected.size === 0) return;
  
  const selectedZones = (_zoneMgrData?.zones || []).filter(z => _zoneMgrSelected.has(z.id));
  
  // นับ locations ที่จะได้รับผลกระทบ
  const affectedLocCount = (_zoneMgrData?.locations || []).filter(l => _zoneMgrSelected.has(l.zone_id)).length;
  
  // แสดง list ของโซนที่จะลบ
  const zonesPreview = selectedZones.slice(0, 5).map(z => `${z.code} (${isLao ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo)})`).join('\n');
  const more = selectedZones.length > 5 ? `\n... +${selectedZones.length - 5} ${isLao ? 'ອື່ນໆ' : 'อื่นๆ'}` : '';
  
  let confirmMsg = isLao 
    ? `ລົບ ${selectedZones.length} ໂຊນ?\n\n${zonesPreview}${more}`
    : `ลบ ${selectedZones.length} โซน?\n\n${zonesPreview}${more}`;
  
  if (affectedLocCount > 0) {
    confirmMsg += isLao
      ? `\n\n⚠️ ${affectedLocCount} ຕຳແໜ່ງຈະກາຍເປັນ "ບໍ່ມີໂຊນ"`
      : `\n\n⚠️ ${affectedLocCount} ตำแหน่งจะกลายเป็น "ไม่มีโซน"`;
  }
  
  if (!confirm(confirmMsg)) return;
  
  showToast(isLao ? '⏳ ກຳລັງລົບ...' : '⏳ กำลังลบ...', 'success');
  
  try {
    const ids = Array.from(_zoneMgrSelected);
    
    // 1. ปลด zone_id ของ locations ที่ใช้ zones เหล่านี้
    const { error: ue } = await sb.from('location_master')
      .update({ zone_id: null })
      .in('zone_id', ids)
      .eq('branch_id', branch.id);
    if (ue) throw ue;
    
    // 2. ลบ zones
    const { error: de } = await sb.from('zones').delete().in('id', ids);
    if (de) throw de;
    
    // Clear selection
    _zoneMgrSelected.clear();
    
    showToast(`🗑️ ${isLao ? 'ລົບແລ້ວ' : 'ลบแล้ว'} ${ids.length} ${isLao ? 'ໂຊນ' : 'โซน'}`, 'success');
    
    // Reload manager + Floor Map
    await loadZoneManager();
    await loadZonesAndLocations();
    const fmEl = document.getElementById('floorMapContent');
    if (fmEl) loadFloorMap();
  } catch (e) {
    console.error('[FS] bulkDeleteZones error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function saveZone() {
  const isLao = lang === 'lo';
  const id = document.getElementById('zoneFormId').value;
  const isEdit = !!id;
  
  const code = document.getElementById('zoneFormCode').value.trim().toUpperCase();
  const name_lo = document.getElementById('zoneFormNameLo').value.trim();
  const name_th = document.getElementById('zoneFormNameTh').value.trim() || name_lo;
  const color = document.getElementById('zoneFormColor').value;
  const sort_order = parseInt(document.getElementById('zoneFormSort').value) || 0;
  const activeEl = document.getElementById('zoneFormActive');
  const is_active = activeEl ? activeEl.value === 'true' : true;
  
  const errEl = document.getElementById('zoneFormErr');
  
  if (!code || !name_lo) {
    errEl.textContent = isLao ? 'ກະລຸນາໃສ່ Code + ຊື່' : 'กรุณาใส่ Code + ชื่อ';
    errEl.classList.add('show');
    return;
  }
  
  try {
    if (isEdit) {
      const upd = { name_lo, name_th, color, sort_order, is_active, updated_at: new Date().toISOString() };
      const { error } = await sb.from('zones').update(upd).eq('id', id);
      if (error) throw error;
      showToast(`✅ ${isLao ? 'ບັນທຶກ' : 'บันทึก'}`, 'success');

      const { error } = await sb.from('zones').insert({

      });
