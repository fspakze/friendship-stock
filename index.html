// ==================== BRANCH FILTER FAB (Users Page) ====================
let _userBranchFilter = null; // null = show all, integer = filter by branch_id

function renderBranchFilterFAB() {
  // Remove existing FAB
  const existing = document.getElementById('qnavWrap');
  if (existing) existing.remove();
  const existingBd = document.getElementById('qnavBackdrop');
  if (existingBd) existingBd.remove();
  
  const branches = _allBranchesForUsers || [];
  if (branches.length === 0) return;
  
  // Count users per branch
  const branchCounts = {};
  _allUsers.forEach(u => {
    if (u.branch_id) {
      branchCounts[u.branch_id] = (branchCounts[u.branch_id] || 0) + 1;
    }
  });
  
  // Sort: hq → warehouse → minimart
  const typeOrder = { 'hq': 1, 'super': 1, 'warehouse': 2, 'minimart': 3, 'mini': 3, 'mall': 3 };
  const sorted = [...branches].sort((a, b) => {
    const oa = typeOrder[a.branch_type] || 9;
    const ob = typeOrder[b.branch_type] || 9;
    if (oa !== ob) return oa - ob;
    return a.id - b.id;
  });
  
  // Backdrop
  const backdrop = document.createElement('div');
  backdrop.className = 'qnav-backdrop';
  backdrop.id = 'qnavBackdrop';
  backdrop.onclick = () => toggleBranchFilterFAB(false);
  document.body.appendChild(backdrop);
  
  // FAB Wrap
  const wrap = document.createElement('div');
  wrap.className = 'qnav-wrap';
  wrap.id = 'qnavWrap';
  
  const isLao = lang === 'lo';
  const totalUsers = _allUsers.length;
  
  // Build items
  const allItem = `
    <button class="qnav-item ${_userBranchFilter === null ? 'qnav-item-active' : ''}" 
            onclick="filterByBranch(null)">
      <span class="qnav-item-icon" style="background:linear-gradient(135deg,var(--violet-100),var(--sky-100));font-size:16px;">🌐</span>
      <span style="font-weight:700;">${isLao ? 'ທັງໝົດ' : 'ทั้งหมด'}</span>
      <span class="qnav-item-count">${totalUsers}</span>
    </button>
  `;
  
  const branchItems = sorted.map(b => {
    const cnt = branchCounts[b.id] || 0;
    if (cnt === 0) return ''; // skip empty
    
    const displayName = isLao ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo);
    const typeIcon = (b.branch_type === 'hq' || b.branch_type === 'super') ? '⭐' :
                     (b.branch_type === 'warehouse') ? '📦' : '🏪';
    
    // Use existing CSS classes for color
    let bgGradient = 'linear-gradient(135deg, #fef3c7, #fde68a)'; // default amber for hq
    if (b.branch_type === 'warehouse') bgGradient = 'linear-gradient(135deg, #ddd6fe, #c4b5fd)';
    else if (['minimart', 'mini', 'mall', 'super'].includes(b.branch_type) && !['hq'].includes(b.branch_type)) {
      bgGradient = 'linear-gradient(135deg, #cffafe, #a5f3fc)';
    }
    if (b.branch_type === 'hq' || b.branch_type === 'super') {
      bgGradient = 'linear-gradient(135deg, #fef3c7, #fde68a)';
    }
    
    const isActive = _userBranchFilter === b.id;
    
    return `
      <button class="qnav-item ${isActive ? 'qnav-item-active' : ''}" 
              onclick="filterByBranch(${b.id})"
              title="${displayName}">
        <span class="qnav-item-icon" style="background:${bgGradient};font-size:16px;">${typeIcon}</span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;">${displayName}</span>
        <span class="qnav-item-count">${cnt}</span>
      </button>
    `;
  }).join('');
  
  wrap.innerHTML = `
    <div class="qnav-menu" id="qnavMenu">
      ${allItem}
      ${branchItems}
    </div>
    <button class="qnav-fab" id="qnavFab" onclick="toggleBranchFilterFAB()" 
            aria-label="Filter by Branch" 
            title="${isLao ? 'ກັ່ນຕອງຕາມສາຂາ' : 'กรองตามสาขา'}">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 6h18M6 12h12M10 18h4"/>
      </svg>
    </button>
  `;
  document.body.appendChild(wrap);
}

function toggleBranchFilterFAB(forceState) {
  const menu = document.getElementById('qnavMenu');
  const fab = document.getElementById('qnavFab');
  const bd = document.getElementById('qnavBackdrop');
  if (!menu || !fab) return;
  
  const willOpen = forceState !== undefined ? forceState : !menu.classList.contains('is-open');
  
  if (willOpen) {
    menu.classList.add('is-open');
    fab.classList.add('is-open');
    if (bd) bd.classList.add('is-open');
  } else {
    menu.classList.remove('is-open');
    fab.classList.remove('is-open');
    if (bd) bd.classList.remove('is-open');
  }
}

function filterByBranch(branchId) {
  _userBranchFilter = branchId;
  toggleBranchFilterFAB(false);
  
  // Update Search input placeholder to hint the filter
  const search = document.getElementById('userSearch');
  if (search) search.value = ''; // Clear search
  
  renderUsersList();
  renderBranchFilterFAB(); // Re-render to update active state
  
  // Show toast feedback
  if (branchId === null) {
    showToast(lang === 'lo' ? '🌐 ສະແດງທັງໝົດ' : '🌐 แสดงทั้งหมด', 'success');
  } else {
    const b = _allBranchesForUsers.find(x => x.id === branchId);
    if (b) {
      const name = lang === 'lo' ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo);
      showToast(`🏪 ${name}`, 'success');
    }
  }
}

async function editUser(id) { openUserModal(id); }

async function saveUser() {
  const id = document.getElementById('editId').value;
  const username = document.getElementById('mUsername').value.trim();
  const password = document.getElementById('mPassword').value;
  const fullName = document.getElementById('mFullName').value.trim();
  const role = document.getElementById('mRole').value;
  const branchId = parseInt(document.getElementById('mBranch').value) || null;
  const isActiveEl = document.getElementById('mIsActive');
  const errEl = document.getElementById('userErr');
  
  if (!username || !fullName) {
    errEl.textContent = T('fill_required');
    errEl.classList.add('show');
    return;
  }
  
  try {
    if (id) {
      const upd = { 
        username, 
        full_name: fullName, 
        role, 
        branch_id: branchId,
        updated_at: new Date().toISOString() 
      };
      if (password) upd.password_hash = await hashPassword(password);
      if (isActiveEl) upd.is_active = isActiveEl.value === 'true';
      const { error } = await sb.from('users').update(upd).eq('id', id);
      if (error) throw error;
    } else {
      if (!password) {
        errEl.textContent = 'Password required';
        errEl.classList.add('show');
        return;
      }
      const hash = await hashPassword(password);
      const { error } = await sb.from('users').insert({
        username, password_hash: hash, full_name: fullName, role,
        language: 'lo', is_active: true,
        branch_id: branchId || branch?.id
      });
      if (error) throw error;
    }
    showToast(T('user_saved'), 'success');
    closeModal();
    loadUsers();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  }
}

function onPosFileSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  log('POS file selected:', file.name);
  showToast(T('importing'), '');
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      
      // หา sheet ชื่อ Products
      const sheetName = wb.SheetNames.find(n => 
        n.toLowerCase().includes('product') || n.toLowerCase().includes('item')
      ) || wb.SheetNames[wb.SheetNames.length - 1]; // เอา sheet สุดท้าย
      
      const ws = wb.Sheets[sheetName];
      const json = XLSX.utils.sheet_to_json(ws, { defval: null });
      
      log('Parsed sheet:', sheetName, 'rows:', json.length);
      
      // Normalize column names
      const products = [];
      json.forEach(row => {
        const barcode = row['Barcode*'] || row['Barcode'] || row['barcode'] || row['BARCODE'];
        if (!barcode) return;
        
        const name_lo = row['Name LO*'] || row['Name LO'] || row['Product Name LO*'] || 
                        row['Product Name LO'] || row['name_lo'] || '';
        const name_th = row['Name TH'] || row['Name TH*'] || row['Product Name TH'] || 
                        row['Product Name TH*'] || row['name_th'] || '';
        
        if (!name_lo && !name_th) return;
        
        // Branch Code (optional - ถ้าไม่มี → ใช้ branch ของ user)
        const branchCode = row['Branch Code'] || row['Branch'] || row['branch_code'] || 
                           row['BRANCH'] || null;
        
        const product = {
          barcode: String(barcode).trim(),
          name_lo: name_lo || name_th || '',
          name_th: name_th || name_lo || '',
          unit_lo: row['Unit LO'] || row['unit_lo'] || 'ອັນ',
          unit_th: row['Unit TH'] || row['unit_th'] || 'ชิ้น',
          pos_qty: parseInt(row['POS Qty*'] || row['POS Qty'] || row['pos_qty'] || 0) || 0,
          sell_price: parseFloat(row['Sell Price*'] || row['Sell Price (LAK)*'] || row['Sell Price'] || row['sell_price'] || 0) || 0,
          gondola_code: row['Gondola Code'] || row['gondola_code'] || null,
          is_markdown: row['Is Markdown'] === true || row['Is Markdown'] === 'TRUE' || row['Is Markdown'] === 'true',
          branch_code: branchCode ? String(branchCode).trim().toUpperCase() : null
        };
        
        if (product.barcode && (product.name_lo || product.name_th)) {
          products.push(product);
        }
      });
      
      if (!products.length) {
        showToast(T('no_products_found'), 'error');
        return;
      }
      
      log('Valid products:', products.length);
      _pendingImport = products;
      showImportPreview(products);
      
    } catch (err) {
      console.error('[FS] Import parse error:', err);
      showToast(T('file_invalid') + ': ' + err.message, 'error');
    }
  };
  
  reader.readAsArrayBuffer(file);
  // Reset input
  event.target.value = '';
}

              <td style="padding:5px 4px;text-align:right;font-weight:600;">${p.pos_qty}</td>
              <td style="padding:5px 4px;text-align:right;">${p.sell_price.toLocaleString()}</td>
            </tr>
          `;}).join('')}
          ${products.length > 10 ? `<tr><td colspan="5" style="padding:6px;text-align:center;color:var(--slate-500);font-style:italic;">... ${lang === 'lo' ? 'ແລະອີກ' : 'และอีก'} ${products.length - 10} ${lang === 'lo' ? 'ລາຍການ' : 'รายการ'}</td></tr>` : ''}

      <label class="form-label">${T('snapshot_name')}</label>
      <input type="text" class="form-input" id="importSnapName" 
             value="Snapshot ${new Date().toISOString().slice(0,16).replace('T',' ')}" 
             autocomplete="off">
    </div>
    
    <div class="error-msg" id="importErr"></div>
    
    <div class="action-row">
      <button class="btn btn-secondary" onclick="closeModal()">${T('cancel')}</button>
      <button class="btn btn-primary" id="importBtn" onclick="executeImport()" style="background:var(--sky-600);">
        ✅ ${T('confirm_import')}
      </button>
    </div>
  `);
  
  // Cache branches list ถ้ายังไม่มี
  if (!window._allBranchesCache) {
    sb.from('branches').select('*').eq('is_active', true).order('id').then(({ data }) => {
      window._allBranchesCache = data || [];
      // Re-populate dropdown
      const sel = document.getElementById('importBranchDest');
      if (sel) {
        const currentVal = sel.value;
        sel.innerHTML = window._allBranchesCache.map(b => {
          const displayName = lang === 'lo' ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo);
          const isCurrentBranch = branch && branch.id === b.id;
          return `<option value="${b.id}" ${isCurrentBranch ? 'selected' : ''}>
            ${displayName} (${b.code})${isCurrentBranch ? ' ✓' : ''}
          </option>`;
        }).join('');
        if (currentVal) sel.value = currentVal;
      }
    });
  }
}

async function executeImport() {
  if (!_pendingImport || !_pendingImport.length) {
    showToast(T('no_products_found'), 'error');
    return;
  }
  
  const snapName = document.getElementById('importSnapName').value.trim();
  const branchDestEl = document.getElementById('importBranchDest');
  const destBranchId = branchDestEl ? parseInt(branchDestEl.value) : (branch?.id || 1);
  const destBranchName = branchDestEl 
    ? branchDestEl.options[branchDestEl.selectedIndex]?.text 
    : (branch?.code || '?');
  
  const btn = document.getElementById('importBtn');
  const errEl = document.getElementById('importErr');
  
  btn.disabled = true;
  
  const total = _pendingImport.length;
  const BATCH_SIZE = 500;
  const totalBatches = Math.ceil(total / BATCH_SIZE);
  
  log('Executing import:', total, 'products to branch_id:', destBranchId, 'in', totalBatches, 'batches');
  
  // Replace modal content with progress UI
  closeModal();
  showModal(`
    <h3>${T('importing') || 'กำลังนำเข้า...'}</h3>
    <p style="font-size:11px;color:var(--slate-500);margin-bottom:11px;">
      ${total.toLocaleString()} รายการ — แบ่ง ${totalBatches} batch
    </p>
    
    <div style="background:var(--slate-100);border-radius:8px;height:24px;overflow:hidden;margin-bottom:9px;position:relative;">
      <div id="importProgressBar" style="background:linear-gradient(90deg,var(--teal-500),var(--teal-600));height:100%;width:0%;transition:width 0.3s;border-radius:8px;"></div>
      <div id="importProgressText" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:var(--slate-900);">0%</div>
    </div>
    
    <div id="importStatusText" style="font-size:11px;color:var(--slate-600);text-align:center;margin-bottom:8px;">
      ${T('preparing') || 'เตรียมข้อมูล...'}
    </div>
    
    <!-- Stats grid -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:9px;">
      <div style="background:var(--teal-100);padding:7px 5px;border-radius:7px;text-align:center;">
        <div style="font-size:9px;color:var(--teal-700);text-transform:uppercase;font-weight:700;">${T('products_new') || 'New'}</div>
        <div id="impNew" style="font-size:15px;font-weight:800;color:var(--teal-700);font-family:'Space Grotesk',monospace;">0</div>
      </div>
      <div style="background:var(--sky-100);padding:7px 5px;border-radius:7px;text-align:center;">
        <div style="font-size:9px;color:var(--sky-600);text-transform:uppercase;font-weight:700;">${T('products_updated') || 'Updated'}</div>
        <div id="impUpdated" style="font-size:15px;font-weight:800;color:var(--sky-600);font-family:'Space Grotesk',monospace;">0</div>
      </div>
      <div style="background:var(--amber-100);padding:7px 5px;border-radius:7px;text-align:center;">
        <div style="font-size:9px;color:#92400e;text-transform:uppercase;font-weight:700;">Batch</div>
        <div id="impBatch" style="font-size:15px;font-weight:800;color:#92400e;font-family:'Space Grotesk',monospace;">0/${totalBatches}</div>
      </div>
    </div>
    
    <div id="importErrDetail" style="background:var(--rose-100);color:var(--rose-500);padding:8px 11px;border-radius:7px;font-size:11px;display:none;"></div>
  `);
  
  // Helper: update progress UI
  const updateProgress = (batchIdx, stats, statusText) => {
    const pct = Math.round((batchIdx / totalBatches) * 100);
    const bar = document.getElementById('importProgressBar');
    const txt = document.getElementById('importProgressText');
    const stat = document.getElementById('importStatusText');
    const batch = document.getElementById('impBatch');
    const newEl = document.getElementById('impNew');
    const updEl = document.getElementById('impUpdated');
    if (bar) bar.style.width = pct + '%';
    if (txt) txt.textContent = pct + '%';
    if (stat && statusText) stat.textContent = statusText;
    if (batch) batch.textContent = `${batchIdx}/${totalBatches}`;
    if (newEl) newEl.textContent = (stats.new_products || 0).toLocaleString();
    if (updEl) updEl.textContent = (stats.updated_products || 0).toLocaleString();
  };
  
  const aggStats = {
    total_processed: 0,
    new_products: 0,
    updated_products: 0,
    deactivated_products: 0,
    total_value: 0
  };
  
  try {
    // Loop ทำ batch ทีละชุด
    for (let i = 0; i < totalBatches; i++) {
      const start = i * BATCH_SIZE;
      const end = Math.min(start + BATCH_SIZE, total);
      const chunk = _pendingImport.slice(start, end);
      const isLast = (i === totalBatches - 1);
      
      updateProgress(i, aggStats, `Batch ${i + 1}/${totalBatches}: ${start.toLocaleString()}-${end.toLocaleString()}`);
      
      // ส่ง batch นี้ — ไม่ส่ง snapshot_name ถ้าไม่ใช่ batch สุดท้าย
      // (snapshot จะถูกบันทึกใน batch สุดท้ายเท่านั้น)
      const { data, error } = await sb.rpc('import_pos_products_batch', {
        p_branch_id: destBranchId,
        p_user_id: user.id,
        p_products: chunk,
        p_is_last_batch: isLast,
        p_snapshot_name: isLast ? snapName : null,
        p_session_id: session?.id || null,
        p_total_count: total
      });
      
      if (error) {
        // Retry ครั้งเดียว ถ้า fail
        log('Batch', i + 1, 'failed, retrying...', error.message);
        await new Promise(r => setTimeout(r, 1000));
        const { data: retryData, error: retryError } = await sb.rpc('import_pos_products_batch', {
          p_branch_id: destBranchId,
          p_user_id: user.id,
          p_products: chunk,
          p_is_last_batch: isLast,
          p_snapshot_name: isLast ? snapName : null,
          p_session_id: session?.id || null,
          p_total_count: total
        });
        if (retryError) throw retryError;
        const r = retryData || {};
        aggStats.total_processed += (r.total_processed || 0);
        aggStats.new_products += (r.new_products || 0);
        aggStats.updated_products += (r.updated_products || 0);
        aggStats.deactivated_products += (r.deactivated_products || 0);
        aggStats.total_value += (r.total_value || 0);
      } else {
        const r = data || {};
        aggStats.total_processed += (r.total_processed || 0);
        aggStats.new_products += (r.new_products || 0);
        aggStats.updated_products += (r.updated_products || 0);
        aggStats.deactivated_products += (r.deactivated_products || 0);
        aggStats.total_value += (r.total_value || 0);
      }
    }
    
    updateProgress(totalBatches, aggStats, 'เสร็จสิ้น!');
    
    // รอ 500ms ให้ user เห็น 100%
    await new Promise(r => setTimeout(r, 500));
    
    closeModal();
    
    // Show success summary
    showModal(`
      <div style="text-align:center;margin-bottom:14px;">
        <div style="font-size:36px;">✅</div>
        <div style="font-size:16px;font-weight:700;color:var(--emerald-500);margin-top:5px;">${T('import_success')}</div>
      </div>
      
      <div style="background:var(--emerald-100);padding:12px;border-radius:10px;">
        <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;font-weight:700;margin-bottom:9px;text-align:center;">${T('import_summary')}</div>
        
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;">
          <div style="background:white;padding:9px;border-radius:7px;text-align:center;">
            <div style="font-size:20px;font-weight:700;color:var(--emerald-500);">${aggStats.total_processed.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--slate-600);">${T('products_total')}</div>
          </div>
          <div style="background:white;padding:9px;border-radius:7px;text-align:center;">
            <div style="font-size:20px;font-weight:700;color:var(--teal-700);">${aggStats.new_products.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--slate-600);">${T('products_new')}</div>
          </div>
          <div style="background:white;padding:9px;border-radius:7px;text-align:center;">
            <div style="font-size:20px;font-weight:700;color:var(--sky-600);">${aggStats.updated_products.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--slate-600);">${T('products_updated')}</div>
          </div>
          <div style="background:white;padding:9px;border-radius:7px;text-align:center;">
            <div style="font-size:20px;font-weight:700;color:var(--rose-500);">${aggStats.deactivated_products.toLocaleString()}</div>
            <div style="font-size:10px;color:var(--slate-600);">${T('products_removed')}</div>
          </div>
        </div>
        
        <div style="margin-top:9px;padding-top:9px;border-top:1px solid var(--slate-200);text-align:center;">
          <div style="font-size:9px;color:var(--slate-500);">Total Value</div>
          <div style="font-size:14px;font-weight:700;color:var(--slate-900);">₭ ${(aggStats.total_value || 0).toLocaleString()}</div>
        </div>
      </div>
      
      <button class="btn btn-primary" onclick="closeModal();loadSettingsStats();" style="margin-top:12px;background:var(--emerald-500);">
        ✓ ${T('continue')}
      </button>
    `);
    
    _pendingImport = null;
    
  } catch (e) {
    console.error('[FS] Import error:', e);
    const errDetail = document.getElementById('importErrDetail');
    if (errDetail) {
      errDetail.textContent = 'Error: ' + (e.message || e);
      errDetail.style.display = 'block';
    } else {
      showToast('Import error: ' + (e.message || e), 'error');
    }
  }
}

async function previewVariance() {
  if (!session) {
    showToast('No active session', 'warning');
    return;
  }
  
  const l1pct = parseFloat(document.getElementById('vsL1Pct').value);
  const l1val = parseFloat(document.getElementById('vsL1Val').value);
  const l2pct = parseFloat(document.getElementById('vsL2Pct').value);
  const l2val = parseFloat(document.getElementById('vsL2Val').value);
  const l3pct = parseFloat(document.getElementById('vsL3Pct').value);
  const l3val = parseFloat(document.getElementById('vsL3Val').value);
  const method = document.getElementById('vsMethod').value;
  
  const { data, error } = await sb.rpc('preview_variance_change', {
    p_branch_id: branch.id,
    p_session_id: session.id,
    p_l1_pct: l1pct,
    p_l1_val: l1val,
    p_l2_pct: l2pct,
    p_l2_val: l2val,
    p_l3_pct: l3pct,
    p_l3_val: l3val,
    p_method: method
  });
  
  if (error) {
    showToast('Preview error: ' + error.message, 'error');
    return;
  }
  
  const cur = data?.current || {l1:0,l2:0,l3:0,l4:0};
  const prev = data?.preview || {l1:0,l2:0,l3:0,l4:0};
  const total = data?.total || 0;
  
  const previewEl = document.getElementById('vsPreview');
  const contentEl = document.getElementById('vsPreviewContent');
  
  const renderLevel = (lv, color, curVal, prevVal) => {
    const diff = prevVal - curVal;
    const diffText = diff === 0 ? '–' : (diff > 0 ? `+${diff}` : `${diff}`);
    const diffColor = diff === 0 ? 'var(--slate-500)' : (diff > 0 ? 'var(--rose-500)' : 'var(--emerald-500)');
    return `
      <div style="display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.5);">
        <span style="background:var(--${color}-500);color:white;padding:1px 7px;border-radius:4px;font-weight:700;font-size:10px;">L${lv}</span>
        <span style="font-size:11px;font-weight:600;color:var(--slate-700);">${curVal}</span>
        <span style="font-size:11px;font-weight:700;color:var(--sky-600);">→ ${prevVal}</span>
        <span style="font-size:10px;font-weight:700;color:${diffColor};">${diffText}</span>
      </div>
    `;
  };
  
  contentEl.innerHTML = `
    <div style="font-size:10px;color:var(--slate-600);margin-bottom:5px;">Total ${total} counts</div>
    <div style="display:grid;grid-template-columns:auto 1fr 1fr auto;gap:8px;font-size:9px;color:var(--slate-500);font-weight:700;text-transform:uppercase;padding-bottom:4px;">
      <span>Lv</span><span>ปัจจุบัน</span><span>ใหม่</span><span>Δ</span>
    </div>
    ${renderLevel(1, 'emerald', cur.l1, prev.l1)}
    ${renderLevel(2, 'amber', cur.l2, prev.l2)}
    ${renderLevel(3, 'rose', cur.l3, prev.l3)}
    ${renderLevel(4, 'rose', cur.l4, prev.l4)}
  `;
  
  previewEl.style.display = 'block';
}

async function saveVarianceSettings() {
  const errEl = document.getElementById('vsErr');
  const btn = document.getElementById('vsSaveBtn');
  errEl.classList.remove('show');
  
  const l1pct = parseFloat(document.getElementById('vsL1Pct').value);
  const l1val = parseFloat(document.getElementById('vsL1Val').value);
  const l2pct = parseFloat(document.getElementById('vsL2Pct').value);
  const l2val = parseFloat(document.getElementById('vsL2Val').value);
  const l3pct = parseFloat(document.getElementById('vsL3Pct').value);
  const l3val = parseFloat(document.getElementById('vsL3Val').value);
  const method = document.getElementById('vsMethod').value;
  
  // Validation
  if (l1pct >= l2pct || l2pct >= l3pct) {
    errEl.textContent = '% ต้องเรียงลำดับ: L1 < L2 < L3';
    errEl.classList.add('show');
    return;
  }
  if (l1val >= l2val || l2val >= l3val) {
    errEl.textContent = 'มูลค่า ต้องเรียงลำดับ: L1 < L2 < L3';
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span>`;
  
  try {
    // Upsert
    const { error } = await sb.from('variance_settings').upsert({
      branch_id: branch.id,
      l1_max_percent: l1pct,
      l1_max_value: l1val,
      l2_max_percent: l2pct,
      l2_max_value: l2val,
      l3_max_percent: l3pct,
      l3_max_value: l3val,
      use_percent_or_value: method,
      updated_by: user.id,
      updated_at: new Date().toISOString()
    }, { onConflict: 'branch_id' });
    
    if (error) throw error;
    
    log('Variance settings saved');
    
    // Auto-recalculate ถ้ามี session
    if (session) {
      await sb.rpc('recalculate_variance_for_session', {
        p_session_id: session.id
      });
      log('Recalculated session counts');
    }
    
    showToast(`✅ ${T('settings_saved')}`, 'success');
    closeModal();
    
    // Reload dashboard if there
    const activeTab = document.querySelector('.tab.active');
    if (activeTab) goPage(activeTab.dataset.page);
    
  } catch (e) {
    console.error('[FS] Variance save error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `💾 ${T('save_settings')}`;
  }
}

async function resetVarianceDefault() {
  if (!confirm(`${T('reset_default')}: L1(2%/30K), L2(5%/100K), L3(10%/300K)?`)) return;
  
  document.getElementById('vsL1Pct').value = 2.00;
  document.getElementById('vsL1Val').value = 30000;
  document.getElementById('vsL2Pct').value = 5.00;
  document.getElementById('vsL2Val').value = 100000;
  document.getElementById('vsL3Pct').value = 10.00;
  document.getElementById('vsL3Val').value = 300000;
  document.getElementById('vsMethod').value = 'either';
  
  document.getElementById('vsPreview').style.display = 'none';
  showToast('Reset to default values', '');
}

// ==================== EXPORT EXCEL (with ExcelJS - Full Formatting) ====================
const XL_COLORS = {
  teal: '0F766E', tealLight: 'CCFBF1',
  amber: 'F59E0B', amberLight: 'FEF3C7',
  rose: 'F43F5E', roseLight: 'FFE4E6',
  emerald: '10B981', emeraldLight: 'D1FAE5',
  violet: '7C3AED', violetLight: 'EDE9FE',
  sky: '0284C7', skyLight: 'E0F2FE',
  slate900: '0F172A', slate700: '334155', slate500: '64748B',
  slate200: 'E2E8F0', slate100: 'F1F5F9'
};

function xlStyleHeader(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 11, bold: true, color: { argb: 'FFFFFFFF' } };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
  cell.border = {
    left: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    right: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    top: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    bottom: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } }
  };
}

function xlStyleData(cell, opts = {}) {
  cell.font = { name: 'Calibri', size: opts.size || 10, bold: opts.bold || false, color: { argb: 'FF' + (opts.color || XL_COLORS.slate900) } };
  cell.alignment = { horizontal: opts.align || 'left', vertical: 'middle', wrapText: true };
  cell.border = {
    left: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    right: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    top: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    bottom: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } }
  };
  if (opts.fill) {
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[opts.fill] } };
  }
}

function xlStyleTitle(cell, color = 'teal', size = 18) {
  cell.font = { name: 'Calibri', size: size, bold: true, color: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'left', vertical: 'middle' };
}

function xlStyleSection(cell, color = 'violet') {
  cell.font = { name: 'Calibri', size: 12, bold: true, color: { argb: 'FFFFFFFF' } };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'left', vertical: 'middle', indent: 1 };
}

function xlStyleKpiValue(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 22, bold: true, color: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'center', vertical: 'middle' };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color + 'Light'] } };
}

function xlStyleKpiLabel(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 9, color: { argb: 'FF' + XL_COLORS.slate500 } };
  cell.alignment = { horizontal: 'center', vertical: 'middle' };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color + 'Light'] } };
}

async function exportToExcel(mode = 'full') {
  if (!session) {
    showToast(T('locked_session'), 'error');
    return;
  }
  
  if (typeof ExcelJS === 'undefined') {
    showToast('ExcelJS not loaded - please refresh page', 'error');
    return;
  }
  
  showToast(T('exporting'), '');
  log('Exporting Excel with formatting, mode:', mode);
  
  try {
    // Load all data
    const [countsRes, gondolaRes, expiryRes, newSkuRes] = await Promise.all([
      sb.from('stock_counts').select(`
        id, counted_at, count_role, location_code, gondola_code, zone_id,
        counted_qty, pos_qty_snapshot, diff, variance_level, workflow_status, note,
        products(barcode, name_th, name_lo, unit_th, unit_lo, sell_price),
        users(full_name, username)
      `).eq('session_id', session.id).order('counted_at', { ascending: false }),
      
      sb.from('v_gondola_progress').select('*').eq('session_id', session.id).order('location_code'),
      
      sb.from('expiry_damage_log').select(`
        *, products(barcode, name_th, name_lo, sell_price), users(full_name)
      `).eq('session_id', session.id).order('created_at', { ascending: false }),
      
      sb.from('new_sku_log').select(`
        *, users(full_name)
      `).eq('session_id', session.id).order('created_at', { ascending: false })
    ]);
    
  // Load variance settings เพื่อแสดง threshold ใน report
  let vsL1Pct = 2, vsL1Val = 30000, vsL2Pct = 5, vsL2Val = 100000, vsL3Pct = 10, vsL3Val = 300000;
  try {
    const { data: vs } = await sb.from('variance_settings')
      .select('*').eq('branch_id', branch?.id).maybeSingle();
    if (vs) {
      vsL1Pct = vs.l1_max_percent; vsL1Val = vs.l1_max_value;
      vsL2Pct = vs.l2_max_percent; vsL2Val = vs.l2_max_value;
      vsL3Pct = vs.l3_max_percent; vsL3Val = vs.l3_max_value;
    }
  } catch (e) { log('vs load skip:', e); }
  
  window._varianceThresholds = { vsL1Pct, vsL1Val, vsL2Pct, vsL2Val, vsL3Pct, vsL3Val };
  
  const counts = countsRes.data || [];
    const gondolas = gondolaRes.data || [];
    const expiries = expiryRes.data || [];
    const newSkus = newSkuRes.data || [];
    
    log('Loaded for export:', { counts: counts.length, gondolas: gondolas.length });
    
    // Create workbook
    const wb = new ExcelJS.Workbook();
    wb.creator = 'Friendship Stock System';
    wb.created = new Date();
    
    // ============ SHEET 1: SUMMARY ============
    if (mode === 'full') {
      buildSummarySheet(wb, counts, gondolas);
    }
    
    // ============ SHEET 2: COUNTS DETAIL ============
    if (mode === 'full' || mode === 'counts') {
      buildCountsSheet(wb, counts);
    }
    
    // ============ SHEET 3: VARIANCE ANALYSIS ============
    if (mode === 'full' || mode === 'variance') {
      buildVarianceSheet(wb, counts);
    }
    
    // ============ SHEET 4: GONDOLA PROGRESS ============
    if (mode === 'full') {
      buildGondolaSheet(wb, gondolas);
    }
    
    // ============ SHEET 5: COUNTER PERFORMANCE ============
    if (mode === 'full') {
      buildPerformanceSheet(wb, counts);
    }
    
    // ============ SHEET 6: TIEBREAKER LOG ============
    if (mode === 'full') {
      const { data: tbData } = await sb.from('v_needs_tiebreaker').select('*').eq('session_id', session.id);
      buildTiebreakerSheet(wb, tbData || []);
    }
    
    // ============ SHEET 7: EXPIRY & NEW SKU ============
    if (mode === 'full') {
      buildExpirySheet(wb, expiries, newSkus);
    }
    
    // Save
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    
    const dateStr = new Date().toISOString().slice(0, 10);
    const sessionLabel = (session.session_name || 'Session').replace(/[^a-zA-Z0-9-]/g, '_').substring(0, 30);
    const filename = `Stock-Count-Report-${sessionLabel}-${dateStr}.xlsx`;
    
    saveAs(blob, filename);
    
    showToast(`✅ ${T('export_success')}: ${filename}`, 'success');
    log('Export complete:', filename);
    
  } catch (e) {
    console.error('[FS] Export error:', e);
    showToast('Export error: ' + e.message, 'error');
  }
}

function buildSummarySheet(wb, counts, gondolas) {
  const ws = wb.addWorksheet('Summary', { views: [{ showGridLines: false }] });
  
  // Title
  ws.mergeCells('A1:H1');
  ws.getCell('A1').value = 'STOCK COUNT REPORT';
  xlStyleTitle(ws.getCell('A1'), 'teal', 22);
  ws.getRow(1).height = 32;
  
  ws.mergeCells('A2:H2');
  ws.getCell('A2').value = 'Friendship Supermart - Pakse, Laos';
  ws.getCell('A2').font = { name: 'Calibri', size: 12, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  // Metadata
  const meta = [
    ['Report Date:', new Date().toLocaleString('en-GB')],
    ['Session Name:', session.session_name || ''],
    ['Branch:', branch?.name_th || branch?.name_lo || 'PAKSE'],
    ['Reported By:', user.full_name || ''],
    ['Phase:', session.phase || 'active'],
  ];
  meta.forEach(([label, val], idx) => {
    const row = 4 + idx;
    ws.getCell(`A${row}`).value = label;
    ws.getCell(`A${row}`).font = { name: 'Calibri', size: 10, bold: true, color: { argb: 'FF' + XL_COLORS.slate700 } };
    ws.getCell(`A${row}`).alignment = { horizontal: 'right' };
    ws.mergeCells(`B${row}:D${row}`);
    ws.getCell(`B${row}`).value = val;
    ws.getCell(`B${row}`).font = { name: 'Calibri', size: 10, color: { argb: 'FF' + XL_COLORS.slate900 } };
  });
  
  // KPI Section
  ws.mergeCells('A10:H10');
  ws.getCell('A10').value = '  KEY PERFORMANCE INDICATORS';
  xlStyleSection(ws.getCell('A10'), 'teal');
  ws.getRow(10).height = 22;
  
  // Calculate KPIs
  const totalSkus = counts.length;
  const totalItems = counts.reduce((s, c) => s + (c.counted_qty || 0), 0);
  const l1Count = counts.filter(c => c.variance_level === 1).length;
  const accuracy = totalSkus > 0 ? (l1Count / totalSkus) : 0;
  let shrinkage = 0;
  counts.forEach(c => {
    if ((c.diff || 0) < 0) shrinkage += Math.abs(c.diff) * (c.products?.sell_price || 0);
  });
  
  // 4 KPI cards
  const kpis = [
    { label: 'Total SKUs Counted', value: totalSkus, color: 'teal', fmt: '#,##0' },
    { label: 'Total Items', value: totalItems, color: 'sky', fmt: '#,##0' },
    { label: 'Accuracy', value: accuracy, color: 'emerald', fmt: '0.0%' },
    { label: 'Shrinkage Value', value: shrinkage, color: 'rose', fmt: '#,##0" K"' },
  ];
  
  kpis.forEach((kpi, i) => {
    const startCol = i * 2 + 2; // B, D, F, H
    const colStart = String.fromCharCode(64 + startCol);
    const colEnd = String.fromCharCode(64 + startCol + 1);
    
    ws.mergeCells(`${colStart}12:${colEnd}12`);
    ws.getCell(`${colStart}12`).value = kpi.value;
    ws.getCell(`${colStart}12`).numFmt = kpi.fmt;
    xlStyleKpiValue(ws.getCell(`${colStart}12`), kpi.color);
    
    ws.mergeCells(`${colStart}13:${colEnd}13`);
    ws.getCell(`${colStart}13`).value = kpi.label;
    xlStyleKpiLabel(ws.getCell(`${colStart}13`), kpi.color);
  });
  
  ws.getRow(12).height = 42;
  ws.getRow(13).height = 20;
  
  // Variance Breakdown
  ws.mergeCells('A15:H15');
  ws.getCell('A15').value = '  VARIANCE BREAKDOWN';
  xlStyleSection(ws.getCell('A15'), 'amber');
  ws.getRow(15).height = 22;
  
  ['Level', 'Description', 'Count', '%', 'Action Required'].forEach((h, i) => {
    const cell = ws.getCell(17, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'slate500');
  });
  if (true) { ws.mergeCells('E17:H17'); }
  ws.getRow(17).height = 22;
  
  const vt = window._varianceThresholds || { vsL1Pct: 2, vsL1Val: 30000, vsL2Pct: 5, vsL2Val: 100000, vsL3Pct: 10, vsL3Val: 300000 };
  const fmtK = (v) => v >= 1000 ? `${v/1000}K` : `${v}`;
  
  const variances = [
    ['L1', `Auto Adjust (<${vt.vsL1Pct}% & <${fmtK(vt.vsL1Val)})`, counts.filter(c => c.variance_level === 1).length, 'emerald', 'Approve automatically'],
    ['L2', `Explain (${vt.vsL1Pct}-${vt.vsL2Pct}% or ${fmtK(vt.vsL1Val)}-${fmtK(vt.vsL2Val)})`, counts.filter(c => c.variance_level === 2).length, 'amber', 'Manager must add explanation'],
    ['L3', `Mandatory Recount (>${vt.vsL2Pct}% or >${fmtK(vt.vsL2Val)})`, counts.filter(c => c.variance_level === 3).length, 'rose', 'Re-count required'],
    ['L4', `Investigation (>${vt.vsL3Pct}% or >${fmtK(vt.vsL3Val)})`, counts.filter(c => c.variance_level === 4).length, 'rose', 'Escalate to investigation'],
  ];
  
  variances.forEach((v, idx) => {
    const r = 18 + idx;
    ws.getCell(`A${r}`).value = v[0];
    ws.getCell(`B${r}`).value = v[1];
    ws.getCell(`C${r}`).value = v[2];
    ws.getCell(`D${r}`).value = totalSkus > 0 ? v[2] / totalSkus : 0;
    ws.mergeCells(`E${r}:H${r}`);
    ws.getCell(`E${r}`).value = v[4];
    
    xlStyleData(ws.getCell(`A${r}`), { align: 'center', bold: true, color: v[3], fill: v[3] + 'Light', size: 11 });
    xlStyleData(ws.getCell(`B${r}`));
    xlStyleData(ws.getCell(`C${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`D${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`E${r}`));
    ws.getCell(`D${r}`).numFmt = '0.0%';
  });
  
  // Gondola Progress
  ws.mergeCells('A23:H23');
  ws.getCell('A23').value = '  GONDOLA PROGRESS';
  xlStyleSection(ws.getCell('A23'), 'violet');
  ws.getRow(23).height = 22;
  
  ['Status', 'Description', 'Count', '%'].forEach((h, i) => {
    const cell = ws.getCell(25, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'slate500');
  });
  ws.getRow(25).height = 22;
  
  const gondoTotal = gondolas.length;
  const gondoStats = [
    ['Completed', 'Done & Verified', gondolas.filter(g => g.status === 'completed').length, 'emerald'],
    ['In Progress', 'Counting/Verifying', gondolas.filter(g => ['counting', 'verifying', 'tiebreaker'].includes(g.status)).length, 'teal'],
    ['Waiting', 'Waiting for next step', gondolas.filter(g => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed'].includes(g.status)).length, 'amber'],
    ['Not Started', 'Closed/Not opened', gondolas.filter(g => ['closed', 'open_for_counting'].includes(g.status)).length, 'slate500'],
  ];
  
  gondoStats.forEach((g, idx) => {
    const r = 26 + idx;
    ws.getCell(`A${r}`).value = g[0];
    ws.getCell(`B${r}`).value = g[1];
    ws.getCell(`C${r}`).value = g[2];
    ws.getCell(`D${r}`).value = gondoTotal > 0 ? g[2] / gondoTotal : 0;
    
    const lightFill = g[3] === 'slate500' ? 'slate100' : g[3] + 'Light';
    xlStyleData(ws.getCell(`A${r}`), { align: 'center', bold: true, color: g[3], fill: lightFill, size: 11 });
    xlStyleData(ws.getCell(`B${r}`));
    xlStyleData(ws.getCell(`C${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`D${r}`), { align: 'center' });
    ws.getCell(`D${r}`).numFmt = '0.0%';

function buildCountsSheet(wb, counts) {
  const ws = wb.addWorksheet('Counts Detail', { views: [{ showGridLines: false, state: 'frozen', ySplit: 3 }] });
  
  ws.mergeCells('A1:P1');
  ws.getCell('A1').value = 'STOCK COUNTS - DETAILED LIST';
  xlStyleTitle(ws.getCell('A1'), 'teal', 16);
  ws.getRow(1).height = 28;
  
  const headers = [
    'Count ID', 'Counted At', 'User', 'Role', 'Location', 'Zone', 'Barcode', 'Product Name',
    'Unit Price (K)', 'POS Qty', 'Counted Qty', 'Unit', 'Diff', 'Var Level', 'Workflow', 'Note'
  ];
  headers.forEach((h, i) => {
    const cell = ws.getCell(3, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'teal');
  });
  ws.getRow(3).height = 32;
  
  counts.forEach((c, idx) => {
    const r = 4 + idx;
    const p = c.products || {};
    const u = c.users || {};
    const name = (lang === 'lo' ? p.name_lo : p.name_th) || p.name_th || p.name_lo || '';
    
    const row = [
      c.id?.substring(0, 8) || '',
      c.counted_at ? new Date(c.counted_at).toLocaleString('en-GB') : '',
      u.full_name || u.username || '',
      c.count_role || '',
      c.location_code || c.gondola_code || '',
      c.zone_id || '',
      p.barcode || '',
      name,
      p.sell_price || 0,
      c.pos_qty_snapshot || 0,
      c.counted_qty || 0,
      p.unit_th || p.unit_lo || 'pcs',
      c.diff || 0,
      c.variance_level || '',
      c.workflow_status || '',
      c.note || ''
    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [4, 6, 12, 14, 15].includes(col) ? 'center' : ([9, 10, 11, 13].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });
    });
    
    // Number formats
    ws.getCell(r, 9).numFmt = '#,##0';
    ws.getCell(r, 10).numFmt = '#,##0';
    ws.getCell(r, 11).numFmt = '#,##0';
    ws.getCell(r, 13).numFmt = '#,##0;[Red](#,##0);"-"';
    
    // Color-code Diff
    const diff = c.diff || 0;
    if (diff < 0) ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
    else if (diff > 0) ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.amberLight } };
    else ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
    
    // Color-code Variance Level
    const lv = c.variance_level || 0;
    if (lv >= 3) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
    else if (lv === 2) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.amberLight } };
    else if (lv === 1) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
  });
  
  // Column widths
  const widths = [10, 18, 14, 11, 10, 7, 16, 32, 12, 9, 11, 8, 10, 11, 13, 28];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  // Auto filter
  if (counts.length > 0) {
    ws.autoFilter = { from: { row: 3, column: 1 }, to: { row: 3, column: 16 } };
  }
}

function buildVarianceSheet(wb, counts) {
  const ws = wb.addWorksheet('Variance Analysis', { views: [{ showGridLines: false, state: 'frozen', ySplit: 4 }] });
  
  ws.mergeCells('A1:K1');
  ws.getCell('A1').value = 'VARIANCE ANALYSIS - Items Requiring Attention';
  xlStyleTitle(ws.getCell('A1'), 'rose', 16);
  
  ws.mergeCells('A2:K2');
  ws.getCell('A2').value = 'Sorted by Variance Level (highest first) | Filter L3-L4 for critical items';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  const headers = ['Priority', 'Location', 'Barcode', 'Product Name', 'POS Qty', 'Counted Qty', 'Diff', 'Diff %', 'Value Impact (K)', 'Var Level', 'Action'];
  headers.forEach((h, i) => {
    const cell = ws.getCell(4, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'rose');
  });
  ws.getRow(4).height = 32;
  
  const sorted = [...counts].filter(c => (c.variance_level || 0) >= 2)
    .sort((a, b) => (b.variance_level || 0) - (a.variance_level || 0));
  
  sorted.forEach((c, idx) => {
    const r = 5 + idx;
    const p = c.products || {};
    const lv = c.variance_level || 1;
    const priority = lv === 4 ? '🔴 HIGH' : lv === 3 ? '🟠 MED' : '🟡 LOW';
    const action = lv === 4 ? 'Investigate' : lv === 3 ? 'Recount' : 'Explain';
    const pctDiff = c.pos_qty_snapshot > 0 ? (c.diff || 0) / c.pos_qty_snapshot : 0;
    const valueImpact = (c.diff || 0) * (p.sell_price || 0);
    
    const row = [
      priority, c.location_code || c.gondola_code || '', p.barcode || '',
      (lang === 'lo' ? p.name_lo : p.name_th) || '',
      c.pos_qty_snapshot || 0, c.counted_qty || 0, c.diff || 0,
      pctDiff, valueImpact, lv, action
    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [1, 10].includes(col) ? 'center' : ([5, 6, 7, 8, 9].includes(col) ? 'right' : 'left');
      const fill = lv === 4 ? 'roseLight' : lv === 3 ? 'amberLight' : 'tealLight';
      xlStyleData(cell, { align, size: 9, fill: col === 1 ? fill : null });
    });
    
    ws.getCell(r, 7).numFmt = '#,##0;[Red](#,##0)';
    ws.getCell(r, 8).numFmt = '0.0%';
    ws.getCell(r, 9).numFmt = '#,##0" K"';
  });
  
  const widths = [10, 11, 16, 30, 9, 11, 10, 9, 14, 10, 28];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  if (sorted.length > 0) {
    ws.autoFilter = { from: { row: 4, column: 1 }, to: { row: 4, column: 11 } };
  }
}

function buildGondolaSheet(wb, gondolas) {
  const ws = wb.addWorksheet('Gondola Progress', { views: [{ showGridLines: false, state: 'frozen', ySplit: 7 }] });
  
  ws.mergeCells('A1:L1');
  ws.getCell('A1').value = 'GONDOLA WORKFLOW PROGRESS';
  xlStyleTitle(ws.getCell('A1'), 'violet', 16);
  
  ws.mergeCells('A2:L2');
  ws.getCell('A2').value = 'Status of each location being counted';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  // Stats
  const total = gondolas.length;
  const completed = gondolas.filter(g => g.status === 'completed').length;
  const inProgress = gondolas.filter(g => ['counting', 'verifying'].includes(g.status)).length;
  
  [

    valCell.font = { name: 'Calibri', size: 14, bold: true, color: { argb: 'FF' + XL_COLORS.violet } };
    valCell.alignment = { horizontal: 'center' };
  });
  
  const headers = ['Location', 'Type', 'Zone', 'Gondola #', 'Status', 'Counter', 'Counter Qty', 'Verifier', 'Verifier Qty', 'Time (min)', 'Opened', 'Completed'];
  headers.forEach((h, i) => {

      g.verifier_name || '', g.verifier_count || 0, Math.round(g.counter_minutes || 0),
      g.opened_at ? new Date(g.opened_at).toLocaleString('en-GB') : '',
      g.completed_at ? new Date(g.completed_at).toLocaleString('en-GB') : ''
    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [1, 2, 3, 4, 5, 10].includes(col) ? 'center' : ([7, 9].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });

    const statusFill = {
      'completed': 'emeraldLight',
      'counting': 'tealLight',

      'tiebreaker_needed': 'roseLight'
    }[g.status];

      ws.getCell(r, 5).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[statusFill] } };

function buildPerformanceSheet(wb, counts) {
  const ws = wb.addWorksheet('Counter Performance', { views: [{ showGridLines: false, state: 'frozen', ySplit: 4 }] });
  
  ws.mergeCells('A1:H1');
  ws.getCell('A1').value = 'COUNTER & VERIFIER PERFORMANCE';
  xlStyleTitle(ws.getCell('A1'), 'sky', 16);
  
  ws.mergeCells('A2:H2');
  ws.getCell('A2').value = 'Productivity & Accuracy by User';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  const headers = ['User', 'Role', 'SKUs Counted', 'Total Items', 'Locations', 'L1 Counts', 'Issues (L2-L4)', 'Accuracy %'];
  headers.forEach((h, i) => {
    const cell = ws.getCell(4, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'sky');
  });
  ws.getRow(4).height = 32;
  
  const perfMap = {};
  counts.forEach(c => {
    const u = c.users || {};
    const key = u.full_name || u.username || 'Unknown';
    if (!perfMap[key]) {
      perfMap[key] = { name: key, role: c.count_role, skus: 0, items: 0, locations: new Set(), l1: 0, issues: 0 };
    }
    perfMap[key].skus++;
    perfMap[key].items += c.counted_qty || 0;
    if (c.location_code || c.gondola_code) perfMap[key].locations.add(c.location_code || c.gondola_code);
    if (c.variance_level === 1) perfMap[key].l1++;
    if ((c.variance_level || 0) >= 2) perfMap[key].issues++;
  });
  
  Object.values(perfMap).forEach((p, idx) => {
    const r = 5 + idx;
    const accuracy = p.skus > 0 ? (p.l1 / p.skus) : 0;
    const row = [p.name, p.role, p.skus, p.items, p.locations.size, p.l1, p.issues, accuracy];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [2].includes(col) ? 'center' : ([3, 4, 5, 6, 7].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });
    });
    
    ws.getCell(r, 8).numFmt = '0.0%';
    // Color accuracy
    if (accuracy >= 0.95) ws.getCell(r, 8).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
    else if (accuracy < 0.90) ws.getCell(r, 8).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
  });
  
  const widths = [14, 11, 13, 12, 11, 11, 14, 12];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  if (Object.keys(perfMap).length > 0) {
    ws.autoFilter = { from: { row: 4, column: 1 }, to: { row: 4, column: 8 } };
  }
}

      <div class="fm-legend-item"><span class="fm-legend-box" style="background:var(--teal-500);"></span><span>${T('status_counting')}</span></div>
      <div class="fm-legend-item"><span class="fm-legend-box" style="background:var(--amber-500);"></span><span>${T('status_verifying')}</span></div>
      <div class="fm-legend-item"><span class="fm-legend-box" style="background:var(--rose-500);"></span><span>${T('status_tiebreaker_needed')}</span></div>
      <div class="fm-legend-item"><span class="fm-legend-box" style="background:var(--emerald-500);"></span><span>${T('completed_lo')}</span></div>
    </div>
    
    <div id="floorMapContent">
      <div class="empty-state"><p>กำลังโหลด...</p></div>
    </div>
  `;
}

async function loadFloorMap() {
  if (!branch) return;
  
  log('Loading floor map for branch:', branch.id);
  
  // Parallel: floor map data + Pan-O-Gram counts per location
  const [fmRes, pogRes] = await Promise.all([
    sb.rpc('get_floor_map_data', { p_branch_id: branch.id }),
    sb.from('pan_o_grams').select('location_code').eq('branch_id', branch.id)
  ]);
  
  if (fmRes.error) {
    log('Floor map error:', fmRes.error);
    showToast('Error: ' + fmRes.error.message, 'error');
    return;
  }
  
  // Cache PoG count per location
  window._pogCountByLoc = {};
  (pogRes.data || []).forEach(p => {
    window._pogCountByLoc[p.location_code] = (window._pogCountByLoc[p.location_code] || 0) + 1;
  });
  
  log('Floor map data:', fmRes.data, 'PoG locations:', Object.keys(window._pogCountByLoc).length);
  renderFloorMapContent(fmRes.data || {});
}

function renderFloorMapContent(data) {
  const el = document.getElementById('floorMapContent');
  if (!el) return;
  
  const saleFloor = data.sale_floor || [];
  const topStock = data.top_stock || [];
  const display = data.display || [];
  const warehouse = data.warehouse || [];
  
  // แยก warehouse 2 ชั้น
  const wh1 = warehouse.filter(w => w.floor === 1);
  const wh2 = warehouse.filter(w => w.floor === 2);
  
  const renderCell = (item) => {
    const status = item.workflow_status || 'closed';
    const total = item.total_products || 0;
    const counted = item.counted_products || 0;
    const issues = item.issues_count || 0;
    const hasIssues = issues > 0 ? 'has-issues' : '';
    const pogCount = (window._pogCountByLoc || {})[item.location_code] || 0;
    
    let progress = '';
    if (total > 0) {
      progress = `<div class="fm-progress">${counted}/${total}</div>`;
    } else if (status !== 'closed') {
      progress = `<div class="fm-progress">${counted}</div>`;
    }
    
    // Pan-O-Gram badge — แสดงเมื่อมี PoG ใน location นี้
    const pogBadge = pogCount > 0 ? `
      <div class="fm-pog-badge" title="${pogCount} Pan-O-Gram positions">
        📐${pogCount}
      </div>
    ` : '';
    
    return `
      <div class="fm-cell s-${status} ${hasIssues} ${pogCount > 0 ? 'has-pog' : ''}" 
           onclick="onFloorMapCellClick('${item.location_code}', '${status}')"
           title="${item.location_code} - ${T('status_'+status)}${item.counter_name ? ' • Counter: '+item.counter_name : ''}${item.verifier_name ? ' • Verifier: '+item.verifier_name : ''}${issues>0 ? ' • Issues: '+issues : ''}${pogCount>0 ? ' • 📐 Pan-O-Gram: '+pogCount : ''}">
        ${pogBadge}
        <div class="fm-code">${item.location_code}</div>
        ${progress}
      </div>
    `;
  };
  
  // ==================== GROUP BY GONDOLA NUMBER ====================
  // Pattern: 01A01 + 01B03 + 01E02 → Gondola 01 group
  function parseFloorMapCode(code) {
    const upper = (code || '').toUpperCase().trim();
    
    // 01A01, 02B03, 10AT05 → number-prefix
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) {
      return {
        groupKey: numMatch[1],
        groupLabel: `Gondola ${numMatch[1]}`,
        type: numMatch[2],
        bay: parseInt(numMatch[3]) || 0
      };
    }
    
    // W028, WT028, WH050 → letter-prefix
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      else if (prefix === 'D') label = 'Display';
      else if (prefix === 'C') label = 'Cashier';
      else if (prefix === 'R') label = 'Rack';
      return {
        groupKey: 'z' + prefix,
        groupLabel: label,
        type: prefix,
        bay: parseInt(letterMatch[2]) || 0
      };
    }
    
    return {
      groupKey: 'zzz_other',
      groupLabel: '?',
      type: '?',
      bay: 0
    };
  }
  
  // Render items grouped by Gondola Number
  const renderGroupedCells = (items, gridClass = 'fm-grid') => {
    if (!items || items.length === 0) return '';
    
    // Group by Gondola Number
    const groups = {};
    items.forEach(item => {
      const parsed = parseFloorMapCode(item.location_code);
      if (!groups[parsed.groupKey]) {
        groups[parsed.groupKey] = {
          key: parsed.groupKey,
          label: parsed.groupLabel,
          items: []
        };
      }
      groups[parsed.groupKey].items.push({ ...item, _parsed: parsed });
    });
    
    // Sort groups: numbers first (01, 02, 03...), then letters (zW, zWT...)
    const sortedGroups = Object.values(groups).sort((a, b) => 
      a.key.localeCompare(b.key, undefined, { numeric: true })
    );
    
    // Sort items within group: by type (A → B → AT...), then bay (1, 2, 3, 10...)
    sortedGroups.forEach(g => {
      g.items.sort((a, b) => {
        const tA = a._parsed.type || '';
        const tB = b._parsed.type || '';
        if (tA !== tB) return tA.localeCompare(tB);
        return a._parsed.bay - b._parsed.bay;
      });
    });
    
    // If only one group with single type → just show flat grid (no need for grouping UI)
    if (sortedGroups.length === 1) {
      const onlyGroup = sortedGroups[0];
      const uniqueTypes = new Set(onlyGroup.items.map(x => x._parsed.type));
      if (uniqueTypes.size <= 1) {
        return `<div class="${gridClass}">${onlyGroup.items.map(renderCell).join('')}</div>`;
      }
    }
    
    // Render grouped
    return sortedGroups.map(group => {
      // Stats per group
      const total = group.items.length;
      const completed = group.items.filter(x => x.workflow_status === 'completed').length;
      const inProgress = group.items.filter(x => ['counting', 'verifying', 'tiebreaker'].includes(x.workflow_status)).length;
      const pendingItems = group.items.filter(x => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed'].includes(x.workflow_status)).length;
      const issuesCount = group.items.filter(x => (x.issues_count || 0) > 0).length;
      const pogCount = group.items.filter(x => (window._pogCountByLoc || {})[x.location_code] > 0).length;
      
      // Progress bar color
      let progressColor = 'var(--slate-300)';
      const progressPct = total > 0 ? (completed / total) * 100 : 0;
      if (progressPct === 100) progressColor = 'var(--emerald-500)';
      else if (progressPct > 0) progressColor = 'var(--teal-500)';
      else if (inProgress > 0 || pendingItems > 0) progressColor = 'var(--amber-500)';
      
      return `
        <div class="fm-group">
          <div class="fm-group-header">
            <div class="fm-group-title">
              <span class="fm-group-label">${group.label}</span>
              <span class="fm-group-count">${total}</span>
            </div>
            <div class="fm-group-progress-bar">
              <div class="fm-group-progress-fill" style="width:${progressPct}%;background:${progressColor};"></div>
            </div>
            <div class="fm-group-stats">
              ${completed > 0 ? `<span class="fm-group-stat-em" title="Completed">✅ ${completed}</span>` : ''}
              ${inProgress > 0 ? `<span class="fm-group-stat-tl" title="In Progress">⏳ ${inProgress}</span>` : ''}
              ${pendingItems > 0 ? `<span class="fm-group-stat-am" title="Pending">⏸ ${pendingItems}</span>` : ''}
              ${issuesCount > 0 ? `<span class="fm-group-stat-rs" title="Issues">⚠️ ${issuesCount}</span>` : ''}
              ${pogCount > 0 ? `<span class="fm-group-stat-vt" title="Has Pan-O-Gram">📐 ${pogCount}</span>` : ''}
            </div>
          </div>
          <div class="${gridClass}">${group.items.map(renderCell).join('')}</div>
        </div>
      `;
    }).join('');
  };
  
  el.innerHTML = `
    <!-- Sale Floor -->
    ${saleFloor.length > 0 ? `
      <div class="fm-section" id="fmSecSale">
        <div class="fm-title">
          <span class="fm-title-emoji">🏬</span>
          <span>${T('sale_floor')}</span>
          <span class="fm-title-count">${saleFloor.length} ${T('points') || 'จุด'}</span>
        </div>
        ${renderGroupedCells(saleFloor)}
      </div>
    ` : ''}
    
    <!-- Top Stock -->
    ${topStock.length > 0 ? `
      <div class="fm-section" id="fmSecTop">
        <div class="fm-title">
          <span class="fm-title-emoji">📦</span>
          <span>${T('top_stock_area')}</span>
          <span class="fm-title-count">${topStock.length} ${T('points') || 'จุด'}</span>
        </div>
        ${renderGroupedCells(topStock)}
      </div>
    ` : ''}
    
    <!-- Display & Others -->
    ${display.length > 0 ? `
      <div class="fm-section" id="fmSecDisplay">
        <div class="fm-title">
          <span class="fm-title-emoji">🎯</span>
          <span>${T('display_area')}</span>
          <span class="fm-title-count">${display.length} ${T('points') || 'จุด'}</span>
        </div>
        ${renderGroupedCells(display)}
      </div>
    ` : ''}
    
    <!-- Warehouse 1 -->
    ${wh1.length > 0 ? `
      <div class="fm-section" id="fmSecWh1">
        <div class="fm-title">
          <span class="fm-title-emoji">🏭</span>
          <span>${T('warehouse_1')}</span>
          <span class="fm-title-count">${wh1.length} ${T('points') || 'จุด'}</span>
        </div>
        ${renderGroupedCells(wh1, 'fm-grid fm-grid-wh')}
      </div>
    ` : ''}
    
    <!-- Warehouse 2 -->
    ${wh2.length > 0 ? `
      <div class="fm-section" id="fmSecWh2">
        <div class="fm-title">
          <span class="fm-title-emoji">🏭</span>
          <span>${T('warehouse_2')}</span>
          <span class="fm-title-count">${wh2.length} ${T('points') || 'จุด'}</span>
        </div>
        ${renderGroupedCells(wh2, 'fm-grid fm-grid-wh')}
      </div>
    ` : ''}
  `;
  
  // Render Quick Nav FAB based on which sections exist
  renderQuickNav({
    sale: saleFloor.length,
    top: topStock.length,
    display: display.length,
    wh1: wh1.length,
    wh2: wh2.length
  }, getStatusCounts(data), data);
}

// ==================== FLOOR MAP SEARCH ====================
let _fmSearchTimer = null;

function onFloorMapSearchInput(value) {
  const clearBtn = document.getElementById('fmSearchClear');
  if (clearBtn) {
    clearBtn.style.display = value.trim() ? 'flex' : 'none';
  }
  
  clearTimeout(_fmSearchTimer);
  _fmSearchTimer = setTimeout(() => {
    renderFloorMapSearchResults(value.trim().toUpperCase());
  }, 150);
}

function onFloorMapSearchKeydown(event) {
  if (event.key === 'Escape') {
    clearFloorMapSearch();
  } else if (event.key === 'Enter') {
    event.preventDefault();
    // กด Enter → ถ้ามี 1 ผลลัพธ์เด่นๆ → กดเลย
    const searchVal = event.target.value.trim().toUpperCase();
    const matches = findFloorMapMatches(searchVal);
    if (matches.length === 1) {
      onFloorMapResultClick(matches[0].location_code);
    } else if (matches.length > 0) {
      // jump ไปอันแรกก่อน
      jumpToFloorMapCell(matches[0].location_code);
    }
  }
}

function clearFloorMapSearch() {
  const inp = document.getElementById('fmSearchInput');
  const clearBtn = document.getElementById('fmSearchClear');
  const results = document.getElementById('fmSearchResults');
  if (inp) inp.value = '';
  if (clearBtn) clearBtn.style.display = 'none';
  if (results) {
    results.style.display = 'none';
    results.innerHTML = '';
  }
}

function findFloorMapMatches(searchVal) {
  if (!searchVal || !window._fmAllData) return [];
  
  const all = [
    ...(window._fmAllData.sale_floor || []),
    ...(window._fmAllData.top_stock || []),
    ...(window._fmAllData.display || []),
    ...(window._fmAllData.warehouse || [])
  ];
  
  return all.filter(loc => (loc.location_code || '').toUpperCase().includes(searchVal));
}

function renderFloorMapSearchResults(searchVal) {
  const resultsEl = document.getElementById('fmSearchResults');
  if (!resultsEl) return;
  
  if (!searchVal) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
    return;
  }
  
  const matches = findFloorMapMatches(searchVal);
  const isLao = lang === 'lo';
  
  if (matches.length === 0) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `
      <div style="text-align:center;padding:20px;color:var(--slate-400);font-size:12px;">
        ${isLao ? 'ບໍ່ພົບ' : 'ไม่พบ'} "${searchVal}"
      </div>
    `;
    return;
  }
  
  // Sort by exact match first
  matches.sort((a, b) => {
    const aExact = a.location_code.toUpperCase() === searchVal ? 0 : 1;
    const bExact = b.location_code.toUpperCase() === searchVal ? 0 : 1;
    if (aExact !== bExact) return aExact - bExact;
    return (a.location_code || '').localeCompare(b.location_code || '', undefined, { numeric: true });
  });
  
  // Status color/icon helpers
  const statusInfo = (s) => {
    const map = {
      'closed': { color: 'var(--slate-400)', icon: '⚪', label: isLao ? 'ປິດ' : 'ปิด' },
      'open_for_counting': { color: 'var(--teal-300)', icon: '🔵', label: isLao ? 'ເປີດໃຫ້ນັບ' : 'เปิดให้นับ' },
      'counting': { color: 'var(--teal-500)', icon: '🔢', label: isLao ? 'ກຳລັງນັບ' : 'กำลังนับ' },
      'counted': { color: 'var(--amber-500)', icon: '✓', label: isLao ? 'ນັບແລ້ວ' : 'นับแล้ว' },
      'open_for_verify': { color: 'var(--amber-400)', icon: '👁️', label: isLao ? 'ເປີດກວດ' : 'เปิดตรวจ' },
      'verifying': { color: 'var(--amber-500)', icon: '🔍', label: isLao ? 'ກຳລັງກວດ' : 'กำลังตรวจ' },
      'verified': { color: 'var(--violet-500)', icon: '☑️', label: isLao ? 'ກວດແລ້ວ' : 'ตรวจแล้ว' },
      'tiebreaker_needed': { color: 'var(--rose-500)', icon: '⚠️', label: isLao ? 'ກວດໃໝ່' : 'ตรวจใหม่' },
      'tiebreaker': { color: 'var(--violet-600)', icon: '🔄', label: isLao ? 'ກຳລັງກວດໃໝ່' : 'กำลังตรวจใหม่' },
      'completed': { color: 'var(--emerald-500)', icon: '✅', label: isLao ? 'ສຳເລັດ' : 'เสร็จ' }
    };
    return map[s] || { color: 'var(--slate-400)', icon: '⚪', label: s };
  };
  
  // จำกัด 30 ผลลัพธ์
  const limit = 30;
  const showItems = matches.slice(0, limit);
  
  let html = `
    <div style="padding:6px 11px;background:var(--violet-100);border-bottom:1px solid var(--slate-200);font-size:10px;color:var(--violet-600);font-weight:700;">
      ${matches.length} ${isLao ? 'ຜົນລັບ' : 'ผลลัพธ์'}${matches.length > limit ? ` (${isLao ? 'ສະແດງ' : 'แสดง'} ${limit})` : ''}
    </div>
  `;
  
  showItems.forEach(loc => {
    const status = loc.workflow_status || 'closed';
    const si = statusInfo(status);
    const total = loc.total_products || 0;
    const counted = loc.counted_products || 0;
    const pogCount = (window._pogCountByLoc || {})[loc.location_code] || 0;
    
    html += `
      <div onclick="onFloorMapResultClick('${loc.location_code}')"
           style="display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--slate-100);cursor:pointer;transition:background 0.1s;"
           onmouseover="this.style.background='var(--violet-100)';"
           onmouseout="this.style.background='white';">
        <div style="background:${si.color};color:white;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">
          ${si.icon}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Space Grotesk',monospace;font-weight:800;font-size:13px;color:var(--slate-900);">
            ${loc.location_code}
            ${pogCount > 0 ? `<span style="background:var(--violet-100);color:var(--violet-600);padding:1px 5px;border-radius:4px;font-size:9px;margin-left:5px;">📐${pogCount}</span>` : ''}
          </div>
          <div style="font-size:10px;color:var(--slate-500);">
            ${si.label} ${total > 0 ? `• ${counted}/${total}` : ''}
            ${loc.counter_name ? ` • 👤 ${loc.counter_name}` : ''}
          </div>
        </div>
        <div style="font-size:11px;color:var(--violet-500);font-weight:700;flex-shrink:0;">
          →
        </div>
      </div>
    `;
  });
  
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = html;
}

function onFloorMapResultClick(locationCode) {
  // ปิด dropdown
  const resultsEl = document.getElementById('fmSearchResults');
  if (resultsEl) resultsEl.style.display = 'none';
  
  // หา status ของ location นี้
  const all = [
    ...(window._fmAllData?.sale_floor || []),
    ...(window._fmAllData?.top_stock || []),
    ...(window._fmAllData?.display || []),
    ...(window._fmAllData?.warehouse || [])
  ];
  const loc = all.find(l => l.location_code === locationCode);
  if (!loc) return;
  
  // Scroll ไปและ trigger click (เพื่อเปิด action modal)
  jumpToFloorMapCell(locationCode);
  
  // หลังจาก scroll/flash เสร็จ → ค่อย trigger click เพื่อเปิด modal
  setTimeout(() => {
    onFloorMapCellClick(locationCode, loc.workflow_status || 'closed');
  }, 700);
}

function jumpToFloorMapCell(locationCode) {
  const cells = document.querySelectorAll('.fm-cell');
  let foundCell = null;
  cells.forEach(c => {
    const codeEl = c.querySelector('.fm-code');
    if (codeEl && codeEl.textContent.trim() === locationCode) {
      foundCell = c;
    }
  });
  
  if (foundCell) {
    foundCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
    
    // Flash highlight
    foundCell.style.transition = 'transform 0.3s, box-shadow 0.3s';
    foundCell.style.transform = 'scale(1.2)';
    foundCell.style.boxShadow = '0 0 0 4px var(--violet-500), 0 8px 24px rgba(139,92,246,0.4)';
    foundCell.style.zIndex = '10';
    foundCell.style.position = 'relative';
    
    setTimeout(() => {
      foundCell.style.transform = '';
      foundCell.style.boxShadow = '';
      setTimeout(() => {
        foundCell.style.transition = '';
        foundCell.style.zIndex = '';
      }, 400);
    }, 1000);
  }
}

// ==================== END FLOOR MAP SEARCH ====================
// คำนวณ status counts จากข้อมูลทั้งหมด
function getStatusCounts(data) {
  const all = [
    ...(data.sale_floor || []),
    ...(data.top_stock || []),
    ...(data.display || []),
    ...(data.warehouse || [])
  ];
  
  const counts = {
    open_for_counting: 0,
    counting: 0,
    counted: 0,
    open_for_verify: 0,
    verifying: 0,
    verified: 0,
    tiebreaker_needed: 0,
    tiebreaker: 0,
    completed: 0
  };
  
  all.forEach(item => {
    const s = item.workflow_status;
    if (counts[s] !== undefined) counts[s]++;
  });
  
  return counts;
}

// ==================== QUICK NAV FAB ====================
function renderQuickNav(counts, statusCounts, allData) {
  // Remove existing
  const existing = document.getElementById('qnavWrap');
  if (existing) existing.remove();
  const existingBd = document.getElementById('qnavBackdrop');
  if (existingBd) existingBd.remove();
  
  // Cache data for jump-to-status feature
  window._fmAllData = allData || null;
  
  const isLao = lang === 'lo';
  
  // Build Status quick-jump items
  const statusItems = [];
  if (statusCounts) {
    // 🔵 เปิดให้นับ (พร้อมรอ Counter)
    if (statusCounts.open_for_counting > 0) statusItems.push({ 
      type: 'status', key: 'open_for_counting', 
      icon: '🔵', cls: 'status-open-counting',
      label: isLao ? 'ເປີດໃຫ້ນັບ (ລໍຖ້າ)' : 'เปิดให้นับ (รอ)', 
      count: statusCounts.open_for_counting,
      bgColor: 'var(--teal-300)'
    });
    if (statusCounts.counting > 0) statusItems.push({ 
      type: 'status', key: 'counting', 
      icon: '🔢', cls: 'status-counting',
      label: isLao ? 'ກຳລັງນັບ' : 'กำลังนับ', 
      count: statusCounts.counting,
      bgColor: 'var(--teal-500)'
    });
    if (statusCounts.counted > 0) statusItems.push({ 
      type: 'status', key: 'counted', 
      icon: '✓', cls: 'status-counted',
      label: isLao ? 'ນັບແລ້ວ ລໍຖ້າຢືນຢັນ' : 'นับแล้ว รอยืนยัน', 
      count: statusCounts.counted,
      bgColor: 'var(--amber-500)'
    });
    if (statusCounts.open_for_verify > 0) statusItems.push({

      </svg>
    </button>
  `;
  document.body.appendChild(wrap);
}

// Jump to first location with the given status
function jumpToStatus(status) {
  toggleQuickNav(false);
  
  const data = window._fmAllData;
  if (!data) return;
  
  // หา location แรกที่มี status นี้
  const allLocations = [
    ...(data.sale_floor || []),
    ...(data.top_stock || []),
    ...(data.display || []),
    ...(data.warehouse || [])
  ];
  
  const matches = allLocations.filter(l => l.workflow_status === status);
  if (matches.length === 0) {
    showToast(lang === 'lo' ? 'ບໍ່ພົບ' : 'ไม่พบ', 'warning');
    return;
  }
  
  const first = matches[0];
  const cells = document.querySelectorAll(`.fm-cell`);
  
  // หา cell ตาม location_code
  let foundCell = null;
  cells.forEach(c => {
    const codeEl = c.querySelector('.fm-code');
    if (codeEl && codeEl.textContent.trim() === first.location_code) {
      foundCell = c;
    }
  });
  
  if (foundCell) {
    foundCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
    
    // Flash highlight effect
    foundCell.style.transition = 'transform 0.3s, box-shadow 0.3s';
    foundCell.style.transform = 'scale(1.2)';
    foundCell.style.boxShadow = '0 0 0 4px var(--violet-500), 0 8px 24px rgba(139,92,246,0.4)';
    foundCell.style.zIndex = '10';
    foundCell.style.position = 'relative';
    
    setTimeout(() => {
      foundCell.style.transform = '';
      foundCell.style.boxShadow = '';
      setTimeout(() => {
        foundCell.style.transition = '';
        foundCell.style.zIndex = '';
      }, 400);
    }, 1000);
    
    // Toast แสดงผล
    const statusLabel = T('status_' + status) || status;
    showToast(`📍 ${first.location_code} • ${statusLabel} (${matches.length} ${lang === 'lo' ? 'ຈຸດ' : 'จุด'})`, 'success');
  }
}

function toggleQuickNav(forceState) {
  const menu = document.getElementById('qnavMenu');
  const fab = document.getElementById('qnavFab');
  const bd = document.getElementById('qnavBackdrop');
  if (!menu || !fab) return;
  
  const willOpen = forceState !== undefined ? forceState : !menu.classList.contains('is-open');
  
  if (willOpen) {
    menu.classList.add('is-open');
    fab.classList.add('is-open');
    if (bd) bd.classList.add('is-open');
  } else {
    menu.classList.remove('is-open');
    fab.classList.remove('is-open');
    if (bd) bd.classList.remove('is-open');
  }
}

function jumpToSection(sectionId) {
  toggleQuickNav(false);
  const sec = document.getElementById(sectionId);
  if (!sec) return;
  
  // Smooth scroll with offset for sticky topbar
  const topbarHeight = 70; // approximate
  const rect = sec.getBoundingClientRect();
  const targetY = window.pageYOffset + rect.top - topbarHeight;
  window.scrollTo({ top: targetY, behavior: 'smooth' });
  
  // Flash highlight
  sec.classList.remove('is-flashed');
  void sec.offsetWidth; // restart animation
  sec.classList.add('is-flashed');
  setTimeout(() => sec.classList.remove('is-flashed'), 1300);
}

// Auto-cleanup Quick Nav when leaving Floor Map page
function cleanupQuickNav() {
  const w = document.getElementById('qnavWrap');
  if (w) w.remove();
  const b = document.getElementById('qnavBackdrop');
  if (b) b.remove();
}

async function saveEditGondola() {
  const isLao = lang === 'lo';
  const errEl = document.getElementById('editGonErr');
  const btn = document.getElementById('editGonSaveBtn');
  
  const id = parseInt(document.getElementById('editGonId').value);
  const oldCode = document.getElementById('editGonOldCode').value;
  const newCode = document.getElementById('editGonCode').value.trim().toUpperCase();
  const type = document.getElementById('editGonType').value;
  const zoneId = document.getElementById('editGonZone').value || null;
  const desc = document.getElementById('editGonDesc').value.trim();
  const isActive = document.getElementById('editGonActive').value === 'true';
  
  // Validation
  if (!newCode) {
    errEl.textContent = isLao ? 'ກະລຸນາໃສ່ Code' : 'กรุณาใส่ Code';
    errEl.classList.add('show');
    return;
  }
  if (newCode.length < 3 || newCode.length > 10) {
    errEl.textContent = isLao ? 'Code ຕ້ອງມີ 3-10 ໂຕອັກສອນ' : 'Code ต้องมี 3-10 ตัวอักษร';
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  
  try {
    // ตรวจซ้ำใน branch ถ้า code เปลี่ยน
    if (newCode !== oldCode) {
      const { data: exists } = await sb.from('location_master')
        .select('id').eq('branch_id', branch.id).eq('location_code', newCode).maybeSingle();
      if (exists) {
        errEl.textContent = `Code "${newCode}" ${isLao ? 'ມີຢູ່ແລ້ວ' : 'มีอยู่แล้ว'}`;
        errEl.classList.add('show');
        btn.disabled = false;
        return;
      }
    }
    
    // Update location
    const { error: ue } = await sb.from('location_master').update({
      location_code: newCode,
      location_type: type,
      zone_id: zoneId,
      description: desc || null,
      is_active: isActive
    }).eq('id', id);
    
    if (ue) throw ue;
    
    // ถ้า code เปลี่ยน → update related tables
    let updates = [];
    if (newCode !== oldCode) {
      updates.push(
        sb.from('pan_o_grams').update({ location_code: newCode })
          .eq('branch_id', branch.id).eq('location_code', oldCode)
      );
      updates.push(
        sb.from('stock_counts').update({ location_code: newCode })
          .eq('branch_id', branch.id).eq('location_code', oldCode)
      );
      
      const results = await Promise.allSettled(updates);
      results.forEach((r, i) => {
        if (r.status === 'rejected' || r.value?.error) {
          console.warn('[FS] Cascade update warning:', r);
        }
      });
    }
    
    closeModal();
    showToast(`✅ ${isLao ? 'ບັນທຶກສຳເລັດ' : 'บันทึกสำเร็จ'}${newCode !== oldCode ? ` (${oldCode} → ${newCode})` : ''}`, 'success');
    
    // Reload floor map
    await loadZonesAndLocations();
    loadFloorMap();
  } catch (e) {
    console.error('[FS] saveEditGondola error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
  }
}

  const isLao = lang === 'lo';
  const inputEl = document.getElementById('deleteConfirmInput');
  const btn = document.getElementById('confirmDeleteBtn');
  
  if (!inputEl) return;
  const typed = inputEl.value.trim().toUpperCase();
  
  if (typed !== locationCode.toUpperCase()) {
    showToast(isLao ? '❌ ພິມບໍ່ຖືກຕ້ອງ' : '❌ พิมพ์ไม่ตรง', 'error');
    inputEl.style.borderColor = 'var(--rose-500)';
    inputEl.focus();
    return;
  }
  
  btn.disabled = true;
  
  try {
    // 1. Delete pan_o_grams ใน location นี้
    const { error: pe } = await sb.from('pan_o_grams').delete()
      .eq('branch_id', branch.id).eq('location_code', locationCode);

  }
