      <div class="empty-state"><p>аёҒаёіаёҘаёұаёҮа№Ӯаё«аёҘаё”...</p></div>
    </div>
  `;
}

async function loadFloorMap() {
  if (!branch) return;
  
  log('Loading floor map for branch:', branch.id);
  
  // Parallel: floor map data + Pan-O-Gram counts per location
  const [fmRes, pogRes] = await Promise.all([
    sb.rpc('get_floor_map_data', { p_branch_id: branch.id }),
    sb.from('pan_o_grams').select('location_code').eq('branch_id', branch.id)
  ]);
  
  if (fmRes.error) {
    log('Floor map error:', fmRes.error);
    showToast('Error: ' + fmRes.error.message, 'error');
    return;
  }
  
  // Cache PoG count per location
  window._pogCountByLoc = {};
  (pogRes.data || []).forEach(p => {
    window._pogCountByLoc[p.location_code] = (window._pogCountByLoc[p.location_code] || 0) + 1;
  });
  
  log('Floor map data:', fmRes.data, 'PoG locations:', Object.keys(window._pogCountByLoc).length);
  renderFloorMapContent(fmRes.data || {});
}

function renderFloorMapContent(data) {
  const el = document.getElementById('floorMapContent');
  if (!el) return;
  
  const saleFloor = data.sale_floor || [];
  const topStock = data.top_stock || [];
  const display = data.display || [];
  const warehouse = data.warehouse || [];
  
  // а№ҒаёўаёҒ warehouse 2 аёҠаёұа№үаёҷ
  const wh1 = warehouse.filter(w => w.floor === 1);
  const wh2 = warehouse.filter(w => w.floor === 2);
  
  const renderCell = (item) => {
    const status = item.workflow_status || 'closed';
    const total = item.total_products || 0;
    const counted = item.counted_products || 0;
    const issues = item.issues_count || 0;
    const hasIssues = issues > 0 ? 'has-issues' : '';
    const pogCount = (window._pogCountByLoc || {})[item.location_code] || 0;
    
    let progress = '';
    if (total > 0) {
      progress = `<div class="fm-progress">${counted}/${total}</div>`;
    } else if (status !== 'closed') {
      progress = `<div class="fm-progress">${counted}</div>`;
    }
    
    // Pan-O-Gram badge вҖ” а№ҒаёӘаё”аёҮа№ҖаёЎаё·а№ҲаёӯаёЎаёө PoG а№ғаёҷ location аёҷаёөа№ү
    const pogBadge = pogCount > 0 ? `
      <div class="fm-pog-badge" title="${pogCount} Pan-O-Gram positions">
        рҹ“җ${pogCount}
      </div>
    ` : '';
    
    return `
      <div class="fm-cell s-${status} ${hasIssues} ${pogCount > 0 ? 'has-pog' : ''}" 
           onclick="onFloorMapCellClick('${item.location_code}', '${status}')"
           title="${item.location_code} - ${T('status_'+status)}${item.counter_name ? ' вҖў Counter: '+item.counter_name : ''}${item.verifier_name ? ' вҖў Verifier: '+item.verifier_name : ''}${issues>0 ? ' вҖў Issues: '+issues : ''}${pogCount>0 ? ' вҖў рҹ“җ Pan-O-Gram: '+pogCount : ''}">
        ${pogBadge}
        <div class="fm-code">${item.location_code}</div>
        ${progress}
      </div>
    `;
  };
  
  // ==================== GROUP BY GONDOLA NUMBER ====================
  // Pattern: 01A01 + 01B03 + 01E02 вҶ’ Gondola 01 group
  function parseFloorMapCode(code) {
    const upper = (code || '').toUpperCase().trim();
    
    // 01A01, 02B03, 10AT05 вҶ’ number-prefix
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) {
      return {
        groupKey: numMatch[1],
        groupLabel: `Gondola ${numMatch[1]}`,
        type: numMatch[2],
        bay: parseInt(numMatch[3]) || 0
      };
    }
    
    // W028, WT028, WH050 вҶ’ letter-prefix
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      else if (prefix === 'D') label = 'Display';
      else if (prefix === 'C') label = 'Cashier';
      else if (prefix === 'R') label = 'Rack';
      return {
        groupKey: 'z' + prefix,
        groupLabel: label,
        type: prefix,
        bay: parseInt(letterMatch[2]) || 0
      };
    }
    
    return {
      groupKey: 'zzz_other',
      groupLabel: '?',
      type: '?',
      bay: 0
    };
  }
  
  // Render items grouped by Gondola Number
  const renderGroupedCells = (items, gridClass = 'fm-grid') => {
    if (!items || items.length === 0) return '';
    
    // Group by Gondola Number
    const groups = {};
    items.forEach(item => {
      const parsed = parseFloorMapCode(item.location_code);
      if (!groups[parsed.groupKey]) {
        groups[parsed.groupKey] = {
          key: parsed.groupKey,
          label: parsed.groupLabel,
          items: []
        };
      }
      groups[parsed.groupKey].items.push({ ...item, _parsed: parsed });
    });
    
    // Sort groups: numbers first (01, 02, 03...), then letters (zW, zWT...)
    const sortedGroups = Object.values(groups).sort((a, b) => 
      a.key.localeCompare(b.key, undefined, { numeric: true })
    );
    
    // Sort items within group: by type (A вҶ’ B вҶ’ AT...), then bay (1, 2, 3, 10...)
    sortedGroups.forEach(g => {
      g.items.sort((a, b) => {
        const tA = a._parsed.type || '';
        const tB = b._parsed.type || '';
        if (tA !== tB) return tA.localeCompare(tB);
        return a._parsed.bay - b._parsed.bay;
      });
    });
    
    // If only one group with single type вҶ’ just show flat grid (no need for grouping UI)
    if (sortedGroups.length === 1) {
      const onlyGroup = sortedGroups[0];
      const uniqueTypes = new Set(onlyGroup.items.map(x => x._parsed.type));
      if (uniqueTypes.size <= 1) {
        return `<div class="${gridClass}">${onlyGroup.items.map(renderCell).join('')}</div>`;
      }
    }
    
    // Render grouped
    return sortedGroups.map(group => {
      // Stats per group
      const total = group.items.length;
      const completed = group.items.filter(x => x.workflow_status === 'completed').length;
      const inProgress = group.items.filter(x => ['counting', 'verifying', 'tiebreaker'].includes(x.workflow_status)).length;
      const pendingItems = group.items.filter(x => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed'].includes(x.workflow_status)).length;
      const issuesCount = group.items.filter(x => (x.issues_count || 0) > 0).length;
      const pogCount = group.items.filter(x => (window._pogCountByLoc || {})[x.location_code] > 0).length;
      
      // Progress bar color
      let progressColor = 'var(--slate-300)';
      const progressPct = total > 0 ? (completed / total) * 100 : 0;
      if (progressPct === 100) progressColor = 'var(--emerald-500)';
      else if (progressPct > 0) progressColor = 'var(--teal-500)';
      else if (inProgress > 0 || pendingItems > 0) progressColor = 'var(--amber-500)';
      
      return `
        <div class="fm-group">
          <div class="fm-group-header">
            <div class="fm-group-title">
              <span class="fm-group-label">${group.label}</span>
              <span class="fm-group-count">${total}</span>
            </div>
            <div class="fm-group-progress-bar">
              <div class="fm-group-progress-fill" style="width:${progressPct}%;background:${progressColor};"></div>
            </div>
            <div class="fm-group-stats">
              ${completed > 0 ? `<span class="fm-group-stat-em" title="Completed">вң… ${completed}</span>` : ''}
              ${inProgress > 0 ? `<span class="fm-group-stat-tl" title="In Progress">вҸі ${inProgress}</span>` : ''}
              ${pendingItems > 0 ? `<span class="fm-group-stat-am" title="Pending">вҸё ${pendingItems}</span>` : ''}
              ${issuesCount > 0 ? `<span class="fm-group-stat-rs" title="Issues">вҡ пёҸ ${issuesCount}</span>` : ''}
              ${pogCount > 0 ? `<span class="fm-group-stat-vt" title="Has Pan-O-Gram">рҹ“җ ${pogCount}</span>` : ''}
            </div>
          </div>
          <div class="${gridClass}">${group.items.map(renderCell).join('')}</div>
        </div>
      `;
    }).join('');
  };
  
  el.innerHTML = `
    <!-- Sale Floor -->
    ${saleFloor.length > 0 ? `
      <div class="fm-section" id="fmSecSale">
        <div class="fm-title">
          <span class="fm-title-emoji">рҹҸ¬</span>
          <span>${T('sale_floor')}</span>
          <span class="fm-title-count">${saleFloor.length} ${T('points') || 'аёҲаёёаё”'}</span>
        </div>
        ${renderGroupedCells(saleFloor)}
      </div>
    ` : ''}
    
    <!-- Top Stock -->
    ${topStock.length > 0 ? `
      <div class="fm-section" id="fmSecTop">
        <div class="fm-title">
          <span class="fm-title-emoji">рҹ“Ұ</span>
          <span>${T('top_stock_area')}</span>
          <span class="fm-title-count">${topStock.length} ${T('points') || 'аёҲаёёаё”'}</span>
        </div>
        ${renderGroupedCells(topStock)}
      </div>
    ` : ''}
    
    <!-- Display & Others -->
    ${display.length > 0 ? `
      <div class="fm-section" id="fmSecDisplay">
        <div class="fm-title">
          <span class="fm-title-emoji">рҹҺҜ</span>
          <span>${T('display_area')}</span>
          <span class="fm-title-count">${display.length} ${T('points') || 'аёҲаёёаё”'}</span>
        </div>
        ${renderGroupedCells(display)}
      </div>
    ` : ''}
    
    <!-- Warehouse 1 -->
    ${wh1.length > 0 ? `
      <div class="fm-section" id="fmSecWh1">
        <div class="fm-title">
          <span class="fm-title-emoji">рҹҸӯ</span>
          <span>${T('warehouse_1')}</span>
          <span class="fm-title-count">${wh1.length} ${T('points') || 'аёҲаёёаё”'}</span>
        </div>
        ${renderGroupedCells(wh1, 'fm-grid fm-grid-wh')}
      </div>
    ` : ''}
    
    <!-- Warehouse 2 -->
    ${wh2.length > 0 ? `
      <div class="fm-section" id="fmSecWh2">
        <div class="fm-title">
          <span class="fm-title-emoji">рҹҸӯ</span>
          <span>${T('warehouse_2')}</span>
          <span class="fm-title-count">${wh2.length} ${T('points') || 'аёҲаёёаё”'}</span>
        </div>
        ${renderGroupedCells(wh2, 'fm-grid fm-grid-wh')}
      </div>
    ` : ''}
  `;
  
  // Render Quick Nav FAB based on which sections exist
  renderQuickNav({
    sale: saleFloor.length,
    top: topStock.length,
    display: display.length,
    wh1: wh1.length,
    wh2: wh2.length
  }, getStatusCounts(data), data);
}

// ==================== FLOOR MAP SEARCH ====================
let _fmSearchTimer = null;

function onFloorMapSearchInput(value) {
  const clearBtn = document.getElementById('fmSearchClear');
  if (clearBtn) {
    clearBtn.style.display = value.trim() ? 'flex' : 'none';
  }
  
  clearTimeout(_fmSearchTimer);
  _fmSearchTimer = setTimeout(() => {
    renderFloorMapSearchResults(value.trim().toUpperCase());
  }, 150);
}

function onFloorMapSearchKeydown(event) {
  if (event.key === 'Escape') {
    clearFloorMapSearch();
  } else if (event.key === 'Enter') {
    event.preventDefault();
    // аёҒаё” Enter вҶ’ аё–а№үаёІаёЎаёө 1 аёңаёҘаёҘаёұаёһаёҳа№Ңа№Җаё”а№Ҳаёҷа№Ҷ вҶ’ аёҒаё”а№ҖаёҘаёў
    const searchVal = event.target.value.trim().toUpperCase();
    const matches = findFloorMapMatches(searchVal);
    if (matches.length === 1) {
      onFloorMapResultClick(matches[0].location_code);
    } else if (matches.length > 0) {
      // jump а№„аёӣаёӯаёұаёҷа№ҒаёЈаёҒаёҒа№Ҳаёӯаёҷ
      jumpToFloorMapCell(matches[0].location_code);
    }
  }
}

function clearFloorMapSearch() {
  const inp = document.getElementById('fmSearchInput');
  const clearBtn = document.getElementById('fmSearchClear');
  const results = document.getElementById('fmSearchResults');
  if (inp) inp.value = '';
  if (clearBtn) clearBtn.style.display = 'none';
  if (results) {
    results.style.display = 'none';
    results.innerHTML = '';
  }
}

function findFloorMapMatches(searchVal) {
  if (!searchVal || !window._fmAllData) return [];
  
  const all = [
    ...(window._fmAllData.sale_floor || []),
    ...(window._fmAllData.top_stock || []),
    ...(window._fmAllData.display || []),
    ...(window._fmAllData.warehouse || [])
  ];
  
  return all.filter(loc => (loc.location_code || '').toUpperCase().includes(searchVal));
}

function renderFloorMapSearchResults(searchVal) {
  const resultsEl = document.getElementById('fmSearchResults');
  if (!resultsEl) return;
  
  if (!searchVal) {
    resultsEl.style.display = 'none';
    resultsEl.innerHTML = '';
    return;
  }
  
  const matches = findFloorMapMatches(searchVal);
  const isLao = lang === 'lo';
  
  if (matches.length === 0) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `
      <div style="text-align:center;padding:20px;color:var(--slate-400);font-size:12px;">
        ${isLao ? 'аәҡа»Қа»Ҳаәһаә»аәҡ' : 'а№„аёЎа№Ҳаёһаёҡ'} "${searchVal}"
      </div>
    `;
    return;
  }
  
  // Sort by exact match first
  matches.sort((a, b) => {
    const aExact = a.location_code.toUpperCase() === searchVal ? 0 : 1;
    const bExact = b.location_code.toUpperCase() === searchVal ? 0 : 1;
    if (aExact !== bExact) return aExact - bExact;
    return (a.location_code || '').localeCompare(b.location_code || '', undefined, { numeric: true });
  });
  
  // Status color/icon helpers
  const statusInfo = (s) => {
    const map = {
      'closed': { color: 'var(--slate-400)', icon: 'вҡӘ', label: isLao ? 'аәӣаәҙаә”' : 'аёӣаёҙаё”' },
      'open_for_counting': { color: 'var(--teal-300)', icon: 'рҹ”ө', label: isLao ? 'а»Җаәӣаәөаә”а»ғаә«а»үаәҷаәұаәҡ' : 'а№Җаёӣаёҙаё”а№ғаё«а№үаёҷаёұаёҡ' },
      'counting': { color: 'var(--teal-500)', icon: 'рҹ”ў', label: isLao ? 'аәҒаәіаәҘаәұаәҮаәҷаәұаәҡ' : 'аёҒаёіаёҘаёұаёҮаёҷаёұаёҡ' },
      'counted': { color: 'var(--amber-500)', icon: 'вң“', label: isLao ? 'аәҷаәұаәҡа»ҒаәҘа»үаә§' : 'аёҷаёұаёҡа№ҒаёҘа№үаё§' },
      'open_for_verify': { color: 'var(--amber-400)', icon: 'рҹ‘ҒпёҸ', label: isLao ? 'а»Җаәӣаәөаә”аәҒаә§аә”' : 'а№Җаёӣаёҙаё”аё•аёЈаё§аёҲ' },
      'verifying': { color: 'var(--amber-500)', icon: 'рҹ”Қ', label: isLao ? 'аәҒаәіаәҘаәұаәҮаәҒаә§аә”' : 'аёҒаёіаёҘаёұаёҮаё•аёЈаё§аёҲ' },
      'verified': { color: 'var(--violet-500)', icon: 'вҳ‘пёҸ', label: isLao ? 'аәҒаә§аә”а»ҒаәҘа»үаә§' : 'аё•аёЈаё§аёҲа№ҒаёҘа№үаё§' },
      'tiebreaker_needed': { color: 'var(--rose-500)', icon: 'вҡ пёҸ', label: isLao ? 'аәҷаәұаәҡаәҠа»үаәі' : 'аёҷаёұаёҡаёӢа№үаёі' },
      'tiebreaker': { color: 'var(--violet-600)', icon: 'рҹ”„', label: isLao ? 'аәҒаәіаәҘаәұаәҮаәҷаәұаәҡаәҠа»үаәі' : 'аёҒаёіаёҘаёұаёҮаёҷаёұаёҡаёӢа№үаёі' },
      'completed': { color: 'var(--emerald-500)', icon: 'вң…', label: isLao ? 'аәӘаәіа»ҖаәҘаәұаә”' : 'а№ҖаёӘаёЈа№ҮаёҲ' }
    };
    return map[s] || { color: 'var(--slate-400)', icon: 'вҡӘ', label: s };
  };
  
  // аёҲаёіаёҒаёұаё” 30 аёңаёҘаёҘаёұаёһаёҳа№Ң
  const limit = 30;
  const showItems = matches.slice(0, limit);
  
  let html = `
    <div style="padding:6px 11px;background:var(--violet-100);border-bottom:1px solid var(--slate-200);font-size:10px;color:var(--violet-600);font-weight:700;">
      ${matches.length} ${isLao ? 'аәңаә»аәҷаәҘаәұаәҡ' : 'аёңаёҘаёҘаёұаёһаёҳа№Ң'}${matches.length > limit ? ` (${isLao ? 'аәӘаә°а»Ғаә”аәҮ' : 'а№ҒаёӘаё”аёҮ'} ${limit})` : ''}
    </div>
  `;
  
  showItems.forEach(loc => {
    const status = loc.workflow_status || 'closed';
    const si = statusInfo(status);
    const total = loc.total_products || 0;
    const counted = loc.counted_products || 0;
    const pogCount = (window._pogCountByLoc || {})[loc.location_code] || 0;
    
    html += `
      <div onclick="onFloorMapResultClick('${loc.location_code}')"
           style="display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1px solid var(--slate-100);cursor:pointer;transition:background 0.1s;"
           onmouseover="this.style.background='var(--violet-100)';"
           onmouseout="this.style.background='white';">
        <div style="background:${si.color};color:white;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">
          ${si.icon}
        </div>
        <div style="flex:1;min-width:0;">
          <div style="font-family:'Space Grotesk',monospace;font-weight:800;font-size:13px;color:var(--slate-900);">
            ${loc.location_code}
            ${pogCount > 0 ? `<span style="background:var(--violet-100);color:var(--violet-600);padding:1px 5px;border-radius:4px;font-size:9px;margin-left:5px;">рҹ“җ${pogCount}</span>` : ''}
          </div>
          <div style="font-size:10px;color:var(--slate-500);">
            ${si.label} ${total > 0 ? `вҖў ${counted}/${total}` : ''}
            ${loc.counter_name ? ` вҖў рҹ‘Ө ${loc.counter_name}` : ''}
          </div>
        </div>
        <div style="font-size:11px;color:var(--violet-500);font-weight:700;flex-shrink:0;">
          вҶ’
        </div>
      </div>
    `;
  });
  
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = html;
}

function onFloorMapResultClick(locationCode) {
  // аёӣаёҙаё” dropdown
  const resultsEl = document.getElementById('fmSearchResults');
  if (resultsEl) resultsEl.style.display = 'none';
  
  // аё«аёІ status аёӮаёӯаёҮ location аёҷаёөа№ү
  const all = [
    ...(window._fmAllData?.sale_floor || []),
    ...(window._fmAllData?.top_stock || []),
    ...(window._fmAllData?.display || []),
    ...(window._fmAllData?.warehouse || [])
  ];
  const loc = all.find(l => l.location_code === locationCode);
  if (!loc) return;
  
  // Scroll а№„аёӣа№ҒаёҘаё° trigger click (а№Җаёһаё·а№Ҳаёӯа№Җаёӣаёҙаё” action modal)
  jumpToFloorMapCell(locationCode);
  
  // аё«аёҘаёұаёҮаёҲаёІаёҒ scroll/flash а№ҖаёӘаёЈа№ҮаёҲ вҶ’ аё„а№Ҳаёӯаёў trigger click а№Җаёһаё·а№Ҳаёӯа№Җаёӣаёҙаё” modal
  setTimeout(() => {
    onFloorMapCellClick(locationCode, loc.workflow_status || 'closed');
  }, 700);
}

function jumpToFloorMapCell(locationCode) {
  const cells = document.querySelectorAll('.fm-cell');
  let foundCell = null;
  cells.forEach(c => {
    const codeEl = c.querySelector('.fm-code');
    if (codeEl && codeEl.textContent.trim() === locationCode) {
      foundCell = c;
    }
  });
  
  if (foundCell) {
    foundCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
    
    // Flash highlight
    foundCell.style.transition = 'transform 0.3s, box-shadow 0.3s';
    foundCell.style.transform = 'scale(1.2)';
    foundCell.style.boxShadow = '0 0 0 4px var(--violet-500), 0 8px 24px rgba(139,92,246,0.4)';
    foundCell.style.zIndex = '10';
    foundCell.style.position = 'relative';
    
    setTimeout(() => {
      foundCell.style.transform = '';
      foundCell.style.boxShadow = '';
      setTimeout(() => {
        foundCell.style.transition = '';
        foundCell.style.zIndex = '';
      }, 400);
    }, 1000);
  }
}

function getStatusCounts(data) {
  const all = [
    ...(data.sale_floor || []),
    ...(data.top_stock || []),
    ...(data.display || []),
    ...(data.warehouse || [])
  ];
  
  const counts = {
    open_for_counting: 0,
    counting: 0,
    counted: 0,
    open_for_verify: 0,
    verifying: 0,
    verified: 0,
    tiebreaker_needed: 0,
    tiebreaker: 0,
    completed: 0
  };
  
  all.forEach(item => {
    const s = item.workflow_status;
    if (counts[s] !== undefined) counts[s]++;
  });
  
  return counts;
}

// Jump to first location with the given status
function jumpToStatus(status) {
  toggleQuickNav(false);
  
  const data = window._fmAllData;
  if (!data) return;
  
  // аё«аёІ location а№ҒаёЈаёҒаё—аёөа№ҲаёЎаёө status аёҷаёөа№ү
  const allLocations = [
    ...(data.sale_floor || []),
    ...(data.top_stock || []),
    ...(data.display || []),
    ...(data.warehouse || [])
  ];
  
  const matches = allLocations.filter(l => l.workflow_status === status);
  if (matches.length === 0) {
    showToast(lang === 'lo' ? 'аәҡа»Қа»Ҳаәһаә»аәҡ' : 'а№„аёЎа№Ҳаёһаёҡ', 'warning');
    return;
  }
  
  const first = matches[0];
  const cells = document.querySelectorAll(`.fm-cell`);
  
  // аё«аёІ cell аё•аёІаёЎ location_code
  let foundCell = null;
  cells.forEach(c => {
    const codeEl = c.querySelector('.fm-code');
    if (codeEl && codeEl.textContent.trim() === first.location_code) {
      foundCell = c;
    }
  });
  
  if (foundCell) {
    foundCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
    
    // Flash highlight effect
    foundCell.style.transition = 'transform 0.3s, box-shadow 0.3s';
    foundCell.style.transform = 'scale(1.2)';
    foundCell.style.boxShadow = '0 0 0 4px var(--violet-500), 0 8px 24px rgba(139,92,246,0.4)';
    foundCell.style.zIndex = '10';
    foundCell.style.position = 'relative';
    
    setTimeout(() => {
      foundCell.style.transform = '';
      foundCell.style.boxShadow = '';
      setTimeout(() => {
        foundCell.style.transition = '';
        foundCell.style.zIndex = '';
      }, 400);
    }, 1000);
    
    // Toast а№ҒаёӘаё”аёҮаёңаёҘ
    const statusLabel = T('status_' + status) || status;
    showToast(`рҹ“Қ ${first.location_code} вҖў ${statusLabel} (${matches.length} ${lang === 'lo' ? 'аәҲаәёаә”' : 'аёҲаёёаё”'})`, 'success');
  }
}

function toggleQuickNav(forceState) {
  const menu = document.getElementById('qnavMenu');
  const fab = document.getElementById('qnavFab');
  const bd = document.getElementById('qnavBackdrop');
  if (!menu || !fab) return;
  
  const willOpen = forceState !== undefined ? forceState : !menu.classList.contains('is-open');
  
  if (willOpen) {
    menu.classList.add('is-open');
    fab.classList.add('is-open');
    if (bd) bd.classList.add('is-open');
  } else {
    menu.classList.remove('is-open');
    fab.classList.remove('is-open');
    if (bd) bd.classList.remove('is-open');
  }
}

function jumpToSection(sectionId) {
  toggleQuickNav(false);
  const sec = document.getElementById(sectionId);
  if (!sec) return;
  
  // Smooth scroll with offset for sticky topbar
  const topbarHeight = 70; // approximate
  const rect = sec.getBoundingClientRect();
  const targetY = window.pageYOffset + rect.top - topbarHeight;
  window.scrollTo({ top: targetY, behavior: 'smooth' });
  
  // Flash highlight
  sec.classList.remove('is-flashed');
  void sec.offsetWidth; // restart animation
  sec.classList.add('is-flashed');
  setTimeout(() => sec.classList.remove('is-flashed'), 1300);
}

// Auto-cleanup Quick Nav when leaving Floor Map page

  const w = document.getElementById('qnavWrap');
  if (w) w.remove();
  const b = document.getElementById('qnavBackdrop');
  if (b) b.remove();
}

async function saveEditGondola() {
  const isLao = lang === 'lo';
  const errEl = document.getElementById('editGonErr');
  const btn = document.getElementById('editGonSaveBtn');
  
  const id = parseInt(document.getElementById('editGonId').value);
  const oldCode = document.getElementById('editGonOldCode').value;
  const newCode = document.getElementById('editGonCode').value.trim().toUpperCase();
  const type = document.getElementById('editGonType').value;
  const zoneId = document.getElementById('editGonZone').value || null;
  const desc = document.getElementById('editGonDesc').value.trim();
  const isActive = document.getElementById('editGonActive').value === 'true';
  
  // Validation
  if (!newCode) {
    errEl.textContent = isLao ? 'аәҒаә°аәҘаәёаәҷаәІа»ғаәӘа»Ҳ Code' : 'аёҒаёЈаёёаё“аёІа№ғаёӘа№Ҳ Code';
    errEl.classList.add('show');
    return;
  }
  if (newCode.length < 3 || newCode.length > 10) {
    errEl.textContent = isLao ? 'Code аә•а»үаәӯаәҮаәЎаәө 3-10 а»Ӯаә•аәӯаәұаәҒаәӘаәӯаәҷ' : 'Code аё•а№үаёӯаёҮаёЎаёө 3-10 аё•аёұаё§аёӯаёұаёҒаё©аёЈ';
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  
  try {
    // аё•аёЈаё§аёҲаёӢа№үаёіа№ғаёҷ branch аё–а№үаёІ code а№ҖаёӣаёҘаёөа№Ҳаёўаёҷ
    if (newCode !== oldCode) {
      const { data: exists } = await sb.from('location_master')
        .select('id').eq('branch_id', branch.id).eq('location_code', newCode).maybeSingle();
      if (exists) {
        errEl.textContent = `Code "${newCode}" ${isLao ? 'аәЎаәөаәўаә№а»Ҳа»ҒаәҘа»үаә§' : 'аёЎаёөаёӯаёўаё№а№Ҳа№ҒаёҘа№үаё§'}`;
        errEl.classList.add('show');
        btn.disabled = false;
        return;
      }
    }
    
    // Update location
    const { error: ue } = await sb.from('location_master').update({
      location_code: newCode,
      location_type: type,
      zone_id: zoneId,
      description: desc || null,
      is_active: isActive
    }).eq('id', id);
    
    if (ue) throw ue;
    
    // аё–а№үаёІ code а№ҖаёӣаёҘаёөа№Ҳаёўаёҷ вҶ’ update related tables
    let updates = [];
    if (newCode !== oldCode) {
      updates.push(
        sb.from('pan_o_grams').update({ location_code: newCode })
          .eq('branch_id', branch.id).eq('location_code', oldCode)
      );
      updates.push(
        sb.from('stock_counts').update({ location_code: newCode })
          .eq('branch_id', branch.id).eq('location_code', oldCode)
      );
      
      const results = await Promise.allSettled(updates);
      results.forEach((r, i) => {
        if (r.status === 'rejected' || r.value?.error) {
          console.warn('[FS] Cascade update warning:', r);
        }
      });
    }
    
    closeModal();
    showToast(`вң… ${isLao ? 'аәҡаәұаәҷаә—аә¶аәҒаәӘаәіа»ҖаәҘаәұаә”' : 'аёҡаёұаёҷаё—аё¶аёҒаёӘаёіа№ҖаёЈа№ҮаёҲ'}${newCode !== oldCode ? ` (${oldCode} вҶ’ ${newCode})` : ''}`, 'success');
    
    // Reload floor map
    await loadZonesAndLocations();
    loadFloorMap();
  } catch (e) {
    console.error('[FS] saveEditGondola error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
  }
}

async function executeDeleteGondola(locationCode) {
  const isLao = lang === 'lo';
  const inputEl = document.getElementById('deleteConfirmInput');
  const btn = document.getElementById('confirmDeleteBtn');
  
  if (!inputEl) return;
  const typed = inputEl.value.trim().toUpperCase();
  
  if (typed !== locationCode.toUpperCase()) {
    showToast(isLao ? 'вқҢ аәһаәҙаәЎаәҡа»Қа»Ҳаә–аә·аәҒаә•а»үаәӯаәҮ' : 'вқҢ аёһаёҙаёЎаёһа№Ңа№„аёЎа№Ҳаё•аёЈаёҮ', 'error');
    inputEl.style.borderColor = 'var(--rose-500)';
    inputEl.focus();
    return;
  }
  
  btn.disabled = true;
  
  try {
    // 1. Delete pan_o_grams а№ғаёҷ location аёҷаёөа№ү
    const { error: pe } = await sb.from('pan_o_grams').delete()
      .eq('branch_id', branch.id).eq('location_code', locationCode);
    if (pe) console.warn('[FS] PoG delete warning:', pe);
    
    // 2. Delete location (stock_counts аёҲаё°аё„аёҮаёӯаёўаё№а№Ҳ а№Ғаё•а№Ҳ location_code аёҲаё° orphan)
    const { error: le } = await sb.from('location_master').delete()
      .eq('branch_id', branch.id).eq('location_code', locationCode);
    if (le) throw le;
    
    closeModal();
    showToast(`рҹ—‘пёҸ ${isLao ? 'аәҘаә»аәҡа»ҒаәҘа»үаә§' : 'аёҘаёҡа№ҒаёҘа№үаё§'}: ${locationCode}`, 'success');
    
    // Reload
    await loadZonesAndLocations();
    loadFloorMap();
  } catch (e) {
    console.error('[FS] executeDeleteGondola error:', e);
    showToast('Error: ' + e.message, 'error');
    btn.disabled = false;
  }
}

// Pivot helper: аёЈаё§аёЎ count rows аёӮаёӯаёҮаёӘаёҙаёҷаё„а№үаёІа№Җаё”аёөаёўаё§аёҒаёұаёҷ а№Җаёӣа№Үаёҷ 1 аёҡаёЈаёЈаё—аёұаё”
// аё„аё·аёҷ array аёӮаёӯаёҮ { product, barcode, name, pos, counter, verifier, tiebreaker, manager, final, diff, varLevel, locCode, zoneId, users }
function pivotByProduct(items, usersById) {
  const byProduct = {};
  
  items.forEach(c => {
    const pid = c.product_id;
    if (!pid) return;
    const p = c.products || {};
    
    if (!byProduct[pid]) {
      byProduct[pid] = {
        product_id: pid,
        barcode: p.barcode || '',
        name_th: p.name_th || '',
        name_lo: p.name_lo || '',
        unit_th: p.unit_th || '',
        unit_lo: p.unit_lo || '',
        pos_qty: p.pos_qty || 0,
        sell_price: p.sell_price || 0,
        is_markdown: c.is_markdown || false,
        location_code: c.location_code || c.gondola_code || '',
        zone_id: c.zone_id,
        variance_level: c.variance_level,
        notes: [],
        // role-specific data
        counter_qty: null, counter_user: '', counter_time: null, counter_id: null,
        verifier_qty: null, verifier_user: '', verifier_time: null, verifier_id: null,
        tiebreaker_qty: null, tiebreaker_user: '', tiebreaker_time: null, tiebreaker_id: null,
        manager_qty: null, manager_user: '', manager_time: null, manager_id: null
      };
    }
    
    const role = (c.count_role || '').toLowerCase();
    const userName = usersById[c.user_id]?.full_name || usersById[c.user_id]?.username || '';
    const recBase = {
      qty: c.counted_qty || 0,
      user: userName,
      time: c.counted_at,
      id: c.id
    };
    
    const target = byProduct[pid];
    if (role.includes('counter')) {
      target.counter_qty = recBase.qty;
      target.counter_user = recBase.user;
      target.counter_time = recBase.time;
      target.counter_id = recBase.id;
    } else if (role.includes('verifier')) {
      target.verifier_qty = recBase.qty;
      target.verifier_user = recBase.user;
      target.verifier_time = recBase.time;
      target.verifier_id = recBase.id;
    } else if (role.includes('tiebreaker') || role === 'ctl_tiebreaker') {
      target.tiebreaker_qty = recBase.qty;
      target.tiebreaker_user = recBase.user;
      target.tiebreaker_time = recBase.time;
      target.tiebreaker_id = recBase.id;
    } else if (role.includes('manager')) {
      target.manager_qty = recBase.qty;
      target.manager_user = recBase.user;
      target.manager_time = recBase.time;
      target.manager_id = recBase.id;
    }
    
    if (c.note) target.notes.push(c.note);
    
    // Update variance level (use the latest/highest)
    if (c.variance_level && (!target.variance_level || c.variance_level > target.variance_level)) {
      target.variance_level = c.variance_level;
    }
  });
  
  // Calculate final qty (аёҒаёҺ 2-of-3) а№ҒаёҘаё° diff vs POS
  Object.values(byProduct).forEach(prod => {
    let final = null;
    let status = 'pending';
    
    // аё–а№үаёІаёЎаёө Manager вҶ’ а№ғаёҠа№ү Manager а№Җаёӣа№Үаёҷ final (override аё—аёёаёҒаёӯаёўа№ҲаёІаёҮ)
    if (prod.manager_qty !== null) {
      final = prod.manager_qty;
      status = 'manager_final';
    }
    // аё–а№үаёІаёЎаёө Tiebreaker вҶ’ а№ғаёҠа№үаёҒаёҺ 2-of-3
    else if (prod.tiebreaker_qty !== null) {
      const c = prod.counter_qty, v = prod.verifier_qty, t = prod.tiebreaker_qty;
      if (c !== null && t === c) { final = c; status = 'tb_match_counter'; }
      else if (v !== null && t === v) { final = v; status = 'tb_match_verifier'; }
      else { final = t; status = 'tb_unique'; }
    }
    // аё–а№үаёІаёЎаёө Counter + Verifier аё•аёЈаёҮаёҒаёұаёҷ
    else if (prod.counter_qty !== null && prod.verifier_qty !== null) {
      if (prod.counter_qty === prod.verifier_qty) {
        final = prod.counter_qty;
        status = 'matched';
      } else {
        // а№„аёЎа№Ҳаё•аёЈаёҮаёҒаёұаёҷ аёЈаёӯ tiebreaker
        status = 'need_tiebreaker';
        final = null;
      }
    }
    // аёЎаёөа№Ғаё„а№Ҳ Counter
    else if (prod.counter_qty !== null) {
      status = 'counter_only';
      final = prod.counter_qty; // tentative
    }
    // аёЎаёөа№Ғаё„а№Ҳ Verifier (rare)
    else if (prod.verifier_qty !== null) {
      status = 'verifier_only';
      final = prod.verifier_qty;
    }
    
    prod.final_qty = final;
    prod.status = status;
    prod.diff = (final !== null) ? (final - prod.pos_qty) : null;
    prod.note = prod.notes.join(' вҖў ');
  });
  
  return Object.values(byProduct);
}

async function showLocationDetail(locationCode) {
  log('Show location detail:', locationCode);
  
  if (!session) {
    showToast(T('no_active_session') || 'No active session', 'error');
    return;
  }
  
  // Loading state
  showModal(`
    <h3>${locationCode}</h3>
    <div class="empty-state"><p>${T('loading') || 'аёҒаёіаёҘаёұаёҮа№Ӯаё«аёҘаё”...'}</p></div>
  `);
  
  // Load counts вҖ” query gondola_code only (since save logic always sets gondola_code = location_code)
  // .or() аё—аёөа№Ҳа№ғаёҠа№үа№Җаё”аёҙаёЎаёЎаёөаёӣаёұаёҚаё«аёІаёҒаёұаёҡ Supabase syntax вҖ” а№ҖаёӣаёҘаёөа№Ҳаёўаёҷа№Җаёӣа№Үаёҷ .in() аёҒаёұаёҡ array а№Ғаё—аёҷ
  const { data: counts, error } = await sb.from('stock_counts')
    .select(`
      id, counted_qty, count_role, counted_at, zone_id, location_code, gondola_code, 
      diff, variance_level, is_markdown, note, user_id, product_id,
      products(id, barcode, name_th, name_lo, unit_th, unit_lo, pos_qty, sell_price)
    `)
    .eq('session_id', session.id)
    .or(`location_code.eq.${locationCode},gondola_code.eq.${locationCode}`)
    .order('counted_at', { ascending: false })
    .limit(100);
  
  if (error) {
    log('showLocationDetail error:', error);
    showToast('Error: ' + error.message, 'error');
    closeModal();
    return;
  }
  
  const items = counts || [];
  log('Location detail items:', items.length);
  
  // Get user names separately (more reliable than join)
  const userIds = [...new Set(items.map(c => c.user_id).filter(x => x))];
  let usersById = {};
  if (userIds.length > 0) {
    const { data: usersData } = await sb.from('users').select('id, full_name, username').in('id', userIds);
    (usersData || []).forEach(u => { usersById[u.id] = u; });
  }
  
  // Get zone info
  const z = (allZones || []).find(zz => zz.id == (items[0]?.zone_id));
  const zoneCode = z?.code || '';
  const zoneName = z ? (lang === 'lo' ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo)) : '';

          <div class="loc-piv-sum-val" style="color:${prod.final_qty !== null ? 'var(--teal-700)' : 'var(--slate-400)'};">${prod.final_qty !== null ? prod.final_qty : 'вҖ”'}</div>

        <div class="loc-piv-sum-item" style="background:${diffBg};">
          <div class="loc-piv-sum-lbl">Diff</div>
          <div class="loc-piv-sum-val" style="color:${diffColor};">${diffText}</div>
        </div>
      </div>
      ` : `
      <div style="margin-top:6px;text-align:right;">
        <span style="font-family:'Space Grotesk',monospace;font-weight:800;font-size:16px;">${prod.final_qty !== null ? prod.final_qty : 'вҖ”'} ${unit}</span>
      </div>
      `}
      
      ${prod.note ? `<div class="loc-piv-note">рҹ“қ ${prod.note}</div>` : ''}
    </div>
  `;
}

// Helper: render single row (1 count = 1 row, а№Ғаёҡаёҡа№Җаё”аёҙаёЎ)
function renderSingleRow(c, usersById) {
  const isAdmin = ['admin', 'scc', 'bcs', 'ctl'].includes(user.role);
  const p = c.products || {};
  const userName = usersById[c.user_id]?.full_name || usersById[c.user_id]?.username || 'вҖ”';
  const name = lang === 'lo' ? (p.name_lo || p.name_th || '?') : (p.name_th || p.name_lo || '?');
  const unit = lang === 'lo' ? (p.unit_lo || p.unit_th || '') : (p.unit_th || p.unit_lo || '');
  const diff = c.diff || 0;
  const diffColor = diff === 0 ? 'var(--emerald-500)' : (diff > 0 ? 'var(--amber-500)' : 'var(--rose-500)');
  const diffBg = diff === 0 ? 'var(--emerald-100)' : (diff > 0 ? 'var(--amber-100)' : 'var(--rose-100)');
  const role = (c.count_role || '').toLowerCase();
  
  let roleLabel = c.count_role || '';
  let roleBg = 'var(--slate-100)', roleColor = 'var(--slate-600)';
  if (role.includes('counter')) { roleBg = 'var(--teal-100)'; roleColor = 'var(--teal-700)'; roleLabel = 'Counter'; }
  else if (role.includes('verifier')) { roleBg = 'var(--amber-100)'; roleColor = '#92400e'; roleLabel = 'Verifier'; }
  else if (role.includes('tiebreaker')) { roleBg = 'var(--violet-100)'; roleColor = 'var(--violet-600)'; roleLabel = T('tab_tiebreaker') || 'TB'; }
  else if (role.includes('manager')) { roleBg = 'var(--sky-100)'; roleColor = 'var(--sky-600)'; roleLabel = 'Manager'; }
  
  const time = new Date(c.counted_at).toLocaleString(lang === 'lo' ? 'lo-LA' : 'th-TH', {
    month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });
  
  const mdBadge = c.is_markdown ? '<span style="background:var(--rose-100);color:var(--rose-500);padding:1px 5px;border-radius:4px;font-size:8px;font-weight:700;margin-left:4px;">MD</span>' : '';
  const varLevel = (isAdmin && c.variance_level) ? `<span style="background:var(--slate-100);padding:1px 5px;border-radius:4px;font-size:8px;font-weight:700;margin-left:4px;color:var(--slate-600);">L${c.variance_level}</span>` : '';
  
  return `
    <div class="loc-detail-item" onclick="openEditCount('${c.id}')">
      <div class="loc-detail-name">
        <strong>${name}</strong>${mdBadge}${varLevel}
      </div>
      <div class="loc-detail-meta">
        <span style="font-family:'Space Grotesk',monospace;font-size:9px;color:var(--slate-500);">${p.barcode || ''}</span>
      </div>
      <div class="loc-detail-row">
        <span class="loc-detail-role" style="background:${roleBg};color:${roleColor};">${roleLabel}</span>
        <span style="font-size:9px;color:var(--slate-500);">${userName} вҖў ${time}</span>
      </div>
      ${isAdmin ? `
        <div class="loc-detail-numbers">
          <div class="loc-detail-num-item">
            <div class="loc-detail-num-lbl">POS</div>
            <div class="loc-detail-num-val">${p.pos_qty || 0}</div>
          </div>
          <div class="loc-detail-num-item">
            <div class="loc-detail-num-lbl">${T('counted_qty') || 'аёҷаёұаёҡа№„аё”а№ү'}</div>
            <div class="loc-detail-num-val" style="color:var(--teal-700);">${c.counted_qty}</div>
          </div>
          <div class="loc-detail-num-item" style="background:${diffBg};">
            <div class="loc-detail-num-lbl">Diff</div>
            <div class="loc-detail-num-val" style="color:${diffColor};">${diff > 0 ? '+' : ''}${diff}</div>
          </div>
        </div>
      ` : `
        <div style="margin-top:6px;display:flex;justify-content:flex-end;">
          <span style="font-family:'Space Grotesk',monospace;font-weight:800;font-size:16px;color:var(--slate-900);">${c.counted_qty} ${unit}</span>
        </div>
      `}
    </div>
  `;
}

// Render the list inside the modal based on current sort + view
function renderLocationDetailList() {
  const list = document.getElementById('locDetailList');
  if (!list) return;
  
  const view = window._locDetailView || 'pivot';
  const usersById = window._locDetailUsers || {};
  
  // Get sort option
  const sortSel = document.getElementById('locDetailSortSel');
  const sortBy = sortSel?.value || 'diff_desc';
  
  if (view === 'pivot') {
    // Pivot view: 1 product / 1 row
    const pivoted = window._locDetailPivoted || [];
    
    // Sort pivoted
    const sortedPivot = [...pivoted].sort((a, b) => {
      switch(sortBy) {
        case 'diff_desc':
          return (b.diff ?? -Infinity) - (a.diff ?? -Infinity);
        case 'diff_abs':
          return Math.abs(b.diff ?? 0) - Math.abs(a.diff ?? 0);
        case 'time_desc': {
          const at = a.counter_time || a.verifier_time || a.tiebreaker_time || 0;
          const bt = b.counter_time || b.verifier_time || b.tiebreaker_time || 0;
          return new Date(bt) - new Date(at);
        }
        case 'qty_desc':
          return (b.final_qty ?? 0) - (a.final_qty ?? 0);
        case 'name': {
          const an = lang === 'lo' ? (a.name_lo || a.name_th || '') : (a.name_th || a.name_lo || '');
          const bn = lang === 'lo' ? (b.name_lo || b.name_th || '') : (b.name_th || b.name_lo || '');
          return an.localeCompare(bn);
        }
        default:
          return 0;
      }
    });
    
    list.innerHTML = sortedPivot.map(renderPivotRow).join('');
  } else {
    // Single rows view (а№ҖаёҒа№ҲаёІ)
    const items = window._locDetailItems || [];
    
    const sorted = [...items].sort((a, b) => {
      switch(sortBy) {
        case 'diff_desc':
          return (b.diff || 0) - (a.diff || 0);
        case 'diff_abs':
          return Math.abs(b.diff || 0) - Math.abs(a.diff || 0);
        case 'time_desc':
          return new Date(b.counted_at) - new Date(a.counted_at);
        case 'qty_desc':
          return (b.counted_qty || 0) - (a.counted_qty || 0);
        case 'name': {
          const an = lang === 'lo' ? (a.products?.name_lo || a.products?.name_th || '') : (a.products?.name_th || a.products?.name_lo || '');
          const bn = lang === 'lo' ? (b.products?.name_lo || b.products?.name_th || '') : (b.products?.name_th || b.products?.name_lo || '');
          return an.localeCompare(bn);
        }
        default:
          return 0;
      }
    });
    
    list.innerHTML = sorted.map(c => renderSingleRow(c, usersById)).join('');
  }
}

// ==================== EXPORT LOCATION DETAIL TO EXCEL ====================
async function exportLocationDetailExcel(locationCode) {
  log('Export location detail Excel:', locationCode);
  
  const items = window._locDetailItems || [];
  const pivoted = window._locDetailPivoted || [];
  const usersById = window._locDetailUsers || {};
  
  if (!items.length) {
    showToast(T('no_history') || 'No data', 'error');
    return;
  }
  
  if (typeof ExcelJS === 'undefined') {
    showToast('ExcelJS not loaded', 'error');
    return;
  }
  
  showToast(T('saving') || 'аёҒаёіаёҘаёұаёҮаёӘаёЈа№үаёІаёҮ...', 'info');
  
  try {
    const wb = new ExcelJS.Workbook();
    wb.creator = 'Friendship Stock';
    wb.created = new Date();
    
    // ===== SHEET 1: Pivot (1 product/row) вҖ” аёӘаёіаё«аёЈаёұаёҡаё§аёҙа№Җаё„аёЈаёІаё°аё«а№Ң Diff =====
    const wsPivot = wb.addWorksheet(`${locationCode} - Pivot`);
    
    // Title row
    const titleRow = wsPivot.addRow([`${locationCode} вҖ” Pivot View (1 аёҡаёЈаёЈаё—аёұаё”/аёӘаёҙаёҷаё„а№үаёІ)`]);
    titleRow.font = { bold: true, size: 13, color: { argb: 'FF0F766E' } };
    wsPivot.mergeCells(1, 1, 1, 13);
    wsPivot.addRow([`Date: ${new Date().toLocaleString('th-TH')}`]);
    wsPivot.addRow([]);
    
    // Headers
    const pivotHeaders = [
      'Barcode', T('product_name') || 'аёҠаё·а№ҲаёӯаёӘаёҙаёҷаё„а№үаёІ', 'Zone', 'Location',
      'POS',
      'Counter', 'Counter By',
      'Verifier', 'Verifier By',
      'TB / аё•аёЈаё§аёҲаёӘаёӯаёҡа№ғаё«аёЎа№Ҳ', 'TB By',
      'аёӘаёЈаёёаёӣ Final', 'Diff', 'Diff %', 'Status',
      'L', 'MD', 'Note'
    ];
    const pivotHeaderRow = wsPivot.addRow(pivotHeaders);
    pivotHeaderRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
    pivotHeaderRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0F766E' } };
    pivotHeaderRow.alignment = { vertical: 'middle', horizontal: 'center', wrapText: true };
    pivotHeaderRow.height = 28;
    
    // Sort pivoted by absolute diff descending (а№Җаё«аёЎаё·аёӯаёҷа№ғаёҷ UI default)
    const sortedPivot = [...pivoted].sort((a, b) => Math.abs(b.diff ?? 0) - Math.abs(a.diff ?? 0));
    
    sortedPivot.forEach(prod => {
      const name = prod.name_th || prod.name_lo || '?';
      const z = (allZones || []).find(zz => zz.id == prod.zone_id);
      const zCode = z?.code || '';
      const diff = prod.diff;
      const diffPct = (diff !== null && prod.pos_qty > 0) ? ((diff / prod.pos_qty) * 100).toFixed(2) + '%' : 'вҖ”';
      
      const statusMap = {
        'matched': 'аё•аёЈаёҮ вң“',
        'need_tiebreaker': 'аё•а№үаёӯаёҮаё•аёЈаё§аёҲаёӘаёӯаёҡа№ғаё«аёЎа№Ҳ',
        'tb_match_counter': 'TB=Counter',
        'tb_match_verifier': 'TB=Verifier',
        'tb_unique': 'а№ғаёҠа№үаё„а№ҲаёІ TB',
        'manager_final': 'Manager Final',
        'counter_only': 'аёЈаёӯ Verifier',
        'verifier_only': 'Verifier а№Җаё—а№ҲаёІаёҷаёұа№үаёҷ',
        'pending': 'аёЈаёӯаёҷаёұаёҡ'
      };
      
      const row = wsPivot.addRow([
        prod.barcode, name,
        zCode, prod.location_code,
        prod.pos_qty,
        prod.counter_qty !== null ? prod.counter_qty : '', prod.counter_user || '',
        prod.verifier_qty !== null ? prod.verifier_qty : '', prod.verifier_user || '',
        prod.tiebreaker_qty !== null ? prod.tiebreaker_qty : '', prod.tiebreaker_user || '',
        prod.final_qty !== null ? prod.final_qty : '',
        diff !== null ? diff : '',
        diffPct,
        statusMap[prod.status] || prod.status,
        prod.variance_level || '',
        prod.is_markdown ? 'Y' : '',
        prod.note || ''
      ]);
      
      // Color Counter (col 6) вҖ” teal bg
      if (prod.counter_qty !== null) {
        row.getCell(6).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCCFBF1' } };
        row.getCell(6).font = { bold: true, color: { argb: 'FF0F766E' } };
      }
      // Color Verifier (col 8) вҖ” amber bg
      if (prod.verifier_qty !== null) {
        row.getCell(8).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFEF3C7' } };
        row.getCell(8).font = { bold: true, color: { argb: 'FF92400E' } };
      }
      // Color TB (col 10) вҖ” violet bg
      if (prod.tiebreaker_qty !== null) {
        row.getCell(10).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEDE9FE' } };
        row.getCell(10).font = { bold: true, color: { argb: 'FF7C3AED' } };
      }
      // Final (col 12) вҖ” bold teal
      if (prod.final_qty !== null) {
        row.getCell(12).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF14B8A6' } };
        row.getCell(12).font = { bold: true, color: { argb: 'FFFFFFFF' }, size: 12 };
      }
      // Color diff (col 13)
      if (diff !== null) {
        const diffCell = row.getCell(13);
        if (diff > 0) {
          diffCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFEF3C7' } };
          diffCell.font = { color: { argb: 'FF92400E' }, bold: true };
        } else if (diff < 0) {
          diffCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFEE2E2' } };
          diffCell.font = { color: { argb: 'FFDC2626' }, bold: true };
        } else {
          diffCell.font = { color: { argb: 'FF059669' }, bold: true };
        }
      }
      // Status (col 15) - color by status
      const statusCell = row.getCell(15);
      if (prod.status === 'matched') {
        statusCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFD1FAE5' } };
        statusCell.font = { color: { argb: 'FF059669' }, bold: true };
      } else if (prod.status === 'need_tiebreaker') {
        statusCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFEE2E2' } };
        statusCell.font = { color: { argb: 'FFDC2626' }, bold: true };
      } else if (prod.status?.startsWith('tb_') || prod.status === 'manager_final') {
        statusCell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEDE9FE' } };
        statusCell.font = { color: { argb: 'FF7C3AED' }, bold: true };
      }
    });
    
    // Summary row at top of data
    const totalProducts = sortedPivot.length;
    const matchedCount = sortedPivot.filter(p => p.status === 'matched').length;
    const tbNeededCount = sortedPivot.filter(p => p.status === 'need_tiebreaker').length;
    const tbDoneCount = sortedPivot.filter(p => p.status?.startsWith('tb_') || p.status === 'manager_final').length;
    const totalDiffValue = sortedPivot.reduce((sum, p) => sum + (p.diff !== null ? (p.diff * (p.sell_price || 0)) : 0), 0);
    
    wsPivot.addRow([]);
    const sumHeader = wsPivot.addRow(['рҹ“Ҡ аёӘаёЈаёёаёӣ']);
    sumHeader.font = { bold: true, size: 12, color: { argb: 'FF0F766E' } };
    const sumRows = [
      ['Total SKUs:', totalProducts],
      ['Matched (аё•аёЈаёҮ):', matchedCount],
      ['Need TB (аё•а№үаёӯаёҮаё•аёЈаё§аёҲаёӘаёӯаёҡа№ғаё«аёЎа№Ҳ):', tbNeededCount],
      ['TB Done (аё•аёЈаё§аёҲаёӘаёӯаёҡа№ғаё«аёЎа№Ҳа№ҒаёҘа№үаё§):', tbDoneCount],
      ['Total Diff Value (вӮӯ):', Math.round(totalDiffValue).toLocaleString()]
    ];
    sumRows.forEach(r => {
      const sr = wsPivot.addRow(r);
      sr.getCell(1).font = { bold: true };
    });
    
    // Column widths
    const pivotWidths = [14, 28, 8, 11, 8, 10, 16, 10, 16, 10, 16, 11, 10, 9, 16, 5, 5, 22];
    pivotWidths.forEach((w, i) => wsPivot.getColumn(i + 1).width = w);
    
    // Freeze top rows
    wsPivot.views = [{ state: 'frozen', ySplit: 4 }];
    
    // ===== SHEET 2: All Counts (raw - 1 count/row) вҖ” аёӘаёіаё«аёЈаёұаёҡ audit detail =====
    const wsRaw = wb.addWorksheet(`${locationCode} - All Counts`);
    
    const rawHeaders = [
      'Barcode', T('product_name') || 'аёҠаё·а№ҲаёӯаёӘаёҙаёҷаё„а№үаёІ', 
      'Zone', 'Location', 
      'Role', T('counted_by') || 'аёңаё№а№үаёҷаёұаёҡ', 
      T('counted_at') || 'а№Җаё§аёҘаёІ',
      'POS', T('counted_qty') || 'аёҷаёұаёҡа№„аё”а№ү', 'Diff', 'Diff %',
      'L', 'Markdown', 'Note'
    ];
    const rawHeaderRow = wsRaw.addRow(rawHeaders);
    rawHeaderRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
    rawHeaderRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF7C3AED' } };
    rawHeaderRow.alignment = { vertical: 'middle', horizontal: 'center' };
    rawHeaderRow.height = 22;
    
    items.forEach(c => {
      const p = c.products || {};
      const name = p.name_th || p.name_lo || '?';
      const z = (allZones || []).find(zz => zz.id == c.zone_id);
      const zCode = z?.code || '';
      const userName = usersById[c.user_id]?.full_name || usersById[c.user_id]?.username || '';
      const time = new Date(c.counted_at).toLocaleString('th-TH', {
        year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      const diff = c.diff || 0;
      const pos = p.pos_qty || 0;
      const diffPct = pos > 0 ? ((diff / pos) * 100).toFixed(2) + '%' : '-';
      
      const row = wsRaw.addRow([
        p.barcode || '', name,
        zCode, c.location_code || c.gondola_code || '',
        c.count_role || '', userName,
        time,
        pos, c.counted_qty || 0, diff, diffPct,
        c.variance_level || '', c.is_markdown ? 'Y' : '', c.note || ''
      ]);
      
      // Color row by role
      const role = (c.count_role || '').toLowerCase();
      let bgColor = null;
      if (role.includes('counter')) bgColor = 'FFCCFBF1';
      else if (role.includes('verifier')) bgColor = 'FFFEF3C7';
      else if (role.includes('tiebreaker')) bgColor = 'FFEDE9FE';
      if (bgColor) {
        row.eachCell(cell => {
          cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: bgColor } };
        });
      }
      
      // Color diff cell
      const diffCell = row.getCell(10);
      if (diff > 0) {
        diffCell.font = { color: { argb: 'FF92400E' }, bold: true };
      } else if (diff < 0) {
        diffCell.font = { color: { argb: 'FFDC2626' }, bold: true };
      } else {
        diffCell.font = { color: { argb: 'FF059669' }, bold: true };
      }
    });
    
    const rawWidths = [14, 28, 8, 12, 14, 18, 18, 8, 10, 9, 10, 5, 10, 22];
    rawWidths.forEach((w, i) => wsRaw.getColumn(i + 1).width = w);
    wsRaw.views = [{ state: 'frozen', ySplit: 1 }];
    
    // Download
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const dateStr = new Date().toISOString().slice(0, 10);
    a.download = `${locationCode}_${dateStr}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showToast(T('saved') || 'Export аёӘаёіа№ҖаёЈа№ҮаёҲ', 'success');
  } catch (e) {
    console.error('[FS] Export error:', e);
    showToast('Export error: ' + e.message, 'error');
  }
}

async function executeAddGondola() {
  const code = document.getElementById('addLocCode').value.trim().toUpperCase();
  const type = document.getElementById('addLocType').value;
  const zoneCode = document.getElementById('addLocZone').value;
  const desc = document.getElementById('addLocDesc').value.trim();
  
  const errEl = document.getElementById('addLocErr');
  const btn = document.getElementById('addLocBtn');
  
  errEl.classList.remove('show');
  
  if (!code) {
    errEl.textContent = 'аёҒаёЈаёёаё“аёІа№ғаёӘа№Ҳ Location Code';
    errEl.classList.add('show');
    return;
  }
  
  if (code.length < 3 || code.length > 10) {
    errEl.textContent = 'Code аё•а№үаёӯаёҮаёЎаёө 3-10 аё•аёұаё§аёӯаёұаёҒаё©аёЈ';
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span>`;
  
  try {
    const { data, error } = await sb.rpc('add_gondola_location', {
      p_branch_id: branch.id,
      p_user_id: user.id,
      p_location_code: code,
      p_location_type: type,
      p_zone_code: zoneCode || null,
      p_description: desc || null
    });
    
    if (error) throw error;
    
    if (data?.success === false) {
      throw new Error(data.error || 'Unknown error');
    }
    
    log('Gondola added:', data);
    showToast(`вң… ${T('saved_added')}: ${code}`, 'success');
    closeModal();
    
    // Reload locations + map
    await loadZonesAndLocations();
    loadFloorMap();
    
  } catch (e) {
    console.error('[FS] Add gondola error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `+ ${T('add_location')}`;
  }
}

function setWfFilter(f) {

    t.classList.toggle('active', t.dataset.f === f));

async function loadWorkflowList() {
  if (!session) return;
  
  log('Loading workflow list');
  
  const { data, error } = await sb.from('v_gondola_progress')
    .select('*')
    .eq('session_id', session.id)
    .order('opened_at', { ascending: false });
  
  if (error) {
    log('Workflow error:', error);
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  window._wfData = data || [];
  log('Workflow items:', window._wfData.length);
  
  renderWorkflowSummary(window._wfData);
  renderWorkflowList(window._wfData);
}

function renderWorkflowSummary(items) {
  const total = items.length;
  const completed = items.filter(x => x.status === 'completed').length;
  const inProgress = items.filter(x => ['counting', 'verifying', 'tiebreaker'].includes(x.status)).length;
  const waiting = items.filter(x => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed'].includes(x.status)).length;
  const notStarted = items.filter(x => ['closed', 'open_for_counting'].includes(x.status)).length;
  const pct = total ? Math.round((completed / total) * 100) : 0;
  
  const el = document.getElementById('wfSummary');
  if (!el) return;
  
  el.innerHTML = `
    <div class="progress-donut-card">
      <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;">${T('progress')}</div>
      <div class="progress-donut">
        <svg class="donut-svg" viewBox="0 0 120 120">
          <circle class="donut-bg" cx="60" cy="60" r="50"/>
          <circle class="donut-fg" cx="60" cy="60" r="50" 
            stroke-dasharray="${2 * Math.PI * 50}" 
            stroke-dashoffset="${2 * Math.PI * 50 * (1 - pct/100)}"/>
          <text class="donut-text" x="60" y="65" text-anchor="middle">${pct}%</text>
        </svg>
        <div style="text-align:left;">
          <div style="font-size:24px;font-weight:700;color:var(--emerald-500);">${completed}<span style="color:var(--slate-400);font-size:14px;">/${total}</span></div>
          <div style="font-size:10px;color:var(--slate-500);">Gondolas</div>
        </div>
      </div>
      <div class="wf-summary-grid">
        <div class="wf-sum-card progress">
          <div class="wf-sum-num">${inProgress}</div>
          <div class="wf-sum-lbl" style="color:var(--teal-700);">${T('in_progress')}</div>
        </div>
        <div class="wf-sum-card waiting">
          <div class="wf-sum-num">${waiting}</div>
          <div class="wf-sum-lbl" style="color:#92400e;">${T('waiting')}</div>
        </div>
        <div class="wf-sum-card completed">
          <div class="wf-sum-num">${completed}</div>
          <div class="wf-sum-lbl" style="color:var(--emerald-500);">${T('completed_lo')}</div>
        </div>
        <div class="wf-sum-card not_started">
          <div class="wf-sum-num">${notStarted}</div>
          <div class="wf-sum-lbl" style="color:var(--slate-600);">${T('not_started')}</div>
        </div>
      </div>
    </div>
  `;
}

function renderWorkflowList(items) {
  const list = document.getElementById('wfList');
  if (!list) return;
  
  // Apply filter
  let filtered = items;
  if (wfFilter === 'active') {
    filtered = items.filter(x => ['counting', 'verifying', 'tiebreaker'].includes(x.status));
  } else if (wfFilter === 'waiting') {
    filtered = items.filter(x => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed', 'open_for_counting'].includes(x.status));
  } else if (wfFilter === 'completed') {
    filtered = items.filter(x => x.status === 'completed');
  }
  
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_gondolas_active')}</p></div>`;
    return;
  }
  
  list.innerHTML = filtered.map(item => {
    const status = item.status || 'closed';
    const statusText = T('status_' + status);
    
    // Action buttons based on status + undo button
    let actions = '';
    let undoBtn = '';
    
    if (status === 'closed') {
      actions = `<button class="wf-btn wf-btn-open" onclick="wfOpenForCounter('${item.location_code}')">${T('open_for_counter')}</button>`;
    } else if (status === 'open_for_counting') {
      actions = `<button class="wf-btn wf-btn-close" onclick="wfCloseCounter('${item.location_code}')">${T('close_counter')} вҶ’</button>`;
      undoBtn = `<button class="wf-btn wf-btn-reopen" onclick="if(confirm('аёўаёҒа№ҖаёҘаёҙаёҒ ${item.location_code}?')){wfResetTo('${item.location_code}','closed');loadWorkflowList();}" style="font-size:10px;flex:0 0 auto;">вҹІ</button>`;
    } else if (status === 'counting') {
      actions = `<button class="wf-btn wf-btn-close" onclick="wfCloseCounter('${item.location_code}')">${T('close_counter')} вң“</button>`;
      undoBtn = `<button class="wf-btn wf-btn-reopen" onclick="if(confirm('аёўаёұаёҮа№„аёЎа№Ҳаёҷаёұаёҡ - аёҒаёҘаёұаёҡ Closed?')){wfResetTo('${item.location_code}','closed');loadWorkflowList();}" style="font-size:10px;flex:0 0 auto;">вҹІ</button>`;
    } else if (status === 'counted') {
      actions = `<button class="wf-btn wf-btn-verify" onclick="wfOpenForVerifier('${item.location_code}')">${T('open_for_verifier')} вҶ’</button>`;
      undoBtn = `<button class="wf-btn wf-btn-reopen" onclick="if(confirm('аёҒаёҘаёұаёҡа№„аёӣаёҷаёұаёҡа№ғаё«аёЎа№Ҳ?')){wfResetTo('${item.location_code}','open_for_counting');loadWorkflowList();}" style="font-size:10px;flex:0 0 auto;">вҹІ</button>`;
    } else if (status === 'open_for_verify' || status === 'verifying') {
      actions = `<button class="wf-btn wf-btn-verify" onclick="wfCloseVerifier('${item.location_code}')">${T('close_verifier')} вң“</button>`;
      undoBtn = `<button class="wf-btn wf-btn-reopen" onclick="if(confirm('аёўаёұаёҮа№„аёЎа№Ҳаё•аёЈаё§аёҲ - аёҒаёҘаёұаёҡ Counter а№ҖаёӘаёЈа№ҮаёҲ?')){wfResetTo('${item.location_code}','counted');loadWorkflowList();}" style="font-size:10px;flex:0 0 auto;">вҹІ</button>`;
    } else if (status === 'verified' || status === 'tiebreaker_needed' || status === 'tiebreaker') {
      actions = `<button class="wf-btn wf-btn-complete" onclick="wfMarkCompleted('${item.location_code}')">${T('mark_completed')} вң“</button>`;
      undoBtn = `<button class="wf-btn wf-btn-reopen" onclick="if(confirm('аёҒаёҘаёұаёҡа№„аёӣ Verify а№ғаё«аёЎа№Ҳ?')){wfResetTo('${item.location_code}','open_for_verify');loadWorkflowList();}" style="font-size:10px;flex:0 0 auto;">вҹІ</button>`;
    } else if (status === 'completed') {
      actions = `<button class="wf-btn wf-btn-reopen" onclick="wfReopen('${item.location_code}')">${T('reopen')}</button>`;
    }
    
    const counter = item.counter_name ? `<span class="wf-stat-chip">рҹ‘Ө ${item.counter_name}: ${item.counter_count || 0}</span>` : '';
    const verifier = item.verifier_name ? `<span class="wf-stat-chip">рҹ”Қ ${item.verifier_name}: ${item.verifier_count || 0}</span>` : '';
    const tb = item.tb_count > 0 ? `<span class="wf-stat-chip">вҡ–пёҸ TB: ${item.tb_count}</span>` : '';
    const zone = item.zone_code ? `Zone ${item.zone_code}` : '';
    
    return `
      <div class="wf-card s-${status}">
        <div class="wf-row">
          <div class="wf-loc">${item.location_code}</div>
          <div class="wf-info">
            <div class="wf-status-text">${statusText}</div>
            <div class="wf-meta">${zone}</div>
            <div class="wf-stats">${counter}${verifier}${tb}</div>
          </div>
        </div>
        <div class="wf-actions">${actions}${undoBtn}</div>
      </div>
    `;
  }).join('');
}

async function confirmOpenNewGondola() {
  const code = document.getElementById('wfNewLoc').value.trim().toUpperCase();
  const errEl = document.getElementById('wfNewErr');
  
  if (!code) {
    errEl.textContent = T('please_select');
    errEl.classList.add('show');
    return;
  }
  
  // Validate location exists
  const found = allLocations.find(l => l.location_code === code);
  if (!found) {
    errEl.textContent = T('loc_not_found') + ': ' + code;
    errEl.classList.add('show');
    return;
  }
  
  await wfOpenForCounter(code);
  closeModal();
}

async function wfOpenForCounter(locCode) {
  log('CTL opening for counter:', locCode);
  
  const { data, error } = await sb.rpc('open_gondola_for_counter', {
    p_session_id: session.id,
    p_branch_id: branch.id,
    p_location_code: locCode,
    p_ctl_user_id: user.id,
    p_counter_id: null

  showToast(`вң… ${locCode} ${T('open_for_counter')}`, 'success');
  loadWorkflowList();
}

async function loadSettingsStats() {
  if (!branch) return;
  
  // Count stock_counts
  const { count: countsTotal } = await sb.from('stock_counts')
    .select('*', { count: 'exact', head: true })
    .eq('branch_id', branch.id);
  
  // Count sessions
  const { count: sessionsTotal } = await sb.from('stock_sessions')
    .select('*', { count: 'exact', head: true })
    .eq('branch_id', branch.id);
  
  // Count Pan-O-Grams
  const { data: pogs } = await sb.from('pan_o_grams')
    .select('total_qty')
    .eq('branch_id', branch.id);
  
  // Count zones + locations
  const [zonesRes, locsRes] = await Promise.all([
    sb.from('zones').select('*', { count: 'exact', head: true }).eq('branch_id', branch.id).eq('is_active', true),
    sb.from('location_master').select('*', { count: 'exact', head: true }).eq('branch_id', branch.id).eq('is_active', true)
  ]);
  
  const ce = document.getElementById('settingsTotalCounts');
  const se = document.getElementById('settingsTotalSessions');
  const pe = document.getElementById('pogStatBadge');
  const ze = document.getElementById('zoneStatBadge');
  if (ce) ce.textContent = (countsTotal || 0).toLocaleString();
  if (se) se.textContent = (sessionsTotal || 0).toLocaleString();
  if (pe) {
    const pogCount = pogs?.length || 0;
    const totalQty = (pogs || []).reduce((s, p) => s + (p.total_qty || 0), 0);
    pe.textContent = `${pogCount.toLocaleString()} / ${totalQty.toLocaleString()} pcs`;
  }
  if (ze) {
    ze.textContent = `${zonesRes.count || 0} / ${locsRes.count || 0}`;
  }
  
  // Last backup time
  const bb = document.getElementById('backupLastStatBadge');
  if (bb) {
    const lastBackup = localStorage.getItem(`fs_last_backup_${branch.id}`);
    if (lastBackup) {
      const t = new Date(lastBackup);
      const now = new Date();
      const diffMs = now - t;
      const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
      const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
      const diffMin = Math.floor(diffMs / (1000 * 60));
      const isLao = lang === 'lo';
      
      let label = '';
      if (diffMin < 1) label = isLao ? 'аә«аәІаәҒа»Қа»Ҳ' : 'а№Җаёһаёҙа№ҲаёҮаё—аёі';
      else if (diffMin < 60) label = `${diffMin} ${isLao ? 'аәҷаә—' : 'аёҷаёІаё—аёө'}`;
      else if (diffHrs < 24) label = `${diffHrs} ${isLao ? 'аәҠаәЎ' : 'аёҠаёЎ'}`;
      else label = `${diffDays} ${isLao ? 'аәЎаә·а»ү' : 'аё§аёұаёҷ'}`;
      
      bb.textContent = label;
      // Warn if > 7 days
      if (diffDays > 7) {
        bb.style.background = 'var(--rose-100)';
        bb.style.color = 'var(--rose-500)';
      } else if (diffDays > 3) {
        bb.style.background = 'var(--amber-100)';
        bb.style.color = '#92400e';
      }
    } else {
      bb.textContent = lang === 'lo' ? 'аәҡа»Қа»ҲаәЎаәө' : 'а№„аёЎа№ҲаёЎаёө';
      bb.style.background = 'var(--rose-100)';
      bb.style.color = 'var(--rose-500)';
    }
  }
}

async function executeReset() {
  const pwd = document.getElementById('resetPwd').value;
  const confirmText = document.getElementById('resetConfirm').value.trim();
  const errEl = document.getElementById('resetErr');
  const btn = document.getElementById('executeResetBtn');
  
  errEl.classList.remove('show');
  
  // Validate confirmation
  if (confirmText !== 'RESET') {
    errEl.textContent = T('must_type_reset');
    errEl.classList.add('show');
    return;
  }
  
  // Validate password
  if (!pwd) {
    errEl.textContent = T('wrong_pwd');
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span> ${T('reset_executing')}`;
  
  try {
    // Verify admin password
    const hash = await hashPassword(pwd);
    const { data: adminCheck } = await sb.from('users')
      .select('id, role')
      .eq('username', user.username)
      .eq('password_hash', hash)
      .eq('is_active', true)
      .maybeSingle();
    
    if (!adminCheck) {
      throw new Error(T('wrong_pwd'));
    }
    
    if (adminCheck.role !== 'admin') {
      throw new Error(lang === 'lo' 
        ? 'аәӘаә°а»ҖаәһаәІаә° Admin а»Җаә—аә»а»ҲаәІаәҷаәұа»үаәҷаә—аәөа»Ҳ Reset аәӮа»Қа»үаәЎаә№аәҷа»„аә”а»ү' 
        : 'а№ҖаёүаёһаёІаё° Admin а№Җаё—а№ҲаёІаёҷаёұа№үаёҷаё—аёөа№Ҳ Reset аёӮа№үаёӯаёЎаё№аёҘа№„аё”а№ү');
    }
    
    log('Reset confirmed by admin:', user.username, 'mode:', resetMode);
    
    // Execute reset
    if (resetMode === 'session' && session) {
      // Delete only counts in current session
      const { error: e1 } = await sb.from('stock_counts')
        .delete()
        .eq('session_id', session.id);
      if (e1) throw e1;
      
      // Delete expiry/sku logs of this session
      await sb.from('expiry_damage_log').delete().eq('session_id', session.id);
      await sb.from('new_sku_log').delete().eq('session_id', session.id);
      
      log('Session counts reset');
      showToast(T('reset_success'), 'success');
      
    } else if (resetMode === 'all') {
      // Delete ALL counts for this branch
      const { error: e1 } = await sb.from('stock_counts')
        .delete()
        .eq('branch_id', branch.id);
      if (e1) throw e1;
      
      // Delete all logs
      await sb.from('expiry_damage_log').delete().eq('branch_id', branch.id);
      await sb.from('new_sku_log').delete().eq('branch_id', branch.id);
      
      // Delete all sessions for this branch
      const { error: e2 } = await sb.from('stock_sessions')
        .delete()
        .eq('branch_id', branch.id);
      if (e2) throw e2;
      
      log('All data reset for branch:', branch.id);
      showToast(T('reset_success'), 'success');
      
      // Clear local session reference
      session = null;
    }
    
    closeModal();
    
    // Reload page after a moment
    setTimeout(async () => {
      await ensureSession();
      goPage('settings');
    }, 500);
    
  } catch (e) {
    console.error('[FS] Reset error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `рҹ—‘пёҸ ${T('reset_data')}`;
  }
}

// Auto-login
(async () => {
  // а№Ӯаё«аёҘаё” branch list аёӘаёіаё«аёЈаёұаёҡ login dropdown (аё—аёёаёҒаё„аёЈаёұа№үаёҮаё—аёөа№Ҳа№Җаёӣаёҙаё”а№Ғаёӯаёӣ)
  loadBranchListForLogin();
  
  const saved = localStorage.getItem('fs_user');
  const savedBranch = localStorage.getItem('fs_branch');
  
  if (saved) {
    try {
      user = JSON.parse(saved);
      if (savedBranch) branch = JSON.parse(savedBranch);
      
      // Re-fetch branch to make sure
      if (!branch && (user.active_branch_id || user.branch_id)) {
        const bid = user.active_branch_id || user.branch_id;
        const { data } = await sb.from('branches').select('*').eq('id', bid).maybeSingle();
        branch = data;
      }
      if (!branch) {
        // Fallback: аёҘаёӯаёҮаё«аёІ SUPERMART аё«аёЈаё·аёӯ PAKSE
        const { data } = await sb.from('branches').select('*').in('code', ['SUPERMART', 'PAKSE']).order('id').maybeSingle();
        branch = data;
      }
      
      const ctx = JSON.parse(localStorage.getItem('fs_context') || '{}');
      const needsZone = ['counter', 'verifier', 'staff', 'audit'].includes(user.role);
      
      // а№Ӯаё«аёҘаё” zones+locations а№ҖаёӘаёЎаёӯ
      await loadZonesAndLocations();
      
      // а№ҖаёҠа№Үаё„ use_zones аёӮаёӯаёҮ branch (per-branch toggle)
      const branchUseZones = branch?.use_zones !== false;
      
      if (needsZone && branchUseZones) {
        // а№Ӯаё«аёЎаё”аёЎаёө zone
        if (ctx.zone) zone = allZones.find(z => z.id == ctx.zone);
        if (ctx.locType) currentLocType = ctx.locType;
        if (ctx.location) loc = allLocations.find(l => l.location_code === ctx.location);
        
        if (!zone || !loc) {
          showZoneStep();
        } else {
          enterApp();
        }
      } else if (needsZone && !branchUseZones) {
        // а№Ӯаё«аёЎаё”аёӣаёҙаё” zone вҖ” аё•а№үаёӯаёҮа№ҖаёҘаё·аёӯаёҒ Gondola
        if (allZones && allZones.length > 0) {
          zone = allZones[0];
        }
        // аёҘаёӯаёҮ resume location аёҲаёІаёҒ localStorage
        if (ctx.location) {
          loc = allLocations.find(l => l.location_code === ctx.location);
        }
        enterApp();
        // аё–а№үаёІа№„аёЎа№ҲаёЎаёө loc вҶ’ а№Җаёӣаёҙаё” picker
        setTimeout(() => {
          if (!loc) {
            openQuickLocPicker(true);
          }
        }, 400);
      } else {
        // Admin/CTL/BCS вҖ” а№„аёЎа№Ҳаё•а№үаёӯаёҮа№ҖаёҘаё·аёӯаёҒ
        enterApp();
      }
    } catch(e) {
      console.error('[FS] Auto-login error:', e);
    }
  }
})();
