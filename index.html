                <div style="font-size:10px;color:var(--slate-500);margin-top:1px;">
                  ${new Date(s.snapshot_date).toLocaleString(lang === 'lo' ? 'lo-LA' : 'th-TH')}
                </div>
                <div style="font-size:10px;color:var(--slate-600);margin-top:3px;">
                  By: <strong>${s.imported_by_name || '?'}</strong>
                </div>
              </div>
              <div style="text-align:right;font-size:10px;">
                <div><strong>${s.total_skus || 0}</strong> SKUs</div>
                <div style="color:var(--emerald-500);">+${s.new_products || 0} new</div>
                <div style="color:var(--sky-600);">~${s.updated_products || 0} upd</div>
              </div>
            </div>
            <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--slate-200);font-size:10px;color:var(--slate-600);">
              💰 Total Value: <strong>₭ ${(s.total_value || 0).toLocaleString()}</strong>
            </div>
          </div>
        `).join('')}
      </div>
    `}
    
    <button class="btn btn-secondary" onclick="closeModal()" style="margin-top:11px;">${T('cancel')}</button>
  `);
}

// ==================== EXPORT EXCEL (with ExcelJS - Full Formatting) ====================
const XL_COLORS = {
  teal: '0F766E', tealLight: 'CCFBF1',
  amber: 'F59E0B', amberLight: 'FEF3C7',
  rose: 'F43F5E', roseLight: 'FFE4E6',
  emerald: '10B981', emeraldLight: 'D1FAE5',
  violet: '7C3AED', violetLight: 'EDE9FE',
  sky: '0284C7', skyLight: 'E0F2FE',
  slate900: '0F172A', slate700: '334155', slate500: '64748B',
  slate200: 'E2E8F0', slate100: 'F1F5F9'
};

function xlStyleHeader(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 11, bold: true, color: { argb: 'FFFFFFFF' } };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'center', vertical: 'middle', wrapText: true };
  cell.border = {
    left: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    right: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    top: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    bottom: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } }
  };
}

function xlStyleData(cell, opts = {}) {
  cell.font = { name: 'Calibri', size: opts.size || 10, bold: opts.bold || false, color: { argb: 'FF' + (opts.color || XL_COLORS.slate900) } };
  cell.alignment = { horizontal: opts.align || 'left', vertical: 'middle', wrapText: true };
  cell.border = {
    left: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    right: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    top: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } },
    bottom: { style: 'thin', color: { argb: 'FF' + XL_COLORS.slate200 } }
  };
  if (opts.fill) {
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[opts.fill] } };
  }
}

function xlStyleTitle(cell, color = 'teal', size = 18) {
  cell.font = { name: 'Calibri', size: size, bold: true, color: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'left', vertical: 'middle' };
}

function xlStyleSection(cell, color = 'violet') {
  cell.font = { name: 'Calibri', size: 12, bold: true, color: { argb: 'FFFFFFFF' } };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'left', vertical: 'middle', indent: 1 };
}

function xlStyleKpiValue(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 22, bold: true, color: { argb: 'FF' + XL_COLORS[color] } };
  cell.alignment = { horizontal: 'center', vertical: 'middle' };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color + 'Light'] } };
}

function xlStyleKpiLabel(cell, color = 'teal') {
  cell.font = { name: 'Calibri', size: 9, color: { argb: 'FF' + XL_COLORS.slate500 } };
  cell.alignment = { horizontal: 'center', vertical: 'middle' };
  cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[color + 'Light'] } };
}

async function exportToExcel(mode = 'full') {
  if (!session) {
    showToast(T('locked_session'), 'error');
    return;
  }
  
  if (typeof ExcelJS === 'undefined') {
    showToast('ExcelJS not loaded - please refresh page', 'error');
    return;
  }
  
  showToast(T('exporting'), '');
  log('Exporting Excel with formatting, mode:', mode);
  
  try {
    // Load all data
    const [countsRes, gondolaRes, expiryRes, newSkuRes] = await Promise.all([
      sb.from('stock_counts').select(`
        id, counted_at, count_role, location_code, gondola_code, zone_id,
        counted_qty, pos_qty_snapshot, diff, variance_level, workflow_status, note,
        products(barcode, name_th, name_lo, unit_th, unit_lo, sell_price),
        users(full_name, username)
      `).eq('session_id', session.id).order('counted_at', { ascending: false }),
      
      sb.from('v_gondola_progress').select('*').eq('session_id', session.id).order('location_code'),
      
      sb.from('expiry_damage_log').select(`
        *, products(barcode, name_th, name_lo, sell_price), users(full_name)
      `).eq('session_id', session.id).order('created_at', { ascending: false }),
      
      sb.from('new_sku_log').select(`
        *, users(full_name)
      `).eq('session_id', session.id).order('created_at', { ascending: false })
    ]);
    
    const counts = countsRes.data || [];
    const gondolas = gondolaRes.data || [];
    const expiries = expiryRes.data || [];
    const newSkus = newSkuRes.data || [];
    
    log('Loaded for export:', { counts: counts.length, gondolas: gondolas.length });
    
    // Create workbook
    const wb = new ExcelJS.Workbook();
    wb.creator = 'Friendship Stock System';
    wb.created = new Date();
    
    // ============ SHEET 1: SUMMARY ============
    if (mode === 'full') {
      buildSummarySheet(wb, counts, gondolas);
    }
    
    // ============ SHEET 2: COUNTS DETAIL ============
    if (mode === 'full' || mode === 'counts') {
      buildCountsSheet(wb, counts);
    }
    
    // ============ SHEET 3: VARIANCE ANALYSIS ============
    if (mode === 'full' || mode === 'variance') {
      buildVarianceSheet(wb, counts);
    }
    
    // ============ SHEET 4: GONDOLA PROGRESS ============
    if (mode === 'full') {
      buildGondolaSheet(wb, gondolas);
    }
    
    // ============ SHEET 5: COUNTER PERFORMANCE ============
    if (mode === 'full') {
      buildPerformanceSheet(wb, counts);
    }
    
    // ============ SHEET 6: TIEBREAKER LOG ============
    if (mode === 'full') {
      const { data: tbData } = await sb.from('v_needs_tiebreaker').select('*').eq('session_id', session.id);
      buildTiebreakerSheet(wb, tbData || []);
    }
    
    // ============ SHEET 7: EXPIRY & NEW SKU ============
    if (mode === 'full') {
      buildExpirySheet(wb, expiries, newSkus);
    }
    
    // Save
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    
    const dateStr = new Date().toISOString().slice(0, 10);
    const sessionLabel = (session.session_name || 'Session').replace(/[^a-zA-Z0-9-]/g, '_').substring(0, 30);
    const filename = `Stock-Count-Report-${sessionLabel}-${dateStr}.xlsx`;
    
    saveAs(blob, filename);
    
    showToast(`✅ ${T('export_success')}: ${filename}`, 'success');
    log('Export complete:', filename);
    
  } catch (e) {
    console.error('[FS] Export error:', e);
    showToast('Export error: ' + e.message, 'error');
  }
}

function buildSummarySheet(wb, counts, gondolas) {
  const ws = wb.addWorksheet('Summary', { views: [{ showGridLines: false }] });
  
  // Title
  ws.mergeCells('A1:H1');
  ws.getCell('A1').value = 'STOCK COUNT REPORT';
  xlStyleTitle(ws.getCell('A1'), 'teal', 22);
  ws.getRow(1).height = 32;
  
  ws.mergeCells('A2:H2');
  ws.getCell('A2').value = 'Friendship Supermart - Pakse, Laos';
  ws.getCell('A2').font = { name: 'Calibri', size: 12, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  // Metadata
  const meta = [
    ['Report Date:', new Date().toLocaleString('en-GB')],
    ['Session Name:', session.session_name || ''],
    ['Branch:', branch?.name_th || branch?.name_lo || 'PAKSE'],
    ['Reported By:', user.full_name || ''],
    ['Phase:', session.phase || 'active'],
  ];
  meta.forEach(([label, val], idx) => {
    const row = 4 + idx;
    ws.getCell(`A${row}`).value = label;
    ws.getCell(`A${row}`).font = { name: 'Calibri', size: 10, bold: true, color: { argb: 'FF' + XL_COLORS.slate700 } };
    ws.getCell(`A${row}`).alignment = { horizontal: 'right' };
    ws.mergeCells(`B${row}:D${row}`);
    ws.getCell(`B${row}`).value = val;
    ws.getCell(`B${row}`).font = { name: 'Calibri', size: 10, color: { argb: 'FF' + XL_COLORS.slate900 } };
  });
  
  // KPI Section
  ws.mergeCells('A10:H10');
  ws.getCell('A10').value = '  KEY PERFORMANCE INDICATORS';
  xlStyleSection(ws.getCell('A10'), 'teal');
  ws.getRow(10).height = 22;
  
  // Calculate KPIs
  const totalSkus = counts.length;
  const totalItems = counts.reduce((s, c) => s + (c.counted_qty || 0), 0);
  const l1Count = counts.filter(c => c.variance_level === 1).length;
  const accuracy = totalSkus > 0 ? (l1Count / totalSkus) : 0;
  let shrinkage = 0;
  counts.forEach(c => {
    if ((c.diff || 0) < 0) shrinkage += Math.abs(c.diff) * (c.products?.sell_price || 0);
  });
  
  // 4 KPI cards
  const kpis = [
    { label: 'Total SKUs Counted', value: totalSkus, color: 'teal', fmt: '#,##0' },
    { label: 'Total Items', value: totalItems, color: 'sky', fmt: '#,##0' },
    { label: 'Accuracy', value: accuracy, color: 'emerald', fmt: '0.0%' },
    { label: 'Shrinkage Value', value: shrinkage, color: 'rose', fmt: '#,##0" K"' },
  ];
  
  kpis.forEach((kpi, i) => {
    const startCol = i * 2 + 2; // B, D, F, H
    const colStart = String.fromCharCode(64 + startCol);
    const colEnd = String.fromCharCode(64 + startCol + 1);
    
    ws.mergeCells(`${colStart}12:${colEnd}12`);
    ws.getCell(`${colStart}12`).value = kpi.value;
    ws.getCell(`${colStart}12`).numFmt = kpi.fmt;
    xlStyleKpiValue(ws.getCell(`${colStart}12`), kpi.color);
    
    ws.mergeCells(`${colStart}13:${colEnd}13`);
    ws.getCell(`${colStart}13`).value = kpi.label;
    xlStyleKpiLabel(ws.getCell(`${colStart}13`), kpi.color);
  });
  
  ws.getRow(12).height = 42;
  ws.getRow(13).height = 20;
  
  // Variance Breakdown
  ws.mergeCells('A15:H15');
  ws.getCell('A15').value = '  VARIANCE BREAKDOWN';
  xlStyleSection(ws.getCell('A15'), 'amber');
  ws.getRow(15).height = 22;
  
  ['Level', 'Description', 'Count', '%', 'Action Required'].forEach((h, i) => {
    const cell = ws.getCell(17, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'slate500');
  });
  if (true) { ws.mergeCells('E17:H17'); }
  ws.getRow(17).height = 22;
  
  const variances = [
    ['L1', 'Auto Adjust (<2% & <5K)', counts.filter(c => c.variance_level === 1).length, 'emerald', 'Approve automatically'],
    ['L2', 'Explain (2-5% or 5-50K)', counts.filter(c => c.variance_level === 2).length, 'amber', 'Manager must add explanation'],
    ['L3', 'Mandatory Recount (>5% or >50K)', counts.filter(c => c.variance_level === 3).length, 'rose', 'Re-count required'],
    ['L4', 'Investigation (>10% or >200K)', counts.filter(c => c.variance_level === 4).length, 'rose', 'Escalate to investigation'],
  ];
  
  variances.forEach((v, idx) => {
    const r = 18 + idx;
    ws.getCell(`A${r}`).value = v[0];
    ws.getCell(`B${r}`).value = v[1];
    ws.getCell(`C${r}`).value = v[2];
    ws.getCell(`D${r}`).value = totalSkus > 0 ? v[2] / totalSkus : 0;
    ws.mergeCells(`E${r}:H${r}`);
    ws.getCell(`E${r}`).value = v[4];
    
    xlStyleData(ws.getCell(`A${r}`), { align: 'center', bold: true, color: v[3], fill: v[3] + 'Light', size: 11 });
    xlStyleData(ws.getCell(`B${r}`));
    xlStyleData(ws.getCell(`C${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`D${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`E${r}`));
    ws.getCell(`D${r}`).numFmt = '0.0%';
  });
  
  // Gondola Progress
  ws.mergeCells('A23:H23');
  ws.getCell('A23').value = '  GONDOLA PROGRESS';
  xlStyleSection(ws.getCell('A23'), 'violet');
  ws.getRow(23).height = 22;
  
  ['Status', 'Description', 'Count', '%'].forEach((h, i) => {
    const cell = ws.getCell(25, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'slate500');
  });
  ws.getRow(25).height = 22;
  
  const gondoTotal = gondolas.length;
  const gondoStats = [
    ['Completed', 'Done & Verified', gondolas.filter(g => g.status === 'completed').length, 'emerald'],
    ['In Progress', 'Counting/Verifying', gondolas.filter(g => ['counting', 'verifying', 'tiebreaker'].includes(g.status)).length, 'teal'],
    ['Waiting', 'Waiting for next step', gondolas.filter(g => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed'].includes(g.status)).length, 'amber'],
    ['Not Started', 'Closed/Not opened', gondolas.filter(g => ['closed', 'open_for_counting'].includes(g.status)).length, 'slate500'],
  ];
  
  gondoStats.forEach((g, idx) => {
    const r = 26 + idx;
    ws.getCell(`A${r}`).value = g[0];
    ws.getCell(`B${r}`).value = g[1];
    ws.getCell(`C${r}`).value = g[2];
    ws.getCell(`D${r}`).value = gondoTotal > 0 ? g[2] / gondoTotal : 0;
    
    const lightFill = g[3] === 'slate500' ? 'slate100' : g[3] + 'Light';
    xlStyleData(ws.getCell(`A${r}`), { align: 'center', bold: true, color: g[3], fill: lightFill, size: 11 });
    xlStyleData(ws.getCell(`B${r}`));
    xlStyleData(ws.getCell(`C${r}`), { align: 'center' });
    xlStyleData(ws.getCell(`D${r}`), { align: 'center' });
    ws.getCell(`D${r}`).numFmt = '0.0%';
  });
  
  // Notes
  ws.getCell('A31').value = 'Notes:';
  ws.getCell('A31').font = { name: 'Calibri', size: 11, bold: true, color: { argb: 'FF' + XL_COLORS.slate700 } };
  ['• L1 (Auto): Approved without action',
   '• L2 (Explain): Manager adds note',
   '• L3 (Recount): New count required',
   '• L4 (Investigate): Escalate to head office'].forEach((note, i) => {
    const r = 32 + i;
    ws.mergeCells(`A${r}:H${r}`);
    ws.getCell(`A${r}`).value = note;
    ws.getCell(`A${r}`).font = { name: 'Calibri', size: 9, color: { argb: 'FF' + XL_COLORS.slate500 } };
  });
  
  // Column widths
  ws.getColumn('A').width = 18;
  ['B','C','D','E','F','G','H'].forEach(c => ws.getColumn(c).width = 16);
}

function buildCountsSheet(wb, counts) {
  const ws = wb.addWorksheet('Counts Detail', { views: [{ showGridLines: false, state: 'frozen', ySplit: 3 }] });
  
  ws.mergeCells('A1:P1');
  ws.getCell('A1').value = 'STOCK COUNTS - DETAILED LIST';
  xlStyleTitle(ws.getCell('A1'), 'teal', 16);
  ws.getRow(1).height = 28;
  
  const headers = [
    'Count ID', 'Counted At', 'User', 'Role', 'Location', 'Zone', 'Barcode', 'Product Name',
    'Unit Price (K)', 'POS Qty', 'Counted Qty', 'Unit', 'Diff', 'Var Level', 'Workflow', 'Note'
  ];
  headers.forEach((h, i) => {
    const cell = ws.getCell(3, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'teal');
  });
  ws.getRow(3).height = 32;
  
  counts.forEach((c, idx) => {
    const r = 4 + idx;
    const p = c.products || {};
    const u = c.users || {};
    const name = (lang === 'lo' ? p.name_lo : p.name_th) || p.name_th || p.name_lo || '';
    
    const row = [
      c.id?.substring(0, 8) || '',
      c.counted_at ? new Date(c.counted_at).toLocaleString('en-GB') : '',
      u.full_name || u.username || '',
      c.count_role || '',
      c.location_code || c.gondola_code || '',
      c.zone_id || '',
      p.barcode || '',
      name,
      p.sell_price || 0,
      c.pos_qty_snapshot || 0,
      c.counted_qty || 0,
      p.unit_th || p.unit_lo || 'pcs',
      c.diff || 0,
      c.variance_level || '',
      c.workflow_status || '',
      c.note || ''
    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [4, 6, 12, 14, 15].includes(col) ? 'center' : ([9, 10, 11, 13].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });
    });
    
    // Number formats
    ws.getCell(r, 9).numFmt = '#,##0';
    ws.getCell(r, 10).numFmt = '#,##0';
    ws.getCell(r, 11).numFmt = '#,##0';
    ws.getCell(r, 13).numFmt = '#,##0;[Red](#,##0);"-"';
    
    // Color-code Diff
    const diff = c.diff || 0;
    if (diff < 0) ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
    else if (diff > 0) ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.amberLight } };
    else ws.getCell(r, 13).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
    
    // Color-code Variance Level
    const lv = c.variance_level || 0;
    if (lv >= 3) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
    else if (lv === 2) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.amberLight } };
    else if (lv === 1) ws.getCell(r, 14).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
  });
  
  // Column widths
  const widths = [10, 18, 14, 11, 10, 7, 16, 32, 12, 9, 11, 8, 10, 11, 13, 28];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  // Auto filter
  if (counts.length > 0) {
    ws.autoFilter = { from: { row: 3, column: 1 }, to: { row: 3, column: 16 } };
  }
}

function buildVarianceSheet(wb, counts) {
  const ws = wb.addWorksheet('Variance Analysis', { views: [{ showGridLines: false, state: 'frozen', ySplit: 4 }] });
  
  ws.mergeCells('A1:K1');
  ws.getCell('A1').value = 'VARIANCE ANALYSIS - Items Requiring Attention';
  xlStyleTitle(ws.getCell('A1'), 'rose', 16);
  
  ws.mergeCells('A2:K2');
  ws.getCell('A2').value = 'Sorted by Variance Level (highest first) | Filter L3-L4 for critical items';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  const headers = ['Priority', 'Location', 'Barcode', 'Product Name', 'POS Qty', 'Counted Qty', 'Diff', 'Diff %', 'Value Impact (K)', 'Var Level', 'Action'];
  headers.forEach((h, i) => {
    const cell = ws.getCell(4, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'rose');
  });
  ws.getRow(4).height = 32;
  
  const sorted = [...counts].filter(c => (c.variance_level || 0) >= 2)
    .sort((a, b) => (b.variance_level || 0) - (a.variance_level || 0));
  
  sorted.forEach((c, idx) => {
    const r = 5 + idx;
    const p = c.products || {};
    const lv = c.variance_level || 1;
    const priority = lv === 4 ? '🔴 HIGH' : lv === 3 ? '🟠 MED' : '🟡 LOW';
    const action = lv === 4 ? 'Investigate' : lv === 3 ? 'Recount' : 'Explain';
    const pctDiff = c.pos_qty_snapshot > 0 ? (c.diff || 0) / c.pos_qty_snapshot : 0;
    const valueImpact = (c.diff || 0) * (p.sell_price || 0);
    
    const row = [
      priority, c.location_code || c.gondola_code || '', p.barcode || '',
      (lang === 'lo' ? p.name_lo : p.name_th) || '',
      c.pos_qty_snapshot || 0, c.counted_qty || 0, c.diff || 0,
      pctDiff, valueImpact, lv, action
    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [1, 10].includes(col) ? 'center' : ([5, 6, 7, 8, 9].includes(col) ? 'right' : 'left');
      const fill = lv === 4 ? 'roseLight' : lv === 3 ? 'amberLight' : 'tealLight';
      xlStyleData(cell, { align, size: 9, fill: col === 1 ? fill : null });
    });
    
    ws.getCell(r, 7).numFmt = '#,##0;[Red](#,##0)';
    ws.getCell(r, 8).numFmt = '0.0%';
    ws.getCell(r, 9).numFmt = '#,##0" K"';
  });
  
  const widths = [10, 11, 16, 30, 9, 11, 10, 9, 14, 10, 28];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  if (sorted.length > 0) {
    ws.autoFilter = { from: { row: 4, column: 1 }, to: { row: 4, column: 11 } };
  }
}

function buildGondolaSheet(wb, gondolas) {
  const ws = wb.addWorksheet('Gondola Progress', { views: [{ showGridLines: false, state: 'frozen', ySplit: 7 }] });
  
  ws.mergeCells('A1:L1');
  ws.getCell('A1').value = 'GONDOLA WORKFLOW PROGRESS';
  xlStyleTitle(ws.getCell('A1'), 'violet', 16);
  
  ws.mergeCells('A2:L2');
  ws.getCell('A2').value = 'Status of each location being counted';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  // Stats
  const total = gondolas.length;
  const completed = gondolas.filter(g => g.status === 'completed').length;
  const inProgress = gondolas.filter(g => ['counting', 'verifying'].includes(g.status)).length;
  
  [
    ['A4', 'Total Locations:', total],
    ['C4', 'Completed:', completed],
    ['E4', 'In Progress:', inProgress],
    ['G4', 'Pending:', total - completed - inProgress]
  ].forEach(([cellRef, label, val]) => {
    const labelCell = ws.getCell(cellRef);
    const valCell = ws.getCell(cellRef.replace(/[A-Z]/, c => String.fromCharCode(c.charCodeAt(0) + 1)));
    labelCell.value = label;
    labelCell.font = { name: 'Calibri', size: 10, bold: true, color: { argb: 'FF' + XL_COLORS.slate700 } };
    labelCell.alignment = { horizontal: 'right' };
    valCell.value = val;
    valCell.font = { name: 'Calibri', size: 14, bold: true, color: { argb: 'FF' + XL_COLORS.violet } };
    valCell.alignment = { horizontal: 'center' };
  });
  
  const headers = ['Location', 'Type', 'Zone', 'Gondola #', 'Status', 'Counter', 'Counter Qty', 'Verifier', 'Verifier Qty', 'Time (min)', 'Opened', 'Completed'];
  headers.forEach((h, i) => {
    const cell = ws.getCell(7, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'violet');
  });
  ws.getRow(7).height = 32;
  
  gondolas.forEach((g, idx) => {
    const r = 8 + idx;
    const row = [
      g.location_code || '', g.location_type || '', g.zone_code || '', g.gondola_no || '',
      g.status || '', g.counter_name || '', g.counter_count || 0,
      g.verifier_name || '', g.verifier_count || 0, Math.round(g.counter_minutes || 0),
      g.opened_at ? new Date(g.opened_at).toLocaleString('en-GB') : '',
      g.completed_at ? new Date(g.completed_at).toLocaleString('en-GB') : ''
    ];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [1, 2, 3, 4, 5, 10].includes(col) ? 'center' : ([7, 9].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });
    });
    
    // Status color
    const statusFill = {
      'completed': 'emeraldLight',
      'counting': 'tealLight',
      'verifying': 'amberLight',
      'tiebreaker_needed': 'roseLight'
    }[g.status];
    if (statusFill) {
      ws.getCell(r, 5).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS[statusFill] } };
    }
  });
  
  const widths = [10, 13, 6, 9, 18, 13, 11, 13, 11, 9, 18, 18];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  if (gondolas.length > 0) {
    ws.autoFilter = { from: { row: 7, column: 1 }, to: { row: 7, column: 12 } };
  }
}

function buildPerformanceSheet(wb, counts) {
  const ws = wb.addWorksheet('Counter Performance', { views: [{ showGridLines: false, state: 'frozen', ySplit: 4 }] });
  
  ws.mergeCells('A1:H1');
  ws.getCell('A1').value = 'COUNTER & VERIFIER PERFORMANCE';
  xlStyleTitle(ws.getCell('A1'), 'sky', 16);
  
  ws.mergeCells('A2:H2');
  ws.getCell('A2').value = 'Productivity & Accuracy by User';
  ws.getCell('A2').font = { name: 'Calibri', size: 11, italic: true, color: { argb: 'FF' + XL_COLORS.slate500 } };
  
  const headers = ['User', 'Role', 'SKUs Counted', 'Total Items', 'Locations', 'L1 Counts', 'Issues (L2-L4)', 'Accuracy %'];
  headers.forEach((h, i) => {
    const cell = ws.getCell(4, i + 1);
    cell.value = h;
    xlStyleHeader(cell, 'sky');
  });
  ws.getRow(4).height = 32;
  
  const perfMap = {};
  counts.forEach(c => {
    const u = c.users || {};
    const key = u.full_name || u.username || 'Unknown';
    if (!perfMap[key]) {
      perfMap[key] = { name: key, role: c.count_role, skus: 0, items: 0, locations: new Set(), l1: 0, issues: 0 };
    }
    perfMap[key].skus++;
    perfMap[key].items += c.counted_qty || 0;
    if (c.location_code || c.gondola_code) perfMap[key].locations.add(c.location_code || c.gondola_code);
    if (c.variance_level === 1) perfMap[key].l1++;
    if ((c.variance_level || 0) >= 2) perfMap[key].issues++;
  });
  
  Object.values(perfMap).forEach((p, idx) => {
    const r = 5 + idx;
    const accuracy = p.skus > 0 ? (p.l1 / p.skus) : 0;
    const row = [p.name, p.role, p.skus, p.items, p.locations.size, p.l1, p.issues, accuracy];
    
    row.forEach((val, i) => {
      const cell = ws.getCell(r, i + 1);
      cell.value = val;
      const col = i + 1;
      const align = [2].includes(col) ? 'center' : ([3, 4, 5, 6, 7].includes(col) ? 'right' : 'left');
      xlStyleData(cell, { align, size: 9 });
    });
    
    ws.getCell(r, 8).numFmt = '0.0%';
    // Color accuracy
    if (accuracy >= 0.95) ws.getCell(r, 8).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.emeraldLight } };
    else if (accuracy < 0.90) ws.getCell(r, 8).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + XL_COLORS.roseLight } };
  });
  
  const widths = [14, 11, 13, 12, 11, 11, 14, 12];
  widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
  
  if (Object.keys(perfMap).length > 0) {
    ws.autoFilter = { from: { row: 4, column: 1 }, to: { row: 4, column: 8 } };
  }
}

  `;
}

function setWfFilter(f) {
  wfFilter = f;
  document.querySelectorAll('.wf-filter-tab').forEach(t => 
    t.classList.toggle('active', t.dataset.f === f));
  renderWorkflowList(window._wfData || []);
}

async function loadWorkflowList() {
  if (!session) return;
  
  log('Loading workflow list');
  
  const { data, error } = await sb.from('v_gondola_progress')
    .select('*')
    .eq('session_id', session.id)
    .order('opened_at', { ascending: false });
  
  if (error) {
    log('Workflow error:', error);
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  window._wfData = data || [];
  log('Workflow items:', window._wfData.length);
  
  renderWorkflowSummary(window._wfData);
  renderWorkflowList(window._wfData);
}

function renderWorkflowSummary(items) {
  const total = items.length;
  const completed = items.filter(x => x.status === 'completed').length;
  const inProgress = items.filter(x => ['counting', 'verifying', 'tiebreaker'].includes(x.status)).length;
  const waiting = items.filter(x => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed'].includes(x.status)).length;
  const notStarted = items.filter(x => ['closed', 'open_for_counting'].includes(x.status)).length;
  const pct = total ? Math.round((completed / total) * 100) : 0;
  
  const el = document.getElementById('wfSummary');
  if (!el) return;
  
  el.innerHTML = `
    <div class="progress-donut-card">
      <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;">${T('progress')}</div>
      <div class="progress-donut">
        <svg class="donut-svg" viewBox="0 0 120 120">
          <circle class="donut-bg" cx="60" cy="60" r="50"/>
          <circle class="donut-fg" cx="60" cy="60" r="50" 
            stroke-dasharray="${2 * Math.PI * 50}" 
            stroke-dashoffset="${2 * Math.PI * 50 * (1 - pct/100)}"/>
          <text class="donut-text" x="60" y="65" text-anchor="middle">${pct}%</text>
        </svg>
        <div style="text-align:left;">
          <div style="font-size:24px;font-weight:700;color:var(--emerald-500);">${completed}<span style="color:var(--slate-400);font-size:14px;">/${total}</span></div>
          <div style="font-size:10px;color:var(--slate-500);">Gondolas</div>
        </div>
      </div>
      <div class="wf-summary-grid">
        <div class="wf-sum-card progress">
          <div class="wf-sum-num">${inProgress}</div>
          <div class="wf-sum-lbl" style="color:var(--teal-700);">${T('in_progress')}</div>
        </div>
        <div class="wf-sum-card waiting">
          <div class="wf-sum-num">${waiting}</div>
          <div class="wf-sum-lbl" style="color:#92400e;">${T('waiting')}</div>
        </div>
        <div class="wf-sum-card completed">
          <div class="wf-sum-num">${completed}</div>
          <div class="wf-sum-lbl" style="color:var(--emerald-500);">${T('completed_lo')}</div>
        </div>
        <div class="wf-sum-card not_started">
          <div class="wf-sum-num">${notStarted}</div>
          <div class="wf-sum-lbl" style="color:var(--slate-600);">${T('not_started')}</div>
        </div>
      </div>
    </div>
  `;
}

function renderWorkflowList(items) {
  const list = document.getElementById('wfList');
  if (!list) return;
  
  // Apply filter
  let filtered = items;
  if (wfFilter === 'active') {
    filtered = items.filter(x => ['counting', 'verifying', 'tiebreaker'].includes(x.status));
  } else if (wfFilter === 'waiting') {
    filtered = items.filter(x => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed', 'open_for_counting'].includes(x.status));
  } else if (wfFilter === 'completed') {
    filtered = items.filter(x => x.status === 'completed');
  }
  
  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_gondolas_active')}</p></div>`;
    return;
  }
  
  list.innerHTML = filtered.map(item => {
    const status = item.status || 'closed';
    const statusText = T('status_' + status);
    
    // Action buttons based on status
    let actions = '';
    if (status === 'closed' || status === 'open_for_counting') {
      actions = `
        <button class="wf-btn wf-btn-close" onclick="wfCloseCounter('${item.location_code}')">${T('close_counter')} →</button>
      `;
      if (status === 'closed') {
        actions = `<button class="wf-btn wf-btn-open" onclick="wfOpenForCounter('${item.location_code}')">${T('open_for_counter')}</button>`;
      }
    } else if (status === 'counting') {
      actions = `<button class="wf-btn wf-btn-close" onclick="wfCloseCounter('${item.location_code}')">${T('close_counter')} ✓</button>`;
    } else if (status === 'counted') {
      actions = `<button class="wf-btn wf-btn-verify" onclick="wfOpenForVerifier('${item.location_code}')">${T('open_for_verifier')} →</button>`;
    } else if (status === 'open_for_verify' || status === 'verifying') {
      actions = `<button class="wf-btn wf-btn-verify" onclick="wfCloseVerifier('${item.location_code}')">${T('close_verifier')} ✓</button>`;
    } else if (status === 'verified' || status === 'tiebreaker_needed' || status === 'tiebreaker') {
      actions = `<button class="wf-btn wf-btn-complete" onclick="wfMarkCompleted('${item.location_code}')">${T('mark_completed')} ✓</button>`;
    } else if (status === 'completed') {
      actions = `<button class="wf-btn wf-btn-reopen" onclick="wfReopen('${item.location_code}')">${T('reopen')}</button>`;
    }
    
    const counter = item.counter_name ? `<span class="wf-stat-chip">👤 ${item.counter_name}: ${item.counter_count || 0}</span>` : '';
    const verifier = item.verifier_name ? `<span class="wf-stat-chip">🔍 ${item.verifier_name}: ${item.verifier_count || 0}</span>` : '';
    const tb = item.tb_count > 0 ? `<span class="wf-stat-chip">⚖️ TB: ${item.tb_count}</span>` : '';
    const zone = item.zone_code ? `Zone ${item.zone_code}` : '';
    
    return `
      <div class="wf-card s-${status}">
        <div class="wf-row">
          <div class="wf-loc">${item.location_code}</div>
          <div class="wf-info">
            <div class="wf-status-text">${statusText}</div>
            <div class="wf-meta">${zone}</div>
            <div class="wf-stats">${counter}${verifier}${tb}</div>
          </div>
        </div>
        <div class="wf-actions">${actions}</div>
      </div>
    `;
  }).join('');
}

// === Workflow Actions ===
async function openNewGondolaForCounter() {
  showModal(`
    <h3>${T('open_gondola')}</h3>
    <p>${T('select_to_count')}</p>
    
    <div class="form-group">
      <label class="form-label">${T('gondola_code')}</label>
      <input type="text" class="form-input mono" id="wfNewLoc" 
             placeholder="01A01, W028, WT028..." 
             autocomplete="off" autocapitalize="characters"
             style="text-transform:uppercase;text-align:center;letter-spacing:2px;font-weight:700;">
    </div>
    
    <div class="error-msg" id="wfNewErr"></div>
    
    <div class="action-row">
      <button class="btn btn-secondary" onclick="closeModal()">${T('cancel')}</button>
      <button class="btn btn-primary" onclick="confirmOpenNewGondola()">${T('open_for_counter')}</button>
    </div>
  `);
  
  setTimeout(() => {
    document.getElementById('wfNewLoc')?.focus();
  }, 100);
}

async function confirmOpenNewGondola() {
  const code = document.getElementById('wfNewLoc').value.trim().toUpperCase();
  const errEl = document.getElementById('wfNewErr');
  
  if (!code) {
    errEl.textContent = T('please_select');
    errEl.classList.add('show');
    return;
  }
  
  // Validate location exists
  const found = allLocations.find(l => l.location_code === code);
  if (!found) {
    errEl.textContent = T('loc_not_found') + ': ' + code;
    errEl.classList.add('show');
    return;
  }
  
  await wfOpenForCounter(code);
  closeModal();
}

async function wfOpenForCounter(locCode) {
  log('CTL opening for counter:', locCode);
  
  const { data, error } = await sb.rpc('open_gondola_for_counter', {
    p_session_id: session.id,
    p_branch_id: branch.id,
    p_location_code: locCode,
    p_ctl_user_id: user.id,
    p_counter_id: null
  });
  
  if (error) {
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  showToast(`✅ ${locCode} ${T('open_for_counter')}`, 'success');
  loadWorkflowList();
}

async function wfCloseCounter(locCode) {
  if (!confirm(`${T('close_counter')} ${locCode}?`)) return;
  
  log('CTL closing counter for:', locCode);
  
  const { error } = await sb.rpc('close_gondola_counter', {
    p_session_id: session.id,
    p_location_code: locCode,
    p_ctl_user_id: user.id
  });
  
  if (error) {
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  showToast(`✅ ${locCode} ${T('counter_done')}`, 'success');
  loadWorkflowList();
}

async function wfOpenForVerifier(locCode) {
  log('CTL opening for verifier:', locCode);
  
  const { error } = await sb.rpc('open_gondola_for_verifier', {
    p_session_id: session.id,
    p_location_code: locCode,

async function wfCloseVerifier(locCode) {
  if (!confirm(`${T('close_verifier')} ${locCode}?`)) return;
  
  log('CTL closing verifier for:', locCode);
  
  const { data, error } = await sb.rpc('close_gondola_verifier', {
    p_session_id: session.id,
    p_location_code: locCode,
    p_ctl_user_id: user.id
  });
  
  if (error) {
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  const result = data || {};
  if (result.status === 'tiebreaker_needed') {
    showToast(`⚠️ ${locCode} ${T('status_tiebreaker_needed')}`, 'warning');
  } else {
    showToast(`✅ ${locCode} ${T('status_completed')}`, 'success');

  loadWorkflowList();
}

async function wfMarkCompleted(locCode) {

async function wfReopen(locCode) {

async function executeReset() {
  const pwd = document.getElementById('resetPwd').value;
  const confirmText = document.getElementById('resetConfirm').value.trim();
  const errEl = document.getElementById('resetErr');
  const btn = document.getElementById('executeResetBtn');
  
  errEl.classList.remove('show');
  
  // Validate confirmation
  if (confirmText !== 'RESET') {
    errEl.textContent = T('must_type_reset');
    errEl.classList.add('show');
    return;
  }
  
  // Validate password
  if (!pwd) {
    errEl.textContent = T('wrong_pwd');
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span> ${T('reset_executing')}`;
  
  try {
    // Verify admin password
    const hash = await hashPassword(pwd);
    const { data: adminCheck } = await sb.from('users')
      .select('id, role')
      .eq('username', user.username)
      .eq('password_hash', hash)
      .eq('is_active', true)
      .maybeSingle();
    
    if (!adminCheck) {
      throw new Error(T('wrong_pwd'));
    }
    
    if (!['admin', 'scc'].includes(adminCheck.role)) {
      throw new Error('Insufficient privileges');
    }
    
    log('Reset confirmed by admin:', user.username, 'mode:', resetMode);
    
    // Execute reset
    if (resetMode === 'session' && session) {
      // Delete only counts in current session
      const { error: e1 } = await sb.from('stock_counts')
        .delete()
        .eq('session_id', session.id);
      if (e1) throw e1;
      
      // Delete expiry/sku logs of this session
      await sb.from('expiry_damage_log').delete().eq('session_id', session.id);
      await sb.from('new_sku_log').delete().eq('session_id', session.id);
      
      log('Session counts reset');
      showToast(T('reset_success'), 'success');
      
    } else if (resetMode === 'all') {
      // Delete ALL counts for this branch
      const { error: e1 } = await sb.from('stock_counts')
        .delete()
        .eq('branch_id', branch.id);
      if (e1) throw e1;
      
      // Delete all logs
      await sb.from('expiry_damage_log').delete().eq('branch_id', branch.id);
      await sb.from('new_sku_log').delete().eq('branch_id', branch.id);
      
      // Delete all sessions for this branch
      const { error: e2 } = await sb.from('stock_sessions')
        .delete()
        .eq('branch_id', branch.id);
      if (e2) throw e2;
      
      log('All data reset for branch:', branch.id);
      showToast(T('reset_success'), 'success');
      
      // Clear local session reference
      session = null;
    }
    
    closeModal();
    
    // Reload page after a moment
    setTimeout(async () => {
      await ensureSession();
      goPage('settings');
    }, 500);
    
  } catch (e) {
    console.error('[FS] Reset error:', e);
    errEl.textContent = e.message;
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `🗑️ ${T('reset_data')}`;
  }
}

// Auto-login
(async () => {
  const saved = localStorage.getItem('fs_user');
  const savedBranch = localStorage.getItem('fs_branch');
  
  if (saved) {
    try {
      user = JSON.parse(saved);
      if (savedBranch) branch = JSON.parse(savedBranch);
      
      // Re-fetch branch to make sure
      if (!branch && user.branch_id) {
        const { data } = await sb.from('branches').select('*').eq('id', user.branch_id).maybeSingle();
        branch = data;
      }
      if (!branch) {
        const { data } = await sb.from('branches').select('*').eq('code', 'PAKSE').maybeSingle();
        branch = data;
      }
      
      const ctx = JSON.parse(localStorage.getItem('fs_context') || '{}');
      const needsZone = ['counter', 'verifier', 'ctl', 'staff', 'audit'].includes(user.role);
      
      if (needsZone) {
        await loadZonesAndLocations();
        if (ctx.zone) zone = allZones.find(z => z.id == ctx.zone);
        if (ctx.locType) currentLocType = ctx.locType;
        if (ctx.location) loc = allLocations.find(l => l.location_code === ctx.location);
        
        if (!zone || !loc) {
          showZoneStep();
        } else {
          enterApp();
        }
      } else {
        enterApp();
      }
    } catch(e) {
      console.error('[FS] Auto-login error:', e);
    }
  }
})();
