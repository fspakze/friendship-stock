function renderZoneLocationsList(search, filter) {
  const isLao = lang === 'lo';
  const zoneId = _zoneMgrSelectedZone;
  const allLocs = _zoneMgrData?.locations || [];
  const s = (search || '').toLowerCase().trim();
  
  // Apply filter
  let filtered = allLocs;
  if (filter === 'in_zone') {
    filtered = allLocs.filter(l => l.zone_id === zoneId);
  } else if (filter === 'not_in_zone') {
    filtered = allLocs.filter(l => l.zone_id !== zoneId);
  } else if (filter === 'no_zone') {
    filtered = allLocs.filter(l => !l.zone_id);
  }
  
  // Apply search
  if (s) {
    filtered = filtered.filter(l => (l.location_code || '').toLowerCase().includes(s));
  }
  
  // Update stats
  const statsEl = document.getElementById('zoneLocStats');
  if (statsEl) {
    const inZone = allLocs.filter(l => l.zone_id === zoneId).length;
    statsEl.innerHTML = `
      <strong style="color:var(--sky-600);">${inZone}</strong> ${isLao ? 'ໃນໂຊນ' : 'ในโซน'} • 
      <strong style="color:var(--slate-700);">${filtered.length}</strong> ${isLao ? 'ກອງ' : 'กรอง'}
    `;
  }
  
  const listEl = document.getElementById('zoneLocList');
  if (!listEl) return;
  
  if (filtered.length === 0) {
    listEl.innerHTML = `<div style="text-align:center;padding:25px;color:var(--slate-400);font-size:11px;">
      ${isLao ? 'ບໍ່ພົບ' : 'ไม่พบ'}
    </div>`;
    return;
  }
  
  // Parse + group by Gondola Number (same logic as Floor Map)
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return { groupKey: numMatch[1], groupLabel: `Gondola ${numMatch[1]}`, type: numMatch[2], bay: parseInt(numMatch[3]) || 0 };
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) {
      const prefix = letterMatch[1];
      let label = prefix;
      if (prefix === 'W') label = 'Wall';
      else if (prefix === 'WT') label = 'Wall Top';
      else if (prefix === 'WH') label = 'Warehouse';
      else if (prefix === 'D') label = 'Display';
      return { groupKey: 'z' + prefix, groupLabel: label, type: prefix, bay: parseInt(letterMatch[2]) || 0 };
    }
    return { groupKey: 'zzz', groupLabel: '?', type: '?', bay: 0 };
  }
  
  const groups = {};
  filtered.forEach(l => {
    const p = parseCode(l.location_code);
    if (!groups[p.groupKey]) {
      groups[p.groupKey] = { label: p.groupLabel, items: [] };
    }
    groups[p.groupKey].items.push({ ...l, _parsed: p });
  });
  
  // Sort groups
  const sortedGroups = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
  
  let html = '';
  sortedGroups.forEach(([gKey, g]) => {
    g.items.sort((a, b) => {
      if (a._parsed.type !== b._parsed.type) return a._parsed.type.localeCompare(b._parsed.type);
      return a._parsed.bay - b._parsed.bay;
    });
    
    const inZoneCount = g.items.filter(l => l.zone_id === zoneId).length;
    const isAllInZone = inZoneCount === g.items.length;
    
    html += `
      <div style="margin-bottom:7px;">
        <div style="background:white;border:1px solid var(--slate-200);border-radius:7px;padding:7px 9px;display:flex;align-items:center;gap:7px;margin-bottom:4px;">
          <span style="font-family:'Space Grotesk',monospace;font-weight:800;font-size:11px;color:var(--slate-900);flex:1;">
            ${g.label}
          </span>
          <span style="font-size:10px;color:var(--slate-500);">
            ${inZoneCount}/${g.items.length}
          </span>
          <button onclick="toggleGroupInZone('${gKey}', ${zoneId || 'null'})"

async function toggleLocationZone(locId, zoneId) {
  const loc = _zoneMgrData.locations.find(l => l.id === locId);
  if (!loc) return;
  
  const newZoneId = loc.zone_id === zoneId ? null : zoneId;
  
  try {
    const { error } = await sb.from('location_master')
      .update({ zone_id: newZoneId })
      .eq('id', locId);
    if (error) throw error;
    
    loc.zone_id = newZoneId;
    
    // Re-render
    const search = document.getElementById('zoneLocSearch')?.value || '';
    const filter = document.getElementById('zoneLocFilter')?.value || 'in_zone';
    renderZoneLocationsList(search, filter);
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function toggleGroupInZone(groupKey, zoneId) {
  const isLao = lang === 'lo';
  const allLocs = _zoneMgrData?.locations || [];
  
  function parseCode(code) {
    const upper = (code || '').toUpperCase().trim();
    const numMatch = upper.match(/^(\d{2,})([A-Z]+)(\d+)$/);
    if (numMatch) return numMatch[1];
    const letterMatch = upper.match(/^([A-Z]+)(\d+)$/);
    if (letterMatch) return 'z' + letterMatch[1];
    return 'zzz';
  }
  
  const inGroup = allLocs.filter(l => parseCode(l.location_code) === groupKey);
  if (inGroup.length === 0) return;
  
  const allInZone = inGroup.every(l => l.zone_id === zoneId);
  const newZoneId = allInZone ? null : zoneId;
  
  showToast(isLao ? '⏳ ກຳລັງອັບເດດ...' : '⏳ กำลังอัปเดต...', 'success');
  
  try {
    const ids = inGroup.map(l => l.id);
    const { error } = await sb.from('location_master')
      .update({ zone_id: newZoneId })
      .in('id', ids);
    if (error) throw error;
    
    // Update local cache
    inGroup.forEach(l => { l.zone_id = newZoneId; });
    
    const search = document.getElementById('zoneLocSearch')?.value || '';
    const filter = document.getElementById('zoneLocFilter')?.value || 'in_zone';
    renderZoneLocationsList(search, filter);
    showToast(`✅ ${inGroup.length} ${isLao ? 'ຕຳແໜ່ງ' : 'ตำแหน่ง'}`, 'success');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function bulkAssignToZone(zoneId, useFilter) {
  const isLao = lang === 'lo';
  
  if (!useFilter) return;
  
  const search = document.getElementById('zoneLocSearch')?.value || '';
  const filter = document.getElementById('zoneLocFilter')?.value || 'all';
  
  // Re-compute filtered list (same as renderZoneLocationsList)
  const allLocs = _zoneMgrData?.locations || [];
  const targetZone = _zoneMgrSelectedZone;
  const s = search.toLowerCase().trim();
  
  let filtered = allLocs;
  if (filter === 'in_zone') filtered = allLocs.filter(l => l.zone_id === targetZone);
  else if (filter === 'not_in_zone') filtered = allLocs.filter(l => l.zone_id !== targetZone);
  else if (filter === 'no_zone') filtered = allLocs.filter(l => !l.zone_id);
  
  if (s) filtered = filtered.filter(l => (l.location_code || '').toLowerCase().includes(s));
  
  if (filtered.length === 0) {
    showToast(isLao ? 'ບໍ່ມີຕຳແໜ່ງ' : 'ไม่มีตำแหน่ง', 'warning');
    return;
  }
  
  const action = zoneId === null 
    ? (isLao ? 'ປົດອອກ' : 'ปลดออก')
    : (isLao ? 'ກຳນົດໂຊນ' : 'กำหนดโซน');
  
  if (!confirm(`${action} ${filtered.length} ${isLao ? 'ຕຳແໜ່ງ' : 'ตำแหน่ง'}?`)) return;
  
  try {
    const ids = filtered.map(l => l.id);
    // Use zoneId from arg (when assigning to current zone) OR null
    const newZoneId = zoneId === null ? null : targetZone;
    
    const { error } = await sb.from('location_master')
      .update({ zone_id: newZoneId })
      .in('id', ids);
    if (error) throw error;
    
    filtered.forEach(l => { l.zone_id = newZoneId; });
    
    renderZoneLocationsList(search, filter);
    showToast(`✅ ${filtered.length} ${isLao ? 'ຕຳແໜ່ງ' : 'ตำแหน่ง'}`, 'success');
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}

}

async function saveCount() {
  if (!curProduct) {
    showToast('No product selected', 'error');
    return;
  }
  if (!session) {
    showToast(T('locked_session'), 'error');
    log('ERROR: No session when saving');
    return;
  }
  
  // Workflow check - Counter/Verifier ต้องให้ CTL เปิดก่อน
  const r = user.role;
  if (['counter', 'staff', 'verifier', 'audit'].includes(r) && loc?.location_code) {
    const { data: gs } = await sb.from('gondola_status')
      .select('status, active_counter_id, active_verifier_id')
      .eq('session_id', session.id)
      .eq('location_code', loc.location_code)
      .maybeSingle();
    
    const isCounter = ['counter', 'staff'].includes(r);
    const isVerifier = ['verifier', 'audit'].includes(r);
    
    if (!gs) {
      showToast(T('gondola_locked'), 'warning');
      saveBtn.disabled = false;
      saveBtn.innerHTML = T('save');
      return;
    }
    
    if (isCounter && !['open_for_counting', 'counting'].includes(gs.status)) {
      showToast(T('gondola_locked') + ' (Status: ' + gs.status + ')', 'warning');
      const saveBtn = document.getElementById('saveBtn');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = T('save'); }
      return;
    }
    
    if (isVerifier && !['open_for_verify', 'verifying'].includes(gs.status)) {
      showToast(T('gondola_locked') + ' (Status: ' + gs.status + ')', 'warning');
      const saveBtn = document.getElementById('saveBtn');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = T('save'); }
      return;
    }
    
    // Update status to counting/verifying ถ้ายังไม่ใช่
    if (isCounter && gs.status === 'open_for_counting') {
      await sb.from('gondola_status').update({
        status: 'counting',
        active_counter_id: user.id,
        counting_started_at: new Date().toISOString()
      }).eq('session_id', session.id).eq('location_code', loc.location_code);
    }
    if (isVerifier && gs.status === 'open_for_verify') {
      await sb.from('gondola_status').update({
        status: 'verifying',
        active_verifier_id: user.id,
        verifying_started_at: new Date().toISOString()
      }).eq('session_id', session.id).eq('location_code', loc.location_code);
    }
  }
  
  const count = parseInt(document.getElementById('countInput').value) || 0;
  const note = document.getElementById('noteInput').value.trim();
  const saveBtn = document.getElementById('saveBtn');
  
  saveBtn.disabled = true;
  saveBtn.innerHTML = `<span class="loader"></span> ${T('saving')}`;
  
  // Determine count_role
  let countRole = 'counter';
  if (['verifier', 'audit'].includes(r)) countRole = 'verifier';
  else if (r === 'ctl') countRole = 'ctl_tiebreaker';
  else if (['admin', 'scc', 'bcs'].includes(r)) countRole = 'manager_final';
  
  const insertData = {
    session_id: session.id,
    branch_id: branch?.id || user.branch_id,
    product_id: curProduct.id,
    zone_id: zone?.id || null,
    location_code: loc?.location_code || null,
    gondola_code: loc?.location_code || null,  // เก็บ Location เต็มเป็น gondola_code ด้วย
    user_id: user.id,
    counted_qty: count,
    pos_qty_snapshot: curProduct.pos_qty || 0,
    count_role: countRole,
    is_markdown: curProduct.is_markdown || false,
    note: note || null,
  };
  
  log('Saving count:', insertData);
  
  const { data, error } = await sb.from('stock_counts').insert(insertData).select().single();
  
  if (error) {
    console.error('[FS] Save error:', error);
    showToast('Error: ' + error.message, 'error');
    saveBtn.disabled = false;
    saveBtn.innerHTML = T('save');
    return;
  }
  
  log('Saved successfully:', data);
  
  // Show feedback based on workflow_status
  let toastMsg = T('saved');
  let toastType = 'success';
  if (data.workflow_status === 'matched') {
    toastMsg = '✓ ' + T('matched');
  } else if (data.workflow_status === 'needs_audit') {
    toastMsg = '⚠️ ' + T('need_tb');
    toastType = 'warning';
  }
  
  showToast(toastMsg, toastType);
  cancelCount();
  await loadSessionStats();
  updateTbBadge();
}

async function loadSessionStats() {

  const r = user.role;
  const isAdmin = ['admin', 'scc', 'bcs'].includes(r);
  
  log('Loading stats for session:', session.id, 'user:', user.id);
  
  // ดึงเฉพาะของ user นี้ (ไม่ใช่ทั้งหมด)
  const { data, error } = await sb.from('stock_counts')
    .select('counted_qty, pos_qty_snapshot, diff')
    .eq('session_id', session.id)
    .eq('user_id', user.id);
  
  if (error) {
    log('Stats error:', error);
    return;
  }
  
  log('My counts:', (data || []).length);
  
  const items = data || [];
  const totalScanned = items.length;
  const totalQty = items.reduce((s, x) => s + (x.counted_qty || 0), 0);
  const totalDiff = items.reduce((s, x) => s + (x.diff || 0), 0);
  
  const sEl = document.getElementById('statScanned');
  const tEl = document.getElementById('statTotal');
  const dEl = document.getElementById('statDiff');
  const dCard = document.getElementById('statDiffCard');
  
  if (sEl) sEl.textContent = totalScanned.toLocaleString();
  if (tEl) tEl.textContent = totalQty.toLocaleString();
  
  if (isAdmin) {
    if (dEl) dEl.textContent = (totalDiff > 0 ? '+' : '') + totalDiff.toLocaleString();
  } else {
    if (dCard) {
      dCard.style.display = 'none';
      const parent = dCard.parentElement;
      if (parent) parent.style.gridTemplateColumns = '1fr 1fr';
    }
  }
}

function applyHistoryFilters() {
  const items = window._histItems || [];
  const zoneFilter = window._histZoneFilter || 'all';
  const search = (window._histSearch || '').toLowerCase().trim();
  
  let filtered = zoneFilter === 'all' ? items : items.filter(it => String(it.zone_id) === String(zoneFilter));
  
  if (search) {
    filtered = filtered.filter(it => {
      const p = it.products || {};
      const name_th = (p.name_th || '').toLowerCase();
      const name_lo = (p.name_lo || '').toLowerCase();
      const barcode = (p.barcode || '').toLowerCase();
      const loc = (it.location_code || it.gondola_code || '').toLowerCase();
      return name_th.includes(search) || name_lo.includes(search) || barcode.includes(search) || loc.includes(search);
    });
  }
  
  renderHistoryList(filtered);
}

async function loadHistory() {
  if (!session) return;
  
  log('Loading history for user:', user.id);
  
  // Reset Pan-O-Gram cache when loading history
  window._historyPogLoaded = false;
  _historySubTab = 'counts';
  
  // Update Pan-O-Gram badge in tab header
  loadHistoryPogBadge();
  
  const { data, error } = await sb.from('stock_counts')
    .select(`
      id, counted_qty, pos_qty_snapshot, diff, variance_level, is_markdown, workflow_status, counted_at, note, gondola_code, location_code, zone_id,
      products(id, barcode, name_th, name_lo, unit_th, unit_lo, pos_qty)
    `)
    .eq('session_id', session.id)
    .eq('user_id', user.id)
    .order('counted_at', { ascending: false })
    .limit(200);
  
  if (error) {
    log('History error:', error);
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  const list = document.getElementById('histList');
  const countEl = document.getElementById('histCount');
  if (!list) return;
  
  const items = data || [];
  log('History loaded:', items.length, 'items');
  
  if (countEl) countEl.textContent = items.length;
  
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_history')}</p></div>`;
    // hide filter bar
    const fb = document.getElementById('histFilterBar');
    if (fb) fb.style.display = 'none';
    return;
  }
  
  // Store globally for filtering
  window._histItems = items;
  window._histZoneFilter = 'all';
  window._histSearch = '';
  
  // Show search bar when there are items
  const searchRow = document.getElementById('histSearchRow');
  if (searchRow) searchRow.style.display = 'flex';
  
  // Build zone filter chips
  buildHistoryFilterBar(items);
  
  // Render with current filter
  renderHistoryList(items);
}

function buildHistoryFilterBar(items) {
  const filterBar = document.getElementById('histFilterBar');
  if (!filterBar) return;
  
  // Get unique zones from items
  const zoneMap = {};
  items.forEach(item => {
    const zid = item.zone_id;
    if (!zid) return;
    if (!zoneMap[zid]) {
      const z = (allZones || []).find(zz => zz.id == zid);
      zoneMap[zid] = {
        id: zid,
        code: z?.code || '?',
        name: z ? (lang === 'lo' ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo)) : '?',
        count: 0
      };
    }
    zoneMap[zid].count++;
  });
  
  const zoneList = Object.values(zoneMap).sort((a, b) => a.code.localeCompare(b.code));
  
  if (zoneList.length === 0) {
    filterBar.style.display = 'none';
    return;
  }
  
  filterBar.style.display = 'flex';
  filterBar.innerHTML = `
    <button class="hist-chip active" data-zone="all" onclick="filterHistByZone('all', this)">
      ${T('all_zones') || 'ทั้งหมด'} <span class="hist-chip-count">${items.length}</span>
    </button>
    ${zoneList.map(z => `
      <button class="hist-chip" data-zone="${z.id}" onclick="filterHistByZone('${z.id}', this)" title="${z.name}">
        ${z.code} <span class="hist-chip-count">${z.count}</span>
      </button>
    `).join('')}
  `;
}

function filterHistByZone(zoneFilter, btnEl) {
  // toggle active state
  document.querySelectorAll('#histFilterBar .hist-chip').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');
  
  window._histZoneFilter = zoneFilter;
  applyHistoryFilters();
}

function renderHistoryList(items) {
  const list = document.getElementById('histList');
  if (!list) return;
  
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_history')}</p></div>`;
    return;
  }
  
  const isAdmin = ['admin', 'scc', 'bcs'].includes(user.role);
  
  // Group by Zone → Location
  const groups = {};
  items.forEach(item => {
    const zid = item.zone_id || 'no_zone';
    const loc = item.location_code || item.gondola_code || '?';
    const groupKey = `${zid}__${loc}`;
    if (!groups[groupKey]) {
      const z = (allZones || []).find(zz => zz.id == item.zone_id);
      groups[groupKey] = {
        zone_id: item.zone_id,
        zone_code: z?.code || '',
        zone_name: z ? (lang === 'lo' ? (z.name_lo || z.name_th) : (z.name_th || z.name_lo)) : '',
        location_code: loc,
        items: []
      };
    }
    groups[groupKey].items.push(item);
  });
  
  // Sort groups by zone code → location
  const sortedGroups = Object.values(groups).sort((a, b) => {
    if (a.zone_code !== b.zone_code) return (a.zone_code || '').localeCompare(b.zone_code || '');
    return (a.location_code || '').localeCompare(b.location_code || '');
  });
  
  list.innerHTML = sortedGroups.map(grp => {
    const groupHeader = `
      <div class="hist-group-header">
        <div class="hist-group-zone">
          <span class="hist-group-zone-code">${grp.zone_code || '—'}</span>
          ${grp.zone_name ? `<span class="hist-group-zone-name">${grp.zone_name}</span>` : ''}
        </div>
        <div class="hist-group-loc">📍 ${grp.location_code}</div>
        <div class="hist-group-count">${grp.items.length} ${T('items') || 'ชิ้น'}</div>
      </div>
    `;
    
    const rows = grp.items.map(item => {
      const p = item.products || {};
      const name = lang === 'lo' ? (p.name_lo || p.name_th || '?') : (p.name_th || p.name_lo || '?');
      const diff = item.diff || 0;
      const cls = isAdmin ? (diff === 0 ? 'match' : (diff > 0 ? 'diff-plus' : 'diff-minus')) : 'match';
      const diffText = isAdmin ? (diff === 0 ? '✓' : (diff > 0 ? `+${diff}` : `${diff}`)) : '✓';
      const diffCls = isAdmin ? (diff === 0 ? 'diff-match-text' : (diff > 0 ? 'diff-plus-text' : 'diff-minus-text')) : 'diff-match-text';
      
      const varLevel = (isAdmin && item.variance_level) ? `<span class="var-level var-level-${item.variance_level}">L${item.variance_level}</span>` : '';
      const mdBadge = item.is_markdown ? '<span class="md-badge" style="margin-left:4px;">MD</span>' : '';
      
      // Show time only (date in header makes it cleaner)
      const time = new Date(item.counted_at).toLocaleTimeString(lang === 'lo' ? 'lo-LA' : 'th-TH', {
        hour: '2-digit', minute: '2-digit'
      });
      
      return `
        <div class="history-item clickable ${cls}" onclick="openEditCount('${item.id}')">
          <div class="history-content">
            <div class="history-name">${name}${mdBadge}</div>
            <div class="history-meta">${p.barcode || ''} • ${time} • <span class="${diffCls}">${diffText}</span> ${varLevel}</div>
          </div>
          <div class="history-qty mono">${item.counted_qty}</div>
          <div style="color:var(--slate-400);font-size:14px;margin-left:4px;">✏️</div>
        </div>
      `;
    }).join('');
    
    return `<div class="hist-group" data-zone-id="${grp.zone_id || ''}">${groupHeader}${rows}</div>`;
  }).join('');
}

function adjustEditCount(delta) {
  const inp = document.getElementById('editCountInput');
  if (!inp) return;
  let v = parseInt(inp.value) || 0;
  inp.value = Math.max(0, v + delta);
}

async function saveEditCount() {
  const id = document.getElementById('editCountId').value;
  const newQty = parseInt(document.getElementById('editCountInput').value) || 0;
  const newNote = document.getElementById('editNoteInput').value.trim();
  const btn = document.getElementById('saveEditBtn');
  
  if (!id) return;
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span> ${T('saving')}`;
  
  const { error } = await sb.from('stock_counts').update({
    counted_qty: newQty,
    note: newNote || null,
    updated_at: new Date().toISOString()
  }).eq('id', id);
  
  if (error) {
    log('Update error:', error);
    showToast('Error: ' + error.message, 'error');
    btn.disabled = false;
    btn.innerHTML = T('save');
    return;
  }
  
  log('Count updated:', id, 'new qty:', newQty);
  showToast(T('updated'), 'success');
  closeModal();
  
  // Reload current page
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) goPage(activeTab.dataset.page);
  
  updateTbBadge();
}

function confirmDeleteCount() {
  const id = document.getElementById('editCountId').value;
  if (!id) return;
  
  if (confirm(T('delete_confirm'))) {
    deleteCount(id);
  }
}

async function deleteCount(id) {
  log('Deleting count:', id);
  
  const { error } = await sb.from('stock_counts').delete().eq('id', id);
  
  if (error) {
    log('Delete error:', error);
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  showToast(T('deleted'), 'success');
  closeModal();
  
  // Reload current page
  const activeTab = document.querySelector('.tab.active');
  if (activeTab) goPage(activeTab.dataset.page);
  
  updateTbBadge();
}

async function startTiebreaker(productId, zoneId, locationCode) {
  log('Start tiebreaker:', productId, zoneId, locationCode);
  
  goPage('scan');
  
  setTimeout(async () => {
    const { data: p } = await sb.from('products').select('*').eq('id', productId).single();
    if (!p) return;
    
    if (zoneId && zoneId !== 'null') {
      const z = allZones.find(zz => zz.id == zoneId);
      if (z) zone = z;
    }
    if (locationCode) {
      const l = allLocations.find(ll => ll.location_code === locationCode);
      if (l) loc = l;
    }
    
    curProduct = p;
    curTask = { type: 'tiebreaker' };
    renderProduct(p);
  }, 200);
}

async function showProductLocations(productId) {
  log('Show product locations for product:', productId);
  
  if (!session) {
    showToast(T('no_active_session'), 'error');
    return;
  }
  
  // Loading modal
  showModal(`
    <h3>${T('product_locations') || 'ตำแหน่งที่นับได้'}</h3>
    <div class="empty-state"><p>${T('loading') || 'กำลังโหลด...'}</p></div>
  `);
  
  // Fetch all counts for this product in this session
  const { data: counts, error } = await sb.from('stock_counts')
    .select(`
      id, counted_qty, count_role, counted_at, zone_id, location_code, gondola_code, note, user_id,
      products(barcode, name_th, name_lo, unit_th, unit_lo)
    `)
    .eq('session_id', session.id)
    .eq('product_id', productId)
    .order('counted_at', { ascending: true });
  
  if (error) {
    log('showProductLocations error:', error);
    showToast('Error: ' + error.message, 'error');
    closeModal();
    return;
  }
  
  if (!counts || counts.length === 0) {
    showModal(`
      <h3>${T('product_locations') || 'ตำแหน่งที่นับได้'}</h3>
      <div class="empty-state"><p>${T('no_history')}</p></div>
      <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel')}</button>
    `);
    return;
  }
  
  // Get user names
  const userIds = [...new Set(counts.map(c => c.user_id).filter(x => x))];
  let usersById = {};
  if (userIds.length > 0) {
    const { data: usersData } = await sb.from('users').select('id, full_name, username').in('id', userIds);
    (usersData || []).forEach(u => { usersById[u.id] = u; });
  }
  
  const p = counts[0].products || {};
  const productName = lang === 'lo' ? (p.name_lo || p.name_th || '?') : (p.name_th || p.name_lo || '?');
  const unit = lang === 'lo' ? (p.unit_lo || p.unit_th || 'ชิ้น') : (p.unit_th || p.unit_lo || 'ชิ้น');
  
  // Group by Zone + Location + count_role to show structure clearly
  // Sort: by location_code, then by counted_at
  const sorted = [...counts].sort((a, b) => {
    const locA = a.location_code || a.gondola_code || '';
    const locB = b.location_code || b.gondola_code || '';
    if (locA !== locB) return locA.localeCompare(locB);
    return new Date(a.counted_at) - new Date(b.counted_at);
  });
  
  // Calculate totals per role
  let totalCounter = 0, totalVerifier = 0, totalTiebreaker = 0;
  sorted.forEach(c => {
    const role = (c.count_role || '').toLowerCase();
    if (role.includes('counter')) totalCounter += (c.counted_qty || 0);
    else if (role.includes('verifier')) totalVerifier += (c.counted_qty || 0);
    else if (role.includes('tiebreaker') || role === 'ctl_tiebreaker') totalTiebreaker += (c.counted_qty || 0);
  });
  
  // Build rows
  const rows = sorted.map(c => {
    const z = (allZones || []).find(zz => zz.id == c.zone_id);
    const zoneCode = z?.code || '—';
    const locCode = c.location_code || c.gondola_code || '?';
    const role = (c.count_role || '').toLowerCase();
    
    let roleClass = '', roleBadge = '', roleLabel = '';
    if (role.includes('counter')) {
      roleClass = 'role-counter';
      roleBadge = 'counter';
      roleLabel = 'Counter';
    } else if (role.includes('verifier')) {
      roleClass = 'role-verifier';
      roleBadge = 'verifier';
      roleLabel = 'Verifier';
    } else if (role.includes('tiebreaker')) {
      roleClass = 'role-tiebreaker';
      roleBadge = 'tiebreaker';
      roleLabel = T('tab_tiebreaker') || 'Tiebreaker';
    } else {
      roleLabel = c.count_role || '?';
    }
    
    const userName = usersById[c.user_id]?.full_name || usersById[c.user_id]?.username || '—';
    const time = new Date(c.counted_at).toLocaleString(lang === 'lo' ? 'lo-LA' : 'th-TH', {
      month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
    });
    
    return `
      <tr class="${roleClass}">
        <td>
          <span class="prod-locs-zone">${zoneCode}</span>
          <span class="prod-locs-loc">${locCode}</span>
        </td>
        <td><span class="prod-locs-role-badge ${roleBadge}">${roleLabel}</span></td>
        <td style="font-size:10px;color:var(--slate-500);">${userName}<br>${time}</td>
        <td class="prod-locs-qty">${c.counted_qty}</td>
      </tr>
    `;
  }).join('');
  
  // Summary cards
  const totalsHtml = `
    <div style="display:grid;grid-template-columns:repeat(${totalTiebreaker > 0 ? 3 : 2},1fr);gap:6px;margin:10px 0;">
      <div style="background:var(--teal-100);padding:8px;border-radius:8px;text-align:center;">
        <div style="font-size:9px;color:var(--teal-700);text-transform:uppercase;font-weight:700;">Counter</div>
        <div style="font-size:18px;font-weight:800;color:var(--teal-700);font-family:'Space Grotesk',monospace;">${totalCounter}</div>
      </div>
      <div style="background:var(--amber-100);padding:8px;border-radius:8px;text-align:center;">
        <div style="font-size:9px;color:#92400e;text-transform:uppercase;font-weight:700;">Verifier</div>
        <div style="font-size:18px;font-weight:800;color:#92400e;font-family:'Space Grotesk',monospace;">${totalVerifier}</div>
      </div>
      ${totalTiebreaker > 0 ? `
        <div style="background:var(--violet-100);padding:8px;border-radius:8px;text-align:center;">
          <div style="font-size:9px;color:var(--violet-600);text-transform:uppercase;font-weight:700;">${T('tab_tiebreaker')}</div>
          <div style="font-size:18px;font-weight:800;color:var(--violet-600);font-family:'Space Grotesk',monospace;">${totalTiebreaker}</div>
        </div>
      ` : ''}
    </div>
  `;
  
  // Count unique locations
  const uniqueLocs = new Set(sorted.map(c => c.location_code || c.gondola_code).filter(x => x));
  const locsHint = uniqueLocs.size > 1 
    ? `<div style="background:var(--amber-100);padding:8px 10px;border-radius:7px;margin-bottom:8px;font-size:11px;color:#92400e;font-weight:600;">
        ⚠️ ${T('product_in_multi_locs') || 'สินค้านี้ถูกนับใน'} ${uniqueLocs.size} ${T('locations') || 'จุด'}
      </div>` 
    : '';
  
  // Store for export
  window._prodLocsItems = sorted;
  window._prodLocsUsers = usersById;
  window._prodLocsProductName = productName;
  window._prodLocsBarcode = p.barcode || '';
  window._prodLocsProductId = productId;
  
  showModal(`
    <h3 style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
      <span>${T('product_locations') || 'ตำแหน่งที่นับได้'}</span>
      <button onclick="exportProductLocationsExcel()" 
              style="font-size:11px;padding:6px 11px;background:var(--emerald-100);color:var(--emerald-600);border:1px solid var(--emerald-500);border-radius:7px;cursor:pointer;font-weight:700;font-family:inherit;" 
              title="${T('export_xlsx') || 'Export Excel'}">
        📥 Excel
      </button>
    </h3>
    
    <!-- Product info -->
    <div style="background:var(--slate-50);padding:9px 11px;border-radius:9px;margin-bottom:10px;">
      <div style="font-size:13px;font-weight:700;color:var(--slate-900);">${productName}</div>
      <div style="font-size:10px;color:var(--slate-500);font-family:'Space Grotesk',monospace;margin-top:2px;">${p.barcode || ''}</div>
    </div>
    
    ${locsHint}
    
    ${totalsHtml}
    
    <!-- Locations table -->
    <div style="max-height:300px;overflow-y:auto;border:1px solid var(--slate-200);border-radius:8px;">
      <table class="prod-locs-table">
        <thead>
          <tr>
            <th>${T('location') || 'ตำแหน่ง'}</th>
            <th>${T('role_label') || 'บทบาท'}</th>
            <th>${T('counted_at') || 'นับเมื่อ'}</th>
            <th style="text-align:right;">${T('counted_qty') || 'จำนวน'}</th>
          </tr>
        </thead>
        <tbody>
          ${rows}
        </tbody>
      </table>
    </div>
    
    <button class="btn btn-secondary" onclick="closeModal()" style="width:100%;margin-top:11px;">${T('cancel') || 'ปิด'}</button>
  `);
}

// Export product locations to Excel
async function exportProductLocationsExcel() {
  const items = window._prodLocsItems || [];
  const usersById = window._prodLocsUsers || {};
  const productName = window._prodLocsProductName || '';
  const barcode = window._prodLocsBarcode || '';
  
  if (!items.length) {
    showToast(T('no_history') || 'No data', 'error');
    return;
  }
  if (typeof ExcelJS === 'undefined') { showToast('ExcelJS not loaded', 'error'); return; }
  
  showToast(T('saving') || 'กำลังสร้าง...', 'info');
  
  try {
    const wb = new ExcelJS.Workbook();
    const ws = wb.addWorksheet('Product Locations');
    
    // Title rows
    ws.addRow([T('product_name') || 'ชื่อสินค้า', productName]);
    ws.addRow(['Barcode', barcode]);
    ws.addRow([]);
    ws.getRow(1).font = { bold: true, size: 12 };
    ws.getRow(2).font = { bold: true };
    
    // Headers
    const headers = ['Zone', 'Location', 'Role', T('counted_by') || 'ผู้นับ', T('counted_at') || 'เวลา', T('counted_qty') || 'จำนวน', T('note_placeholder') || 'Note'];
    const headerRow = ws.addRow(headers);
    headerRow.font = { bold: true, color: { argb: 'FFFFFFFF' } };
    headerRow.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF7C3AED' } };
    headerRow.alignment = { vertical: 'middle', horizontal: 'center' };
    
    items.forEach(c => {
      const z = (allZones || []).find(zz => zz.id == c.zone_id);
      const zCode = z?.code || '';
      const userName = usersById[c.user_id]?.full_name || usersById[c.user_id]?.username || '';
      const time = new Date(c.counted_at).toLocaleString('th-TH', {
        year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      
      const row = ws.addRow([
        zCode, c.location_code || c.gondola_code || '',
        c.count_role || '', userName, time,
        c.counted_qty || 0, c.note || ''
      ]);
      
      const role = (c.count_role || '').toLowerCase();
      let fgColor = null;
      if (role.includes('counter')) fgColor = 'FFCCFBF1';
      else if (role.includes('verifier')) fgColor = 'FFFEF3C7';
      else if (role.includes('tiebreaker')) fgColor = 'FFEDE9FE';
      if (fgColor) {
        row.eachCell(cell => {
          cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fgColor } };
        });
      }
    });
    
    // Totals
    ws.addRow([]);
    const totalCounter = items.filter(c => (c.count_role || '').includes('counter')).reduce((s, c) => s + (c.counted_qty || 0), 0);
    const totalVerifier = items.filter(c => (c.count_role || '').includes('verifier')).reduce((s, c) => s + (c.counted_qty || 0), 0);
    const totalTb = items.filter(c => (c.count_role || '').includes('tiebreaker')).reduce((s, c) => s + (c.counted_qty || 0), 0);
    
    const tcRow = ws.addRow(['', '', '', '', 'Counter Total:', totalCounter]);
    tcRow.font = { bold: true };
    tcRow.getCell(6).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFCCFBF1' } };
    
    const tvRow = ws.addRow(['', '', '', '', 'Verifier Total:', totalVerifier]);
    tvRow.font = { bold: true };
    tvRow.getCell(6).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFEF3C7' } };
    
    if (totalTb > 0) {
      const ttRow = ws.addRow(['', '', '', '', 'Tiebreaker Total:', totalTb]);
      ttRow.font = { bold: true };
      ttRow.getCell(6).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFEDE9FE' } };
    }
    
    const widths = [8, 14, 16, 20, 20, 12, 25];
    widths.forEach((w, i) => ws.getColumn(i + 1).width = w);
    
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const safeName = (productName || 'product').replace(/[^a-zA-Z0-9ก-๙]/g, '_').substring(0, 40);
    const dateStr = new Date().toISOString().slice(0, 10);
    a.download = `${safeName}_${barcode}_${dateStr}.xlsx`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showToast(T('saved') || 'Export สำเร็จ', 'success');
  } catch (e) {
    console.error('[FS] Export error:', e);
    showToast('Export error: ' + e.message, 'error');
  }
}

async function loadDashboard() {
  if (!session) return;
  
  log('Loading dashboard');
  
  // Load workflow summary first
  const { data: wfItems } = await sb.from('v_gondola_progress')
    .select('status')
    .eq('session_id', session.id);
  
  const wf = wfItems || [];
  const wfTotal = wf.length;
  const wfCompleted = wf.filter(x => x.status === 'completed').length;
  const wfInProgress = wf.filter(x => ['counting', 'verifying', 'tiebreaker'].includes(x.status)).length;
  const wfWaiting = wf.filter(x => ['counted', 'open_for_verify', 'verified', 'tiebreaker_needed', 'open_for_counting'].includes(x.status)).length;
  const wfPct = wfTotal ? Math.round((wfCompleted / wfTotal) * 100) : 0;
  
  const wfEl = document.getElementById('dashWfSummary');
  if (wfEl) {
    wfEl.innerHTML = `
      <div class="progress-donut-card">
        <div style="font-size:11px;color:var(--slate-500);text-transform:uppercase;font-weight:700;letter-spacing:0.5px;">Gondola ${T('progress')}</div>
        <div class="progress-donut">
          <svg class="donut-svg" viewBox="0 0 120 120">
            <circle class="donut-bg" cx="60" cy="60" r="50"/>
            <circle class="donut-fg" cx="60" cy="60" r="50" 
              stroke-dasharray="${2 * Math.PI * 50}" 
              stroke-dashoffset="${2 * Math.PI * 50 * (1 - wfPct/100)}"/>
            <text class="donut-text" x="60" y="65" text-anchor="middle">${wfPct}%</text>
          </svg>
          <div style="text-align:left;">
            <div style="font-size:24px;font-weight:700;color:var(--emerald-500);">${wfCompleted}<span style="color:var(--slate-400);font-size:14px;">/${wfTotal}</span></div>
            <div style="font-size:10px;color:var(--slate-500);">Gondolas Done</div>
          </div>
        </div>
        <div class="wf-summary-grid">
          <div class="wf-sum-card progress">
            <div class="wf-sum-num">${wfInProgress}</div>
            <div class="wf-sum-lbl" style="color:var(--teal-700);">${T('in_progress')}</div>
          </div>
          <div class="wf-sum-card waiting">
            <div class="wf-sum-num">${wfWaiting}</div>
            <div class="wf-sum-lbl" style="color:#92400e;">${T('waiting')}</div>
          </div>
        </div>
      </div>
    `;
  }
  
  // Get all counts for stats (no join needed for counts)
  const { data: counts, error: cErr } = await sb.from('stock_counts')
    .select('count_role, variance_level, workflow_status, diff')
    .eq('session_id', session.id);
  
  if (cErr) log('Dashboard counts error:', cErr);
  
  const items = counts || [];
  log('Dashboard items:', items.length);
  
  const counter = items.filter(x => x.count_role === 'counter').length;
  const verifier = items.filter(x => x.count_role === 'verifier').length;
  const ctl = items.filter(x => x.count_role === 'ctl_tiebreaker').length;
  const matched = items.filter(x => x.workflow_status === 'matched').length;
  
  const l1 = items.filter(x => x.variance_level === 1).length;
  const l2 = items.filter(x => x.variance_level === 2).length;
  const l3 = items.filter(x => x.variance_level === 3).length;
  const l4 = items.filter(x => x.variance_level === 4).length;
  
  document.getElementById('dCounter').textContent = counter;
  document.getElementById('dVerifier').textContent = verifier;
  document.getElementById('dCTL').textContent = ctl;
  document.getElementById('dMatched').textContent = matched;
  
  const total = l1 + l2 + l3 + l4 || 1;
  document.getElementById('dL1').textContent = l1;
  document.getElementById('dL2').textContent = l2;
  document.getElementById('dL3').textContent = l3;
  document.getElementById('dL4').textContent = l4;
  document.getElementById('dL1Bar').style.width = (l1/total*100) + '%';
  document.getElementById('dL2Bar').style.width = (l2/total*100) + '%';
  document.getElementById('dL3Bar').style.width = (l3/total*100) + '%';
  document.getElementById('dL4Bar').style.width = (l4/total*100) + '%';
  
  // All counts list
  const { data: recent } = await sb.from('stock_counts')
    .select(`id, counted_qty, diff, variance_level, is_markdown, count_role, counted_at, gondola_code, location_code,
             products(barcode, name_th, name_lo), users(full_name)`)
    .eq('session_id', session.id)
    .order('counted_at', { ascending: false })
    .limit(30);
  
  const list = document.getElementById('dAllList');
  if (!list) return;
  
  const recItems = recent || [];
  
  if (!recItems.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_history')}</p></div>`;
    return;
  }
  
  list.innerHTML = recItems.map(item => {
    const p = item.products || {};
    const u = item.users || {};
    const name = lang === 'lo' ? (p.name_lo || p.name_th || '?') : (p.name_th || p.name_lo || '?');
    const diff = item.diff || 0;
    const cls = diff === 0 ? 'match' : (diff > 0 ? 'diff-plus' : 'diff-minus');
    const varLevel = item.variance_level ? `<span class="var-level var-level-${item.variance_level}">L${item.variance_level}</span>` : '';
    const mdBadge = item.is_markdown ? '<span class="md-badge" style="margin-left:4px;">MD</span>' : '';
    const roleBadge = `<span style="font-size:9px;background:var(--slate-100);padding:1px 5px;border-radius:4px;color:var(--slate-600);">${item.count_role || ''}</span>`;
    const locBadge = item.gondola_code ? `<span style="background:var(--teal-100);color:var(--teal-700);padding:1px 5px;border-radius:4px;font-weight:700;margin-left:4px;font-family:'Space Grotesk',monospace;">${item.gondola_code}</span>` : '';
    
    return `
      <div class="history-item clickable ${cls}" onclick="openEditCount('${item.id}')">
        <div class="history-content">
          <div class="history-name">${name}${mdBadge}${locBadge}</div>
          <div class="history-meta">${u.full_name || '?'} ${roleBadge} ${varLevel}</div>
        </div>
        <div class="history-qty mono">${item.counted_qty}</div>
        <div style="color:var(--slate-400);font-size:14px;margin-left:4px;">✏️</div>
      </div>
    `;
  }).join('');
}

// คำนวณ variance level จาก variance % และ value
// ตรงกับ KPI logic
function calcVarianceLevel(pct, value) {
  const absValue = Math.abs(value || 0);
  const absPct = Math.abs(pct || 0);
  
  if (absPct > 10 || absValue > 300000) return 'L4';
  if (absPct > 5 || absValue > 100000) return 'L3';
  if (absPct >= 2 || absValue >= 30000) return 'L2';
  return 'L1';
}

async function loadVarianceReport() {
  if (!session && _varianceFilter.period === 'session') {
    document.getElementById('varianceList').innerHTML = `
      <div style="text-align:center;padding:40px 20px;color:var(--slate-400);">
        <div style="font-size:48px;margin-bottom:11px;">📋</div>
        <div style="font-size:13px;font-weight:700;color:var(--slate-600);">
          ${lang === 'lo' ? 'ບໍ່ມີ session ໃຊ້ງານ' : 'ไม่มี session ใช้งาน'}
        </div>
      </div>
    `;
    return;
  }
  
  try {
    // Build date filter
    let dateFilter = '';
    let sessionFilter = '';
    if (_varianceFilter.period === 'session' && session) {
      sessionFilter = session.id;
    } else if (_varianceFilter.period === 'today') {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      dateFilter = today.toISOString();
    } else if (_varianceFilter.period === 'week') {
      const week = new Date();
      week.setDate(week.getDate() - 7);
      dateFilter = week.toISOString();
    }
    
    // โหลด stock_counts ของ branch (กับ products)
    let query = sb.from('stock_counts')
      .select(`
        *, 
        products(barcode, name_th, name_lo, unit_th, unit_lo, pos_qty, cost_price, sell_price)
      `)
      .eq('branch_id', branch.id);
    
    if (sessionFilter) query = query.eq('session_id', sessionFilter);
    if (dateFilter) query = query.gte('counted_at', dateFilter);
    
    const { data: counts, error } = await query.order('counted_at', { ascending: false });
    
    if (error) throw error;
    
    // Pivot: รวม counts ของ product เดียวกัน (counter, verifier, ctl, manager)
    // จัด priority: manager_final > ctl_tiebreaker > verifier > counter (newest)
    const byProduct = {};
    (counts || []).forEach(c => {
      const key = c.product_id;
      if (!byProduct[key]) {
        byProduct[key] = {
          product_id: c.product_id,
          product: c.products,
          barcode: c.barcode,
          gondola_code: c.gondola_code,
          location_code: c.location_code,
          zone_id: c.zone_id,
          counter: null,
          verifier: null,
          ctl: null,
          manager: null,
          rounds: 0,
          last_counted: null
        };
      }
      const p = byProduct[key];
      p.rounds++;
      if (!p.last_counted || c.counted_at > p.last_counted) {
        p.last_counted = c.counted_at;
      }
      // ใช้ gondola ล่าสุด (เผื่อมีการย้าย)
      if (c.gondola_code && !p.gondola_code) {
        p.gondola_code = c.gondola_code;
      }
      
      // Save by role
      if (c.count_role === 'counter' || c.count_role === 'staff') {
        if (!p.counter || c.counted_at > p.counter.counted_at) p.counter = c;
      } else if (c.count_role === 'verifier' || c.count_role === 'audit') {
        if (!p.verifier || c.counted_at > p.verifier.counted_at) p.verifier = c;
      } else if (c.count_role === 'ctl_tiebreaker') {
        if (!p.ctl || c.counted_at > p.ctl.counted_at) p.ctl = c;
      } else if (c.count_role === 'manager_final') {
        if (!p.manager || c.counted_at > p.manager.counted_at) p.manager = c;
      }
    });
    
    // Calculate variance for each product
    const items = Object.values(byProduct).map(p => {
      // Final = manager > ctl > verifier > counter
      const finalCount = p.manager?.counted_qty 
        ?? p.ctl?.counted_qty 
        ?? p.verifier?.counted_qty 
        ?? p.counter?.counted_qty 
        ?? 0;
      
      const counterCount = p.counter?.counted_qty ?? null;
      const verifierCount = p.verifier?.counted_qty ?? null;
      const ctlCount = p.ctl?.counted_qty ?? null;
      const managerCount = p.manager?.counted_qty ?? null;
      
      // 🔍 Detect orphan: product was deleted, only stock_counts remain
      const isOrphan = !p.product;
      
      // POS qty: ใช้ค่าจาก products ปัจจุบัน (= 0 ถ้าไม่อยู่ในไฟล์ POS ล่าสุด)
      // ถ้า orphan → ใช้ pos_qty_snapshot จาก stock_counts (เผื่อ Admin ดูข้อมูลย้อนหลัง)
      let posQty = 0;
      let costPrice = 0;
      if (p.product) {
        posQty = p.product.pos_qty || 0;
        costPrice = p.product.cost_price || 0;
      } else {
        // Orphan: ใช้ snapshot จาก latest count
        const latestCount = p.manager || p.ctl || p.verifier || p.counter;
        posQty = latestCount?.pos_qty_snapshot || 0;
      }
      
      const diff = finalCount - posQty;
      const pct = posQty > 0 ? Math.abs(diff / posQty * 100) : (diff !== 0 ? 100 : 0);
      const value = diff * costPrice;
      const level = calcVarianceLevel(pct, value);
      
      // Check if needs recount (counter vs verifier mismatch)
      const needsRecount = (counterCount !== null && verifierCount !== null && counterCount !== verifierCount);
      
      return {
        ...p,
        final_qty: finalCount,
        counter_qty: counterCount,
        verifier_qty: verifierCount,
        ctl_qty: ctlCount,
        manager_qty: managerCount,
        pos_qty: posQty,
        cost_price: costPrice,
        diff,
        pct,
        value,
        level,
        needsRecount,
        isOrphan  // 🔥 flag สำหรับแสดงเตือน
      };
    });
    
    // เก็บ all items (รวม orphan) ไว้ใน _varianceAllData
    _varianceAllData = items;
    
    // _varianceData = items ที่ valid (มี product) เท่านั้น — แสดงในรายการหลัก
    // (orphan แสดงใน section พิเศษ)
    _varianceData = items.filter(it => !it.isOrphan);
    
    renderVarianceSummary();
    renderVarianceList();
  } catch (e) {
    console.error('[FS] loadVarianceReport error:', e);
    document.getElementById('varianceList').innerHTML = `
      <div style="text-align:center;padding:30px;color:var(--rose-500);font-size:11px;">
        ❌ ${e.message}
      </div>
    `;
  }
}

function renderVarianceSummary() {
  if (!_varianceData) return;
  const isLao = lang === 'lo';
  
  const all = _varianceData;
  const total = all.length;
  
  // Count by level
  const byLevel = { L1: 0, L2: 0, L3: 0, L4: 0 };
  all.forEach(p => { byLevel[p.level] = (byLevel[p.level] || 0) + 1; });
  
  // Update level tab counts
  Object.entries(byLevel).forEach(([lv, count]) => {
    const el = document.getElementById('vlCount-' + lv);
    if (el) el.textContent = count.toLocaleString();
  });
  
  // Recount Rate = (L3+L4) / total
  const recountCount = byLevel.L3 + byLevel.L4;
  const recountRate = total > 0 ? (recountCount / total * 100).toFixed(1) : '0.0';
  
  // Shrinkage = sum of negative values (ขาดทุน)
  // Loss = ของหาย (final < pos) → negative value
  // Calc absolute shrinkage value and %
  const totalPosValue = all.reduce((s, p) => s + (p.pos_qty * p.cost_price), 0);
  const totalLoss = all.reduce((s, p) => {
    // Only loss (final < pos)
    if (p.diff < 0) return s + Math.abs(p.value);
    return s;
  }, 0);
  const shrinkagePct = totalPosValue > 0 ? (totalLoss / totalPosValue * 100).toFixed(2) : '0.00';
  
  // Match rate = L1 / total
  const matchRate = total > 0 ? (byLevel.L1 / total * 100).toFixed(1) : '0.0';
  
  // Net variance value (gain - loss)
  const netVarianceValue = all.reduce((s, p) => s + p.value, 0);
  
  const fmt = new Intl.NumberFormat('th-TH');
  
  document.getElementById('varianceSummary').innerHTML = `
    <!-- Recount Rate -->
    <div onclick="setVarianceLevel('L3')" 
         style="background:${recountRate > 5 ? 'linear-gradient(135deg,var(--rose-100),var(--amber-100))' : 'linear-gradient(135deg,var(--emerald-100),var(--teal-100))'};padding:11px;border-radius:11px;border:1px solid ${recountRate > 5 ? 'var(--rose-300)' : 'var(--emerald-300)'};cursor:pointer;">
      <div style="font-size:9px;color:var(--slate-600);font-weight:700;text-transform:uppercase;margin-bottom:3px;">
        🔁 Recount Rate
      </div>
      <div style="font-size:22px;font-weight:800;color:${recountRate > 5 ? 'var(--rose-500)' : 'var(--emerald-500)'};font-family:'Space Grotesk',monospace;line-height:1;">
        ${recountRate}<span style="font-size:14px;">%</span>
      </div>
      <div style="font-size:10px;color:var(--slate-600);margin-top:3px;">
        ${recountCount.toLocaleString()} / ${total.toLocaleString()} ${isLao ? 'ສິນຄ້າ' : 'สินค้า'}
      </div>
    </div>
    
    <!-- Shrinkage % -->
    <div style="background:${shrinkagePct > 1 ? 'linear-gradient(135deg,var(--rose-100),var(--rose-50))' : 'linear-gradient(135deg,var(--emerald-100),var(--teal-100))'};padding:11px;border-radius:11px;border:1px solid ${shrinkagePct > 1 ? 'var(--rose-300)' : 'var(--emerald-300)'};">
      <div style="font-size:9px;color:var(--slate-600);font-weight:700;text-transform:uppercase;margin-bottom:3px;">
        💸 ${isLao ? 'ການສູນເສຍ' : 'Shrinkage'}
      </div>
      <div style="font-size:22px;font-weight:800;color:${shrinkagePct > 1 ? 'var(--rose-500)' : 'var(--emerald-500)'};font-family:'Space Grotesk',monospace;line-height:1;">
        ${shrinkagePct}<span style="font-size:14px;">%</span>
      </div>
      <div style="font-size:10px;color:var(--slate-600);margin-top:3px;font-family:'Space Grotesk',monospace;">
        ₭ ${fmt.format(totalLoss)}
      </div>
    </div>
    
    <!-- Match Rate -->
    <div onclick="setVarianceLevel('L1')" 
         style="background:linear-gradient(135deg,var(--emerald-100),var(--teal-100));padding:11px;border-radius:11px;border:1px solid var(--emerald-300);cursor:pointer;">
      <div style="font-size:9px;color:var(--emerald-700);font-weight:700;text-transform:uppercase;margin-bottom:3px;">
        ✅ ${isLao ? 'ສະຕ໋ອກຕົງ' : 'สต๊อกตรง'}
      </div>
      <div style="font-size:22px;font-weight:800;color:var(--emerald-500);font-family:'Space Grotesk',monospace;line-height:1;">
        ${matchRate}<span style="font-size:14px;">%</span>
      </div>
      <div style="font-size:10px;color:var(--slate-600);margin-top:3px;">
        ${byLevel.L1.toLocaleString()} / ${total.toLocaleString()} ${isLao ? 'ສິນຄ້າ' : 'สินค้า'}
      </div>
    </div>
    
    <!-- Net Variance -->
    <div style="background:${netVarianceValue < 0 ? 'linear-gradient(135deg,var(--rose-100),var(--amber-100))' : 'linear-gradient(135deg,var(--sky-100),var(--violet-100))'};padding:11px;border-radius:11px;border:1px solid ${netVarianceValue < 0 ? 'var(--rose-300)' : 'var(--sky-300)'};">
      <div style="font-size:9px;color:var(--slate-600);font-weight:700;text-transform:uppercase;margin-bottom:3px;">
        ${netVarianceValue < 0 ? '📉' : '📈'} Net Variance
      </div>
      <div style="font-size:18px;font-weight:800;color:${netVarianceValue < 0 ? 'var(--rose-500)' : 'var(--sky-600)'};font-family:'Space Grotesk',monospace;line-height:1;">
        ₭ ${fmt.format(Math.abs(netVarianceValue))}
      </div>
      <div style="font-size:10px;color:var(--slate-600);margin-top:3px;">
        ${netVarianceValue < 0 ? (isLao ? 'ຂາດ' : 'ขาด') : (isLao ? 'ເກີນ' : 'เกิน')}
      </div>
    </div>
  `;
  
  // 🔥 Orphan Records Warning — แสดงถ้ามี stock_counts ที่ product ถูกลบไปแล้ว
  renderOrphanWarning();
}

function renderOrphanWarning() {

  const all = _varianceAllData || [];

  // หา container — จะใส่หลัง varianceSummary
  let warningEl = document.getElementById('varianceOrphanWarning');
  
  if (orphans.length === 0) {
    // ลบ banner ถ้าไม่มี orphan
    if (warningEl) warningEl.remove();
    return;
  }
  
  // สร้าง banner ถ้ายังไม่มี
  if (!warningEl) {
    warningEl = document.createElement('div');
    warningEl.id = 'varianceOrphanWarning';
    const summary = document.getElementById('varianceSummary');
    if (summary && summary.parentNode) {
      summary.parentNode.insertBefore(warningEl, summary.nextSibling);
    }
  }
  
  const orphanIds = orphans.map(o => {
    // หา stock_counts id เพื่อ cleanup
    const latest = o.manager || o.ctl || o.verifier || o.counter;
    return latest?.id;
  }).filter(Boolean);
  
  warningEl.innerHTML = `

async function cleanupOrphanCounts() {
  const isLao = lang === 'lo';
  const all = _varianceAllData || [];
  const orphans = all.filter(p => p.isOrphan);
  
  if (orphans.length === 0) {
    showToast(isLao ? 'ບໍ່ມີ orphan' : 'ไม่มี orphan', 'warning');
    return;
  }
  
  if (!confirm(isLao 
    ? `ລົບ ${orphans.length} ການນັບທີ່ສິນຄ້າຖືກລົບແລ້ວ?\n\nການນັບເຫລົ່ານີ້ບໍ່ມີສິນຄ້າອ້າງອີງໃນລະບົບ`
    : `ลบ ${orphans.length} การนับที่สินค้าถูกลบแล้ว?\n\nการนับเหล่านี้ไม่มีสินค้าอ้างอิงในระบบ`)) return;
  
  showToast(isLao ? '⏳ ກຳລັງລົບ...' : '⏳ กำลังลบ...', 'success');
  
  try {
    // รวบรวม stock_counts ids ทั้งหมดของ orphan products
    // ต้องลบทุก record ของ product_id เหล่านี้ ไม่ใช่แค่ latest
    const orphanProductIds = orphans.map(o => o.product_id).filter(Boolean);
    
    if (orphanProductIds.length === 0) {
      showToast(isLao ? 'ບໍ່ມີ ID' : 'ไม่มี ID', 'warning');
      return;
    }
    
    const { error } = await sb.from('stock_counts')
      .delete()
      .eq('branch_id', branch.id)
      .in('product_id', orphanProductIds);
    
    if (error) throw error;
    
    showToast(`🧹 ${isLao ? 'ລົບແລ້ວ' : 'ลบแล้ว'} ${orphans.length} ${isLao ? 'ການນັບ' : 'การนับ'}`, 'success');
    
    // Reload
    await loadVarianceReport();
  } catch (e) {
    console.error('[FS] cleanupOrphanCounts error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

function renderVarianceList() {
  if (!_varianceData) return;
  const isLao = lang === 'lo';
  const fmt = new Intl.NumberFormat('th-TH');
  
  // Filter by level
  let items = _varianceData.filter(p => p.level === _varianceFilter.level);
  
  // Filter by search
  if (_varianceFilter.search) {
    const s = _varianceFilter.search.toLowerCase();
    items = items.filter(p => 
      (p.product?.barcode || '').toLowerCase().includes(s) ||
      (p.product?.name_lo || '').toLowerCase().includes(s) ||
      (p.product?.name_th || '').toLowerCase().includes(s) ||
      (p.gondola_code || '').toLowerCase().includes(s)
    );
  }
  
  // Sort: highest diff first (absolute)
  items.sort((a, b) => Math.abs(b.diff) - Math.abs(a.diff));
  
  const listEl = document.getElementById('varianceList');
  
  if (items.length === 0) {
    listEl.innerHTML = `
      <div style="text-align:center;padding:40px 20px;color:var(--slate-400);">
        <div style="font-size:48px;margin-bottom:11px;">${_varianceFilter.level === 'L1' ? '✅' : '🎉'}</div>
        <div style="font-size:13px;font-weight:700;color:var(--slate-600);">
          ${_varianceFilter.level === 'L1' 
            ? (isLao ? 'ບໍ່ມີສິນຄ້າທີ່ສະຕ໋ອກຕົງ' : 'ไม่มีสินค้าที่สต๊อกตรง')
            : (isLao ? `ບໍ່ມີສິນຄ້າໃນລະດັບ ${_varianceFilter.level}` : `ไม่มีสินค้าในระดับ ${_varianceFilter.level}`)}
        </div>
      </div>
    `;
    return;
  }
  
  // Group by gondola?
  let html = '';
  
  if (_varianceFilter.groupBy === 'gondola') {
    // Group
    const groups = {};
    items.forEach(p => {
      const key = p.gondola_code || (isLao ? 'ບໍ່ມີຕຳແໜ່ງ' : 'ไม่มีตำแหน่ง');
      if (!groups[key]) groups[key] = [];
      groups[key].push(p);
    });
    
    const sortedGroups = Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
    
    sortedGroups.forEach(([gondola, gItems]) => {
      const groupDiff = gItems.reduce((s, p) => s + p.diff, 0);
      const groupValue = gItems.reduce((s, p) => s + p.value, 0);
      
      html += `
        <div style="background:linear-gradient(135deg,var(--sky-100),white);border:1px solid var(--sky-300);border-radius:8px;padding:7px 11px;margin-bottom:5px;margin-top:11px;display:flex;align-items:center;gap:7px;">
          <span style="font-weight:800;color:var(--sky-600);font-family:'Space Grotesk',monospace;font-size:13px;">📍 ${gondola}</span>
          <span style="font-size:10px;color:var(--slate-500);margin-left:auto;">
            ${gItems.length} ${isLao ? 'ສິນຄ້າ' : 'สินค้า'} • 
            <strong style="color:${groupValue < 0 ? 'var(--rose-500)' : 'var(--emerald-500)'};">
              ₭ ${fmt.format(Math.abs(groupValue))}
            </strong>
          </span>
        </div>
      `;
      
      gItems.forEach(p => {
        html += renderVarianceItem(p, fmt, isLao);
      });
    });
  } else {
    // No grouping
    items.forEach(p => {
      html += renderVarianceItem(p, fmt, isLao);
    });
  }
  
  listEl.innerHTML = html;
}

function renderVarianceItem(p, fmt, isLao) {
  const name = isLao ? (p.product?.name_lo || p.product?.name_th || p.barcode) : (p.product?.name_th || p.product?.name_lo || p.barcode);
  const unit = isLao ? (p.product?.unit_lo || 'ຊິ້ນ') : (p.product?.unit_th || 'ชิ้น');
  
  // Color by diff direction
  const diffColor = p.diff === 0 ? 'var(--emerald-500)' : (p.diff < 0 ? 'var(--rose-500)' : 'var(--sky-600)');
  const diffBg = p.diff === 0 ? 'var(--emerald-50)' : (p.diff < 0 ? 'var(--rose-50)' : 'var(--sky-50)');
  const diffSign = p.diff > 0 ? '+' : '';
  
  // Recount badge
  const recountBadge = p.needsRecount 
    ? `<span style="background:var(--amber-500);color:white;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700;margin-left:5px;">🔁 R</span>` 
    : '';
  
  return `
    <div onclick="openVarianceDetail(${p.product_id})"
         style="background:${diffBg};border:1px solid ${p.diff === 0 ? 'var(--emerald-200)' : (p.diff < 0 ? 'var(--rose-200)' : 'var(--sky-200)')};border-left:4px solid ${diffColor};border-radius:9px;padding:9px 11px;margin-bottom:5px;cursor:pointer;display:flex;align-items:center;gap:9px;transition:transform 0.1s;"
         onmouseover="this.style.transform='translateX(2px)'" onmouseout="this.style.transform='translateX(0)'">
      <!-- Product info -->
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:700;color:var(--slate-900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">
          ${name}${recountBadge}
        </div>
        <div style="font-size:9px;color:var(--slate-500);font-family:monospace;display:flex;align-items:center;gap:6px;margin-top:1px;">
          <span>${p.product?.barcode || ''}</span>
          ${p.gondola_code && _varianceFilter.groupBy !== 'gondola' ? `<span style="background:var(--violet-100);color:var(--violet-600);padding:1px 5px;border-radius:3px;font-weight:700;">📍 ${p.gondola_code}</span>` : ''}
        </div>
        ${(p.counter_qty !== null || p.verifier_qty !== null) ? `
          <div style="font-size:9px;color:var(--slate-500);margin-top:2px;display:flex;gap:7px;">
            ${p.counter_qty !== null ? `<span>👤 ${p.counter_qty}</span>` : ''}
            ${p.verifier_qty !== null ? `<span>🔍 ${p.verifier_qty}</span>` : ''}
            ${p.ctl_qty !== null ? `<span>⚖️ ${p.ctl_qty}</span>` : ''}
            ${p.manager_qty !== null ? `<span>👔 ${p.manager_qty}</span>` : ''}
          </div>
        ` : ''}
      </div>
      
      <!-- POS vs Final -->
      <div style="text-align:center;flex-shrink:0;background:white;padding:5px 9px;border-radius:7px;">
        <div style="font-size:8px;color:var(--slate-500);font-weight:700;text-transform:uppercase;">POS → Final</div>
        <div style="font-size:11px;color:var(--slate-700);font-family:'Space Grotesk',monospace;font-weight:700;">
          ${p.pos_qty} → ${p.final_qty}
        </div>
      </div>
      
      <!-- Diff -->
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:14px;font-weight:800;color:${diffColor};font-family:'Space Grotesk',monospace;">
          ${diffSign}${p.diff}
        </div>
        <div style="font-size:9px;color:${diffColor};font-family:'Space Grotesk',monospace;font-weight:600;">
          ${p.pct.toFixed(1)}%
        </div>
        ${p.value !== 0 ? `<div style="font-size:9px;color:${p.value < 0 ? 'var(--rose-500)' : 'var(--sky-600)'};font-family:'Space Grotesk',monospace;font-weight:700;margin-top:1px;">
          ${p.value < 0 ? '-' : '+'}₭${fmt.format(Math.abs(p.value))}
        </div>` : ''}
      </div>
    </div>
  `;
}

// ==================== VARIANCE FILTERS ====================
function setVarianceLevel(level) {
  _varianceFilter.level = level;
  
  // Update tab styling
  ['L1', 'L2', 'L3', 'L4'].forEach(lv => {
    const btn = document.getElementById('vl-' + lv);
    if (!btn) return;
    if (lv === level) {
      // Active styling per level
      const colors = {
        L1: { bg: 'var(--emerald-500)', text: 'white' },
        L2: { bg: 'var(--amber-500)', text: 'white' },
        L3: { bg: 'var(--rose-500)', text: 'white' },
        L4: { bg: 'var(--rose-600)', text: 'white' }
      };
      const c = colors[lv];
      btn.style.background = c.bg;
      btn.style.borderColor = c.bg;
      btn.style.color = c.text;
      btn.querySelectorAll('div').forEach(d => d.style.color = c.text);
    } else {
      btn.style.background = 'white';
      btn.style.borderColor = 'var(--slate-200)';
      btn.style.color = 'var(--slate-600)';
      // Reset child colors
      const divs = btn.querySelectorAll('div');
      if (divs[1]) divs[1].style.color = 'var(--slate-600)';
      const colorMap = {
        L1: 'var(--emerald-500)',
        L2: 'var(--amber-500)',
        L3: 'var(--rose-500)',
        L4: 'var(--rose-600)'
      };
      if (divs[2]) divs[2].style.color = colorMap[lv];
    }
  });
  
  renderVarianceList();
}

function setVariancePeriod(period) {
  _varianceFilter.period = period;
  
  // Update button styling
  ['session', 'today', 'week', 'all'].forEach(p => {
    const btn = document.getElementById('vpBtn' + p.charAt(0).toUpperCase() + p.slice(1));
    if (!btn) return;
    if (p === period) {
      btn.style.background = 'var(--violet-500)';
      btn.style.color = 'white';
    } else {
      btn.style.background = 'transparent';
      btn.style.color = 'var(--slate-600)';
    }
  });
  
  loadVarianceReport();
}

function onVarianceSearchInput(value) {
  _varianceFilter.search = value.trim();
  clearTimeout(window._varianceSearchTimer);
  window._varianceSearchTimer = setTimeout(() => renderVarianceList(), 200);
}

function toggleVarianceGroup() {
  _varianceFilter.groupBy = _varianceFilter.groupBy === 'gondola' ? 'none' : 'gondola';
  const btn = document.getElementById('varianceGroupBtn');
  if (btn) {

async function exportVarianceExcel() {

  try {
    const wb = XLSX.utils.book_new();
    
    // Sheet 1: All items
    const allRows = _varianceData.map(p => ({
      Level: p.level,

      Barcode: p.product?.barcode || '',

    const totalLoss = _varianceData.reduce((s, p) => p.diff < 0 ? s + Math.abs(p.value) : s, 0);
    const shrinkagePct = totalPosValue > 0 ? (totalLoss / totalPosValue * 100).toFixed(2) : 0;
    
    const summaryData = [
      ['Friendship Stock - Variance Report'],
      [],
      ['Branch', branch.code + ' - ' + (branch.name_th || branch.name_lo)],
      ['Generated', new Date().toLocaleString()],
      ['Period', _varianceFilter.period],
      ['Session', session?.session_name || '-'],
      [],
      ['KPI', 'Value'],
      ['Total Items', total],
      ['Recount Rate', recountRate + '%'],
      ['Shrinkage %', shrinkagePct + '%'],
      ['Total Loss (₭)', totalLoss],
      [],
      ['Level', 'Count', '%'],
      ['L1 (Match)', byLevel.L1, total > 0 ? (byLevel.L1/total*100).toFixed(1) + '%' : '0%'],
      ['L2 (Explain)', byLevel.L2, total > 0 ? (byLevel.L2/total*100).toFixed(1) + '%' : '0%'],
      ['L3 (Recount)', byLevel.L3, total > 0 ? (byLevel.L3/total*100).toFixed(1) + '%' : '0%'],
      ['L4 (Critical)', byLevel.L4, total > 0 ? (byLevel.L4/total*100).toFixed(1) + '%' : '0%']
    ];
    const wsSum = XLSX.utils.aoa_to_sheet(summaryData);
    wsSum['!cols'] = [{wch:25},{wch:15},{wch:12}];
    XLSX.utils.book_append_sheet(wb, wsSum, '_Summary', true);
    
    const fileName = `variance-${branch.code}-${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, fileName);
    
    showToast(`✅ ${total.toLocaleString()} records`, 'success');
  } catch (e) {
    console.error('[FS] exportVarianceExcel error:', e);
    showToast('Error: ' + e.message, 'error');
  }
}

async function loadKPI() {
  if (!session) return;
  
  log('Loading KPI');
  
  // Get all counts + products for calculation
  const { data: counts } = await sb.from('stock_counts')
    .select(`counted_qty, pos_qty_snapshot, diff, variance_level, is_markdown,
             products(sell_price)`)
    .eq('session_id', session.id);
  
  const items = counts || [];
  const list = document.getElementById('kpiList');
  if (!list) return;
  
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_history')}</p></div>`;
    return;
  }
  
  const total = items.length;
  const l1Count = items.filter(x => x.variance_level === 1).length;
  const recountCount = items.filter(x => (x.variance_level || 0) >= 3).length;
  
  const accuracy = (l1Count / total * 100);
  const recountRate = (recountCount / total * 100);
  
  let shrinkageValue = 0, overageValue = 0, totalPosValue = 0;
  items.forEach(x => {
    const price = x.products?.sell_price || 0;
    if (x.diff < 0) shrinkageValue += Math.abs(x.diff) * price;
    if (x.diff > 0) overageValue += x.diff * price;
    totalPosValue += (x.pos_qty_snapshot || 0) * price;
  });
  
  const shrinkagePct = totalPosValue ? (shrinkageValue / totalPosValue * 100) : 0;
  
  const accCls = accuracy >= 95 ? 'kpi-good' : (accuracy >= 90 ? 'kpi-warn' : 'kpi-bad');
  const rcCls = recountRate <= 5 ? 'kpi-good' : (recountRate <= 10 ? 'kpi-warn' : 'kpi-bad');
  const shCls = shrinkagePct <= 0.3 ? 'kpi-good' : (shrinkagePct <= 1 ? 'kpi-warn' : 'kpi-bad');
  
  const mdCount = items.filter(x => x.is_markdown).length;
  
  list.innerHTML = `
    <div class="kpi-card ${accCls}">
      <div class="kpi-header"><div class="kpi-title">${T('count_accuracy')}</div><div class="kpi-value">${accuracy.toFixed(1)}%</div></div>
      <div class="kpi-target">Target: ≥ 95%</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(accuracy,100)}%"></div></div>
    </div>
    <div class="kpi-card ${rcCls}">
      <div class="kpi-header"><div class="kpi-title">${T('recount_rate')}</div><div class="kpi-value">${recountRate.toFixed(1)}%</div></div>
      <div class="kpi-target">Target: < 5%</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(recountRate*5,100)}%"></div></div>
    </div>
    <div class="kpi-card ${shCls}">
      <div class="kpi-header"><div class="kpi-title">${T('shrinkage_pct')}</div><div class="kpi-value">${shrinkagePct.toFixed(2)}%</div></div>
      <div class="kpi-target">Target: < 0.3%</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(shrinkagePct*30,100)}%"></div></div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="num">₭${shrinkageValue.toLocaleString()}</div><div class="lbl">Shrinkage</div></div>
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">SKUs Counted</div></div>
      <div class="stat-card"><div class="num">${mdCount}</div><div class="lbl">MD SKUs</div></div>
      <div class="stat-card"><div class="num">₭${overageValue.toLocaleString()}</div><div class="lbl">Overage</div></div>
    </div>
  `;
}

let _allUsers = [];
let _allBranchesForUsers = [];
let _userViewMode = 'branch'; // 'branch' | 'flat'

async function loadUsers() {
  // Load both users and branches in parallel
  const [usersRes, branchesRes] = await Promise.all([
    sb.from('users').select('*').order('role').order('username'),
    sb.from('branches').select('*').eq('is_active', true).order('id')
  ]);
  
  _allUsers = usersRes.data || [];
  _allBranchesForUsers = branchesRes.data || [];
  
  // Cache สำหรับใช้ใน Modal และ Switcher
  window._allBranchesCache = _allBranchesForUsers;
  
  renderUsersList();
  
  // เพิ่ม Branch Filter FAB (เหมือน Floor Map)
  renderBranchFilterFAB();
}

function renderUsersList() {
  const list = document.getElementById('usersList');
  if (!list) return;
  
  const searchEl = document.getElementById('userSearch');
  const searchTerm = (searchEl?.value || '').toLowerCase().trim();
  
  // Filter out hidden roles
  let filtered = _allUsers.filter(u => 
    !['admin', 'scc'].includes(u.role) || u.id === user.id
  );
  
  // Apply branch filter (from FAB)
  if (_userBranchFilter !== null) {
    filtered = filtered.filter(u => u.branch_id === _userBranchFilter);
  }
  
  // Apply search
  if (searchTerm) {
    filtered = filtered.filter(u => 
      (u.username || '').toLowerCase().includes(searchTerm) ||
      (u.full_name || '').toLowerCase().includes(searchTerm) ||
      (u.role || '').toLowerCase().includes(searchTerm)
    );
  }
  
  // Filter status badge above list
  let statusBadge = '';
  if (_userBranchFilter !== null) {
    const b = _allBranchesForUsers.find(x => x.id === _userBranchFilter);
    if (b) {
      const name = lang === 'lo' ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo);
      statusBadge = `
        <div style="background:linear-gradient(135deg,var(--violet-100),var(--sky-100));border:1px solid var(--violet-300);padding:8px 11px;border-radius:9px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:11px;">
          <span style="font-size:14px;">🏪</span>
          <span style="flex:1;">
            <strong style="color:var(--violet-600);">${lang === 'lo' ? 'ກຳລັງກັ່ນຕອງ:' : 'กำลังกรอง:'}</strong> ${name}
          </span>
          <button onclick="filterByBranch(null)" 
                  style="background:var(--rose-500);color:white;border:none;border-radius:5px;padding:3px 9px;font-size:10px;font-weight:700;cursor:pointer;">
            ✕ ${lang === 'lo' ? 'ລ້າງ' : 'ล้าง'}
          </button>
        </div>
      `;
    }
  }
  
  if (filtered.length === 0) {
    list.innerHTML = statusBadge + `<div style="text-align:center;padding:30px;color:var(--slate-400);">
      ${lang === 'lo' ? 'ບໍ່ພົບ' : 'ไม่พบ'}
    </div>`;
    return;
  }
  
  if (_userViewMode === 'flat' || _userBranchFilter !== null) {
    // ถ้ามี filter ตามสาขาแล้ว → แสดงเป็น flat (ไม่ต้อง group ซ้ำ)
    list.innerHTML = statusBadge + filtered.map(u => renderUserCard(u)).join('');
    return;
  }
  
  // Group by branch
  const grouped = {};
  const noBranch = [];
  
  filtered.forEach(u => {
    if (u.branch_id) {
      if (!grouped[u.branch_id]) grouped[u.branch_id] = [];
      grouped[u.branch_id].push(u);
    } else {
      noBranch.push(u);
    }
  });
  
  // Sort branches by type then id
  const typeOrder = { 'hq': 1, 'super': 1, 'warehouse': 2, 'minimart': 3, 'mini': 3, 'mall': 3 };
  const sortedBranches = [..._allBranchesForUsers].sort((a, b) => {
    const oa = typeOrder[a.branch_type] || 9;
    const ob = typeOrder[b.branch_type] || 9;
    if (oa !== ob) return oa - ob;
    return a.id - b.id;
  });
  
  // Sort users in each branch by role priority then username
  const roleOrder = { 'admin': 1, 'scc': 2, 'bcs': 3, 'ctl': 4, 'verifier': 5, 'audit': 5, 'counter': 6, 'staff': 7 };
  Object.keys(grouped).forEach(bid => {
    grouped[bid].sort((a, b) => {
      const oa = roleOrder[a.role] || 9;
      const ob = roleOrder[b.role] || 9;
      if (oa !== ob) return oa - ob;
      return (a.username || '').localeCompare(b.username || '');
    });
  });
  
  let html = statusBadge;
  
  for (const b of sortedBranches) {
    const users = grouped[b.id];
    if (!users || !users.length) continue;
    
    const displayName = lang === 'lo' ? (b.name_lo || b.name_th) : (b.name_th || b.name_lo);
    const typeIcon = (b.branch_type === 'hq' || b.branch_type === 'super') ? '⭐' :
                     (b.branch_type === 'warehouse') ? '📦' : '🏪';
    const typeColor = (b.branch_type === 'hq' || b.branch_type === 'super') ? 'var(--amber-300)' :
                      (b.branch_type === 'warehouse') ? 'var(--violet-300)' : 'var(--sky-300)';
    
    // Count active/inactive in this branch
    const activeCount = users.filter(u => u.is_active).length;
    const inactiveCount = users.length - activeCount;
    
    html += `
      <div style="margin-bottom:12px;">
        <div style="background:linear-gradient(135deg,var(--slate-50),white);border:2px solid ${typeColor};border-radius:11px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px;cursor:pointer;" onclick="filterByBranch(${b.id})">
          <div style="font-size:18px;">${typeIcon}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-weight:700;font-size:13px;color:var(--slate-900);">${displayName}</div>
            <div style="font-size:10px;color:var(--slate-500);font-family:monospace;">${b.code}</div>
          </div>
          <div style="background:${typeColor};padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;color:var(--slate-700);">
            ${activeCount}${inactiveCount > 0 ? `/<span style="opacity:0.5;">${users.length}</span>` : ''}
          </div>
        </div>
        <div style="padding-left:8px;border-left:3px solid ${typeColor};">
          ${users.map(u => renderUserCard(u)).join('')}
        </div>
      </div>
    `;
  }
  
  // Users without branch
  if (noBranch.length > 0) {
    html += `
      <div style="margin-bottom:12px;">
        <div style="background:var(--slate-100);border:2px solid var(--slate-300);border-radius:11px;padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:9px;">
          <div style="font-size:18px;">❓</div>
          <div style="flex:1;">
            <div style="font-weight:700;font-size:13px;color:var(--slate-700);">${lang === 'lo' ? 'ບໍ່ມີສາຂາ' : 'ไม่มีสาขา'}</div>
            <div style="font-size:10px;color:var(--slate-500);">${lang === 'lo' ? 'ບັນຊີທີ່ບໍ່ໄດ້ກຳນົດສາຂາ' : 'บัญชีที่ยังไม่ได้กำหนดสาขา'}</div>
          </div>
          <div style="background:var(--slate-300);padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;">
            ${noBranch.length}
          </div>
        </div>
        <div style="padding-left:8px;border-left:3px solid var(--slate-300);">
          ${noBranch.map(u => renderUserCard(u)).join('')}
        </div>
      </div>
    `;
  }
  
  list.innerHTML = html;
}

function renderUserCard(u) {
  const initial = (u.username || '?').charAt(0).toUpperCase();

  return `

        <div class="user-username">@${u.username}</div>

      <div class="user-badge-r ${u.role}">${u.role}</div>

  `;
}
