<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f766e">
<title>Friendship Stock v3.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --teal-700: #0f766e; --teal-600: #0d9488; --teal-500: #14b8a6;
    --teal-400: #2dd4bf; --teal-100: #ccfbf1; --teal-50: #f0fdfa;
    --amber-500: #f59e0b; --amber-400: #fbbf24; --amber-100: #fef3c7;
    --rose-500: #f43f5e; --rose-100: #ffe4e6;
    --emerald-500: #10b981; --emerald-100: #d1fae5;
    --indigo-700: #4338ca; --indigo-600: #4f46e5; --indigo-500: #6366f1; --indigo-100: #e0e7ff;
    --violet-600: #7c3aed; --violet-500: #8b5cf6; --violet-100: #ede9fe;
    --sky-600: #0284c7; --sky-500: #0ea5e9; --sky-100: #e0f2fe;
    --slate-900: #0f172a; --slate-700: #334155; --slate-600: #475569;
    --slate-500: #64748b; --slate-400: #94a3b8; --slate-300: #cbd5e1;
    --slate-200: #e2e8f0; --slate-100: #f1f5f9; --slate-50: #f8fafc;
    --bg: #fafaf7;
    --sh-sm: 0 1px 2px rgba(15,23,42,0.05);
    --sh-md: 0 4px 12px rgba(15,23,42,0.08);
    --sh-lg: 0 12px 32px rgba(15,23,42,0.12);
    --sh-xl: 0 24px 48px rgba(15,118,110,0.18);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { overflow-x: hidden; }
  body {
    font-family: 'Noto Sans Lao', 'Noto Sans Thai', system-ui, sans-serif;
    background: var(--bg);
    background-image: 
      radial-gradient(at 0% 0%, rgba(20,184,166,0.08) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(245,158,11,0.06) 0px, transparent 50%);
    min-height: 100vh;
    color: var(--slate-900);
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'Space Grotesk', monospace; font-variant-numeric: tabular-nums; }
  .display { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.02em; }
  
  /* LOGIN */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; position: relative; overflow: hidden; }
  .login-screen::before { content: ''; position: absolute; top: -50%; right: -30%; width: 600px; height: 600px; background: radial-gradient(circle, var(--teal-100) 0%, transparent 70%); }
  .login-card { background: white; border-radius: 24px; padding: 28px 24px; width: 100%; max-width: 420px; box-shadow: var(--sh-xl); position: relative; z-index: 1; border: 1px solid rgba(15,118,110,0.1); }
  .login-brand { text-align: center; margin-bottom: 22px; }
  .login-logo { width: 56px; height: 56px; margin: 0 auto 10px; background: linear-gradient(135deg, var(--teal-700), var(--teal-500)); border-radius: 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(15,118,110,0.3); }
  .login-logo svg { width: 28px; height: 28px; color: white; }
  .login-title { font-size: 22px; font-weight: 700; }
  .login-subtitle { font-size: 12px; color: var(--slate-500); margin-top: 4px; }
  .lang-toggle { position: absolute; top: 14px; right: 14px; display: flex; gap: 4px; background: var(--slate-100); padding: 3px; border-radius: 9px; }
  .lang-btn { padding: 5px 10px; border: none; background: transparent; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--slate-500); }
  .lang-btn.active { background: white; color: var(--teal-700); box-shadow: var(--sh-sm); }
  
  .form-group { margin-bottom: 11px; }
  .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--slate-600); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-input, .form-select { width: 100%; padding: 12px 14px; border: 2px solid var(--slate-200); border-radius: 11px; font-size: 15px; font-family: inherit; background: var(--slate-50); }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--teal-500); background: white; box-shadow: 0 0 0 4px rgba(20,184,166,0.1); }
  
  .btn { width: 100%; padding: 13px; border: none; border-radius: 11px; font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: linear-gradient(135deg, var(--teal-700), var(--teal-600)); color: white; box-shadow: 0 4px 12px rgba(15,118,110,0.3); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn-secondary { background: var(--slate-100); color: var(--slate-700); }
  .btn-danger { background: var(--rose-500); color: white; }
  .btn-amber { background: var(--amber-500); color: white; }
  .btn-violet { background: linear-gradient(135deg, var(--violet-600), var(--violet-500)); color: white; }
  
  .error-msg { background: var(--rose-100); color: var(--rose-500); padding: 11px 13px; border-radius: 10px; font-size: 13px; margin-bottom: 11px; display: none; }
  .error-msg.show { display: block; }
  
  /* APP */
  .app { min-height: 100vh; display: none; }
  .app.active { display: block; }
  
  .topbar { background: white; border-bottom: 1px solid var(--slate-200); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .topbar-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .topbar-logo { width: 34px; height: 34px; background: linear-gradient(135deg, var(--teal-700), var(--teal-500)); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
  .topbar-logo.r-counter, .topbar-logo.r-staff { background: linear-gradient(135deg, var(--teal-700), var(--teal-500)); }
  .topbar-logo.r-verifier, .topbar-logo.r-audit { background: linear-gradient(135deg, var(--amber-500), var(--amber-400)); }
  .topbar-logo.r-ctl { background: linear-gradient(135deg, var(--violet-600), var(--violet-500)); }
  .topbar-logo.r-bcs { background: linear-gradient(135deg, var(--sky-600), var(--sky-500)); }
  .topbar-logo.r-admin, .topbar-logo.r-scc { background: linear-gradient(135deg, var(--indigo-700), var(--indigo-500)); }
  .topbar-info { font-size: 12px; min-width: 0; }
  .topbar-info .name { font-weight: 700; color: var(--slate-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar-info .meta { font-size: 10px; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.3px; }
  .topbar-actions { display: flex; gap: 5px; align-items: center; }
  .icon-btn { width: 32px; height: 32px; border: none; background: var(--slate-100); border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--slate-600); }
  .icon-btn:hover { background: var(--slate-200); color: var(--teal-700); }
  .icon-btn svg { width: 16px; height: 16px; }
  
  .context-bar { padding: 6px 14px; display: flex; gap: 6px; align-items: center; font-size: 11px; flex-wrap: wrap; }
  .context-bar.r-counter, .context-bar.r-staff { background: var(--teal-50); border-bottom: 1px solid var(--teal-100); }
  .context-bar.r-verifier, .context-bar.r-audit { background: var(--amber-100); border-bottom: 1px solid var(--amber-400); }
  .context-bar.r-ctl { background: var(--violet-100); border-bottom: 1px solid var(--violet-500); }
  .context-bar.r-bcs { background: var(--sky-100); border-bottom: 1px solid var(--sky-500); }
  .context-bar.r-admin, .context-bar.r-scc { background: var(--indigo-100); border-bottom: 1px solid var(--indigo-500); }
  .ctx-chip { background: white; padding: 4px 9px; border-radius: 7px; font-weight: 600; color: var(--slate-700); box-shadow: var(--sh-sm); font-size: 11px; }
  .ctx-chip .lbl { color: var(--slate-500); font-weight: 500; margin-right: 3px; }
  .ctx-change { margin-left: auto; font-size: 11px; color: var(--teal-700); background: none; border: none; cursor: pointer; text-decoration: underline; }
  
  .content { padding: 12px; padding-bottom: 80px; max-width: 600px; margin: 0 auto; }
  
  /* Tabs */
  .tabs { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid var(--slate-200); display: flex; z-index: 90; box-shadow: 0 -4px 20px rgba(15,23,42,0.06); max-width: 600px; margin: 0 auto; }
  .tab { flex: 1; padding: 8px 4px; border: none; background: transparent; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; color: var(--slate-500); font-size: 10px; font-weight: 600; font-family: inherit; position: relative; }
  .tab svg { width: 20px; height: 20px; }
  .tab.active { color: var(--teal-700); }
  .tab .tab-badge { position: absolute; top: 4px; right: 50%; transform: translateX(18px); background: var(--rose-500); color: white; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 9px; min-width: 16px; }
  
  /* Session Card */
  .session-card { background: linear-gradient(135deg, var(--teal-700), var(--teal-500)); border-radius: 18px; padding: 16px; color: white; box-shadow: var(--sh-lg); margin-bottom: 12px; position: relative; overflow: hidden; }
  .session-card.r-verifier, .session-card.r-audit { background: linear-gradient(135deg, #b45309, var(--amber-400)); }
  .session-card.r-ctl { background: linear-gradient(135deg, var(--violet-600), var(--violet-500)); }
  .session-card.r-bcs { background: linear-gradient(135deg, var(--sky-600), var(--sky-500)); }
  .session-card.r-admin, .session-card.r-scc { background: linear-gradient(135deg, var(--indigo-700), var(--indigo-500)); }
  .session-card::before { content: ''; position: absolute; top: -50%; right: -20%; width: 180px; height: 180px; background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%); }
  .session-label { font-size: 10px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  .session-name { font-size: 14px; font-weight: 700; margin-top: 3px; margin-bottom: 10px; line-height: 1.3; }
  .session-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; position: relative; z-index: 1; }
  .session-stat { text-align: center; }
  .session-stat .num { font-size: 20px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .session-stat .lbl { font-size: 9px; opacity: 0.85; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.3px; }
  
  /* Scan */
  .scan-card { background: white; border-radius: 16px; padding: 12px; box-shadow: var(--sh-md); margin-bottom: 12px; border: 1px solid var(--slate-200); }
  .scan-frame { background: var(--slate-900); border-radius: 11px; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; margin-bottom: 10px; position: relative; }
  #reader { width: 100% !important; }
  #reader video { width: 100% !important; height: 100% !important; object-fit: cover; }
  .scan-placeholder { text-align: center; padding: 24px; }
  .scan-placeholder svg { width: 44px; height: 44px; opacity: 0.5; margin-bottom: 6px; }
  .scan-placeholder p { font-size: 12px; opacity: 0.7; }
  .scan-frame.scanning::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--teal-400), transparent); animation: scan-line 2s linear infinite; }
  @keyframes scan-line { 0% { top: 20%; opacity: 0; } 50% { opacity: 1; } 100% { top: 80%; opacity: 0; } }
  
  .manual-search { display: flex; gap: 6px; }
  .manual-search input { flex: 1; padding: 10px 12px; border: 2px solid var(--slate-200); border-radius: 9px; font-size: 14px; font-family: 'Space Grotesk', monospace; }
  .manual-search input:focus { outline: none; border-color: var(--teal-500); }
  
  /* Product Card */
  .product-card { background: white; border-radius: 16px; padding: 14px; box-shadow: var(--sh-lg); margin-bottom: 12px; border-left: 5px solid var(--teal-500); animation: slideUp 0.3s ease; }
  .product-card.audit-mode { border-left-color: var(--amber-500); }
  .product-card.tiebreaker-mode { border-left-color: var(--violet-500); }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .md-badge { display: inline-block; background: linear-gradient(135deg, var(--rose-500), #e11d48); color: white; font-size: 10px; padding: 2px 8px; border-radius: 5px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 5px; }
  .product-name { font-size: 15px; font-weight: 700; color: var(--slate-900); margin-bottom: 5px; line-height: 1.4; }
  .product-barcode { font-size: 11px; color: var(--slate-500); font-family: 'Space Grotesk', monospace; background: var(--slate-100); padding: 3px 8px; border-radius: 5px; display: inline-block; margin-bottom: 10px; }
  .product-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 10px; }
  .meta-item { background: var(--slate-50); padding: 8px 10px; border-radius: 8px; }
  .meta-label { font-size: 10px; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
  .meta-value { font-size: 13px; font-weight: 700; color: var(--slate-900); margin-top: 2px; font-family: 'Space Grotesk', sans-serif; }
  
  .count-section { background: linear-gradient(135deg, var(--teal-50), white); border-radius: 11px; padding: 11px; border: 2px solid var(--teal-100); margin-bottom: 10px; }
  .count-section.audit-mode { background: linear-gradient(135deg, var(--amber-100), white); border-color: var(--amber-400); }
  .count-section.tiebreaker-mode { background: linear-gradient(135deg, var(--violet-100), white); border-color: var(--violet-500); }
  .count-label { font-size: 11px; font-weight: 700; color: var(--teal-700); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; text-align: center; }
  .count-section.audit-mode .count-label { color: #92400e; }
  .count-section.tiebreaker-mode .count-label { color: var(--violet-600); }
  .count-controls { display: flex; align-items: center; gap: 7px; }
  .count-btn { width: 44px; height: 44px; border: none; border-radius: 11px; background: white; color: var(--teal-700); font-size: 22px; font-weight: 700; cursor: pointer; box-shadow: var(--sh-sm); font-family: 'Space Grotesk', sans-serif; }
  .count-section.audit-mode .count-btn { color: #92400e; }
  .count-section.tiebreaker-mode .count-btn { color: var(--violet-600); }
  .count-btn:active { transform: scale(0.92); }
  .count-input { flex: 1; height: 44px; border: 2px solid var(--teal-200); border-radius: 11px; text-align: center; font-size: 22px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; background: white; }
  .count-section.audit-mode .count-input { border-color: var(--amber-400); }
  .count-section.tiebreaker-mode .count-input { border-color: var(--violet-500); }
  
  .note-input { width: 100%; padding: 9px 11px; border: 2px solid var(--slate-200); border-radius: 9px; font-size: 13px; font-family: inherit; margin-bottom: 9px; resize: none; }
  .action-row { display: flex; gap: 7px; }
  .action-row .btn { flex: 1; }
  
  /* Quick actions */
  .quick-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .quick-btn { padding: 8px; border: 1px dashed var(--slate-300); background: var(--slate-50); border-radius: 8px; cursor: pointer; font-size: 11px; color: var(--slate-600); display: flex; align-items: center; justify-content: center; gap: 4px; font-family: inherit; }
  .quick-btn:hover { background: var(--slate-100); }
  .quick-btn svg { width: 13px; height: 13px; }
  
  /* History/list cards */
  .history-card { background: white; border-radius: 16px; padding: 12px; box-shadow: var(--sh-md); border: 1px solid var(--slate-200); margin-bottom: 12px; }
  .section-title { font-size: 11px; font-weight: 700; color: var(--slate-500); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px; display: flex; align-items: center; justify-content: space-between; }
  .badge { background: var(--teal-100); color: var(--teal-700); padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 700; }
  .badge.danger { background: var(--rose-100); color: var(--rose-500); }
  .badge.warn { background: var(--amber-100); color: #92400e; }
  
  .history-list { display: flex; flex-direction: column; gap: 5px; max-height: 400px; overflow-y: auto; }
  .history-item { background: var(--slate-50); border-radius: 9px; padding: 9px; display: flex; align-items: center; gap: 9px; border-left: 3px solid var(--slate-300); }
  .history-item.match { border-left-color: var(--emerald-500); }
  .history-item.diff-plus { border-left-color: var(--amber-500); }
  .history-item.diff-minus { border-left-color: var(--rose-500); }
  .history-item.clickable { cursor: pointer; }
  .history-item.clickable:hover { background: var(--slate-100); }
  .history-content { flex: 1; min-width: 0; }
  .history-name { font-size: 12px; font-weight: 600; color: var(--slate-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .history-meta { font-size: 10px; color: var(--slate-500); font-family: 'Space Grotesk', monospace; }
  .history-qty { font-size: 15px; font-weight: 700; color: var(--slate-900); font-family: 'Space Grotesk', sans-serif; min-width: 38px; text-align: right; }
  
  .diff-plus-text { color: var(--amber-500); }
  .diff-minus-text { color: var(--rose-500); }
  .diff-match-text { color: var(--emerald-500); }
  
  .empty-state { text-align: center; padding: 24px 14px; color: var(--slate-400); }
  .empty-state svg { width: 40px; height: 40px; margin-bottom: 6px; opacity: 0.5; }
  
  /* Variance Badges */
  .var-level { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
  .var-level-1 { background: var(--emerald-100); color: var(--emerald-500); }
  .var-level-2 { background: var(--amber-100); color: #92400e; }
  .var-level-3 { background: #fed7aa; color: #c2410c; }
  .var-level-4 { background: var(--rose-100); color: var(--rose-500); }
  
  /* Banners */
  .banner { border-radius: 13px; padding: 11px 13px; display: flex; gap: 10px; margin-bottom: 12px; }
  .banner.amber { background: var(--amber-100); border: 1px solid var(--amber-400); }
  .banner.violet { background: var(--violet-100); border: 1px solid var(--violet-500); }
  .banner.sky { background: var(--sky-100); border: 1px solid var(--sky-500); }
  .banner-icon { width: 34px; height: 34px; border-radius: 9px; display: flex; align-items: center; justify-content: center; color: white; flex-shrink: 0; }
  .banner.amber .banner-icon { background: var(--amber-500); }
  .banner.violet .banner-icon { background: var(--violet-600); }
  .banner.sky .banner-icon { background: var(--sky-600); }
  .banner-icon svg { width: 18px; height: 18px; }
  .banner-text h4 { font-size: 12px; font-weight: 700; margin-bottom: 1px; }
  .banner-text p { font-size: 10px; }
  .banner.amber .banner-text { color: #78350f; }
  .banner.amber .banner-text h4 { color: #92400e; }
  .banner.violet .banner-text { color: #4c1d95; }
  .banner.violet .banner-text h4 { color: var(--violet-600); }
  .banner.sky .banner-text { color: #075985; }
  .banner.sky .banner-text h4 { color: var(--sky-600); }
  
  /* Stats grid */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 12px; }
  .stat-card { background: white; padding: 12px; border-radius: 12px; box-shadow: var(--sh-sm); border: 1px solid var(--slate-200); }
  .stat-card .num { font-size: 24px; font-weight: 700; color: var(--slate-900); font-family: 'Space Grotesk', sans-serif; }
  .stat-card .lbl { font-size: 10px; color: var(--slate-500); text-transform: uppercase; letter-spacing: 0.3px; margin-top: 2px; }
  
  /* KPI */
  .kpi-card { background: white; padding: 12px; border-radius: 12px; box-shadow: var(--sh-sm); border: 1px solid var(--slate-200); margin-bottom: 9px; }
  .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .kpi-title { font-size: 11px; font-weight: 700; color: var(--slate-700); text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-value { font-size: 26px; font-weight: 700; font-family: 'Space Grotesk', sans-serif; }
  .kpi-target { font-size: 10px; color: var(--slate-500); }
  .kpi-bar { height: 5px; background: var(--slate-100); border-radius: 3px; overflow: hidden; margin-top: 5px; }
  .kpi-bar-fill { height: 100%; transition: width 0.3s; border-radius: 3px; }
  .kpi-good .kpi-bar-fill { background: var(--emerald-500); }
  .kpi-warn .kpi-bar-fill { background: var(--amber-500); }
  .kpi-bad .kpi-bar-fill { background: var(--rose-500); }
  
  /* Zone selection */
  .zone-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; max-height: 280px; overflow-y: auto; }

function T(key) { return (I18N[lang] && I18N[lang][key]) || key; }

function applyI18n() {
  document.documentElement.lang = lang;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = T(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {

  });
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === lang);
  });
}

  localStorage.setItem('lang', l);

// ==================== UTILS ====================
function log(msg, data) {
  console.log('[FS]', msg, data || '');
}

function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type;
  setTimeout(() => el.classList.add('show'), 10);
  setTimeout(() => el.classList.remove('show'), 2800);
}

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 1200;
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
    osc.start(); osc.stop(ctx.currentTime + 0.1);
  } catch(e) {}
}

function showModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

async function hashPassword(pwd) {
  const data = new TextEncoder().encode(pwd + SALT);
  const buf = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ==================== AUTH ====================
async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  
  errEl.classList.remove('show');
  if (!username || !password) {
    errEl.textContent = T('login_failed');
    errEl.classList.add('show');
    return;
  }
  
  btn.disabled = true;
  btn.innerHTML = `<span class="loader"></span> ${T('logging_in')}`;
  
  try {
    const hash = await hashPassword(password);
    log('Login attempt:', username);
    
    // Step 1: Find user (without join to avoid issues)
    const { data: userData, error: userErr } = await sb
      .from('users')
      .select('*')
      .eq('username', username)
      .eq('password_hash', hash)
      .eq('is_active', true)
      .maybeSingle();
    
    if (userErr) throw userErr;
    if (!userData) {
      errEl.textContent = T('login_failed');
      errEl.classList.add('show');
      btn.disabled = false;
      btn.innerHTML = `<span>${T('login')}</span>`;
      return;
    }
    
    user = userData;
    log('User logged in:', user.username, 'role:', user.role);
    
    // Step 2: Load branch (default to PAKSE if no branch_id)
    if (user.branch_id) {
      const { data: br } = await sb.from('branches').select('*').eq('id', user.branch_id).maybeSingle();
      branch = br;
    }
    if (!branch) {
      const { data: pakse } = await sb.from('branches').select('*').eq('code', 'PAKSE').maybeSingle();
      branch = pakse;
      if (branch && !user.branch_id) {
        // Update user with branch_id
        await sb.from('users').update({ branch_id: branch.id }).eq('id', user.id);
        user.branch_id = branch.id;
      }
    }
    
    log('Branch:', branch);
    
    localStorage.setItem('fs_user', JSON.stringify(user));
    localStorage.setItem('fs_branch', JSON.stringify(branch));
    
    await afterLogin();
    
  } catch (e) {
    console.error('[FS] Login error:', e);
    errEl.textContent = T('login_failed') + ': ' + (e.message || e);
    errEl.classList.add('show');
    btn.disabled = false;
    btn.innerHTML = `<span>${T('login')}</span>`;
  }
}

async function afterLogin() {
  const needsZone = ['counter', 'verifier', 'ctl', 'staff', 'audit'].includes(user.role);
  
  if (needsZone) {
    await loadZonesAndLocations();
    showZoneStep();
  } else {
    enterApp();
  }
}

async function loadZonesAndLocations() {
  if (!branch) {
    log('ERROR: No branch loaded');
    return;
  }
  
  log('Loading zones + locations for branch:', branch.id);
  
  const [zonesRes, locsRes] = await Promise.all([
    sb.from('zones').select('*').eq('branch_id', branch.id).eq('is_active', true).order('sort_order'),
    sb.from('location_master').select('*').eq('branch_id', branch.id).eq('is_active', true).order('location_code')
  ]);
  
  allZones = zonesRes.data || [];
  allLocations = locsRes.data || [];
  
  // จัดกลุ่มตาม type
  locationsByType = {};
  allLocations.forEach(l => {
    if (!locationsByType[l.location_type]) locationsByType[l.location_type] = [];
    locationsByType[l.location_type].push(l);
  });
  
  log('Zones loaded:', allZones.length);
  log('Locations loaded:', allLocations.length);
  log('Location types:', Object.keys(locationsByType));
  
  if (!allZones.length) {
    showToast('ບໍ່ມີໂຊນ - ກະລຸນາໃຫ້ Admin ສ້າງໂຊນ', 'error');
  }
  if (!allLocations.length) {
    showToast('ບໍ່ມີຕຳແໜ່ງ - ກະລຸນາ run SQL 19-add-full-locations.sql', 'error');
  }
}

function showZoneStep() {
  document.getElementById('step-login').classList.remove('active');
  document.getElementById('step-zone').classList.add('active');
  document.getElementById('zoneStepGreeting').textContent = 
    `ສະບາຍດີ ${user.full_name} (${user.role.toUpperCase()})`;
  
  document.getElementById('zoneGrid').innerHTML = allZones.map(z => `
    <div class="zone-card" data-zone="${z.id}" onclick="selectZone(${z.id})">
      <div class="zone-code">${z.code}</div>
      <div class="zone-name">${lang === 'lo' ? z.name_lo : z.name_th}</div>
    </div>
  `).join('') || '<div style="padding:20px;text-align:center;color:var(--slate-500);font-size:12px;">No zones available</div>';
  
  // Update placeholder
  const inp = document.getElementById('locInput');
  if (inp) inp.placeholder = T('loc_format_hint');
  
  // แสดง location type tabs
  renderLocationTypes();
  
  // แสดง recent locations
  renderRecentLocations();
  
  // Pre-select if saved
  const saved = JSON.parse(localStorage.getItem('fs_context') || '{}');
  if (saved.zone) {
    const z = allZones.find(zz => zz.id == saved.zone);
    if (z) selectZone(z.id);
  }
  if (saved.locType) currentLocType = saved.locType;
  if (saved.location) {
    const l = allLocations.find(ll => ll.location_code === saved.location);
    if (l) {
      loc = l;
      renderSelectedLocation();
    }
  }
  renderLocationGrid();
}

function renderRecentLocations() {
  const recent = JSON.parse(localStorage.getItem('fs_loc_recent') || '[]');
  const row = document.getElementById('locRecentRow');
  const list = document.getElementById('locRecent');
  if (!row || !list) return;
  
  if (!recent.length) {
    row.style.display = 'none';
    return;
  }
  
  row.style.display = 'block';
  list.innerHTML = recent.slice(0, 8).map(code => `
    <div class="loc-recent-chip" onclick="pickRecent('${code}')">${code}</div>
  `).join('');
}

function pickRecent(code) {
  document.getElementById('locInput').value = code;
  onLocInput(code);
}

function saveRecentLocation(code) {
  let recent = JSON.parse(localStorage.getItem('fs_loc_recent') || '[]');
  recent = recent.filter(c => c !== code);  // remove if exists
  recent.unshift(code);  // add to front
  recent = recent.slice(0, 10);  // keep 10
  localStorage.setItem('fs_loc_recent', JSON.stringify(recent));
}

function onLocInput(value) {
  const code = value.trim().toUpperCase();
  const errEl = document.getElementById('locNotFound');
  
  // Clear if empty
  if (!code) {
    if (errEl) errEl.style.display = 'none';
    return;
  }
  
  // Find location
  const found = allLocations.find(l => l.location_code === code);
  
  if (found) {
    loc = found;
    // Auto switch type tab
    if (locationsByType[found.location_type]) {
      currentLocType = found.location_type;
      renderLocationTypes();
    }
    renderSelectedLocation();
    if (errEl) errEl.style.display = 'none';
    log('Location auto-selected:', found);
  } else {
    // Show suggestion ถ้าพิมพ์ครบ pattern แต่ไม่มี
    if (code.length >= 4 && errEl) {
      errEl.className = 'loc-not-found';
      errEl.style.display = 'block';
      errEl.innerHTML = `⚠️ ${T('loc_not_found')}: <strong>${code}</strong>`;
    } else if (errEl) {
      errEl.style.display = 'none';
    }
  }
}

function renderSelectedLocation() {
  const el = document.getElementById('locSelected');
  if (!el) return;
  
  if (!loc) {
    el.innerHTML = '';
    return;
  }
  
  el.innerHTML = `
    <div class="loc-selected">
      <div class="loc-selected-icon">📍</div>
      <div class="loc-selected-info">
        <div class="loc-selected-code">${loc.location_code}</div>
        <div class="loc-selected-desc">${loc.description || ''}</div>
      </div>
      <button class="loc-selected-clear" onclick="clearLocation()" title="${T('clear')}">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  `;
}

function clearLocation() {
  loc = null;
  document.getElementById('locInput').value = '';
  const errEl = document.getElementById('locNotFound');
  if (errEl) errEl.style.display = 'none';
  renderSelectedLocation();
}

function toggleBrowse() {
  const grid = document.getElementById('locGrid');
  const btn = document.getElementById('browseToggleBtn');
  if (!grid) return;
  
  if (grid.classList.contains('hidden')) {
    grid.classList.remove('hidden');
    btn.innerHTML = `↑ <span>${T('hide_browse')}</span>`;
    renderLocationGrid();
  } else {
    grid.classList.add('hidden');
    btn.innerHTML = `↓ <span>${T('browse_all')}</span>`;
  }
}

let locScanner = null;

async function scanLocCode() {
  // เปิดกล้องสแกน Barcode ที่ติดบน Gondola
  showModal(`
    <h3>${T('scan_loc_code')}</h3>
    <p>${T('loc_format_hint')}</p>
    <div id="locScanFrame" style="background:var(--slate-900);border-radius:11px;aspect-ratio:4/3;overflow:hidden;margin-bottom:10px;position:relative;">
      <div id="locReader" style="width:100%;"></div>
    </div>
    <div class="action-row">
      <button class="btn btn-secondary" onclick="stopLocScan()">${T('cancel')}</button>
    </div>
  `);
  
  setTimeout(async () => {
    locScanner = new Html5Qrcode("locReader");
    try {
      await locScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 280, height: 160 } },
        (decoded) => {
          stopLocScan();
          document.getElementById('locInput').value = decoded.trim().toUpperCase();
          onLocInput(decoded);
          beep();
        },
        () => {}
      );
    } catch (e) {
      showToast(T('scan_error'), 'error');
      stopLocScan();
    }
  }, 100);
}

async function stopLocScan() {
  if (locScanner) {
    try { await locScanner.stop(); } catch(e) {}
    locScanner = null;
  }
  closeModal();
}

function renderLocationTypes() {
  const types = ['gondola', 'gondola_top', 'wall', 'wall_top', 'display', 'cashier', 'rack', 'warehouse'];
  const typeIcons = {
    gondola: '📦', gondola_top: '⬆️📦', 
    wall: '🧱', wall_top: '⬆️🧱',
    display: '🎯', cashier: '💰', rack: '📐', warehouse: '🏭'
  };
  
  const tabsEl = document.getElementById('locTypeTabs');
  if (!tabsEl) return;
  
  tabsEl.innerHTML = types
    .filter(type => locationsByType[type] && locationsByType[type].length > 0)
    .map(type => `
      <button class="loc-type-tab ${currentLocType === type ? 'active' : ''}" 
              onclick="selectLocType('${type}')" 
              data-type="${type}">
        ${typeIcons[type]} ${T('loc_' + type)} 
        <span class="loc-type-count">${locationsByType[type].length}</span>
      </button>
    `).join('');
}

function selectLocType(type) {
  currentLocType = type;
  document.querySelectorAll('.loc-type-tab').forEach(t => 
    t.classList.toggle('active', t.dataset.type === type));
  
  // Re-render grid if visible
  const grid = document.getElementById('locGrid');
  if (grid && !grid.classList.contains('hidden')) {
    renderLocationGrid();
  }
}

function renderLocationGrid() {
  const grid = document.getElementById('locGrid');
  if (!grid) return;
  
  let items = locationsByType[currentLocType] || [];
  
  // ถ้าเลือก Gondola หรือ Gondola Top ให้กรองตาม Zone ที่เลือก
  if ((currentLocType === 'gondola' || currentLocType === 'gondola_top') && zone) {
    items = items.filter(l => l.zone_id === zone.id);
  }
  
  if (!items.length) {
    grid.innerHTML = `<div style="padding:20px;text-align:center;color:var(--slate-400);font-size:12px;grid-column:1/-1;">${T('no_locations')}</div>`;
    return;
  }
  
  grid.innerHTML = items.map(l => {
    const displayText = l.location_code;
    return `
      <div class="loc-chip" data-loc="${l.location_code}" onclick="selectLocation('${l.location_code}')" title="${l.description || ''}">
        ${displayText}
      </div>
    `;
  }).join('');
}

function selectZone(zoneId) {
  document.querySelectorAll('.zone-card').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.zone-card[data-zone="${zoneId}"]`)?.classList.add('selected');
  zone = allZones.find(z => z.id == zoneId);
  log('Zone selected:', zone);
  // re-render gondola/gondola_top list to filter by zone
  if (currentLocType === 'gondola' || currentLocType === 'gondola_top') renderLocationGrid();
}

function selectLocation(locCode) {
  loc = allLocations.find(l => l.location_code === locCode);
  if (!loc) return;
  log('Location selected:', loc);
  
  // Update input + display
  const inp = document.getElementById('locInput');
  if (inp) inp.value = locCode;
  renderSelectedLocation();
  
  // Highlight chip if visible
  document.querySelectorAll('.loc-chip').forEach(c => c.classList.remove('selected'));
  document.querySelector(`.loc-chip[data-loc="${locCode}"]`)?.classList.add('selected');
  
  // Hide grid after selection
  const grid = document.getElementById('locGrid');
  const btn = document.getElementById('browseToggleBtn');
  if (grid && !grid.classList.contains('hidden')) {
    grid.classList.add('hidden');
    if (btn) btn.innerHTML = `↓ <span>${T('browse_all')}</span>`;
  }
}

function confirmZoneLocation() {
  if (!zone || !loc) {
    showToast(T('please_select'), 'warning');
    return;
  }
  
  // Save to recent
  saveRecentLocation(loc.location_code);
  
  localStorage.setItem('fs_context', JSON.stringify({
    zone: zone.id, 
    location: loc.location_code,
    locType: currentLocType
  }));
  enterApp();
}

async function logout() {
  localStorage.removeItem('fs_user');
  localStorage.removeItem('fs_branch');
  localStorage.removeItem('fs_context');
  user = null; zone = null; loc = null; branch = null; session = null;

function changeZone() {
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginScreen').style.display = 'flex';
  showZoneStep();
}

async function ensureSession() {
  if (!branch) {
    log('ERROR: No branch for session');
    return null;
  }
  
  log('Ensuring session for branch:', branch.id);
  
  const { data: existing, error: selErr } = await sb
    .from('stock_sessions')
    .select('*')
    .eq('status', 'active')
    .eq('branch_id', branch.id)
    .order('started_at', { ascending: false })
    .limit(1)
    .maybeSingle();
  
  if (selErr) {
    log('Session select error:', selErr);
  }
  
  if (existing) {
    session = existing;
    log('Active session found:', session.id, session.session_name);
    return session;
  }
  
  // Create new session
  const now = new Date();
  const q = 'Q' + (Math.floor(now.getMonth()/3)+1) + '/' + now.getFullYear();
  const sessionName = `${q} - ${branch.name_lo || branch.name_th} ${now.toISOString().slice(0,10)}`;
  
  log('Creating new session:', sessionName);
  
  const { data: newS, error: insErr } = await sb
    .from('stock_sessions')
    .insert({
      session_name: sessionName,
      status: 'active',
      phase: 'counting',
      quarter: q,
      branch_id: branch.id,
      started_by: user.id
    })
    .select()
    .single();
  
  if (insErr) {
    log('Session create error:', insErr);
    showToast('Error creating session: ' + insErr.message, 'error');
    return null;
  }
  
  session = newS;
  log('New session created:', session.id);
  return session;
}

    c.innerHTML = renderHistoryPage();
    loadHistory();
  } else if (page === 'tiebreaker') {
    c.innerHTML = renderTiebreakerPage();
    loadTiebreakerList();
  } else if (page === 'dashboard') {

    c.innerHTML = renderUsersPage();

async function startScan() {
  document.getElementById('scanPlaceholder').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('startScanBtn').style.display = 'none';
  document.getElementById('stopScanBtn').style.display = 'flex';
  document.getElementById('scanFrame').classList.add('scanning');
  
  html5QrCode = new Html5Qrcode("reader");
  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 280, height: 160 } },
      (decoded) => { stopScan(); lookupProduct(decoded); },
      () => {}
    );
  } catch (e) {
    showToast(T('scan_error'), 'error');
    stopScan();
  }
}

async function stopScan() {
  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch(e) {}
    html5QrCode = null;
  }
  const ph = document.getElementById('scanPlaceholder');
  if (ph) {
    ph.style.display = 'block';
    document.getElementById('reader').style.display = 'none';
    document.getElementById('startScanBtn').style.display = 'flex';
    document.getElementById('stopScanBtn').style.display = 'none';
    document.getElementById('scanFrame').classList.remove('scanning');
  }
}

async function manualLookup() {
  const bc = document.getElementById('manualBarcode').value.trim();
  if (!bc) return;
  await lookupProduct(bc);
  document.getElementById('manualBarcode').value = '';
}

async function lookupProduct(barcode) {
  beep();
  log('Lookup product:', barcode);
  
  const { data, error } = await sb.from('products').select('*').eq('barcode', barcode).maybeSingle();
  
  if (error) {
    log('Lookup error:', error);
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  if (!data) {
    document.getElementById('productCard').innerHTML = `
      <div class="product-card" style="border-left-color: var(--rose-500);">
        <div class="product-name" style="color: var(--rose-500);">⚠️ ${T('product_not_found')}</div>
        <div class="product-barcode">${barcode}</div>
        <button class="btn btn-amber" onclick="openNewSKUModal('${barcode}')" style="margin-top:8px;">
          ${T('add_new_sku')}
        </button>
      </div>
    `;
    return;
  }
  
  curProduct = data;
  renderProduct(data);
}

function renderProduct(p) {
  const name = lang === 'lo' ? (p.name_lo || p.name_th) : (p.name_th || p.name_lo);
  const unit = lang === 'lo' ? (p.unit_lo || p.unit_th || 'pcs') : (p.unit_th || p.unit_lo || 'ชิ้น');
  const price = Number(p.sell_price || 0).toLocaleString();
  const r = user.role;
  const isAdmin = ['admin', 'scc', 'bcs'].includes(r);
  const isVerifier = ['verifier', 'audit'].includes(r);
  const isCTL = r === 'ctl';
  
  let labelText = T('count_label');
  let modeClass = '';
  if (isVerifier) { labelText = T('verify_label'); modeClass = 'audit-mode'; }
  if (isCTL) { labelText = T('tiebreaker_label'); modeClass = 'tiebreaker-mode'; }
  
  const metaSection = isAdmin ? `
    <div class="product-meta">
      <div class="meta-item"><div class="meta-label">${T('pos_qty')}</div><div class="meta-value mono">${p.pos_qty || 0} ${unit}</div></div>
      <div class="meta-item"><div class="meta-label">${T('sell_price')}</div><div class="meta-value mono">₭ ${price}</div></div>
    </div>` : `
    <div class="product-meta" style="grid-template-columns: 1fr;">
      <div class="meta-item" style="background: var(--teal-50);">
        <div class="meta-label">${T('unit_label')}</div>
        <div class="meta-value mono">${unit}</div>
      </div>
    </div>`;
  
  const mdWarning = p.is_markdown ? `<div class="md-badge">MD ${p.barcode.substring(0,3)}</div>` : '';
  const startValue = isAdmin ? (p.pos_qty || 0) : 0;
  
  document.getElementById('productCard').innerHTML = `
    <div class="product-card ${modeClass}">
      ${mdWarning}
      <div class="product-name">${name}</div>
      <div class="product-barcode">${p.barcode}</div>
      ${metaSection}
      <div class="count-section ${modeClass}">
        <div class="count-label">${labelText}</div>
        <div class="count-controls">
          <button class="count-btn" onclick="adjustCount(-1)">−</button>
          <input class="count-input mono" id="countInput" type="number" inputmode="numeric" value="${startValue}" min="0">
          <button class="count-btn" onclick="adjustCount(1)">+</button>
        </div>
      </div>
      <textarea class="note-input" id="noteInput" rows="2" placeholder="${T('note_placeholder')}"></textarea>
      <div class="action-row">
        <button class="btn btn-secondary" onclick="cancelCount()">${T('cancel')}</button>
        <button class="btn btn-primary" id="saveBtn" onclick="saveCount()">${T('save')}</button>
      </div>
    </div>
  `;
  setTimeout(() => {
    const inp = document.getElementById('countInput');
    if (inp) { inp.focus(); inp.select(); }
  }, 100);
}

function adjustCount(delta) {
  const inp = document.getElementById('countInput');
  if (!inp) return;
  let v = parseInt(inp.value) || 0;
  inp.value = Math.max(0, v + delta);
}

function cancelCount() {
  curProduct = null;
  curTask = null;
  const c = document.getElementById('productCard');
  if (c) c.innerHTML = '';
}

async function saveCount() {
  if (!curProduct) {
    showToast('No product selected', 'error');
    return;
  }
  if (!session) {
    showToast(T('locked_session'), 'error');
    log('ERROR: No session when saving');
    return;
  }
  
  const count = parseInt(document.getElementById('countInput').value) || 0;
  const note = document.getElementById('noteInput').value.trim();
  const saveBtn = document.getElementById('saveBtn');
  
  saveBtn.disabled = true;
  saveBtn.innerHTML = `<span class="loader"></span> ${T('saving')}`;
  
  // Determine count_role
  let countRole = 'counter';
  const r = user.role;
  if (['verifier', 'audit'].includes(r)) countRole = 'verifier';
  else if (r === 'ctl') countRole = 'ctl_tiebreaker';
  else if (['admin', 'scc', 'bcs'].includes(r)) countRole = 'manager_final';
  
  const insertData = {
    session_id: session.id,
    branch_id: branch?.id || user.branch_id,
    product_id: curProduct.id,
    zone_id: zone?.id || null,
    location_code: loc?.location_code || null,
    gondola_code: loc?.location_code || null,  // เก็บ Location เต็มเป็น gondola_code ด้วย
    user_id: user.id,
    counted_qty: count,
    pos_qty_snapshot: curProduct.pos_qty || 0,
    count_role: countRole,
    is_markdown: curProduct.is_markdown || false,
    note: note || null,
  };
  
  log('Saving count:', insertData);
  
  const { data, error } = await sb.from('stock_counts').insert(insertData).select().single();
  
  if (error) {
    console.error('[FS] Save error:', error);
    showToast('Error: ' + error.message, 'error');
    saveBtn.disabled = false;
    saveBtn.innerHTML = T('save');
    return;
  }
  
  log('Saved successfully:', data);
  
  // Show feedback based on workflow_status
  let toastMsg = T('saved');
  let toastType = 'success';
  if (data.workflow_status === 'matched') {
    toastMsg = '✓ ' + T('matched');
  } else if (data.workflow_status === 'needs_audit') {
    toastMsg = '⚠️ ' + T('need_tb');
    toastType = 'warning';
  }
  
  showToast(toastMsg, toastType);
  cancelCount();
  await loadSessionStats();
  updateTbBadge();
}

// ==================== STATS ====================
async function loadSessionStats() {
  if (!session) return;
  
  const r = user.role;
  const isAdmin = ['admin', 'scc', 'bcs'].includes(r);
  
  log('Loading stats for session:', session.id, 'user:', user.id);
  
  // ดึงเฉพาะของ user นี้ (ไม่ใช่ทั้งหมด)
  const { data, error } = await sb.from('stock_counts')
    .select('counted_qty, pos_qty_snapshot, diff')
    .eq('session_id', session.id)
    .eq('user_id', user.id);
  
  if (error) {
    log('Stats error:', error);
    return;
  }
  
  log('My counts:', (data || []).length);
  
  const items = data || [];
  const totalScanned = items.length;
  const totalQty = items.reduce((s, x) => s + (x.counted_qty || 0), 0);
  const totalDiff = items.reduce((s, x) => s + (x.diff || 0), 0);
  
  const sEl = document.getElementById('statScanned');
  const tEl = document.getElementById('statTotal');
  const dEl = document.getElementById('statDiff');
  const dCard = document.getElementById('statDiffCard');
  
  if (sEl) sEl.textContent = totalScanned.toLocaleString();
  if (tEl) tEl.textContent = totalQty.toLocaleString();
  
  if (isAdmin) {
    if (dEl) dEl.textContent = (totalDiff > 0 ? '+' : '') + totalDiff.toLocaleString();
  } else {
    if (dCard) {
      dCard.style.display = 'none';
      const parent = dCard.parentElement;
      if (parent) parent.style.gridTemplateColumns = '1fr 1fr';
    }
  }
}

// ==================== HISTORY ====================
function renderHistoryPage() {
  return `
    <div class="history-card">
      <div class="section-title">
        ${T('my_counts')}
        <span class="badge" id="histCount">0</span>
      </div>
      <div class="history-list" id="histList"></div>
    </div>
  `;
}

async function loadHistory() {
  if (!session) return;
  
  log('Loading history for user:', user.id);
  
  const { data, error } = await sb.from('stock_counts')
    .select(`
      id, counted_qty, pos_qty_snapshot, diff, variance_level, is_markdown, workflow_status, counted_at, note,
      products(barcode, name_th, name_lo)
    `)
    .eq('session_id', session.id)
    .eq('user_id', user.id)
    .order('counted_at', { ascending: false })
    .limit(50);
  
  if (error) {
    log('History error:', error);
    showToast('Error: ' + error.message, 'error');
    return;
  }
  
  const list = document.getElementById('histList');
  const countEl = document.getElementById('histCount');
  if (!list) return;
  
  const items = data || [];
  log('History loaded:', items.length, 'items');
  
  if (countEl) countEl.textContent = items.length;
  
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_history')}</p></div>`;
    return;
  }
  
  const isAdmin = ['admin', 'scc', 'bcs'].includes(user.role);
  
  list.innerHTML = items.map(item => {
    const p = item.products || {};
    const name = lang === 'lo' ? (p.name_lo || p.name_th || '?') : (p.name_th || p.name_lo || '?');
    const diff = item.diff || 0;
    const cls = isAdmin ? (diff === 0 ? 'match' : (diff > 0 ? 'diff-plus' : 'diff-minus')) : 'match';
    const diffText = isAdmin ? (diff === 0 ? '✓' : (diff > 0 ? `+${diff}` : `${diff}`)) : '✓';
    const diffCls = isAdmin ? (diff === 0 ? 'diff-match-text' : (diff > 0 ? 'diff-plus-text' : 'diff-minus-text')) : 'diff-match-text';
    
    const varLevel = (isAdmin && item.variance_level) ? `<span class="var-level var-level-${item.variance_level}">L${item.variance_level}</span>` : '';
    const mdBadge = item.is_markdown ? '<span class="md-badge" style="margin-left:4px;">MD</span>' : '';
    
    return `
      <div class="history-item ${cls}">
        <div class="history-content">
          <div class="history-name">${name}${mdBadge}</div>
          <div class="history-meta">${p.barcode || ''} • <span class="${diffCls}">${diffText}</span> ${varLevel}</div>
        </div>
        <div class="history-qty mono">${item.counted_qty}</div>
      </div>
    `;
  }).join('');
}

async function loadTiebreakerList() {
  if (!session) return;
  
  log('Loading tiebreaker list');
  
  let q = sb.from('v_needs_tiebreaker').select('*').eq('session_id', session.id);
  if (zone) q = q.eq('zone_id', zone.id);
  
  const { data, error } = await q;
  
  if (error) {
    log('Tiebreaker error:', error);
    showToast('Error: ' + error.message, 'error');
  }
  
  const items = data || [];
  log('Tiebreaker items:', items.length);
  
  const list = document.getElementById('tbList');
  const countEl = document.getElementById('tbCount');
  if (countEl) countEl.textContent = items.length;
  if (!list) return;
  
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_history')}</p></div>`;
    return;
  }
  
  const isAdmin = ['admin', 'scc', 'bcs'].includes(user.role);
  
  list.innerHTML = items.map(item => {
    const name = lang === 'lo' ? (item.name_lo || item.name_th) : (item.name_th || item.name_lo);
    const diff = Math.abs(item.cv_diff || 0);
    const valDiff = Number(item.cv_value_diff || 0);
    let priority = 'low', icon = '·', color = 'var(--teal-700)', bg = 'var(--teal-100)';
    if (valDiff > 300000 || diff >= 20) { priority = 'high'; icon = '!'; color = 'var(--rose-500)'; bg = 'var(--rose-100)'; }
    else if (diff >= 5) { priority = 'medium'; icon = '!'; color = 'var(--amber-500)'; bg = 'var(--amber-100)'; }
    
    const details = isAdmin ? `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px;padding:7px;background:var(--slate-50);border-radius:7px;margin-top:6px;">
        <div><span style="color:var(--slate-500);">Counter:</span> <strong>${item.counter_qty}</strong></div>
        <div><span style="color:var(--slate-500);">Verifier:</span> <strong>${item.verifier_qty}</strong></div>
        <div style="grid-column:1/-1;"><span style="color:var(--slate-500);">Diff:</span> <strong style="color:var(--rose-500);">${item.cv_diff > 0 ? '+' : ''}${item.cv_diff}</strong> (₭ ${valDiff.toLocaleString()})</div>
      </div>` : '';
    
    return `
      <div class="history-item clickable" onclick="startTiebreaker(${item.product_id}, ${item.zone_id || 'null'}, '${item.location_code || ''}')" style="display:block;">
        <div style="display:flex;align-items:center;gap:9px;">

        </div>

    `;
  }).join('');
}

async function startTiebreaker(productId, zoneId, locationCode) {
  log('Start tiebreaker:', productId, zoneId, locationCode);
  
  goPage('scan');
  
  setTimeout(async () => {
    const { data: p } = await sb.from('products').select('*').eq('id', productId).single();
    if (!p) return;
    
    if (zoneId && zoneId !== 'null') {
      const z = allZones.find(zz => zz.id == zoneId);
      if (z) zone = z;
    }
    if (locationCode) {
      const l = allLocations.find(ll => ll.location_code === locationCode);
      if (l) loc = l;
    }
    
    curProduct = p;
    curTask = { type: 'tiebreaker' };
    renderProduct(p);
  }, 200);
}

async function loadKPI() {
  if (!session) return;
  
  log('Loading KPI');
  
  // Get all counts + products for calculation
  const { data: counts } = await sb.from('stock_counts')
    .select(`counted_qty, pos_qty_snapshot, diff, variance_level, is_markdown,
             products(sell_price)`)
    .eq('session_id', session.id);
  
  const items = counts || [];
  const list = document.getElementById('kpiList');
  if (!list) return;
  
  if (!items.length) {
    list.innerHTML = `<div class="empty-state"><p>${T('no_history')}</p></div>`;
    return;
  }
  
  const total = items.length;
  const l1Count = items.filter(x => x.variance_level === 1).length;
  const recountCount = items.filter(x => (x.variance_level || 0) >= 3).length;
  
  const accuracy = (l1Count / total * 100);
  const recountRate = (recountCount / total * 100);
  
  let shrinkageValue = 0, overageValue = 0, totalPosValue = 0;
  items.forEach(x => {
    const price = x.products?.sell_price || 0;
    if (x.diff < 0) shrinkageValue += Math.abs(x.diff) * price;
    if (x.diff > 0) overageValue += x.diff * price;
    totalPosValue += (x.pos_qty_snapshot || 0) * price;
  });
  
  const shrinkagePct = totalPosValue ? (shrinkageValue / totalPosValue * 100) : 0;
  
  const accCls = accuracy >= 95 ? 'kpi-good' : (accuracy >= 90 ? 'kpi-warn' : 'kpi-bad');
  const rcCls = recountRate <= 5 ? 'kpi-good' : (recountRate <= 10 ? 'kpi-warn' : 'kpi-bad');
  const shCls = shrinkagePct <= 0.3 ? 'kpi-good' : (shrinkagePct <= 1 ? 'kpi-warn' : 'kpi-bad');
  
  const mdCount = items.filter(x => x.is_markdown).length;
  
  list.innerHTML = `
    <div class="kpi-card ${accCls}">
      <div class="kpi-header"><div class="kpi-title">${T('count_accuracy')}</div><div class="kpi-value">${accuracy.toFixed(1)}%</div></div>
      <div class="kpi-target">Target: ≥ 95%</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(accuracy,100)}%"></div></div>
    </div>
    <div class="kpi-card ${rcCls}">
      <div class="kpi-header"><div class="kpi-title">${T('recount_rate')}</div><div class="kpi-value">${recountRate.toFixed(1)}%</div></div>
      <div class="kpi-target">Target: < 5%</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(recountRate*5,100)}%"></div></div>
    </div>
    <div class="kpi-card ${shCls}">
      <div class="kpi-header"><div class="kpi-title">${T('shrinkage_pct')}</div><div class="kpi-value">${shrinkagePct.toFixed(2)}%</div></div>
      <div class="kpi-target">Target: < 0.3%</div>
      <div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(shrinkagePct*30,100)}%"></div></div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="num">₭${shrinkageValue.toLocaleString()}</div><div class="lbl">Shrinkage</div></div>
      <div class="stat-card"><div class="num">${total}</div><div class="lbl">SKUs Counted</div></div>
      <div class="stat-card"><div class="num">${mdCount}</div><div class="lbl">MD SKUs</div></div>
      <div class="stat-card"><div class="num">₭${overageValue.toLocaleString()}</div><div class="lbl">Overage</div></div>
    </div>
  `;
}

async function saveUser() {
  const id = document.getElementById('editId').value;
  const username = document.getElementById('mUsername').value.trim();
  const password = document.getElementById('mPassword').value;
  const fullName = document.getElementById('mFullName').value.trim();
  const role = document.getElementById('mRole').value;
  const errEl = document.getElementById('userErr');
  
  if (!username || !fullName) {
    errEl.textContent = T('fill_required');
    errEl.classList.add('show');
    return;
  }
  
  try {
    if (id) {
      const upd = { username, full_name: fullName, role, updated_at: new Date().toISOString() };
      if (password) upd.password_hash = await hashPassword(password);
      const { error } = await sb.from('users').update(upd).eq('id', id);
      if (error) throw error;
    } else {
      if (!password) {
        errEl.textContent = 'Password required';
        errEl.classList.add('show');
        return;
      }
      const hash = await hashPassword(password);
      const { error } = await sb.from('users').insert({
        username, password_hash: hash, full_name: fullName, role,
        language: 'lo', is_active: true,
        branch_id: branch?.id
      });
      if (error) throw error;
    }
    showToast(T('user_saved'), 'success');
    closeModal();
    loadUsers();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.add('show');
  }
}

window.startScan = startScan;
window.stopScan = stopScan;
window.manualLookup = manualLookup;
window.adjustCount = adjustCount;
window.cancelCount = cancelCount;
window.saveCount = saveCount;
window.startTiebreaker = startTiebreaker;
window.openUserModal = openUserModal;
window.editUser = editUser;
window.saveUser = saveUser;
window.closeModal = closeModal;
window.openExpiryModal = openExpiryModal;
window.saveExpiry = saveExpiry;
window.openNewSKUModal = openNewSKUModal;
window.saveNewSKU = saveNewSKU;

document.addEventListener('keydown', e => {
  if (e.target.id === 'password' && e.key === 'Enter') login();
  if (e.target.id === 'manualBarcode' && e.key === 'Enter') manualLookup();
  if (e.target.id === 'locInput' && e.key === 'Enter') {
    // ถ้าเลือก location แล้ว + เลือก zone แล้ว → confirm ทันที
    if (loc && zone) confirmZoneLocation();
  }
});

applyI18n();

// Auto-login
(async () => {
  const saved = localStorage.getItem('fs_user');
  const savedBranch = localStorage.getItem('fs_branch');
  
  if (saved) {
    try {
      user = JSON.parse(saved);
      if (savedBranch) branch = JSON.parse(savedBranch);
      
      // Re-fetch branch to make sure
      if (!branch && user.branch_id) {
        const { data } = await sb.from('branches').select('*').eq('id', user.branch_id).maybeSingle();
        branch = data;
      }
      if (!branch) {
        const { data } = await sb.from('branches').select('*').eq('code', 'PAKSE').maybeSingle();
        branch = data;
      }
      
      const ctx = JSON.parse(localStorage.getItem('fs_context') || '{}');
      const needsZone = ['counter', 'verifier', 'ctl', 'staff', 'audit'].includes(user.role);
      
      if (needsZone) {
        await loadZonesAndLocations();
        if (ctx.zone) zone = allZones.find(z => z.id == ctx.zone);
        if (ctx.locType) currentLocType = ctx.locType;
        if (ctx.location) loc = allLocations.find(l => l.location_code === ctx.location);
        
        if (!zone || !loc) {
          showZoneStep();
        } else {
          enterApp();
        }
      } else {
        enterApp();
      }
    } catch(e) {
      console.error('[FS] Auto-login error:', e);
    }
  }
})();
</script>
